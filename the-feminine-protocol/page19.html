<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            background: #001a1d; color: #4ed9e6; font-family: sans-serif; 
            margin: 0; padding: 20px; display: flex; justify-content: center; 
            align-items: center; min-height: 100vh; box-sizing: border-box; 
        }

        .quiz-container { 
            width: 100%; max-width: 500px; background: rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(78, 217, 230, 0.2); border-radius: 12px; 
            padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        .phase-label { 
            font-size: 10px; color: #ffab40; letter-spacing: 3px; 
            text-transform: uppercase; font-weight: bold; opacity: 0.8;
        }

        h2 { font-size: 17px; line-height: 1.6; margin: 15px 0; color: #fff; }

        /* Option Styling */
        .option { 
            display: block; width: 100%; padding: 14px; margin: 10px 0; 
            background: rgba(78, 217, 230, 0.05); border: 1px solid rgba(78, 217, 230, 0.2); 
            color: #4ed9e6; border-radius: 8px; cursor: pointer; text-align: left; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-size: 13px; line-height: 1.5; 
        }

        .option:hover { 
            background: #4ed9e6; color: #000; font-weight: bold; 
            transform: translateX(8px); border-color: #fff;
        }

        /* Result Box & Next Button */
        #result-box { 
            display: none; margin-top: 15px; padding: 20px; 
            border: 1px solid #ffab40; background: rgba(255, 171, 64, 0.08); 
            border-radius: 10px; animation: fadeInUp 0.5s ease; 
        }

        .res-title { 
            font-size: 15px; font-weight: bold; color: #ffab40; 
            margin-bottom: 10px; display: block; border-left: 4px solid #ffab40; 
            padding-left: 10px; text-transform: uppercase;
        }

        .res-desc { color: #fff; font-size: 13px; line-height: 1.7; margin-bottom: 20px; }

        .next-btn { 
            display: block; width: 100%; padding: 15px; background: #ffab40; 
            color: #000; border: none; border-radius: 6px; font-weight: 900; 
            cursor: pointer; text-align: center; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s;
        }

        .next-btn:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,171,64,0.3); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="quiz-container">
    <span class="phase-label">SYSTEM SCAN: PAGE 19</span>
    <h2 id="q-text">အမျိုးသားတစ်ယောက်အနေနဲ့ တစ်ဖက်လူရဲ့ ဟန်ဆောင်မျက်နှာဖုံးကို ဘယ်လို ခွဲခြားမလဲ?</h2>
    
    <div id="options-group">
        <button class="option" onclick="showAnalysis('THE SILENT OBSERVER', 'သင်ဟာ ရေငြိမ်အောက်က အန္တရာယ်ရှိတဲ့ ကျောက်ဆောင်တစ်ခုနဲ့ တူပါတယ်။ ဘာမှမသိသလို ဟန်ဆောင်ပြီး တစ်ဖက်လူရဲ့ ကစားကွက်ကို အဆုံးထိ ငြိမ်ကြည့်နေခြင်းက သူတို့ရဲ့ အားနည်းချက်ကို ဖမ်းဆုပ်ဖို့ အထိရောက်ဆုံး နည်းလမ်းပါပဲ။')">၁။ ဘာမှမသိသလို ဟန်ဆောင်ပြီး တစ်ဖက်လူရဲ့ ကစားကွက်ကို အဆုံးထိ ငြိမ်ကြည့်နေတယ်</button>
        
        <button class="option" onclick="showAnalysis('THE DOMINATOR', 'သင့်မှာ ပြင်းထန်တဲ့ လွှမ်းမိုးနိုင်စွမ်းရှိပါတယ်။ တစ်ဖက်လူရဲ့ မျက်လုံးကို တိုက်ရိုက်စိုက်ကြည့်ပြီး တုံ့ပြန်မှုကို စမ်းသပ်ခြင်းက သူတို့ရဲ့ မရိုးသားမှုနဲ့ ကြောက်ရွံ့မှုကို အမြန်ဆုံး ဖော်ထုတ်နိုင်တဲ့ နည်းလမ်းပါပဲ။')">၂။ မျက်လုံးချင်း စိုက်ကြည့်ပြီး သူတို့ရဲ့ တုံ့ပြန်မှုကို တိုက်ရိုက် စမ်းသပ်တယ်</button>
        
        <button class="option" onclick="showAnalysis('THE PRAGMATIST', 'သင်ဟာ အချက်အလက်နဲ့ အကျိုးအမြတ်ကိုပဲ ကြည့်တဲ့ လက်တွေ့သမားပါ။ တစ်ဖက်လူရဲ့ လှပတဲ့ စကားလုံးတွေထက် သူတို့ ရနိုင်မယ့် ကိန်းဂဏန်းနဲ့ အကျိုးအမြတ်ကိုပဲ တွက်ချက်ပြီး မျက်နှာဖုံးကို ခွာချတတ်သူ ဖြစ်ပါတယ်။')">၃။ တစ်ဖက်လူရဲ့ စကားလုံးတွေထက် သူတို့ ရနိုင်မယ့် အကျိုးအမြတ်ကိုပဲ တွက်ချက်တယ်</button>
        
        <button class="option" onclick="showAnalysis('THE SKEPTIC', 'သင့်ရဲ့ သံသယစိတ်က သင့်အတွက် အကောင်းဆုံး ဒိုင်းလွှားပါပဲ။ အလွန်အမင်း ယဉ်ကျေးပျူငှာပြနေတာကို မရိုးသားမှုရဲ့ အစလို့ သတ်မှတ်ထားခြင်းက သင့်ကို ကြိုးကိုင်ခြယ်လှယ်မှု (Manipulation) တွေကနေ ကာကွယ်ပေးထားပါတယ်။')">၄။ အလွန်အမင်း ယဉ်ကျေးပြနေတာကို မရိုးသားမှုရဲ့ လက္ခဏာလို့ သတ်မှတ်တယ်</button>
        
        <button class="option" onclick="showAnalysis('THE DISTANT', 'သင်ဟာ အတွင်းစည်းကို သေချာကာကွယ်ထားတဲ့ခံတပ်တစ်ခုလိုပါပဲ။ တစ်ဖက်လူရဲ့ အပြုအမူတွေကို စိတ်မဝင်စားသလို ခပ်စိမ်းစိမ်း နေလိုက်ခြင်းဖြင့် သူတို့ကို သင့်ရဲ့ ကစားကွက်ထဲ ဝင်မလာနိုင်အောင် တားဆီးထားနိုင်ပါတယ်။')">၅။ တစ်ဖက်လူရဲ့ အပြုအမူတွေကို စိတ်မဝင်စားသလိုပဲ ခပ်စိမ်းစိမ်း နေလိုက်တယ်</button>
    </div>

    <div id="result-box">
        <span class="res-title" id="res-title"></span>
        <p class="res-desc" id="res-desc"></p>
        
        <button onclick="parent.postMessage('quizCompleted', '*')" class="next-btn">
            နောက်တစ်ခန်းသို့သွားရန် Lock ဖွင့်ပါ →
        </button>
    </div>
</div>

<script>
    function showAnalysis(title, desc) {
        document.getElementById('options-group').style.display = 'none';
        document.getElementById('q-text').style.opacity = '0.3';
        document.getElementById('res-title').innerText = title;
        document.getElementById('res-desc').innerText = desc;
        document.getElementById('result-box').style.display = 'block';
    }
</script>

</body>
</html>
