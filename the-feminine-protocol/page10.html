<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #001a1d; color: #4ed9e6; font-family: sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; box-sizing: border-box; }
        .quiz-container { width: 100%; max-width: 480px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(78, 217, 230, 0.3); border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .phase-label { font-size: 10px; color: #ffab40; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
        h2 { font-size: 16px; line-height: 1.6; margin: 15px 0; color: #fff; }
        .option { display: block; width: 100%; padding: 12px; margin: 8px 0; background: rgba(78, 217, 230, 0.05); border: 1px solid rgba(78, 217, 230, 0.2); color: #4ed9e6; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.3s; font-size: 13px; }
        .option:hover { background: #4ed9e6; color: #000; font-weight: bold; }
        
        /* Result Box Style */
        #result-box { display: none; margin-top: 15px; padding: 15px; border: 1px solid #ffab40; background: rgba(255, 171, 64, 0.1); border-radius: 10px; animation: fadeInUp 0.5s ease; }
        .res-title { font-size: 14px; font-weight: bold; color: #ffab40; margin-bottom: 8px; display: block; border-left: 3px solid #ffab40; padding-left: 8px; }
        .res-desc { color: #fff; font-size: 13px; line-height: 1.6; margin-bottom: 15px; }

        /* Lock ဖွင့်မည့် ခလုတ်အသစ် */
        .next-btn { 
            display: block; width: 100%; padding: 12px; background: #ffab40; 
            color: #000; border: none; border-radius: 8px; font-weight: bold; 
            cursor: pointer; text-align: center; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s;
        }
        .next-btn:hover { background: #fff; transform: translateY(-2px); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="quiz-container">
    <span class="phase-label">စာမျက်နှာ ၁၀ - အခြေအနေကို ဆန်းစစ်ခြင်း</span>
    <h2 id="q-text">သင့်ရဲ့ ဆုံးဖြတ်ချက်တွေအပေါ် တစ်ဖက်လူရဲ့ လွှမ်းမိုးမှုကို ဘယ်လို တုံ့ပြန်မလဲ?</h2>
    
    <div id="options-group">
        <button class="option" onclick="showAnalysis('အချုပ်အခြာအာဏာရှင်', 'သင်ဟာ သင့်ဘဝရဲ့ ဘုရင်ပါပဲ။ တစ်ဖက်လူ ဘာဖြစ်ဖြစ် ကိုယ့်စိတ်ဆန္ဒအတိုင်းပဲ ဘာကိုမှ ဂရုမစိုက်ဘဲ လုပ်ဆောင်နိုင်တဲ့ ပြတ်သားတဲ့ စိတ်ဓာတ်ရှိပါတယ်။')">၁။ တစ်ဖက်လူ ဘာဖြစ်ဖြစ် ကိုယ့်စိတ်ဆန္ဒအတိုင်းပဲ ဘာကိုမှ ဂရုမစိုက်ဘဲ လုပ်တယ်</button>
        <button class="option" onclick="showAnalysis('ဗျူဟာမြောက်သူ', 'ကိုယ့်စိတ်ကြိုက်ဖြစ်ဖို့အတွက် တစ်ဖက်လူကိုပါ ဗျူဟာမြောက် အသုံးချနိုင်စွမ်းရှိပါတယ်။ ဒါဟာ ထက်မြက်တဲ့ အမျိုးသားတစ်ယောက်ရဲ့ လက္ခဏာပါ။')">၂။ ကိုယ့်စိတ်ကြိုက်ဖြစ်ဖို့အတွက် တစ်ဖက်လူကိုပါ ဗျူဟာမြောက် အသုံးချတယ်</button>
        <button class="option" onclick="showAnalysis('လွတ်လပ်စွာ ဆုံးဖြတ်သူ', 'ကိုယ့်အမှားကို ကိုယ်တိုင်တာဝန်ယူရဲတဲ့ စိတ်ဓာတ်ရှိပါတယ်။ တစ်ဖက်လူရဲ့ ဝေဖန်မှုကို လုံးဝ နားမယောင်ဘဲ ကိုယ့်လမ်းကိုယ် သွားတတ်သူပါ။')">၃။ ကိုယ့်ရဲ့ ဆုံးဖြတ်ချက်တွေကို တစ်ဖက်လူ ဝေဖန်တာကို လုံးဝ နားမယောင်ဘူး</button>
        <button class="option" onclick="showAnalysis('သံသယရှိသူ', 'ကိုယ့်လုပ်ဆောင်ချက်တွေကို ပြန်လည် သံသယဝင်နေခြင်းဟာ တစ်ဖက်လူရဲ့ ကြိုးကိုင်မှုကို စတင်ခံနေရတဲ့ လက္ခဏာဖြစ်လို့ သတိထားဖို့ လိုပါတယ်။')">၄။ ကိုယ့်ရဲ့ လုပ်ဆောင်ချက်တွေအပေါ် တစ်ခါတစ်ရံ သံသယဝင်မိတတ်တယ်</button>
        <button class="option" onclick="showAnalysis('အလိုက်သင့် နေသူ', 'တစ်ဖက်လူ စိတ်ဆိုးမှာစိုးလို့ ကိုယ့်ရည်မှန်းချက်တွေကို လျှော့ချပေးမိခြင်းဟာ သင့်ရဲ့ Identity ကို ပျောက်ဆုံးစေနိုင်ပါတယ်။')">၅။ တစ်ဖက်လူ စိတ်ဆိုးမှာစိုးလို့ ကိုယ့်ရည်မှန်းချက်တွေကို လျှော့ချပေးမိတယ်</button>
    </div>

    <div id="result-box">
        <span class="res-title" id="res-title"></span>
        <p class="res-desc" id="res-desc"></p>
        
        <button onclick="parent.postMessage('quizCompleted', '*')" class="next-btn">
            နောက်တစ်ခန်းသို့သွားရန် Lock ဖွင့်ပါ →
        </button>
    </div>
</div>

<script>
    function showAnalysis(title, desc) {
        document.getElementById('options-group').style.display = 'none';
        document.getElementById('q-text').style.opacity = '0.5';
        document.getElementById('res-title').innerText = title;
        document.getElementById('res-desc').innerText = desc;
        document.getElementById('result-box').style.display = 'block';
    }
</script>
</body>
</html>
