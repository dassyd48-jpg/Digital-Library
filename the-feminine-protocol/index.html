<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Book",
      "name": "The Feminine Protocol",
      "author": { "@type": "Person", "name": "DASSY", "url": "https://dassyd48-jpg.github.io/Digital-Library/" },
      "publisher": { "@type": "Organization", "name": "DASSY Digital Library" }
    }
    </script>

    <title>THE FEMININE PROTOCOL | DASSY DIGITAL LIBRARY</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* High-Definition Background Video */
        #bg-video { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 0; filter: brightness(0.8); /* ကြည်လင်အောင် Brightness တိုးထားသည် */
            transition: opacity 1s ease;
        }

        /* Centered UI Layout */
        #lock {
            position: fixed; inset: 0; display: flex; 
            justify-content: center; align-items: center; flex-direction: column; 
            z-index: 20; background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px); color: #fff; text-align: center;
        }

        .book-title {
            color: #fff; font-weight: 900; letter-spacing: 6px; 
            font-size: clamp(20px, 5vw, 32px); margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(78, 217, 230, 0.8);
        }

        #lock input {
            padding: 16px; width: 260px; border: 1px solid #4ed9e6; 
            background: rgba(0,0,0,0.8); color: #fff; text-align: center; 
            font-size: 16px; letter-spacing: 5px; border-radius: 4px;
        }

        #lock button {
            margin-top: 25px; padding: 12px 60px; background: #4ed9e6; 
            color: #000; border: none; font-weight: bold; cursor: pointer;
            text-transform: uppercase; border-radius: 4px;
        }

        /* Perfect Centering for All Devices */
        #book-container { 
            display: none; width: 100vw; height: 100vh; 
            position: relative; z-index: 10;
        }

        #flipbook-wrapper {
            width: 100%; height: 100%; display: flex;
            justify-content: center; align-items: center;
            background: #000;
        }

        .watermark { 
            position: absolute; bottom: 15px; width: 100%; 
            text-align: center; font-size: 9px; color: #4ed9e6; 
            opacity: 0.4; letter-spacing: 3px; pointer-events: none;
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline><source src="video.mp4" type="video/mp4"></video>

    <div id="lock">
        <p style="font-size:10px; color:#4ed9e6; letter-spacing:4px; margin-bottom:10px;">DASSY DIGITAL LIBRARY PRESENTS</p>
        <h1 class="book-title">THE FEMININE PROTOCOL</h1>
        <input type="password" id="pass" placeholder="PRIVATE CODE">
        <button onclick="unlock()">INITIALIZE</button>
    </div>

    <div id="book-container">
        <div id="flipbook-wrapper">
            <div id="flipbook"></div>
        </div>
        <div class="watermark">© DASSY DIGITAL LIBRARY</div>
    </div>

    <audio id="sound" src="flip.mp3" preload="auto"></audio>

    <script>
        const myPassword = "PROTOCOL_DASSY_2026"; 
        const maxPages = 61; 
        const quizPages = [10, 19, 25, 31, 37, 44, 50, 56]; 
        let isQuizLocked = false; 

        function unlock() {
            if(document.getElementById("pass").value === myPassword) {
                $("#bg-video").css("opacity", "0"); // Video ဖျောက်ပစ်ရန်
                $("#lock").fadeOut(500, () => {
                    setTimeout(() => { $("#bg-video").hide(); }, 1000);
                    $("#book-container").fadeIn(400);
                    loadAndInit();
                });
            } else { alert("ACCESS DENIED: Code မှားယွင်းနေပါသည်။"); }
        }

        function loadAndInit() {
            const flipbook = $("#flipbook");
            // Screen Size အလိုက် စာအုပ်အရွယ်အစားကို ချိန်ညှိခြင်း
            let h = window.innerHeight * 0.85;
            let w = h * 0.707;
            
            if(window.innerWidth < 600) { // Mobile အတွက်
                w = window.innerWidth * 0.9;
                h = w / 0.707;
            }

            for(let i=1; i<=maxPages; i++) {
                const pageDiv = $('<div class="page" style="background:#001a1d;"></div>');
                if(quizPages.includes(i)) {
                    pageDiv.append(`<iframe data-src="page${i}.html" style="width:100%; height:100%; border:none;"></iframe>`);
                } else {
                    const img = $('<img style="width:100%; height:100%; object-fit:contain;" />').attr('src', `page${i}.jpg`);
                    pageDiv.append(img);
                }
                flipbook.append(pageDiv);
            }

            setTimeout(() => {
                flipbook.turn({
                    width: w, height: h, autoCenter: true, display: 'single', acceleration: true,
                    when: {
                        turning: function(e, page) {
                            if (isQuizLocked) { e.preventDefault(); return; }
                            const s = document.getElementById("sound");
                            s.currentTime = 0; s.play().catch(e=>{});
                        },
                        turned: function(e, page) {
                            isQuizLocked = quizPages.includes(page);
                            if(isQuizLocked) {
                                const f = $(this).find('iframe');
                                if(!f.attr('src')) f.attr('src', f.attr('data-src'));
                            }
                        }
                    }
                });
            }, 100);
        }

        window.addEventListener("message", (e) => {
            if(e.data === "quizCompleted") {
                isQuizLocked = false;
                setTimeout(() => { $("#flipbook").turn("next"); }, 100);
            }
        });

        // Device ပြောင်းလဲမှုရှိပါက စာအုပ်ကို အလည်ပြန်ပို့ရန်
        $(window).resize(() => {
            const h = window.innerHeight * 0.85;
            const w = (window.innerWidth < 600) ? window.innerWidth * 0.9 : h * 0.707;
            $("#flipbook").turn("size", w, (window.innerWidth < 600) ? w/0.707 : h);
        });
    </script>
</body>
</html>
