<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Book",
      "name": "The Feminine Protocol",
      "author": { "@type": "Person", "name": "DASSY", "url": "https://dassyd48-jpg.github.io/Digital-Library/" },
      "publisher": { "@type": "Organization", "name": "DASSY Digital Library" }
    }
    </script>

    <title>THE FEMININE PROTOCOL | DASSY DIGITAL LIBRARY</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- turn.js ကို ပိုမိုတည်ငြိမ်ပြီး အလုပ်လုပ်တာမြန်တဲ့ CDN ပြောင်းလဲထားသည် -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.2.2/turn.min.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* High-Definition Background Video */
        #bg-video { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 0; filter: brightness(0.8);
            transition: opacity 1s ease;
        }

        /* Centered UI Layout */
        #lock {
            position: fixed; inset: 0; display: flex; 
            justify-content: center; align-items: center; flex-direction: column; 
            z-index: 20; background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px); color: #fff; text-align: center;
        }

        .book-title {
            color: #fff; font-weight: 900; letter-spacing: 6px; 
            font-size: clamp(20px, 5vw, 32px); margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(78, 217, 230, 0.8);
        }

        #lock input {
            padding: 16px; width: 260px; border: 1px solid #4ed9e6; 
            background: rgba(0,0,0,0.8); color: #fff; text-align: center; 
            font-size: 16px; letter-spacing: 5px; border-radius: 4px; outline: none;
        }

        #lock button {
            margin-top: 25px; padding: 12px 60px; background: #4ed9e6; 
            color: #000; border: none; font-weight: bold; cursor: pointer;
            text-transform: uppercase; border-radius: 4px;
        }

        /* Full Screen Book Container */
        #book-container { 
            display: none; width: 100vw; height: 100vh; 
            position: relative; z-index: 10; opacity: 0;
        }

        #flipbook-wrapper {
            width: 100%; height: 100%; display: flex;
            justify-content: center; align-items: center;
            background: #000;
            padding-bottom: 35px; /* အောက်ခြေလွတ်ရုံချန်ပြီး စာမျက်နှာကို အရှည်ဆုံးဆွဲဆန့်ရန် */
        }

        .page { background: #001a1d; }
        .page img { width: 100%; height: 100%; object-fit: fill !important; } /* စာမျက်နှာပုံရိပ်ကို အပြည့်ဆွဲဆန့်ရန် fill သုံးထားသည် */

        .watermark { 
            position: absolute; bottom: 15px; width: 100%; 
            text-align: center; font-size: 9px; color: #4ed9e6; 
            opacity: 0.4; letter-spacing: 3px; pointer-events: none;
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline><source src="video.mp4" type="video/mp4"></video>

    <div id="lock">
        <p style="font-size:10px; color:#4ed9e6; letter-spacing:4px; margin-bottom:10px;">DASSY DIGITAL LIBRARY PRESENTS</p>
        <h1 class="book-title">THE FEMININE PROTOCOL</h1>
        <input type="password" id="pass" placeholder="PRIVATE CODE">
        <button onclick="unlock()">INITIALIZE</button>
        <div style="margin-top: 25px; text-align: center;">
            <a href="https://t.me/Dassy_digital_Library" target="_blank" 
               style="display: inline-flex; align-items: center; gap: 8px; color: rgba(255, 255, 255, 0.4); text-decoration: none; font-size: 12px; transition: 0.3s; font-family: sans-serif; letter-spacing: 1px;">
                <span>📩</span> 
                <span style="border-bottom: 1px solid rgba(255, 255, 255, 0.2); padding-bottom: 2px;">Contact DASSY for Password</span>
            </a>
        </div>
    </div>

    <div id="book-container">
        <div id="flipbook-wrapper">
            <div id="flipbook"></div>
        </div>
        <div class="watermark">© DASSY DIGITAL LIBRARY</div>
    </div>

    <audio id="sound" src="flip.mp3" preload="auto"></audio>

    <script>
        const myPassword = "PROTOCOL_DASSY_2026"; 
        const maxPages = 61; 
        const quizPages = [10, 19, 25, 31, 37, 44, 50, 56]; 
        let isQuizLocked = false; 

        // စာမျက်နှာဖွင့်ပြီးသားလား အော်တိုစစ်ဆေးသည့်စနစ်
        $(document).ready(function() {
            const isUnlocked = localStorage.getItem("tfp_unlocked");
            if (isUnlocked === "true") {
                $("#lock, #bg-video").hide();
                $("#book-container").show().css("opacity", 1);
                loadAndInit();
            }
        });

        // 🚨 စာမျက်နှာကို ဖုန်း Screen အပြည့်အရှည်ဆုံး ဖြစ်စေမည့် အရွယ်အစားတွက်ချက်မှုစနစ်သစ်
        function getBookSize() {
            let w = window.innerWidth;
            let h = window.innerHeight - 40; 

            if (window.innerWidth < 600) {
                // ဖုန်းများအတွက် - Ratio ဘောင်မထားဘဲ အပေါ်အောက် အပြည့်ဆွဲဆန့်သည်
                w = window.innerWidth;
            } else {
                // Laptop/Tablet များအတွက် ပုံမပျက်စေရန် မူလ Ratio အတိုင်းထားသည်
                let tabletH = window.innerHeight * 0.85;
                let tabletW = tabletH * 0.707;
                if (w / h > 0.707) { w = tabletW; h = tabletH; } else { h = w / 0.707; }
            }
            return { w, h };
        }

        function unlock() {
            if(document.getElementById("pass").value === myPassword) {
                localStorage.setItem("tfp_unlocked", "true"); // သော့ပွင့်သွားကြောင်း မှတ်သားရန်
                $("#bg-video").css("opacity", "0");
                $("#lock").fadeOut(500, () => {
                    setTimeout(() => { $("#bg-video").hide(); }, 1000);
                    $("#book-container").show().animate({ opacity: 1 }, 600);
                    loadAndInit();
                });
            } else { alert("ACCESS DENIED: Code မှားယွင်းနေပါသည်။"); }
        }

        function loadAndInit() {
            const flipbook = $("#flipbook");
            if (flipbook.children().length > 0) return; // ကုဒ်ထပ်မံပွားခြင်းမှ ကာကွယ်ရန်

            const { w, h } = getBookSize();

            for(let i=1; i<=maxPages; i++) {
                const pageDiv = $('<div class="page"></div>');
                if(quizPages.includes(i)) {
                    pageDiv.append(`<iframe data-src="page${i}.html" style="width:100%; height:100%; border:none;"></iframe>`);
                } else {
                    const img = $('<img />').attr('src', `page${i}.jpg`);
                    pageDiv.append(img);
                }
                flipbook.append(pageDiv);
            }

            setTimeout(() => {
                flipbook.turn({
                    width: w, height: h, autoCenter: true, display: 'single', acceleration: true, duration: 400,
                    when: {
                        turning: function(e, page) {
                            if (isQuizLocked) { e.preventDefault(); return; }
                            const s = document.getElementById("sound");
                            s.currentTime = 0; s.play().catch(e=>{});
                        },
                        turned: function(e, page) {
                            localStorage.setItem("tfp_last_page", page); // ဖတ်လက်စစာမျက်နှာကို သိမ်းဆည်းရန်
                            isQuizLocked = quizPages.includes(page);
                            if(isQuizLocked) {
                                const f = $(this).find('.page').eq(page-1).find('iframe');
                                if(!f.attr('src')) f.attr('src', f.attr('data-src'));
                            }
                        }
                    }
                });

                // ယခင်ဖတ်လက်စ စာမျက်နှာရှိပါက တန်းသွားရန်
                const savedPage = localStorage.getItem("tfp_last_page");
                if (savedPage) {
                    flipbook.turn("page", parseInt(savedPage));
                } else {
                    flipbook.turn("page", 1);
                }
            }, 100);
        }

        window.addEventListener("message", (e) => {
            if(e.data === "quizCompleted") {
                isQuizLocked = false;
                setTimeout(() => { $("#flipbook").turn("next"); }, 100);
            }
        });

        // Device Screen ပြောင်းလဲသွားပါက စာအုပ်ကို အရွယ်အစားအလိုအလျောက် ပြန်ညှိရန်
        $(window).resize(() => {
            const { w, h } = getBookSize();
            $("#flipbook").turn("size", w, h);
        });
    </script>
</body>
</html>
