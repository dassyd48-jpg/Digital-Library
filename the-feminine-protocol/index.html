    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="turn.js"></script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #bg-video { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 0; filter: brightness(0.8);
            transition: opacity 1s ease;
        }

        #lock {
            position: fixed; inset: 0; display: flex; 
            justify-content: center; align-items: center; flex-direction: column; 
            z-index: 20; background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px); color: #fff; text-align: center;
        }

        .book-title {
            color: #fff; font-weight: 900; letter-spacing: 6px; 
            font-size: clamp(20px, 5vw, 32px); margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(78, 217, 230, 0.8);
        }

        #lock input {
            padding: 16px; width: 260px; border: 1px solid #4ed9e6; 
            background: rgba(0,0,0,0.8); color: #fff; text-align: center; 
            font-size: 16px; letter-spacing: 5px; border-radius: 4px; outline: none;
        }

        #lock button {
            margin-top: 25px; padding: 12px 60px; background: #4ed9e6; 
            color: #000; border: none; font-weight: bold; cursor: pointer;
            text-transform: uppercase; border-radius: 4px;
        }

        #book-container { 
            display: none; width: 100vw; height: 100vh; 
            position: relative; z-index: 10; opacity: 0;
        }

        #flipbook-wrapper {
            width: 100%; height: 100%; display: flex;
            justify-content: center; align-items: center;
            background: #000;
            padding-bottom: 35px;
        }

        /* 🛠️ Improved CSS Layout for Page & iFrames to prevent blank/black scaling bugs */
        .page { background: #001a1d; width: 100%; height: 100%; position: relative; overflow: hidden; }
        .page img { width: 100%; height: 100%; object-fit: fill !important; display: block; pointer-events: none; }
        
        .page iframe { 
            width: 100% !important; 
            height: 100% !important; 
            border: none !important; 
            display: block; 
            background: #001a1d; 
            position: absolute;
            top: 0;
            left: 0;
        }

        .watermark { 
            position: absolute; bottom: 15px; width: 100%; 
            text-align: center; font-size: 9px; color: #4ed9e6; 
            opacity: 0.4; letter-spacing: 3px; pointer-events: none;
            z-index: 15;
        }

        /* 🛠️ Bookmark ခလုတ်စတိုင်လ်များ */
        .bookmark-controls {
            position: fixed;
            top: 15px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 100;
            pointer-events: none; /* စာအုပ်စာမျက်နှာလှန်တာကို မပိတ်ဆို့စေရန် */
        }

        .bookmark-btn {
            pointer-events: auto; /* ခလုတ်ကို နှိပ်လို့ရအောင် လုပ်ဆောင်သည် */
            padding: 8px 16px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #4ed9e6;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(78, 217, 230, 0.2);
        }

        /* Bookmark မလုပ်ရသေးခင် စတိုင် */
        #add-bookmark-btn {
            background: rgba(0, 26, 29, 0.85);
            color: #4ed9e6;
        }

        /* Bookmark လုပ်ပြီးသား စတိုင် */
        #add-bookmark-btn.active {
            background: #4ed9e6;
            color: #000;
            box-shadow: 0 0 15px rgba(78, 217, 230, 0.6);
        }

        /* Go to Bookmark ပြန်သွားရန် ခလုတ်စတိုင် */
        #go-bookmark-btn {
            background: rgba(78, 217, 230, 0.15);
            color: #4ed9e6;
            display: none; /* Bookmark မရှိရင် ဖျောက်ထားမည် */
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline><source src="video.mp4" type="video/mp4"></video>

    <div id="lock">
        <p style="font-size:10px; color:#4ed9e6; letter-spacing:4px; margin-bottom:10px;">DASSY DIGITAL LIBRARY PRESENTS</p>
        <h1 class="book-title">THE FEMININE PROTOCOL</h1>
        <input type="password" id="pass" placeholder="PRIVATE CODE">
        <button onclick="unlock()">INITIALIZE</button>
        <div style="margin-top: 25px; text-align: center;">
            <a href="https://t.me/Dassy_digital_Library" target="_blank" 
               style="display: inline-flex; align-items: center; gap: 8px; color: rgba(255, 255, 255, 0.4); text-decoration: none; font-size: 12px; transition: 0.3s; font-family: sans-serif; letter-spacing: 1px;">
                <span>📩</span> 
                <span style="border-bottom: 1px solid rgba(255, 255, 255, 0.2); padding-bottom: 2px;">Contact DASSY for Password</span>
            </a>
        </div>
    </div>

    <div id="book-container">
        <!-- Bookmark ခလုတ်များ ထားရှိရာ နေရာ -->
        <div class="bookmark-controls">
            <button id="go-bookmark-btn" class="bookmark-btn" onclick="goToBookmark()">📖 Go to Bookmark</button>
            <button id="add-bookmark-btn" class="bookmark-btn" onclick="toggleBookmark()">🔖 Bookmark</button>
        </div>

        <div id="flipbook-wrapper">
            <div id="flipbook"></div>
        </div>
        <div class="watermark">© DASSY DIGITAL LIBRARY</div>
    </div>

    <audio id="sound" src="flip.mp3" preload="auto"></audio>

    <script>
        const myPassword = "PROTOCOL_DASSY_2026"; 
        const maxPages = 61; 
        const quizPages = [10, 19, 25, 31, 37, 44, 50, 56]; 
        let isQuizLocked = false; 

        $(document).ready(function() {
            const isUnlocked = localStorage.getItem("tfp_unlocked");
            if (isUnlocked === "true") {
                $("#lock, #bg-video").hide();
                $("#book-container").show().css("opacity", 1);
                loadAndInit();
            }
        });

        function getBookSize() {
            let w = window.innerWidth;
            let h = window.innerHeight - 40; 

            if (window.innerWidth < 600) {
                w = window.innerWidth;
            } else {
                let tabletH = window.innerHeight * 0.85;
                let tabletW = tabletH * 0.707;
                if (w / h > 0.707) { w = tabletW; h = tabletH; } else { h = w / 0.707; }
            }
            return { w, h };
        }

        function unlock() {
            if(document.getElementById("pass").value === myPassword) {
                localStorage.setItem("tfp_unlocked", "true"); 
                $("#bg-video").css("opacity", "0");
                $("#lock").fadeOut(500, () => {
                    setTimeout(() => { $("#bg-video").hide(); }, 1000);
                    $("#book-container").show().animate({ opacity: 1 }, 600);
                    loadAndInit();
                });
            } else { alert("ACCESS DENIED: Code မှားယွင်းနေပါသည်။"); }
        }

        // Bookmark အဖွင့်အပိတ် ပြုလုပ်ပေးမည့် Logic
        function toggleBookmark() {
            const currentPage = $("#flipbook").turn("page");
            const savedBookmark = localStorage.getItem("tfp_bookmark_page");

            if (savedBookmark && parseInt(savedBookmark) === currentPage) {
                // လက်ရှိစာမျက်နှာကို Bookmark ဖြုတ်လိုက်သည်
                localStorage.removeItem("tfp_bookmark_page");
                updateBookmarkButtons(currentPage);
            } else {
                // လက်ရှိစာမျက်နှာသစ်ကို Bookmark မှတ်သားသည်
                localStorage.setItem("tfp_bookmark_page", currentPage);
                updateBookmarkButtons(currentPage);
            }
        }

        // Bookmark ခလုတ်များ၏ ပြသမှုကို update လုပ်ပေးမည့် Logic
        function updateBookmarkButtons(currentPage) {
            const savedBookmark = localStorage.getItem("tfp_bookmark_page");
            
            // ၁။ Bookmark လုပ်ပြီးသား စာမျက်နှာဖြစ်ပါက ခလုတ်အရောင်ကို active စတိုင်ပြောင်းမည်
            if (savedBookmark && parseInt(savedBookmark) === currentPage) {
                $("#add-bookmark-btn").addClass("active").html("📌 Bookmarked");
            } else {
                $("#add-bookmark-btn").removeClass("active").html("🔖 စာမျက်နှာမှတ်ရန်");
            }

            // ၂။ သိမ်းထားသော Bookmark ရှိပါက "မှတ်ထားသောစာမျက်နှာဆီသို့" ခလုတ်ကို ဖော်ပြပေးမည်
            if (savedBookmark) {
                $("#go-bookmark-btn").fadeIn(200);
            } else {
                $("#go-bookmark-btn").fadeOut(200);
            }
        }

        // Bookmark မှတ်ထားသော စာမျက်နှာသို့ တိုက်ရိုက်သွားရန်
        function goToBookmark() {
            const savedBookmark = localStorage.getItem("tfp_bookmark_page");
            if (savedBookmark) {
                isQuizLocked = false; // Page သွားနိုင်ရန် ခေတ္တ unlock လုပ်ပေးသည်
                $("#flipbook").turn("page", parseInt(savedBookmark));
            }
        }

        function loadAndInit() {
            const flipbook = $("#flipbook");
            if (flipbook.children().length > 0) return; 

            const { w, h } = getBookSize();

            // Loop ပတ်ပြီး စာမျက်နှာ တည်ဆောက်ခြင်း
            for(let i=1; i<=maxPages; i++) {
                const pageDiv = $('<div class="page"></div>');
                
                if(quizPages.includes(i)) {
                    // 🛠️ Static Path Rendering Logic: ကက်ရှ်လွဲချော်မှုမရှိစေရန် src သို့ တိုက်ရိုက်လမ်းကြောင်းပေးထားသည်
                    pageDiv.append(`<iframe src="page${i}.html" style="width:100%; height:100%; border:none;"></iframe>`);
                } else {
                    const img = $('<img />').attr('src', `page${i}.jpg`);
                    pageDiv.append(img);
                }
                flipbook.append(pageDiv);
            }

            setTimeout(() => {
                flipbook.turn({
                    width: w, height: h, autoCenter: true, display: 'single', acceleration: true, duration: 400,
                    when: {
                        turning: function(e, page) {
                            if (isQuizLocked) { e.preventDefault(); return; }
                            const s = document.getElementById("sound");
                            s.currentTime = 0; s.play().catch(e=>{});
                        },
                        turned: function(e, page) {
                            localStorage.setItem("tfp_last_page", page); 
                            
                            // လက်ရှိစာမျက်နှာက Quiz ဖြစ်ခဲ့လျှင် Next ကို Lock ချမည်
                            isQuizLocked = quizPages.includes(page);

                            // စာမျက်နှာရောက်တိုင်း Bookmark ခလုတ်တွေရဲ့ အခြေအနေကို update လုပ်ပေးရန်
                            updateBookmarkButtons(page);
                        }
                    }
                });

                const savedPage = localStorage.getItem("tfp_last_page");
                const initialPage = savedPage ? parseInt(savedPage) : 1;
                flipbook.turn("page", initialPage);

                // စာအုပ် စဖွင့်ဖွင့်ချင်း Bookmark ခလုတ်များ အခြေအနေ ပြရန်
                updateBookmarkButtons(initialPage);
            }, 100);
        }

        // Quiz HTML ဆီမှ Quiz အောင်မြင်ပြီးကြောင်း Message လာလျှင် စာမျက်နှာလှန်ပေးရန်
        window.addEventListener("message", (e) => {
            if(e.data === "quizCompleted") {
                isQuizLocked = false;
                setTimeout(() => { $("#flipbook").turn("next"); }, 100);
            }
        });

        $(window).resize(() => {
            const { w, h } = getBookSize();
            $("#flipbook").turn("size", w, h);
        });
    </script>
</body>
</html>
