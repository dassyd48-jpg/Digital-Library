<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            background: #001a1d; color: #4ed9e6; font-family: sans-serif; 
            margin: 0; padding: 20px; display: flex; justify-content: center; 
            align-items: center; min-height: 100vh; box-sizing: border-box; 
        }

        .quiz-container { 
            width: 100%; max-width: 500px; background: rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(78, 217, 230, 0.2); border-radius: 12px; 
            padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        .phase-label { 
            font-size: 10px; color: #ffab40; letter-spacing: 3px; 
            text-transform: uppercase; font-weight: bold; opacity: 0.8;
        }

        h2 { font-size: 17px; line-height: 1.6; margin: 15px 0; color: #fff; }

        .option { 
            display: block; width: 100%; padding: 14px; margin: 10px 0; 
            background: rgba(78, 217, 230, 0.05); border: 1px solid rgba(78, 217, 230, 0.2); 
            color: #4ed9e6; border-radius: 8px; cursor: pointer; text-align: left; 
            transition: 0.3s ease; font-size: 13px; line-height: 1.5; 
        }

        .option:hover { 
            background: #4ed9e6; color: #000; font-weight: bold; 
            transform: translateX(8px); border-color: #fff;
        }

        #result-box { 
            display: none; margin-top: 15px; padding: 20px; 
            border: 1px solid #ffab40; background: rgba(255, 171, 64, 0.08); 
            border-radius: 10px; animation: fadeInUp 0.5s ease; 
        }

        .res-title { 
            font-size: 15px; font-weight: bold; color: #ffab40; 
            margin-bottom: 10px; display: block; border-left: 4px solid #ffab40; 
            padding-left: 10px; text-transform: uppercase;
        }

        .res-desc { color: #fff; font-size: 13px; line-height: 1.7; margin-bottom: 20px; }

        .next-btn { 
            display: block; width: 100%; padding: 15px; background: #ffab40; 
            color: #000; border: none; border-radius: 6px; font-weight: 900; 
            cursor: pointer; text-align: center; text-transform: uppercase;
            letter-spacing: 1px; transition: 0.3s;
        }

        .next-btn:hover { background: #fff; box-shadow: 0 5px 15px rgba(255,171,64,0.3); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="quiz-container">
    <span class="phase-label">TRUTH DECODING: PAGE 25</span>
    <h2 id="q-text">တစ်ဖက်လူက သင့်ကို လိမ်ညာနေတယ်လို့ ယူဆရင် ဘယ်လို တုံ့ပြန်မလဲ?</h2>
    
    <div id="options-group">
        <button class="option" onclick="showAnalysis('THE EXECUTIONER', 'သင့်မှာ အချိန်ကို တန်ဖိုးထားတဲ့ စိတ်ဓာတ်ရှိပါတယ်။ လိမ်ညာမှုကို သိလိုက်တာနဲ့ ရှင်းပြချက်တွေနောက်မှာ အချိန်မဖြုန်းဘဲ ချက်ချင်း ဖြတ်တောက်လိုက်ခြင်းက သင့်ဘဝကို အမှိုက်ကင်းအောင် ရှင်းလင်းလိုက်တာပါပဲ။')">၁။ လိမ်ညာမှန်း သိလိုက်တာနဲ့ ဘာရှင်းပြချက်မှ နားမထောင်ဘဲ ချက်ချင်း ဖြတ်တောက်လိုက်တယ်</button>
        
        <button class="option" onclick="showAnalysis('THE TRAP SETTER', 'သင်ဟာ အကွက်မြင်တဲ့ မုဆိုးတစ်ယောက်ပါ။ သိသိကြီးနဲ့ ထပ်လိမ်အောင် လမ်းဖွင့်ပေးပြီးမှ အချက်အလက်နဲ့ အသေပိတ်ဖမ်းခြင်းက တစ်ဖက်လူကို နောင်တရသွားစေမယ့် ပါးနပ်တဲ့ နည်းဗျူဟာဖြစ်ပါတယ်။')">၂။ သိသိကြီးနဲ့ ထပ်လိမ်အောင် လမ်းဖွင့်ပေးပြီးမှ အချက်အလက်နဲ့ အသေပိတ်ဖမ်းတယ်</button>
        
        <button class="option" onclick="showAnalysis('THE DIRECT TRUTH', 'သင့်မှာ ရဲရင့်တဲ့ အမျိုးသားတစ်ယောက်ရဲ့ ဂုဏ်သိက္ခာရှိပါတယ်။ လိမ်နေတာကို မျက်နှာချင်းဆိုင် တိုက်ရိုက် ထောက်ပြပြီး အကြပ်ရိုက်အောင်လုပ်ခြင်းက သင့်ရဲ့ လွှမ်းမိုးနိုင်စွမ်း (Dominance) ကို ပြသရာရောက်ပါတယ်။')">၃။ လိမ်နေတာကို မျက်နှာချင်းဆိုင် တိုက်ရိုက် ထောက်ပြပြီး အကြပ်ရိုက်အောင်လုပ်တယ်</button>
        
        <button class="option" onclick="showAnalysis('THE COLD HEART', 'သင်ဟာ အကျိုးအမြတ်ကို ရှေ့တန်းတင်တဲ့ လက်တွေ့သမားပါ။ လိမ်နေတာကို သိပေမယ့် ကိုယ့်အတွက် အသုံးချလို့ရနေသရွှေ့ အသာလေး ဆက်ကြည့်နေခြင်းက စိတ်ခံစားချက်ထက် ဦးနှောက်ကို ဦးစားပေးတဲ့ ပုံစံမျိုးပါ။')">၄။ လိမ်နေတာကို သိပေမယ့် ကိုယ့်အတွက် အသုံးချလို့ရနေသရွှေ့ အသာလေး ဆက်ကြည့်နေတယ်</button>
        
        <button class="option" onclick="showAnalysis('THE ANALYSER', 'သင်ဟာ လူကဲခတ် ကျွမ်းကျင်သူတစ်ယောက်ပါ။ စကားလုံးတွေထက် ခန္ဓာကိုယ်ရဲ့ တုံ့ပြန်မှု (Body Language) ကို ကြည့်ပြီး တစ်ဖက်လူရဲ့ အားနည်းချက်ကို ရှာဖွေခြင်းက အဆင့်မြင့်တဲ့ စိတ်ပညာနည်းလမ်းတစ်ခု ဖြစ်ပါတယ်။')">၅။ ခန္ဓာကိုယ်ရဲ့ တုံ့ပြန်မှုတွေကို ကြည့်ပြီး တစ်ဖက်လူရဲ့ အားနည်းချက်ကို ရှာဖွေတယ်</button>
    </div>

    <div id="result-box">
        <span class="res-title" id="res-title"></span>
        <p class="res-desc" id="res-desc"></p>
        
        <button onclick="parent.postMessage('quizCompleted', '*')" class="next-btn">
            ACCESS GRANTED: NEXT PHASE →
        </button>
    </div>
</div>

<script>
    function showAnalysis(title, desc) {
        document.getElementById('options-group').style.display = 'none';
        document.getElementById('q-text').style.opacity = '0.3';
        document.getElementById('res-title').innerText = title;
        document.getElementById('res-desc').innerText = desc;
        document.getElementById('result-box').style.display = 'block';
    }
</script>

</body>
</html>
