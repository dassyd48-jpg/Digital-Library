<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #001a1d; color: #4ed9e6; font-family: sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .quiz-container { width: 100%; max-width: 500px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(78, 217, 230, 0.3); border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .phase-label { font-size: 10px; color: #ffab40; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
        h2 { font-size: 16px; line-height: 1.6; margin: 15px 0; color: #fff; }
        .option { display: block; width: 100%; padding: 12px; margin: 8px 0; background: rgba(78, 217, 230, 0.05); border: 1px solid rgba(78, 217, 230, 0.2); color: #4ed9e6; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.3s; font-size: 13px; line-height: 1.4; }
        .option:hover { background: #4ed9e6; color: #000; font-weight: bold; transform: translateX(5px); }
        #result-box { display: none; margin-top: 15px; padding: 15px; border: 1px solid #ffab40; background: rgba(255, 171, 64, 0.1); border-radius: 10px; animation: fadeInUp 0.5s ease; }
        .res-title { font-size: 14px; font-weight: bold; color: #ffab40; margin-bottom: 8px; display: block; border-left: 3px solid #ffab40; padding-left: 8px; }
        .res-desc { color: #fff; font-size: 13px; line-height: 1.6; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="quiz-container">
    <span class="phase-label">စာမျက်နှာ ၂၅ - မရိုးသားမှုကို ဖော်ထုတ်ခြင်း</span>
    <h2 id="q-text">တစ်ဖက်လူက သင့်ကို လိမ်ညာနေတယ်လို့ ယူဆရင် ဘယ်လို တုံ့ပြန်မလဲ?</h2>
    <div id="options-group">
        <button class="option" onclick="showAnalysis('The Executioner', 'လိမ်ညာမှန်း သိလိုက်တာနဲ့ ဘာရှင်းပြချက်မှ နားမထောင်ဘဲ ချက်ချင်း ဖြတ်တောက်လိုက်ခြင်းက သင့်ဘဝမှာ မလိုအပ်တဲ့ ရှုပ်ထွေးမှုတွေကို ဖယ်ရှားလိုက်တာပါပဲ။')">၁။ လိမ်ညာမှန်း သိလိုက်တာနဲ့ ဘာရှင်းပြချက်မှ နားမထောင်ဘဲ ချက်ချင်း ဖြတ်တောက်လိုက်တယ်</button>
        <button class="option" onclick="showAnalysis('The Trap Setter', 'သိသိကြီးနဲ့ ထပ်လိမ်အောင် လမ်းဖွင့်ပေးပြီးမှ အချက်အလက်နဲ့ အသေပိတ်ဖမ်းခြင်းက တစ်ဖက်လူကို အရှက်ရစေမယ့် ပါးနပ်တဲ့ နည်းလမ်းပါ။')">၂။ သိသိကြီးနဲ့ ထပ်လိမ်အောင် လမ်းဖွင့်ပေးပြီးမှ အချက်အလက်နဲ့ အသေပိတ်ဖမ်းတယ်</button>
        <button class="option" onclick="showAnalysis('The Direct Truth', 'လိမ်နေတာကို မျက်နှာချင်းဆိုင် တိုက်ရိုက် ထောက်ပြပြီး အကြပ်ရိုက်အောင်လုပ်ခြင်းက သင့်ရဲ့ သတ္တိနဲ့ ပြတ်သားမှုကို ပြသရာရောက်ပါတယ်။')">၃။ လိမ်နေတာကို မျက်နှာချင်းဆိုင် တိုက်ရိုက် ထောက်ပြပြီး အကြပ်ရိုက်အောင်လုပ်တယ်</button>
        <button class="option" onclick="showAnalysis('The Cold Heart', 'လိမ်နေတာကို သိပေမယ့် ကိုယ့်အတွက် အသုံးချလို့ရနေသရွှေ့ အသာလေး ဆက်ကြည့်နေခြင်းက လက်တွေ့ကျတဲ့ အကျိုးမျှော်ကိုးသူရဲ့ အမြင်ပါ။')">၄။ လိမ်နေတာကို သိပေမယ့် ကိုယ့်အတွက် အသုံးချလို့ရနေသရွှေ့ အသာလေး ဆက်ကြည့်နေတယ်</button>
        <button class="option" onclick="showAnalysis('The Analyser', 'ခန္ဓာကိုယ်ရဲ့ တုံ့ပြန်မှုတွေကို ကြည့်ပြီး တစ်ဖက်လူရဲ့ အားနည်းချက်ကို ရှာဖွေခြင်းက အဆင့်မြင့် လူကဲခတ်နည်းတစ်ခုပါ။')">၅။ ခန္ဓာကိုယ်ရဲ့ တုံ့ပြန်မှုတွေကို ကြည့်ပြီး တစ်ဖက်လူရဲ့ အားနည်းချက်ကို ရှာဖွေတယ်</button>
    </div>

    <div id="result-box">
        <span class="res-title" id="res-title"></span>
        <p class="res-desc" id="res-desc"></p>
        
        <button onclick="parent.postMessage('quizCompleted', '*')" class="next-btn">
            နောက်တစ်ခန်းသို့သွားရန် Lock ဖွင့်ပါ →
        </button>
    </div>
</div>
<script>
    function showAnalysis(title, desc) {
        document.getElementById('options-group').style.display = 'none';
        document.getElementById('q-text').style.opacity = '0.5';
        document.getElementById('res-title').innerText = title;
        document.getElementById('res-desc').innerText = desc;
        document.getElementById('result-box').style.display = 'block';
    }
</script>
</body>
</html>
