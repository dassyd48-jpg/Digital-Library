<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>THE UNSPOKEN MAGNET | DASSY DIGITAL LIBRARY</title>
    <meta name="description" content="အမျိုးသမီးတို့၏ မသိစိတ်ကို စိုးမိုး၍ အစားထိုးမရသော ဧကရာဇ်ဖြစ်လာစေမည့် Shadow Psychology နည်းဗျူဟာများ။">
    <meta name="keywords" content="The Unspoken Magnet, Dassy, Shadow Psychology Myanmar, Relationship Strategy">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transition: opacity 1.5s; }

        #lock {
            position: fixed; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;
            flex-direction: column; z-index: 20; background: rgba(0,0,0,0.75); color: #d4af37; text-align: center;
        }
        #lock h2 { letter-spacing: 5px; margin-bottom: 10px; font-size: 28px; text-transform: uppercase; text-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        #lock p { color: #fff; font-size: 13px; margin-bottom: 25px; opacity: 0.7; letter-spacing: 2px; }
        #lock input {
            padding: 15px; width: 220px; border-radius: 5px; border: 1px solid #d4af37;
            background: rgba(255,255,255,0.05); color: #fff; text-align: center; outline: none; font-size: 16px;
        }
        #lock button {
            margin-top: 20px; padding: 12px 40px; border-radius: 5px; border: none;
            background: #d4af37; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        }
        #lock button:hover { background: #fff; transform: scale(1.05); }

        #book-container { display: none; width: 100%; height: 100%; position: fixed; top: 0; left: 0; z-index: 10; background: #111; }
        #flipbook-wrapper { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        
        #flipbook {
            width: 90vw; height: calc(90vw * 1.414); max-height: 85vh; max-width: 450px;
            box-shadow: 0 25px 100px rgba(0,0,0,1);
        }

        .page { background: #1a1a1a; width: 100%; height: 100%; overflow: hidden; }
        .page img { width: 100%; height: 100%; object-fit: fill; }

        .watermark {
            position: fixed; bottom: 15px; width: 100%; text-align: center;
            font-size: 10px; color: rgba(212, 175, 55, 0.4); letter-spacing: 3px;
            pointer-events: none; z-index: 100; text-transform: uppercase;
        }

        .contact-link {
            margin-top: 30px; font-size: 12px; color: #d4af37; text-decoration: none;
            border-bottom: 1px solid rgba(212, 175, 55, 0.5); padding-bottom: 2px; opacity: 0.8;
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline><source src="video.mp4" type="video/mp4"></video>

    <div id="lock">
        <h2>THE UNSPOKEN MAGNET</h2>
        <p>ENTER THE THRONE OF POWER</p>
        <input type="password" id="pass" placeholder="PASSWORD">
        <button onclick="unlock()">ACCESS STRATEGY</button>
        <a href="https://t.me/Dassy_Digital_Library" target="_blank" class="contact-link">Get Access from DASSY</a>
    </div>

    <div id="book-container">
        <div id="flipbook-wrapper"><div id="flipbook"></div></div>
        <div class="watermark">POWERED BY DASSY DIGITAL LIBRARY</div>
    </div>

    <audio id="sound" src="flip.mp3" preload="auto"></audio>

    <script>
        const myPassword = "MAGNET99"; 
        const maxPages = 17; 

        function unlock(){
            const entered = document.getElementById("pass").value;
            if(entered === myPassword){
                $("#bg-video").css("opacity", "0");
                $("#lock").fadeOut(800, function(){
                    $("#book-container").fadeIn(600);
                    loadAndInit();
                });
            } else { alert("စကားဝှက် မှားယွင်းနေပါသည်။"); }
        }

        function loadAndInit(){
            const flipbook = $("#flipbook");
            flipbook.empty();

            for(let i=1; i<=maxPages; i++){
                const pageDiv = $('<div class="page"></div>');
                // First 3 pages eager load, others lazy load for speed
                const img = $(`<img loading="${i <= 3 ? 'eager' : 'lazy'}" />`).attr('src', `page${i}.jpg`);
                pageDiv.append(img);
                flipbook.append(pageDiv);
            }

            setTimeout(() => {
                flipbook.turn({
                    width: flipbook.width(),
                    height: flipbook.height(),
                    autoCenter: true, 
                    display: 'single',
                    acceleration: true,
                    gradients: true,
                    elevation: 100,
                    duration: 1100,
                    when: { turning: function() { playSound(); } }
                });
            }, 200);

            flipbook.on('click touchstart', function(e) {
                const width = $(this).width();
                const offset = $(this).offset();
                const pageX = (e.type === 'touchstart') ? e.originalEvent.touches[0].pageX : e.pageX;
                
                if (pageX) {
                    const relativeX = pageX - offset.left;
                    if (relativeX > width / 2) { $(this).turn('next'); } 
                    else { $(this).turn('previous'); }
                }
            });
        }

        function playSound(){ 
            let s = document.getElementById("sound"); 
            if(s) { s.pause(); s.currentTime = 0; s.play().catch(e => {}); }
        }
    </script>
</body>
</html>
