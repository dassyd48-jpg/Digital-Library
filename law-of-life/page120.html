<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHAPTER 12: THE LAW OF DEFENSIVENESS QUIZ</title>
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #FCF6BA;
            --dark-panel: rgba(20, 20, 20, 0.85);
        }
        /* Mobile Device များတွင် Touch နှင့် Scroll စနစ် ပိုမိုကောင်းမွန်စေရန် */
        body { 
            background: #0D0D0D; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box; 
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .quiz-container { 
            width: 100%; 
            max-width: 480px; 
            background: var(--dark-panel); 
            border: 1px solid rgba(212, 175, 55, 0.25); 
            border-radius: 8px; 
            padding: 25px; 
            box-shadow: 0 10px 35px rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            text-align: center;
        }
        .phase-label { 
            font-size: 11px; color: var(--gold); letter-spacing: 3px; 
            text-transform: uppercase; font-weight: bold;
            display: block; margin-bottom: 15px;
        }
        h2 { font-size: 16px; line-height: 1.6; margin: 15px 0; color: #fff; text-align: left; font-weight: normal; transition: opacity 0.3s ease; }
        
        .option { 
            display: block; width: 100%; padding: 15px; margin: 12px 0; 
            background: rgba(212, 175, 55, 0.03); 
            border: 1px solid rgba(212, 175, 55, 0.15); 
            color: #eee; border-radius: 4px; cursor: pointer; text-align: left; 
            transition: all 0.3s ease; font-size: 13px; line-height: 1.5;
            outline: none;
        }
        .option:hover, .option:active { 
            background: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728); 
            color: #000; font-weight: bold; border-color: transparent;
            box-shadow: 0 4px 12px rgba(179,135,40,0.2);
        }
        
        #result-box { 
            display: none; margin-top: 5px; padding: 22px; 
            border: 1px solid var(--gold); background: rgba(212, 175, 55, 0.05); 
            border-radius: 6px; animation: fadeInUp 0.4s ease-out; 
        }
        .res-title { 
            font-size: 16px; font-weight: bold; color: var(--gold); 
            margin-bottom: 14px; display: block; border-left: 3px solid var(--gold); 
            padding-left: 10px; text-align: left; letter-spacing: 1px;
        }
        .res-desc { color: #ddd; font-size: 13px; line-height: 1.7; margin-bottom: 22px; text-align: left; }
        
        #strategy-note { 
            font-size: 12.5px; color: var(--gold-light); font-style: normal; 
            background: rgba(212, 175, 55, 0.1); padding: 14px; 
            border-radius: 4px; margin-bottom: 22px; text-align: left; line-height: 1.6;
        }
        
        .next-btn { 
            display: block; width: 100%; padding: 15px; 
            background: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728); 
            color: #000; border: none; border-radius: 4px; font-weight: 900; 
            cursor: pointer; text-align: center; text-transform: uppercase; letter-spacing: 1px;
            outline: none;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="quiz-container">
    <span class="phase-label">အခန်း (၁၂) ခုခံမှုများကို ပျော်ဝင်စေခြင်း နိယာမ</span>
    <h2 id="q-text">သင်က တစ်ဖက်လူကို အကြံဉာဏ်တစ်ခု ပေးလိုက်တဲ့အခါ ဒါမှမဟုတ် ပြဿနာတစ်ခု ထောက်ပြလိုက်တဲ့အခါ သူက ချက်ချင်း ငြင်းဆန်ပြီး သူ့ကိုယ်သူ အတင်းကာကွယ် (Defensive ဖြစ်) နေရင် သင် ဘယ်လို နည်းဗျူဟာ သုံးမလဲ?</h2>
    
    <div id="options-group">
        <button class="option" onclick="showAnalysis('THE FORCEFUL ARGUE (အတင်းအကျပ် စည်းရုံးခြင်း အမှား)', 'သင်ဟာ ယုတ္တိဗေဒ (Logic) ကို သုံးပြီး တစ်ဖက်လူ မှားနေတာကို အနိုင်တိုက်ဖို့ ကြိုးစားတတ်သူပါ။ ဒါဟာ တစ်ဖက်လူရဲ့ စိတ်ခံတပ် (Defensive Wall) ကို ပိုမိုမြင့်တက်သွားစေပြီး ဆက်ဆံရေးကို ပျက်ပြားစေပါတယ်။', '💡 ဗျူဟာ: လူတွေဟာ အချက်အလက်ကြောင့် ငြင်းတာမဟုတ်ဘဲ ကိုယ့်ကိုယ်ကိုယ် အထင်သေးခံရမှာ ကြောက်လို့ ခုခံတာပါ။ အတင်းအနိုင်မတိုက်ပါနဲ့ရှင်။')">၁။ သူမှားနေတာကို သိသာစေဖို့ အချက်အလက်နဲ့ ယုတ္တိတက်ပြီး အတင်းအကျပ် ဆက်ရှင်းပြတယ်</button>
        <button class="option" onclick="showAnalysis('THE SILENT RETREAT (အလျှော့ပေး ထွက်ပြေးခြင်း အမှား)', 'သင်ဟာ ပဋိပက္ခကို ရှောင်ချင်တာကြောင့် အလျှော့ပေးလိုက်သူပါ။ ဒါဟာ ပြဿနာကို မဖြေရှင်းနိုင်တဲ့အပြင် တစ်ဖက်လူကိုလည်း ပိုပြီး အတ္တကြီးလာစေနိုင်ပါတယ်။', '💡 ဗျူဟာ: အလျှော့ပေးရုံနဲ့ စိတ်ခုခံမှုတွေ ကျမသွားပါဘူး။ ပညာသားပါပါနဲ့ တစ်ဖက်လူရဲ့ စိတ်ကို ပျော်ဝင်အောင် ကစားတတ်ဖို့ လိုအပ်ပါတယ်ရှင်။')">၂။ စကားများရမှာ စိုးလို့ ဘာမှမပြောတော့ဘဲ စကားလမ်းကြောင်း လွှဲပစ်လိုက်တယ်</button>
        <button class="option" onclick="showAnalysis('THE MASTER PSYCHOLOGIST (စိတ်ပညာရှင်အဆင့် တုံ့ပြန်မှု)', 'ဒါဟာ တစ်ဖက်လူရဲ့ ခုခံမှုကို အလိုအလျောက် ပျော်ဝင်သွားစေမည့် ထိပ်တန်းနည်းဗျူဟာပါ။ သူ့ရဲ့ တန်ဖိုးကို အရင်မြှင့်တင်ပေးလိုက်ခြင်းက သူ့ရဲ့ ကာကွယ်ရေးစနစ်ကို ลုံးဝ လက်နက်ချသွားစေပါတယ်။', '💡 ဗျူဟာ: &quot;နင့်ရဲ့ စေတနာနဲ့ လုပ်ဆောင်ချက်တွေကို ငါတန်ဖိုးထားပါတယ်၊ ဒါပေမယ့်...&quot; ဆိုပြီး သူ့အတ္တကို အရင်ချော့ပြီးမှ လိုချင်တဲ့ လမ်းကြောင်းထဲ ဆွဲသွင်းပါရှင်။')">၃။ သူ့ရဲ့ အားထုတ်မှုကို အရင်ဦးစွာ ချီးမွမ်းပေးပြီးမှ စကားကို ပညာသားပါပါ ဆက်ပြောတယ်</button>
    </div>

    <div id="result-box">
        <span class="res-title" id="res-title"></span>
        <p class="res-desc" id="res-desc"></p>
        <div id="strategy-note"></div>
        
        <button onclick="completeQuiz()" class="next-btn">UNLOCK FINAL SHADOW →</button>
    </div>
</div>

<script>
    function showAnalysis(title, desc, strat) {
        document.getElementById('options-group').style.display = 'none';
        document.getElementById('q-text').style.opacity = '0.2';
        document.getElementById('res-title').innerText = title;
        document.getElementById('res-desc').innerText = desc;
        document.getElementById('strategy-note').innerHTML = strat; // innerHTML သို့ပြောင်းလဲ၍ Tags များကို အလုပ်လုပ်စေခြင်း
        document.getElementById('result-box').style.display = 'block';
    }

    function completeQuiz() {
        // Main Book Page ဆီသို့ နောက်စာမျက်နှာလှန်ရန် Signal ပေးပို့ခြင်း
        if (window.parent && window.parent !== window) {
            window.parent.postMessage("quizCompleted", "*");
        }
    }
</script>

</body>
</html>
