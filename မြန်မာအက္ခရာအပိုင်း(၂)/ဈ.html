<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dassy's Alphabet Quest - Racing Car (ဈ)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght=400;700;900&family=Pyidaungsu:wght=400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1e293b;
            font-family: 'Fredoka One', 'Pyidaungsu', 'Montserrat', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .burmese-font {
            font-family: 'Pyidaungsu', 'Myanmar3', 'Yunghkio', sans-serif;
        }
    </style>
</head>
<body class="relative">

    <!-- HUD Progress bar and stats -->
    <div id="hud" class="absolute top-4 left-4 right-4 pointer-events-none z-30 flex flex-col space-y-2 max-w-md">
        <div class="flex items-center space-x-3 bg-slate-950/90 backdrop-blur-md p-3 rounded-2xl border border-amber-500/20 shadow-lg">
            <span class="text-xs font-black text-amber-400 tracking-wider uppercase">Race Progress</span>
            <div class="flex-1 bg-black/40 h-4 rounded-full overflow-hidden p-0.5 border border-white/5">
                <div id="xp-bar" class="bg-gradient-to-r from-amber-500 via-orange-500 to-yellow-500 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <span id="level-display" class="bg-amber-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Lvl 1</span>
        </div>
        
        <div class="flex items-center space-x-3">
            <div class="flex items-center space-x-2 bg-slate-950/90 backdrop-blur-md px-4 py-2 rounded-2xl border border-amber-500/20 shadow-lg">
                <span class="text-xl">🏆</span>
                <span id="cash-display" class="text-white font-black tracking-widest text-sm">0</span>
            </div>
            <div class="flex items-center space-x-2 bg-gradient-to-r from-amber-500/20 to-orange-500/20 backdrop-blur-md px-4 py-2 rounded-2xl border border-amber-500/40 shadow-lg">
                <span class="text-xs font-bold text-amber-400 tracking-wider burmese-font">ဖမ်းယူရမည့်အက္ခရာ:</span>
                <span id="target-letter-display" class="burmese-font text-3xl font-black text-amber-300 animate-bounce">ဈ</span>
            </div>
        </div>
    </div>

    <!-- Right Top Buttons (HP & Exit System) -->
    <div class="absolute top-4 right-4 z-40 flex items-center space-x-3">
        <div class="pointer-events-none flex items-center space-x-2 bg-slate-950/90 backdrop-blur-md px-4 py-2 rounded-2xl border border-amber-500/20 shadow-lg">
            <span class="text-lg">🛡️</span>
            <span id="hp-display" class="text-amber-500 font-black tracking-wider text-sm">100 / 100</span>
        </div>
        <button id="exit-btn" class="hidden pointer-events-auto flex items-center justify-center bg-rose-600 hover:bg-rose-500 text-white font-black px-4 py-2.5 rounded-2xl border-b-4 border-rose-800 active:scale-95 transition-all shadow-lg text-sm">
            🚪 <span class="ml-1 burmese-font text-xs font-bold tracking-wide">ထွက်မည်</span>
        </button>
    </div>

    <!-- Upgrade / Power-up Modal -->
    <div id="upgrade-modal" class="hidden absolute inset-0 bg-black/85 backdrop-blur-md z-[100] flex items-center justify-center p-6 transition-all duration-300">
        <div class="bg-[#0f172a] border-2 border-amber-500/20 rounded-[3rem] p-10 max-w-md w-full text-center shadow-[0_0_100px_rgba(245,158,11,0.15)] scale-95 transition-transform">
            <div class="relative mb-8">
                <div class="text-4xl">🏎️⚡🔥</div>
            </div>
            <h2 class="text-3xl font-black text-amber-500 tracking-wider mb-2 uppercase">Lvl Up!</h2>
            <p class="text-neutral-400 text-xs tracking-widest mb-8 uppercase">Select your power-up</p>
            <div id="upgrade-options" class="space-y-4"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Start & Game Over Overlay Screen -->
    <div id="overlay-screen" class="absolute inset-0 bg-slate-950/95 backdrop-blur-md z-[90] flex flex-col items-center justify-center text-center p-8">
        <h1 class="text-5xl sm:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 via-orange-500 to-yellow-500 tracking-widest mb-2 uppercase drop-shadow-[0_0_30px_rgba(245,158,11,0.3)]">RACING CAR</h1>
        <p class="text-amber-400 text-[10px] uppercase font-black tracking-[0.5em] mb-8">Dassy's Burmese Alphabet Quest: "ဈ"</p>
        
        <!-- Stats Panel -->
        <div id="game-stats" class="hidden bg-slate-900 border-2 border-amber-500/30 rounded-3xl p-6 mb-10 max-w-sm w-full text-left space-y-4 shadow-xl">
            <div class="text-center border-b border-white/10 pb-2 mb-2">
                <span class="text-amber-400 font-bold burmese-font text-sm">📊 ကစားမှုရလဒ်မှတ်တမ်း</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-neutral-300 burmese-font text-sm">🟢 မှန်ကန်သော အက္ခရာများ</span>
                <span id="stat-coins" class="text-green-400 font-black text-lg">0</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-neutral-300 burmese-font text-sm">🔴 မှားယွင်းသော အက္ခရာများ</span>
                <span id="stat-kills" class="text-rose-400 font-black text-lg">0</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-neutral-300 burmese-font text-sm">👑 ရောက်ရှိသွားသော အဆင့်</span>
                <span id="stat-level" class="text-amber-400 font-black text-lg">Lvl 1</span>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center items-center pointer-events-auto w-full max-w-md">
            <button id="start-btn" class="w-full sm:w-auto px-12 py-5 bg-amber-600 hover:bg-amber-500 text-white font-black text-xs uppercase tracking-[0.2em] rounded-full transition-all shadow-[0_15px_40px_rgba(245,158,11,0.3)] border-b-4 border-amber-800 active:scale-95 burmese-font">
                🔄 စတင်ကစားမည်
            </button>
            <button id="main-page-btn" class="w-full sm:w-auto px-12 py-5 bg-indigo-600 hover:bg-indigo-500 text-white font-black text-xs uppercase tracking-[0.2em] rounded-full transition-all shadow-[0_15px_40px_rgba(67,56,202,0.3)] border-b-4 border-indigo-800 active:scale-95 burmese-font">
                🚪 ပင်မစာမျက်နှာ (Main Page)
            </button>
        </div>
    </div>

    <script>
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'coin') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.setValueAtTime(900, now + 0.08);
                gainNode.gain.setValueAtTime(0.12, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.22);
                osc.start(now);
                osc.stop(now + 0.22);
            } else if (type === 'fail') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.linearRampToValueAtTime(80, now + 0.2);
                gainNode.gain.setValueAtTime(0.15, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'levelup') {
                const freqs = [400, 500, 600, 700, 900];
                freqs.forEach((f, i) => {
                    const oscSeq = audioCtx.createOscillator();
                    const gainSeq = audioCtx.createGain();
                    oscSeq.connect(gainSeq);
                    gainSeq.connect(audioCtx.destination);
                    oscSeq.type = 'sine';
                    oscSeq.frequency.setValueAtTime(f, now + i * 0.05);
                    gainSeq.gain.setValueAtTime(0.06, now + i * 0.05);
                    gainSeq.gain.exponentialRampToValueAtTime(0.01, now + i * 0.05 + 0.15);
                    oscSeq.start(now + i * 0.05);
                    oscSeq.stop(now + i * 0.05 + 0.15);
                });
            }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const burmeseAlphabets = [
            'က', 'ခ', 'ဂ', 'ဃ', 'င', 'စ', 'ဆ', 'ဇ', 'ဈ', 'ည',
            'တ', 'ထ', 'ဒ', 'ဓ', 'န', 'ပ', 'ဖ', 'ဗ', 'ဘ', 'မ',
            'ယ', 'ရ', 'လ', 'ဝ', 'သ', 'ဟ', 'ဠ', 'အ'
        ];

        const game = {
            running: false,
            paused: false,
            score: 0,
            correctPops: 0,
            incorrectPops: 0,
            targetLetter: 'ဈ',
            roadScrollY: 0,
            roadSpeed: 2.5 
        };

        const player = {
            x: 0, 
            y: 0, 
            width: 50,
            height: 85,
            hp: 100,
            maxHp: 100,
            xp: 0,
            maxXp: 100,
            level: 1
        };

        const keys = {};
        let isDragging = false; 

        // ကီးဘုတ်
        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        // ကားကို တိုက်ရိုက်ဖိဆွဲထိန်းချုပ်ခြင်း
        window.addEventListener('touchstart', (e) => {
            initAudio();
            if (!game.running || game.paused) return;
            const touch = e.touches[0];
            if (Math.abs(touch.clientX - player.x) < 80 && Math.abs(touch.clientY - player.y) < 100) {
                isDragging = true;
            }
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!game.running || game.paused || !isDragging) return;
            player.x = e.touches[0].clientX;
        }, { passive: true });

        window.addEventListener('touchend', () => { isDragging = false; }, { passive: true });

        window.addEventListener('mousedown', (e) => {
            initAudio();
            if (!game.running || game.paused) return;
            if (Math.abs(e.clientX - player.x) < 80 && Math.abs(e.clientY - player.y) < 100) {
                isDragging = true;
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging && game.running && !game.paused) player.x = e.clientX;
        });

        window.addEventListener('mouseup', () => { isDragging = false; });

        // လမ်းကြောင်း ၃ လမ်းရဲ့ အလယ်ဗဟို X နေရာကို ကွက်တိတွက်ချက်ပေးမည့် လုပ်ဆောင်ချက်
        function getLaneCenterTarget(laneIndex) {
            const roadWidth = Math.min(500, canvas.width - 40);
            const roadLeft = (canvas.width - roadWidth) / 2;
            const laneWidth = roadWidth / 3;
            // laneIndex: 0 = ဘယ်လမ်း၊ 1 = အလယ်လမ်း၊ 2 = ညာလမ်း
            return roadLeft + (laneWidth * laneIndex) + (laneWidth / 2);
        }

        function spawnLetterBubble() {
            if (!game.running || game.paused) return;

            // လမ်းကြောင်း ၃ လမ်းထဲက တစ်လမ်းကို ကျပန်းရွေးချယ်သည် (၀၊ ၁၊ ၂)
            const chosenLane = Math.floor(Math.random() * 3);
            const fixedX = getLaneCenterTarget(chosenLane); // ရွေးချယ်ထားသောလမ်း၏ အလယ်တည့်တည့် X တန်ဖိုး
            const startY = -60;

            const isTargetSpawn = Math.random() < 0.5; 
            let chosenLetter = game.targetLetter;
            if (!isTargetSpawn) {
                const filtered = burmeseAlphabets.filter(char => char !== game.targetLetter);
                chosenLetter = filtered[Math.floor(Math.random() * filtered.length)];
            }

            entities.letterBubbles.push({
                x: fixedX, // မျဉ်းပေါ်မကျဘဲ လမ်းအလယ်တည့်တည့်တွင်သာ ရှိစေခြင်း
                y: startY,
                letter: chosenLetter,
                radius: 35, 
                speedY: game.roadSpeed, 
                pulseOffset: Math.random() * Math.PI
            });
        }

        setInterval(spawnLetterBubble, 1800);

        const entities = {
            letterBubbles: []
        };

        function drawRoad() {
            const roadWidth = Math.min(500, canvas.width - 40);
            const roadLeft = (canvas.width - roadWidth) / 2;

            ctx.fillStyle = '#15803d';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#334155';
            ctx.fillRect(roadLeft, 0, roadWidth, canvas.height);

            ctx.fillStyle = '#cbd5e1';
            ctx.fillRect(roadLeft - 8, 0, 8, canvas.height);
            ctx.fillRect(roadLeft + roadWidth, 0, 8, canvas.height);

            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 6;
            ctx.setLineDash([35, 35]);
            ctx.lineDashOffset = -game.roadScrollY;
            
            ctx.beginPath();
            ctx.moveTo(roadLeft + roadWidth / 3, 0);
            ctx.lineTo(roadLeft + roadWidth / 3, canvas.height);
            ctx.moveTo(roadLeft + (roadWidth / 3) * 2, 0);
            ctx.lineTo(roadLeft + (roadWidth / 3) * 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawPlayerCar(x, y) {
            ctx.save();
            ctx.translate(x, y);

            ctx.fillStyle = '#0f172a';
            ctx.fillRect(-player.width/2 - 4, -player.height/2 + 10, 6, 18);
            ctx.fillRect(player.width/2 - 2, -player.height/2 + 10, 6, 18);
            ctx.fillRect(-player.width/2 - 4, player.height/2 - 25, 6, 18);
            ctx.fillRect(player.width/2 - 2, player.height/2 - 25, 6, 18);

            ctx.fillStyle = '#dc2626';
            ctx.beginPath();
            ctx.roundRect(-player.width/2, -player.height/2, player.width, player.height, 14);
            ctx.fill();

            ctx.fillStyle = '#1e293b';
            ctx.fillRect(-player.width/2 + 6, -10, player.width - 12, 32);
            ctx.fillStyle = '#38bdf8';
            ctx.fillRect(-player.width/2 + 8, -8, player.width - 16, 8);

            ctx.fillStyle = '#fef08a';
            ctx.fillRect(-player.width/2 + 6, -player.height/2, 8, 4);
            ctx.fillRect(player.width/2 - 14, -player.height/2, 8, 4);

            ctx.restore();
        }

        function drawLetterSign(bubble) {
            const isTarget = bubble.letter === game.targetLetter;
            const pulse = Math.sin(Date.now() * 0.003 + bubble.pulseOffset) * 2;

            ctx.save();
            ctx.shadowBlur = 10;
            ctx.shadowColor = isTarget ? 'rgba(245, 158, 11, 0.6)' : 'rgba(14, 165, 233, 0.4)';

            ctx.fillStyle = isTarget ? '#f59e0b' : '#0ea5e9';
            ctx.beginPath();
            ctx.arc(bubble.x, bubble.y, bubble.radius + pulse, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.fillStyle = '#ffffff';
            ctx.font = `bold 32px Pyidaungsu, "Myanmar3", "Yunghkio", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(bubble.letter, bubble.x, bubble.y + 2);

            ctx.restore();
        }

        const UPGRADE_POOL = [
            { id: 'hp', name: 'Repair Shield', desc: 'Restore Structural HP', stat: 'hp_heal', factor: 30 }
        ];

        function triggerLevelUp() {
            playSound('levelup');
            player.level++;
            player.xp = 0;
            player.maxXp = Math.round(player.maxXp * 1.5);
            
            const optionsContainer = document.getElementById('upgrade-options');
            optionsContainer.innerHTML = '';
            
            UPGRADE_POOL.forEach(upg => {
                const btn = document.createElement('button');
                btn.className = "w-full p-5 bg-[#1e293b] border border-white/5 hover:border-amber-500 rounded-2xl flex items-center justify-between text-left transition-all active:scale-95";
                btn.innerHTML = `
                    <div>
                        <h4 class="text-white font-black text-sm tracking-wide uppercase">${upg.name}</h4>
                        <p class="text-neutral-400 text-[10px] mt-1 uppercase tracking-wider">${upg.desc}</p>
                    </div>
                    <span class="text-lg">⚡</span>
                `;
                btn.onclick = () => applyUpgrade(upg);
                optionsContainer.appendChild(btn);
            });
            document.getElementById('upgrade-modal').classList.remove('hidden');
            game.paused = true;
        }

        function applyUpgrade(upg) {
            if (upg.stat === 'hp_heal') {
                player.hp = Math.min(player.maxHp, player.hp + upg.factor);
            }
            document.getElementById('upgrade-modal').classList.add('hidden');
            game.paused = false;
        }

        function updateGame(dt) {
            if (!game.running || game.paused) return;

            if (player.hp <= 0) {
                gameOver();
                return;
            }

            game.roadScrollY += game.roadSpeed * dt;
            if (game.roadScrollY >= 70) game.roadScrollY = 0;

            let moveX = 0;
            if (keys['a'] || keys['arrowleft']) moveX = -1;
            if (keys['d'] || keys['arrowright']) moveX = 1;
            if (moveX !== 0) player.x += moveX * 6 * dt;

            const roadWidth = Math.min(500, canvas.width - 40);
            const roadLeft = (canvas.width - roadWidth) / 2;
            player.x = Math.max(roadLeft + player.width/2 + 10, Math.min(roadLeft + roadWidth - player.width/2 - 10, player.x));

            for (let i = entities.letterBubbles.length - 1; i >= 0; i--) {
                const bubble = entities.letterBubbles[i];
                bubble.y += bubble.speedY * dt;

                const carLeft = player.x - player.width / 2;
                const carRight = player.x + player.width / 2;
                const carTop = player.y - player.height / 2;
                const carBottom = player.y + player.height / 2;

                const closestX = Math.max(carLeft, Math.min(bubble.x, carRight));
                const closestY = Math.max(carTop, Math.min(bubble.y, carBottom));
                const distanceX = bubble.x - closestX;
                const distanceY = bubble.y - closestY;
                const distanceSquared = (distanceX * distanceX) + (distanceY * distanceY);

                if (distanceSquared < (bubble.radius * bubble.radius)) {
                    if (bubble.letter === game.targetLetter) {
                        playSound('coin');
                        game.correctPops++;
                        game.score += 20;
                        player.xp += 34;
                        if (player.xp >= player.maxXp) triggerLevelUp();
                    } else {
                        playSound('fail');
                        game.incorrectPops++;
                        player.hp = Math.max(0, player.hp - 15);
                    }
                    entities.letterBubbles.splice(i, 1);
                    continue;
                }

                if (bubble.y > canvas.height + 50) {
                    entities.letterBubbles.splice(i, 1);
                }
            }

            document.getElementById('xp-bar').style.width = `${(player.xp / player.maxXp) * 100}%`;
            document.getElementById('level-display').innerText = `Lvl ${player.level}`;
            document.getElementById('cash-display').innerText = game.score;
            document.getElementById('hp-display').innerText = `${Math.max(0, Math.round(player.hp))} / ${player.maxHp}`;
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawRoad();
            entities.letterBubbles.forEach(bubble => drawLetterSign(bubble));
            drawPlayerCar(player.x, player.y);
        }

        let lastTime = performance.now();
        function gameLoop(now) {
            let dt = (now - lastTime) / 16.666;
            lastTime = now;
            if (dt > 4) dt = 4;

            updateGame(dt);
            render();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            initAudio();
            player.hp = player.maxHp;
            player.xp = 0;
            player.level = 1;
            player.x = canvas.width / 2;
            player.y = canvas.height - 120;
            game.score = 0;
            game.correctPops = 0;
            game.incorrectPops = 0;
            game.roadSpeed = 2.5;
            entities.letterBubbles = [];
            isDragging = false;
            
            document.getElementById('game-stats').classList.add('hidden');
            document.getElementById('overlay-screen').classList.add('hidden');
            document.getElementById('exit-btn').classList.remove('hidden');
            game.running = true;
        }

        function returnToMainPage() {
            playSound('fail');
            game.running = false;
            window.location.href = 'index.html?fromGame=true';
        }

        function gameOver() {
            game.running = false;
            document.getElementById('exit-btn').classList.add('hidden');
            
            document.getElementById('stat-coins').innerText = game.correctPops;
            document.getElementById('stat-kills').innerText = game.incorrectPops;
            document.getElementById('stat-level').innerText = `Lvl ${player.level}`;
            document.getElementById('game-stats').classList.remove('hidden'); 
            
            document.getElementById('start-btn').innerText = "🔄 ပြန်လည်မောင်းနှင်မည်";
            document.getElementById('overlay-screen').classList.remove('hidden');
        }

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('exit-btn').onclick = returnToMainPage;
        document.getElementById('main-page-btn').onclick = returnToMainPage;
        
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
