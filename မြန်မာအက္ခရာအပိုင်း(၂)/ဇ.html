<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dassy's Alphabet Quest - Hill Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght=400;700;900&family=Pyidaungsu:wght=400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #bae6fd;
            font-family: 'Fredoka One', 'Pyidaungsu', 'Montserrat', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .burmese-font {
            font-family: 'Pyidaungsu', 'Myanmar3', 'Yunghkio', sans-serif;
        }
    </style>
</head>
<body class="relative">

    <div id="hud" class="absolute top-4 left-4 right-4 pointer-events-none z-30 flex flex-col space-y-2 max-w-md">
        <div class="flex items-center space-x-3 bg-slate-950/90 backdrop-blur-md p-3 rounded-2xl border border-green-500/20 shadow-lg">
            <span class="text-xs font-black text-green-400 tracking-wider uppercase">Learning Progress</span>
            <div class="flex-1 bg-black/40 h-4 rounded-full overflow-hidden p-0.5 border border-white/5">
                <div id="xp-bar" class="bg-gradient-to-r from-emerald-500 via-teal-500 to-green-500 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <span id="level-display" class="bg-green-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Lvl 1</span>
        </div>
        
        <div class="flex items-center space-x-3">
            <div class="flex items-center space-x-2 bg-slate-950/90 backdrop-blur-md px-4 py-2 rounded-2xl border border-green-500/20 shadow-lg">
                <span class="text-xl">⭐</span>
                <span id="cash-display" class="text-white font-black tracking-widest text-sm">0</span>
            </div>
            <div class="flex items-center space-x-2 bg-gradient-to-r from-amber-500/20 to-emerald-500/20 backdrop-blur-md px-4 py-2 rounded-2xl border border-amber-500/40 shadow-lg animate-pulse">
                <span class="text-xs font-bold text-amber-400 tracking-wider burmese-font">စုဆောင်းရမည့်အက္ခရာ:</span>
                <span id="target-letter-display" class="burmese-font text-2xl font-black text-amber-300">ဇ</span>
            </div>
        </div>
    </div>

    <div class="absolute top-4 right-4 z-40 flex items-center space-x-3">
        <div class="pointer-events-none flex items-center space-x-2 bg-slate-950/90 backdrop-blur-md px-4 py-2 rounded-2xl border border-green-500/20 shadow-lg">
            <span class="text-lg">❤️</span>
            <span id="hp-display" class="text-rose-500 font-black tracking-wider text-sm">100 / 100</span>
        </div>
        <button id="exit-btn" class="hidden pointer-events-auto flex items-center justify-center bg-rose-600 hover:bg-rose-500 text-white font-black px-4 py-2.5 rounded-2xl border-b-4 border-rose-800 active:scale-95 transition-all shadow-lg text-sm">
            🚪 <span class="ml-1 burmese-font text-xs font-bold tracking-wide">ထွက်မည်</span>
        </button>
    </div>

    <div id="upgrade-modal" class="hidden absolute inset-0 bg-black/85 backdrop-blur-md z-[100] flex items-center justify-center p-6 transition-all duration-300">
        <div class="bg-[#0f172a] border-2 border-green-500/20 rounded-[3rem] p-10 max-w-md w-full text-center shadow-[0_0_100px_rgba(16,185,129,0.15)] scale-95 transition-transform">
            <div class="relative mb-8">
                <div class="text-4xl">🏔️🌳🐦</div>
            </div>
            <h2 class="text-3xl font-black text-emerald-500 tracking-wider mb-2 uppercase">HILL LEVEL UP!</h2>
            <p class="text-neutral-400 text-xs tracking-widest mb-8 uppercase">Select your magical nature power-up</p>
            <div id="upgrade-options" class="space-y-4"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="joystick-zone" class="absolute bottom-12 left-12 w-32 h-32 bg-white/5 border border-white/10 rounded-full flex items-center justify-center pointer-events-auto touch-none z-30 shadow-2xl active:bg-white/10 transition-colors">
        <div id="joystick-knob" class="w-12 h-12 bg-emerald-500 rounded-full shadow-lg shadow-emerald-500/50 transform transition-transform duration-75"></div>
    </div>

    <div id="overlay-screen" class="absolute inset-0 bg-slate-950/95 backdrop-blur-md z-[90] flex flex-col items-center justify-center text-center p-8">
        <h1 class="text-5xl sm:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-teal-500 to-green-500 tracking-widest mb-2 uppercase drop-shadow-[0_0_30px_rgba(16,185,129,0.3)]">HILL ADVENTURE</h1>
        <p class="text-amber-400 text-[10px] uppercase font-black tracking-[0.5em] mb-8">Dassy's Burmese Alphabet Quest: "ဇ"</p>
        
        <div id="game-stats" class="hidden bg-slate-900 border-2 border-emerald-500/30 rounded-3xl p-6 mb-10 max-w-sm w-full text-left space-y-4 shadow-xl">
            <div class="text-center border-b border-white/10 pb-2 mb-2">
                <span class="text-emerald-400 font-bold burmese-font text-sm">📊 ကစားမှုရလဒ်မှတ်တမ်း</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-neutral-300 burmese-font text-sm">🟢 မှန်ကန်သော အက္ခရာများ</span>
                <span id="stat-coins" class="text-green-400 font-black text-lg">0</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-neutral-300 burmese-font text-sm">🔴 မှားယွင်းသော အက္ခရာများ</span>
                <span id="stat-kills" class="text-rose-400 font-black text-lg">0</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-neutral-300 burmese-font text-sm">👑 ရောက်ရှိသွားသော အဆင့်</span>
                <span id="stat-level" class="text-amber-400 font-black text-lg">Lvl 1</span>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center items-center pointer-events-auto w-full max-w-md">
            <button id="start-btn" class="w-full sm:w-auto px-12 py-5 bg-emerald-600 hover:bg-emerald-500 text-white font-black text-xs uppercase tracking-[0.2em] rounded-full transition-all shadow-[0_15px_40px_rgba(16,185,129,0.3)] border-b-4 border-emerald-800 active:scale-95 burmese-font">
                🔄 စတင်ကစားမည်
            </button>
            <button id="main-page-btn" class="w-full sm:w-auto px-12 py-5 bg-indigo-600 hover:bg-indigo-500 text-white font-black text-xs uppercase tracking-[0.2em] rounded-full transition-all shadow-[0_15px_40px_rgba(67,56,202,0.3)] border-b-4 border-indigo-800 active:scale-95 burmese-font">
                🚪 ပင်မစာမျက်နှာ (Main Page)
            </button>
        </div>
    </div>

    <script>
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'shoot') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(550, now);
                osc.frequency.exponentialRampToValueAtTime(180, now + 0.1);
                gainNode.gain.setValueAtTime(0.08, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.12);
                gainNode.gain.setValueAtTime(0.06, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
                osc.start(now);
                osc.stop(now + 0.12);
            } else if (type === 'coin') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.setValueAtTime(1200, now + 0.08);
                gainNode.gain.setValueAtTime(0.12, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.22);
                osc.start(now);
                osc.stop(now + 0.22);
            } else if (type === 'fail') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(70, now + 0.25);
                gainNode.gain.setValueAtTime(0.12, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            } else if (type === 'levelup') {
                const freqs = [300, 400, 500, 600, 800];
                freqs.forEach((f, i) => {
                    const oscSeq = audioCtx.createOscillator();
                    const gainSeq = audioCtx.createGain();
                    oscSeq.connect(gainSeq);
                    gainSeq.connect(audioCtx.destination);
                    oscSeq.type = 'sine';
                    oscSeq.frequency.setValueAtTime(f, now + i * 0.06);
                    gainSeq.gain.setValueAtTime(0.06, now + i * 0.06);
                    gainSeq.gain.exponentialRampToValueAtTime(0.01, now + i * 0.06 + 0.15);
                    oscSeq.start(now + i * 0.06);
                    oscSeq.stop(now + i * 0.06 + 0.15);
                });
            }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const burmeseAlphabets = [
            'က', 'ခ', 'ဂ', 'ဃ', 'င', 'စ', 'ဆ', 'ဇ', 'ဈ', 'ည',
            'တ', 'ထ', 'ဒ', 'ဓ', 'န', 'ပ', 'ဖ', 'ဗ', 'ဘ', 'မ',
            'ယ', 'ရ', 'လ', 'ဝ', 'သ', 'ဟ', 'ဠ', 'အ'
        ];

        const game = {
            running: false,
            paused: false,
            score: 0,
            correctPops: 0,
            incorrectPops: 0,
            targetLetter: 'ဇ',
            camera: { x: 0, y: 0 }
        };

        const player = {
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            radius: 20,
            hp: 100,
            maxHp: 100,
            xp: 0,
            maxXp: 100,
            level: 1,
            speed: 4.2,
            range: 180,
            damage: 50,
            shootCooldown: 0.3,
            lastShotTime: 0
        };

        const keys = {};
        const entities = {
            projectiles: [],
            letterBubbles: [],
            collectibles: [],
            scenery: []
        };

        function initScenery() {
            entities.scenery = [];
            const mapRadius = 1600;
            
            for (let i = -mapRadius; i < mapRadius; i += 320) {
                entities.scenery.push({
                    type: 'mountain',
                    x: i + (Math.random() - 0.5) * 80,
                    y: -1100 + (Math.random() - 0.5) * 100,
                    width: 380 + Math.random() * 180,
                    height: 280 + Math.random() * 120,
                    color: '#064e3b'
                });
            }

            for (let i = -mapRadius; i < mapRadius; i += 240) {
                entities.scenery.push({
                    type: 'mountain',
                    x: i + (Math.random() - 0.5) * 50,
                    y: -950 + (Math.random() - 0.5) * 80,
                    width: 280 + Math.random() * 120,
                    height: 180 + Math.random() * 80,
                    color: '#0f766e'
                });
            }

            for (let i = 0; i < 45; i++) {
                entities.scenery.push({
                    type: 'pine_tree',
                    x: (Math.random() - 0.5) * mapRadius * 2,
                    y: (Math.random() - 0.5) * mapRadius * 2,
                    radius: 24 + Math.random() * 12
                });
            }

            for (let i = 0; i < 50; i++) {
                entities.scenery.push({
                    type: 'wildflower',
                    x: (Math.random() - 0.5) * mapRadius * 2,
                    y: (Math.random() - 0.5) * mapRadius * 2,
                    radius: 6 + Math.random() * 4,
                    color: Math.random() > 0.5 ? 'rgba(236, 72, 153, 0.7)' : 'rgba(251, 191, 36, 0.7)'
                });
            }
        }

        function changeTargetLetter() {
            game.targetLetter = 'ဇ';
            document.getElementById('target-letter-display').innerText = game.targetLetter;
        }

        function drawMountain(ctx, x, y, width, height, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x - width / 2, y + height);
            ctx.lineTo(x, y);
            ctx.lineTo(x + width / 2, y + height);
            ctx.closePath();
            ctx.fill();

            ctx.strokeStyle = 'rgba(52, 211, 153, 0.2)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(x - width / 4, y + height / 2);
            ctx.lineTo(x, y);
            ctx.lineTo(x + width / 4, y + height / 2);
            ctx.stroke();
        }

        function drawPineTree(ctx, x, y, radius) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.beginPath();
            ctx.ellipse(x, y + radius, radius * 1.2, radius * 0.35, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#78350f';
            ctx.fillRect(x - radius * 0.15, y, radius * 0.3, radius * 1.3);
            ctx.fillStyle = '#047857';
            ctx.beginPath();
            ctx.moveTo(x, y - radius * 1.6);
            ctx.lineTo(x - radius * 0.8, y - radius * 0.2);
            ctx.lineTo(x + radius * 0.8, y - radius * 0.2);
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(x, y - radius * 1.0);
            ctx.lineTo(x - radius * 1.0, y + radius * 0.4);
            ctx.lineTo(x + radius * 1.0, y + radius * 0.4);
            ctx.closePath();
            ctx.fill();
        }

        function drawWildflower(ctx, x, y, radius, color) {
            const glow = ctx.createRadialGradient(x, y, 1, x, y, radius * 2.5);
            glow.addColorStop(0, color);
            glow.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(x, y, radius * 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(x, y, radius * 0.4, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawPlayer(ctx, x, y) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.beginPath();
            ctx.ellipse(x, y + 16, 22, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#065f46';
            ctx.beginPath();
            ctx.moveTo(x - 16, y + 15);
            ctx.quadraticCurveTo(x, y - 25, x + 16, y + 15);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#022c22';
            ctx.beginPath();
            ctx.arc(x, y - 5, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#f59e0b';
            ctx.beginPath();
            ctx.arc(x - 3, y - 5, 2, 0, Math.PI * 2);
            ctx.arc(x + 3, y - 5, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(16, 185, 129, 0.45)';
            ctx.lineWidth = 2.5;
            ctx.setLineDash([8, 6]);
            ctx.beginPath();
            ctx.arc(x, y, player.range, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawLetterBubble(ctx, bird) {
            const { x, y, letter, scale } = bird;
            const isTarget = letter === game.targetLetter;

            ctx.save();
            ctx.translate(x, y);
            const direction = Math.sin(Date.now() * 0.0015 + bird.angleOffset) > 0 ? 1 : -1;
            ctx.scale(direction, 1);
            const flap = Math.sin(Date.now() * 0.02 + bird.angleOffset) * 10 * scale;
            const birdColor = isTarget ? '#fbbf24' : '#0284c7';

            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 2 * scale;
            ctx.beginPath();
            ctx.moveTo(4 * scale, 4 * scale);
            ctx.lineTo(4 * scale, 24 * scale);
            ctx.stroke();

            const boardY = 24 * scale;
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = isTarget ? '#fbbf24' : '#38bdf8';
            ctx.lineWidth = 2.5 * scale;
            ctx.beginPath();
            ctx.arc(4 * scale, boardY, 13 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.save();
            ctx.scale(direction, 1);
            ctx.fillStyle = '#0f172a';
            ctx.font = `bold ${16 * scale}px Pyidaungsu, "Myanmar3", "Yunghkio", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(letter, direction * 4 * scale, boardY);
            ctx.restore();

            ctx.fillStyle = birdColor;
            ctx.beginPath();
            ctx.arc(0, 0, 11 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#f97316';
            ctx.beginPath();
            ctx.moveTo(9 * scale, -3 * scale);
            ctx.lineTo(16 * scale, 0);
            ctx.lineTo(9 * scale, 3 * scale);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(4 * scale, -4 * scale, 3 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(5 * scale, -4 * scale, 1.5 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = birdColor;
            ctx.beginPath();
            ctx.moveTo(-9 * scale, 0);
            ctx.lineTo(-16 * scale, -5 * scale);
            ctx.lineTo(-13 * scale, 0);
            ctx.lineTo(-16 * scale, 5 * scale);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = isTarget ? '#d97706' : '#0369a1';
            ctx.beginPath();
            ctx.ellipse(-2 * scale, -4 * scale, 5 * scale, 9 * scale, -Math.PI/6 + flap * 0.01, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        let joystickActive = false;
        let joystickStart = { x: 0, y: 0 };
        let joystickDir = { x: 0, y: 0 };

        joystickZone.addEventListener('touchstart', (e) => {
            initAudio();
            joystickActive = true;
            const rect = joystickZone.getBoundingClientRect();
            joystickStart = {
                x: rect.left + rect.width / 2,
                y: rect.top + rect.height / 2
            };
            e.preventDefault();
        }, { passive: false });

        joystickZone.addEventListener('touchmove', (e) => {
            if (!joystickActive) return;
            const touch = e.touches[0];
            const dx = touch.clientX - joystickStart.x;
            const dy = touch.clientY - joystickStart.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const maxRadius = 50;

            if (distance === 0) {
                joystickDir = { x: 0, y: 0 };
                joystickKnob.style.transform = 'translate(0px, 0px)';
            } else {
                const angle = Math.atan2(dy, dx);
                const boundedDist = Math.min(distance, maxRadius);
                joystickDir = { x: Math.cos(angle), y: Math.sin(angle) };
                joystickKnob.style.transform = `translate(${joystickDir.x * boundedDist}px, ${joystickDir.y * boundedDist}px)`;
            }
            e.preventDefault();
        }, { passive: false });

        joystickZone.addEventListener('touchend', (e) => {
            joystickActive = false;
            joystickDir = { x: 0, y: 0 };
            joystickKnob.style.transform = 'translate(0px, 0px)';
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        canvas.addEventListener('mousedown', (e) => {
            if (!game.running || game.paused) return;
            fireManualProjectile(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            if (!game.running || game.paused) return;
            const touch = e.touches[0];
            const rect = joystickZone.getBoundingClientRect();
            if (touch.clientX >= rect.left && touch.clientX <= rect.right &&
                touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
                return;
            }
            fireManualProjectile(touch.clientX, touch.clientY);
        }, { passive: true });

        function fireManualProjectile(screenX, screenY) {
            const now = Date.now() / 1000;
            if (now - player.lastShotTime < player.shootCooldown) return;

            const worldX = screenX + game.camera.x;
            const worldY = screenY + game.camera.y;

            const dx = worldX - player.x;
            const dy = worldY - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist === 0) return;

            playSound('shoot');
            entities.projectiles.push({
                x: player.x,
                y: player.y,
                vx: (dx / dist) * 11.5,
                vy: (dy / dist) * 11.5,
                radius: 7
            });

            player.lastShotTime = now;
        }

        function spawnLetterBubble() {
            if (!game.running || game.paused) return;
            
            const angle = Math.random() * Math.PI * 2;
            const dist = 120 + Math.random() * 130; 
            const x = player.x + Math.cos(angle) * dist;
            const y = player.y + Math.sin(angle) * dist;

            const isTargetSpawn = Math.random() < 0.40;
            let chosenLetter = game.targetLetter;
            if (!isTargetSpawn) {
                const filtered = burmeseAlphabets.filter(char => char !== game.targetLetter);
                chosenLetter = filtered[Math.floor(Math.random() * filtered.length)];
            }

            entities.letterBubbles.push({
                x,
                y,
                letter: chosenLetter,
                scale: 1.0 + Math.random() * 0.3,
                speed: 0.8 + Math.random() * 0.8,
                angleOffset: Math.random() * Math.PI * 2,
                hp: 1,
                spawnTime: Date.now()
            });
        }

        setInterval(spawnLetterBubble, 900);

        const UPGRADE_POOL = [
            { id: 'dmg', name: 'Emerald Ray', desc: '+25% Spell Damage', stat: 'damage', factor: 1.25 },
            { id: 'rng', name: 'Bramble Aura', desc: '+15% Search & Capture Range', stat: 'range', factor: 1.15 },
            { id: 'spd', name: 'Meadow Runners', desc: '+15% Walking Velocity', stat: 'speed', factor: 1.15 },
            { id: 'rate', name: 'Rapid Clover', desc: '-15% Spell Delay', stat: 'shootCooldown', factor: 0.85 }
        ];

        function triggerLevelUp() {
            playSound('levelup');
            player.level++;
            player.xp = 0;
            player.maxXp = Math.round(player.maxXp * 1.5);
            
            const optionsContainer = document.getElementById('upgrade-options');
            optionsContainer.innerHTML = '';
            const shuffled = [...UPGRADE_POOL].sort(() => 0.5 - Math.random()).slice(0, 3);
            shuffled.forEach(upg => {
                const btn = document.createElement('button');
                btn.className = "w-full p-5 bg-[#1e293b] border border-white/5 hover:border-green-500 rounded-2xl flex items-center justify-between text-left transition-all active:scale-95";
                btn.innerHTML = `
                    <div>
                        <h4 class="text-white font-black text-sm tracking-wide uppercase">${upg.name}</h4>
                        <p class="text-neutral-400 text-[10px] mt-1 uppercase tracking-wider">${upg.desc}</p>
                    </div>
                    <span class="text-lg">🎓</span>
                `;
                btn.onclick = () => applyUpgrade(upg);
                optionsContainer.appendChild(btn);
            });
            document.getElementById('upgrade-modal').classList.remove('hidden');
            game.paused = true;
        }

        function applyUpgrade(upg) {
            player[upg.stat] *= upg.factor;
            document.getElementById('upgrade-modal').classList.add('hidden');
            game.paused = false;
        }

        let lastTime = performance.now();
        function updateGame(dt) {
            if (!game.running || game.paused) return;

            if (player.hp <= 0) {
                gameOver();
                return;
            }

            let moveX = 0;
            let moveY = 0;

            if (keys['w'] || keys['arrowup']) moveY = -1;
            if (keys['s'] || keys['arrowdown']) moveY = 1;
            if (keys['a'] || keys['arrowleft']) moveX = -1;
            if (keys['d'] || keys['arrowright']) moveX = 1;
            if (moveX !== 0 && moveY !== 0) {
                moveX *= 0.7071;
                moveY *= 0.7071;
            }

            if (joystickActive) {
                moveX = joystickDir.x;
                moveY = joystickDir.y;
            }

            player.x += moveX * player.speed * dt;
            player.y += moveY * player.speed * dt;

            const mapLimit = 1500;
            player.x = Math.max(-mapLimit, Math.min(mapLimit, player.x));
            player.y = Math.max(-mapLimit, Math.min(mapLimit, player.y));
            
            game.camera.x += (player.x - window.innerWidth / 2 - game.camera.x) * 0.1 * dt;
            game.camera.y += (player.y - window.innerHeight / 2 - game.camera.y) * 0.1 * dt;
            
            for (let i = entities.projectiles.length - 1; i >= 0; i--) {
                const proj = entities.projectiles[i];
                proj.x += proj.vx * dt;
                proj.y += proj.vy * dt;
                const flightDistance = Math.sqrt((proj.x - player.x) ** 2 + (proj.y - player.y) ** 2);
                if (flightDistance > player.range + 200) {
                    entities.projectiles.splice(i, 1);
                    continue;
                }

                let projectileHit = false;
                for (let j = entities.letterBubbles.length - 1; j >= 0; j--) {
                    const bubble = entities.letterBubbles[j];
                    const dx = bubble.x - proj.x;
                    const dy = bubble.y - proj.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < (20 * bubble.scale) + proj.radius) {
                        projectileHit = true;
                        
                        if (bubble.letter === game.targetLetter) {
                            playSound('hit');
                            entities.letterBubbles.splice(j, 1);
                            
                            game.correctPops++;
                            game.score += 15;
                            player.xp += 25;
                            if (player.xp >= player.maxXp) triggerLevelUp();
                            
                            entities.collectibles.push({
                                x: bubble.x,
                                y: bubble.y,
                                value: 25
                            });
                            
                            changeTargetLetter();
                        } else {
                            playSound('fail');
                            game.incorrectPops++;
                            entities.letterBubbles.splice(j, 1);
                            player.hp = Math.max(0, player.hp - 10);
                        }
                        break;
                    }
                }

                if (projectileHit) {
                    entities.projectiles.splice(i, 1);
                }
            }

            for (let idx = entities.letterBubbles.length - 1; idx >= 0; idx--) {
                const bubble = entities.letterBubbles[idx];
                if (bubble.letter !== game.targetLetter && (Date.now() - bubble.spawnTime > 5000)) {
                    entities.letterBubbles.splice(idx, 1);
                    continue;
                }

                const driftTime = Date.now() * 0.0015 + bubble.angleOffset;
                bubble.x += Math.sin(driftTime) * 1.5 * dt;
                bubble.y += Math.cos(driftTime * 0.8) * 1.2 * dt;
                const dx = player.x - bubble.x;
                const dy = player.y - bubble.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < player.radius + 18) {
                    if (bubble.letter === game.targetLetter) {
                        playSound('coin');
                        game.correctPops++;
                        game.score += 25;
                        player.xp += 30;
                        if (player.xp >= player.maxXp) triggerLevelUp();
                        entities.letterBubbles.splice(idx, 1);
                        changeTargetLetter();
                    } else {
                        playSound('fail');
                        game.incorrectPops++; 
                        entities.letterBubbles.splice(idx, 1);
                        player.hp = Math.max(0, player.hp - 15);
                    }
                }

                if (Math.abs(bubble.y - player.y) > 600 || Math.abs(bubble.x - player.x) > 800) {
                    entities.letterBubbles.splice(idx, 1);
                }
            }

            for (let i = entities.collectibles.length - 1; i >= 0; i--) {
                const item = entities.collectibles[i];
                const dx = player.x - item.x;
                const dy = player.y - item.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < player.range) {
                    item.x += (dx / dist) * 7.5 * dt;
                    item.y += (dy / dist) * 7.5 * dt;
                }

                if (dist < player.radius + 10) {
                    playSound('coin');
                    player.xp += item.value;
                    if (player.xp >= player.maxXp) triggerLevelUp();
                    entities.collectibles.splice(i, 1);
                }
            }

            document.getElementById('xp-bar').style.width = `${(player.xp / player.maxXp) * 100}%`;
            document.getElementById('level-display').innerText = `Lvl ${player.level}`;
            document.getElementById('cash-display').innerText = game.score;
            document.getElementById('hp-display').innerText = `${Math.max(0, Math.round(player.hp))} / ${player.maxHp}`;
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-game.camera.x, -game.camera.y);

            const bgGrad = ctx.createLinearGradient(player.x - 2000, player.y - 2000, player.x + 2000, player.y + 2000);
            bgGrad.addColorStop(0, '#bae6fd');
            bgGrad.addColorStop(0.6, '#e0f2fe');
            bgGrad.addColorStop(1, '#f0fdf4');
            
            ctx.fillStyle = bgGrad;
            ctx.fillRect(player.x - 2000, player.y - 2000, 4000, 4000);

            ctx.strokeStyle = 'rgba(52, 211, 153, 0.1)';
            ctx.lineWidth = 1.5;
            for (let x = -2000; x < 2000; x += 150) {
                ctx.beginPath();
                ctx.moveTo(x, -2000);
                ctx.lineTo(x, 2000); ctx.stroke();
            }
            for (let y = -2000; y < 2000; y += 150) {
                ctx.beginPath();
                ctx.moveTo(-2000, y);
                ctx.lineTo(2000, y); ctx.stroke();
            }

            entities.scenery.forEach(item => {
                if (item.type === 'mountain') drawMountain(ctx, item.x, item.y, item.width, item.height, item.color);
            });
            entities.scenery.forEach(item => {
                // ⭐ အမှန်ပြင်ဆင်ချက် - `radius` နေရာမှာ `item.radius` ဟု တိကျစွာ ပြင်ဆင်လိုက်သဖြင့် Screen ပျောက်သွားခြင်း လုံးဝမရှိတော့ပါ။
                if (item.type === 'wildflower') drawWildflower(ctx, item.x, item.y, item.radius, item.color);
                if (item.type === 'pine_tree') drawPineTree(ctx, item.x, item.y, item.radius);
            });
            
            entities.collectibles.forEach(item => {
                ctx.fillStyle = '#fbbf24';
                ctx.beginPath();
                ctx.arc(item.x, item.y, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(item.x - 3, item.y - 3, 2.5, 0, Math.PI * 2);
                ctx.fill();
            });
            
            entities.projectiles.forEach(proj => {
                ctx.fillStyle = '#10b981';
                ctx.beginPath();
                ctx.arc(proj.x, proj.y, proj.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(proj.x - 2, proj.y - 2, 2.5, 0, Math.PI * 2);
                ctx.fill();
            });
            
            entities.letterBubbles.forEach(bird => drawLetterBubble(ctx, bird));
            drawPlayer(ctx, player.x, player.y);

            ctx.restore();
        }

        function gameLoop(now) {
            let dt = (now - lastTime) / 16.666;
            lastTime = now;
            if (dt > 4) dt = 4;

            updateGame(dt);
            render();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            initAudio();
            player.hp = player.maxHp;
            player.xp = 0;
            player.level = 1;
            player.x = 0;
            player.y = 0;
            game.score = 0;
            game.correctPops = 0;
            game.incorrectPops = 0;
            entities.letterBubbles = [];
            entities.projectiles = [];
            entities.collectibles = [];
            
            initScenery();
            changeTargetLetter();
            
            document.getElementById('game-stats').classList.add('hidden');
            document.getElementById('overlay-screen').classList.add('hidden');
            document.getElementById('exit-btn').classList.remove('hidden');
            game.running = true;
        }

        function returnToMainPage() {
            playSound('fail');
            game.running = false;
            window.location.href = 'index.html?fromGame=true';
        }

        function gameOver() {
            game.running = false;
            document.getElementById('exit-btn').classList.add('hidden');
            
            document.getElementById('stat-coins').innerText = game.correctPops;
            document.getElementById('stat-kills').innerText = game.incorrectPops;
            document.getElementById('stat-level').innerText = `Lvl ${player.level}`;
            document.getElementById('game-stats').classList.remove('hidden'); 
            
            document.getElementById('start-btn').innerText = "🔄 ပြန်လည်ကစားမည်";
            document.getElementById('overlay-screen').classList.remove('hidden');
        }

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('exit-btn').onclick = returnToMainPage;
        document.getElementById('main-page-btn').onclick = returnToMainPage;
        
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
