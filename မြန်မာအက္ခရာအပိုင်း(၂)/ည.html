<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dassy's Alphabet Quest - Golden Summer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght@400;700;900&family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #dcfce7; /* Soft Pastel Garden Green Base */
            font-family: 'Fredoka One', 'Pyidaungsu', 'Montserrat', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .burmese-font {
            font-family: 'Pyidaungsu', 'Myanmar3', 'Yunghkio', sans-serif;
        }
    </style>
</head>
<body class="relative">

    <div id="hud" class="absolute top-4 left-4 right-4 pointer-events-none z-30 flex flex-col space-y-2 max-w-md">
        <div class="flex items-center space-x-3 bg-slate-950/90 backdrop-blur-md p-3 rounded-2xl border border-amber-500/20 shadow-lg">
            <span class="text-xs font-black text-amber-400 tracking-wider burmese-font">သင်ယူမှု တိုးတက်မှု</span>
            <div class="flex-1 bg-black/40 h-4 rounded-full overflow-hidden p-0.5 border border-white/5">
                <div id="xp-bar" class="bg-gradient-to-r from-amber-500 via-rose-500 to-yellow-400 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <span id="level-display" class="bg-amber-500 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Lvl 1</span>
        </div>
        
        <div class="flex items-center space-x-3">
            <div class="flex items-center space-x-2 bg-slate-950/90 backdrop-blur-md px-4 py-2 rounded-2xl border border-amber-500/20 shadow-lg">
                <span class="text-xl">🏆</span>
                <span id="cash-display" class="text-white font-black tracking-widest text-sm">0</span>
            </div>
            <div class="flex items-center space-x-2 bg-gradient-to-r from-amber-500/20 to-yellow-500/20 backdrop-blur-md px-4 py-2 rounded-2xl border border-amber-500/40 shadow-lg animate-pulse">
                <span class="text-xs font-black text-amber-400 burmese-font">ပန်းတိုင်အက္ခရာ:</span>
                <span id="target-letter-display" class="burmese-font text-2xl font-bold text-amber-300">ည</span>
            </div>
        </div>
    </div>

    <div class="absolute top-4 right-4 z-30 flex items-center space-x-2">
        <div class="bg-slate-950/90 backdrop-blur-md px-4 py-2 rounded-2xl border border-amber-500/20 shadow-lg flex items-center space-x-2 pointer-events-none">
            <span class="text-lg">❤️</span>
            <span id="hp-display" class="text-rose-500 font-black tracking-wider text-sm">100 / 100</span>
        </div>
        <button id="exit-btn" class="hidden pointer-events-auto bg-rose-600 hover:bg-rose-500 text-white text-xs font-bold px-4 py-2.5 rounded-2xl shadow-lg border-b-4 border-rose-800 active:scale-95 transition-all burmese-font">
            🚪 ထွက်မည်
        </button>
    </div>

    <div id="upgrade-modal" class="hidden absolute inset-0 bg-black/85 backdrop-blur-md z-[100] flex items-center justify-center p-6 transition-all duration-300">
        <div class="bg-[#0f172a] border-2 border-amber-500/20 rounded-[3rem] p-10 max-w-md w-full text-center shadow-[0_0_100px_rgba(245,158,11,0.15)] scale-95 transition-transform">
            <div class="relative mb-8">
                <div class="text-4xl">🌻🐝✨</div>
            </div>
            <h2 class="text-3xl font-black text-amber-500 tracking-wider mb-2 burmese-font">စွမ်းရည်မြှင့်တင်ရန်!</h2>
            <p class="text-neutral-400 text-xs tracking-widest mb-8 burmese-font">မှော်ဝတ်မှုန် စွမ်းအားတစ်ခုကို ရွေးချယ်ပါ</p>
            
            <div id="upgrade-options" class="space-y-4">
                </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="joystick-zone" class="absolute bottom-12 left-12 w-32 h-32 bg-white/5 border border-white/10 rounded-full flex items-center justify-center pointer-events-auto touch-none z-30 shadow-2xl active:bg-white/10 transition-colors">
        <div id="joystick-knob" class="w-12 h-12 bg-amber-500 rounded-full shadow-lg shadow-amber-500/50 transform transition-transform duration-75"></div>
    </div>

    <div id="overlay-screen" class="absolute inset-0 bg-slate-950/95 backdrop-blur-md z-[90] flex flex-col items-center justify-center text-center p-8">
        <h1 class="text-5xl sm:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 via-rose-500 to-yellow-500 tracking-widest mb-2 uppercase drop-shadow-[0_0_30px_rgba(245,158,11,0.3)]">GOLDEN SUMMER</h1>
        <p class="text-amber-400 text-[10px] uppercase font-black tracking-[0.5em] mb-16">Dassy's Burmese Alphabet Quest</p>
        
        <div id="game-stats" class="hidden bg-white/5 border border-white/5 rounded-3xl p-6 mb-10 max-w-xs w-full text-left space-y-3 burmese-font">
            <div class="text-center text-amber-400 font-bold mb-2 border-b border-white/10 pb-2">📊 ရလဒ်မှတ်တမ်း</div>
            <div class="flex justify-between"><span class="text-neutral-400">🟢 မှန်ကန်စွာ စုဆောင်းမှု</span><span id="stat-coins" class="text-green-400 font-bold">0</span></div>
            <div class="flex justify-between"><span class="text-neutral-400">🔴 မှားယွင်းမှု ရှောင်ရှားနိုင်မှု</span><span id="stat-kills" class="text-rose-400 font-bold">0</span></div>
            <div class="flex justify-between"><span class="text-neutral-400">👑 ရောက်ရှိသွားသော အဆင့်</span><span id="stat-level" class="text-amber-400 font-bold">Lvl 1</span></div>
            <button id="main-page-btn" class="w-full mt-4 py-2.5 bg-slate-800 hover:bg-slate-700 text-white rounded-xl font-bold text-xs border border-white/10 transition-all active:scale-95">🏠 ပင်မစာမျက်နှာသို့</button>
        </div>

        <button id="start-btn" class="px-16 py-6 bg-amber-600 hover:bg-amber-500 text-white font-black text-xs uppercase tracking-[0.3em] rounded-full transition-all shadow-[0_20px_50px_rgba(245,158,11,0.3)] border-b-4 border-amber-800 active:scale-95 pointer-events-auto burmese-font">ခရီးစဉ်စတင်မည်</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            if (type === 'shoot') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(550, now);
                osc.frequency.exponentialRampToValueAtTime(180, now + 0.1);
                gainNode.gain.setValueAtTime(0.08, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.12);
                gainNode.gain.setValueAtTime(0.06, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
                osc.start(now);
                osc.stop(now + 0.12);
            } else if (type === 'coin') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.setValueAtTime(1200, now + 0.08);
                gainNode.gain.setValueAtTime(0.12, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.22);
                osc.start(now);
                osc.stop(now + 0.22);
            } else if (type === 'fail') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(70, now + 0.25);
                gainNode.gain.setValueAtTime(0.12, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            } else if (type === 'levelup') {
                const freqs = [300, 400, 500, 600, 800];
                freqs.forEach((f, i) => {
                    const oscSeq = audioCtx.createOscillator();
                    const gainSeq = audioCtx.createGain();
                    oscSeq.connect(gainSeq);
                    gainSeq.connect(audioCtx.destination);
                    oscSeq.type = 'sine';
                    oscSeq.frequency.setValueAtTime(f, now + i * 0.06);
                    gainSeq.gain.setValueAtTime(0.06, now + i * 0.06);
                    gainSeq.gain.exponentialRampToValueAtTime(0.01, now + i * 0.06 + 0.15);
                    oscSeq.start(now + i * 0.06);
                    oscSeq.stop(now + i * 0.06 + 0.15);
                });
            }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const burmeseAlphabets = [
            'က', 'ခ', 'ဂ', 'ဃ', 'င', 'စ', 'ဆ', 'ဇ', 'ဈ', 'ည',
            'တ', 'ထ', 'ဒ', 'ဓ', 'န', 'ပ', 'ဖ', 'ဗ', 'ဘ', 'မ',
            'ယ', 'ရ', 'လ', 'ဝ', 'သ', 'ဟ', 'ဠ', 'အ'
        ];

        const game = {
            running: false,
            paused: false,
            score: 0,
            correctPops: 0,
            incorrectPops: 0,
            targetLetter: 'ည',
            camera: { x: 0, y: 0 }
        };

        const player = {
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            radius: 20,
            hp: 100,
            maxHp: 100,
            xp: 0,
            maxXp: 100,
            level: 1,
            speed: 4.2,
            range: 180,
            damage: 50,
            shootCooldown: 0.3,
            lastShotTime: 0
        };

        const keys = {};
        const entities = {
            projectiles: [],
            letterBubbles: [],
            collectibles: [],
            scenery: []
        };

        function initScenery() {
            entities.scenery = [];
            const mapRadius = 1600;
            for (let i = 0; i < 40; i++) {
                entities.scenery.push({
                    type: 'summer_tree',
                    x: (Math.random() - 0.5) * mapRadius * 2,
                    y: (Math.random() - 0.5) * mapRadius * 2,
                    radius: 25 + Math.random() * 15
                });
            }
            for (let i = 0; i < 35; i++) {
                entities.scenery.push({
                    type: 'sunflower',
                    x: (Math.random() - 0.5) * mapRadius * 2,
                    y: (Math.random() - 0.5) * mapRadius * 2,
                    radius: 10 + Math.random() * 6
                });
            }
            for (let i = 0; i < 50; i++) {
                entities.scenery.push({
                    type: 'fallen_leaf',
                    x: (Math.random() - 0.5) * mapRadius * 2,
                    y: (Math.random() - 0.5) * mapRadius * 2,
                    radius: 6 + Math.random() * 4
                });
            }
        }

        function changeTargetLetter() {
            game.targetLetter = 'ည'; // Lock on target 'ည'
            document.getElementById('target-letter-display').innerText = game.targetLetter;
        }

        function drawSummerTree(ctx, x, y, radius) {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.12)';
            ctx.beginPath();
            ctx.ellipse(x, y + radius, radius * 1.2, radius * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#78350f';
            ctx.fillRect(x - radius * 0.15, y, radius * 0.3, radius * 1.5);

            ctx.fillStyle = '#ca8a04';
            ctx.beginPath();
            ctx.arc(x, y - radius * 0.2, radius, 0, Math.PI * 2);
            ctx.arc(x - radius * 0.6, y - radius * 0.7, radius * 0.8, 0, Math.PI * 2);
            ctx.arc(x + radius * 0.6, y - radius * 0.7, radius * 0.8, 0, Math.PI * 2);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#fef08a'; 
            ctx.beginPath();
            ctx.arc(x - radius * 0.2, y - radius * 0.8, radius * 0.5, 0, Math.PI * 2);
            ctx.closePath();
            ctx.fill();
        }

        function drawSunflower(ctx, x, y, radius) {
            ctx.strokeStyle = '#15803d';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(x, y + radius * 2);
            ctx.quadraticCurveTo(x - 5, y + radius, x, y);
            ctx.stroke();

            ctx.fillStyle = '#facc15';
            for (let i = 0; i < 8; i++) {
                const angle = (i * Math.PI) / 4;
                ctx.beginPath();
                ctx.ellipse(x + Math.cos(angle) * radius * 0.6, y + Math.sin(angle) * radius * 0.6, radius * 0.7, radius * 0.25, angle, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.fillStyle = '#451a03';
            ctx.beginPath();
            ctx.arc(x, y, radius * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawFallenLeaf(ctx, x, y, radius) {
            ctx.fillStyle = 'rgba(234, 179, 8, 0.7)';
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(Math.PI / 4);
            ctx.beginPath();
            ctx.ellipse(0, 0, radius * 1.5, radius * 0.7, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawPlayer(ctx, x, y) {
            ctx.fillStyle = 'rgba(15, 23, 42, 0.25)';
            ctx.beginPath();
            ctx.ellipse(x, y + 15, 20, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#f59e0b';
            ctx.beginPath();
            ctx.moveTo(x - 16, y + 15);
            ctx.quadraticCurveTo(x, y - 25, x + 16, y + 15);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#b45309';
            ctx.beginPath();
            ctx.moveTo(x - 22, y - 10);
            ctx.lineTo(x, y - 28);
            ctx.lineTo(x + 22, y - 10);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#d97706';
            ctx.fillRect(x - 24, y - 12, 48, 4);

            ctx.fillStyle = '#451a03';
            ctx.beginPath();
            ctx.arc(x, y - 3, 7, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#38bdf8';
            ctx.beginPath();
            ctx.arc(x - 3, y - 3, 2, 0, Math.PI * 2);
            ctx.arc(x + 3, y - 3, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = 'rgba(251, 191, 36, 0.45)';
            ctx.lineWidth = 2.5;
            ctx.setLineDash([8, 6]);
            ctx.beginPath();
            ctx.arc(x, y, player.range, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function drawLetterBubble(ctx, bee) {
            const { x, y, letter, scale } = bee;
            const isTarget = letter === game.targetLetter;

            ctx.save();
            ctx.translate(x, y);

            const direction = Math.sin(Date.now() * 0.002 + bee.angleOffset) > 0 ? 1 : -1;
            ctx.scale(direction, 1);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.beginPath();
            ctx.ellipse(0, 16 * scale, 16 * scale, 6 * scale, 0, 0, Math.PI * 2);
            ctx.fill();

            const wingFlap = Math.sin(Date.now() * 0.025 + bee.angleOffset) * (8 * scale);
            ctx.fillStyle = 'rgba(224, 242, 254, 0.7)';
            ctx.beginPath();
            ctx.ellipse(-2 * scale, -10 * scale - wingFlap * 0.2, 6 * scale, 10 * scale, -Math.PI / 6, 0, Math.PI * 2);
            ctx.ellipse(4 * scale, -10 * scale - wingFlap * 0.2, 5 * scale, 8 * scale, Math.PI / 6, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#facc15';
            ctx.beginPath();
            ctx.ellipse(0, 0, 18 * scale, 13 * scale, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#1e293b';
            ctx.fillRect(-8 * scale, -11 * scale, 4 * scale, 22 * scale);
            ctx.fillRect(0 * scale, -13 * scale, 4 * scale, 26 * scale);
            ctx.fillRect(8 * scale, -11 * scale, 4 * scale, 22 * scale);

            ctx.fillStyle = '#1e293b';
            ctx.beginPath();
            ctx.moveTo(-18 * scale, 0);
            ctx.lineTo(-22 * scale, -3 * scale);
            ctx.lineTo(-22 * scale, 3 * scale);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#0f172a';
            ctx.beginPath();
            ctx.arc(14 * scale, 0, 8 * scale, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(16 * scale, -2 * scale, 2.5 * scale, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = isTarget ? '#fef08a' : '#ffffff';
            ctx.strokeStyle = isTarget ? '#ca8a04' : '#94a3b8';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(0, 0, 11 * scale, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.restore();

            ctx.save();
            ctx.translate(x, y);
            ctx.fillStyle = '#0f172a';
            ctx.font = `bold ${16 * scale}px Pyidaungsu, sans-serif`;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';
            ctx.fillText(letter, 0, 0);
            ctx.restore();
        }

        function spawnLetterBubble() {
            if (!game.running || game.paused) return;
            if (entities.letterBubbles.length >= 15) return;

            const spawnDist = Math.max(canvas.width, canvas.height) * 0.7;
            const angle = Math.random() * Math.PI * 2;
            
            // 50% chance to spawn target letter 'ည'
            const isTarget = Math.random() < 0.5;
            let letter = game.targetLetter;
            if (!isTarget) {
                const distractors = burmeseAlphabets.filter(l => l !== game.targetLetter);
                letter = distractors[Math.floor(Math.random() * distractors.length)];
            }

            entities.letterBubbles.push({
                x: player.x + Math.cos(angle) * spawnDist,
                y: player.y + Math.sin(angle) * spawnDist,
                letter: letter,
                hp: 40,
                maxHp: 40,
                radius: 24,
                scale: 1.0 + Math.random() * 0.3,
                speed: 1.0 + Math.random() * 1.2,
                angleOffset: Math.random() * 100,
                points: isTarget ? 10 : -5
            });
        }

        function spawnCollectible(x, y) {
            entities.collectibles.push({
                x: x,
                y: y,
                radius: 8,
                pulse: 0
            });
        }

        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        let joystickActive = false;
        let joystickStart = { x: 0, y: 0 };
        let joystickDir = { x: 0, y: 0 };

        joystickZone.addEventListener('touchstart', (e) => {
            joystickActive = true;
            const rect = joystickZone.getBoundingClientRect();
            joystickStart = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            e.preventDefault();
        }, { passive: false });

        joystickZone.addEventListener('touchmove', (e) => {
            if (!joystickActive) return;
            const touch = e.touches[0];
            const dx = touch.clientX - joystickStart.x;
            const dy = touch.clientY - joystickStart.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const maxRadius = 50;

            if (distance === 0) {
                joystickDir = { x: 0, y: 0 };
                joystickKnob.style.transform = 'translate(0px, 0px)';
            } else {
                const angle = Math.atan2(dy, dx);
                const boundedDist = Math.min(distance, maxRadius);
                joystickDir = { x: Math.cos(angle), y: Math.sin(angle) };
                joystickKnob.style.transform = `translate(${joystickDir.x * boundedDist}px, ${joystickDir.y * boundedDist}px)`;
            }
            e.preventDefault();
        }, { passive: false });

        joystickZone.addEventListener('touchend', (e) => {
            joystickActive = false;
            joystickDir = { x: 0, y: 0 };
            joystickKnob.style.transform = 'translate(0px, 0px)';
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        canvas.addEventListener('mousedown', (e) => {
            if (!game.running || game.paused) return;
            shootSpell(e.clientX, e.clientY);
        });

        function shootSpell(screenX, screenY) {
            const now = audioCtx.currentTime;
            if (now - player.lastShotTime < player.shootCooldown) return;
            player.lastShotTime = now;

            const worldX = screenX + game.camera.x;
            const worldY = screenY + game.camera.y;
            const dx = worldX - player.x;
            const dy = worldY - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist === 0) return;
            entities.projectiles.push({
                x: player.x,
                y: player.y,
                vx: (dx / dist) * 9,
                vy: (dy / dist) * 9,
                radius: 6
            });
            playSound('shoot');
        }

        function updateGame(dt) {
            if (!game.running || game.paused) return;

            // Handle Movements
            let moveX = 0;
            let moveY = 0;

            if (keys['w'] || keys['arrowup']) moveY = -1;
            if (keys['s'] || keys['arrowdown']) moveY = 1;
            if (keys['a'] || keys['arrowleft']) moveX = -1;
            if (keys['d'] || keys['arrowright']) moveX = 1;

            if (joystickActive) {
                moveX = joystickDir.x;
                moveY = joystickDir.y;
            }

            const len = Math.sqrt(moveX * moveX + moveY * moveY);
            if (len > 0) {
                player.vx = (moveX / len) * player.speed;
                player.vy = (moveY / len) * player.speed;
            } else {
                player.vx *= 0.85;
                player.vy *= 0.85;
            }

            player.x += player.vx;
            player.y += player.vy;

            // Camera Setup
            game.camera.x = player.x - canvas.width / 2;
            game.camera.y = player.y - canvas.height / 2;

            // Projectiles Update
            for (let i = entities.projectiles.length - 1; i >= 0; i--) {
                const proj = entities.projectiles[i];
                proj.x += proj.vx;
                proj.y += proj.vy;
                
                // Boundaries limit check
                const dx = proj.x - player.x;
                const dy = proj.y - player.y;
                if (Math.sqrt(dx * dx + dy * dy) > 900) {
                    entities.projectiles.splice(i, 1);
                }
            }

            // Bees (LetterBubbles) Logic
            for (let i = entities.letterBubbles.length - 1; i >= 0; i--) {
                const bee = entities.letterBubbles[i];
                const dx = player.x - bee.x;
                const dy = player.y - bee.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // Movement towards player
                bee.x += (dx / dist) * bee.speed;
                bee.y += (dy / dist) * bee.speed;

                // Collision check with player
                if (dist < player.radius + bee.radius) {
                    if (bee.letter === game.targetLetter) {
                        game.score += 10;
                        game.correctPops++;
                        playSound('coin');
                        spawnCollectible(bee.x, bee.y);
                        player.xp += 20;
                        if (player.xp >= player.maxXp) triggerLevelUp();
                    } else {
                        player.hp -= 15;
                        game.incorrectPops++;
                        playSound('fail');
                        if (player.hp <= 0) gameOver();
                    }
                    document.getElementById('cash-display').innerText = game.score;
                    document.getElementById('hp-display').innerText = `${Math.max(0, player.hp)} / ${player.maxHp}`;
                    document.getElementById('xp-bar').style.width = `${(player.xp / player.maxXp) * 100}%`;
                    entities.letterBubbles.splice(i, 1);
                    continue;
                }

                // Projectile hits bee
                for (let j = entities.projectiles.length - 1; j >= 0; j--) {
                    const proj = entities.projectiles[j];
                    const pdx = proj.x - bee.x;
                    const pdy = proj.y - bee.y;
                    const pDist = Math.sqrt(pdx * pdx + pdy * pdy);

                    if (pDist < bee.radius + proj.radius) {
                        entities.projectiles.splice(j, 1);
                        bee.hp -= player.damage;
                        playSound('hit');

                        if (bee.hp <= 0) {
                            if (bee.letter === game.targetLetter) {
                                game.score += 10;
                                game.correctPops++;
                                spawnCollectible(bee.x, bee.y);
                                player.xp += 15;
                                if (player.xp >= player.maxXp) triggerLevelUp();
                            } else {
                                game.incorrectPops++;
                            }
                            document.getElementById('cash-display').innerText = game.score;
                            document.getElementById('xp-bar').style.width = `${(player.xp / player.maxXp) * 100}%`;
                            entities.letterBubbles.splice(i, 1);
                            break;
                        }
                    }
                }
            }

            // Collectibles (Stars) Update
            for (let i = entities.collectibles.length - 1; i >= 0; i--) {
                const c = entities.collectibles[i];
                const dx = player.x - c.x;
                const dy = player.y - c.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < player.radius + c.radius) {
                    entities.collectibles.splice(i, 1);
                    playSound('coin');
                }
            }
        }

        function triggerLevelUp() {
            player.level++;
            player.xp = 0;
            playSound('levelup');
            document.getElementById('level-display').innerText = `Lvl ${player.level}`;
            document.getElementById('xp-bar').style.width = '0%';
            showUpgradeModal();
        }

        function showUpgradeModal() {
            game.paused = true;
            const container = document.getElementById('upgrade-options');
            container.innerHTML = '';

            const upgrades = [
                { title: '⚡ အမြန်နှုန်းမြှင့်တင်ရန်', desc: 'ရွေ့လျားမှုအမြန်နှုန်းကို ပိုမိုမြန်ဆန်စေသည်', action: () => { player.speed += 0.6; } },
                { title: '🛡️ သွေးပမာဏဖြည့်တင်းရန်', desc: 'နှလုံးအသက်သွေး ၃၀ ပွိုင့် ပြန်လည်ဖြည့်တင်းမည်', action: () => { player.hp = Math.min(player.maxHp, player.hp + 30); } },
                { title: '🎯 ပစ်ခတ်မှုအရှိန်မြှင့်ရန်', desc: 'မှော်ဝတ်မှုန် ပစ်ခတ်မှုCooldown လျှော့ချမည်', action: () => { player.shootCooldown = Math.max(0.15, player.shootCooldown - 0.05); } }
            ];

            upgrades.forEach(u => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left bg-white/5 border border-white/10 hover:border-amber-500/50 p-4 rounded-2xl transition-all active:scale-[0.98] group flex flex-col";
                btn.innerHTML = `<span class="text-white font-bold group-hover:text-amber-400 burmese-font">${u.title}</span><span class="text-xs text-neutral-400 mt-1 burmese-font">${u.desc}</span>`;
                btn.onclick = () => {
                    u.action();
                    document.getElementById('hp-display').innerText = `${player.hp} / ${player.maxHp}`;
                    document.getElementById('upgrade-modal').classList.add('hidden');
                    game.paused = false;
                };
                container.appendChild(btn);
            });

            document.getElementById('upgrade-modal').classList.remove('hidden');
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(-game.camera.x, -game.camera.y);

            // Draw Background Grid/Garden floor details
            ctx.strokeStyle = 'rgba(21, 128, 61, 0.04)';
            ctx.lineWidth = 1;
            const gridSize = 100;
            const startGridX = Math.floor(game.camera.x / gridSize) * gridSize;
            const startGridY = Math.floor(game.camera.y / gridSize) * gridSize;
            
            for (let x = startGridX; x < startGridX + canvas.width + gridSize; x += gridSize) {
                ctx.beginPath(); ctx.moveTo(x, game.camera.y); ctx.lineTo(x, game.camera.y + canvas.height); ctx.stroke();
            }
            for (let y = startGridY; y < startGridY + canvas.height + gridSize; y += gridSize) {
                ctx.beginPath(); ctx.moveTo(game.camera.x, y); ctx.lineTo(game.camera.x + canvas.width, y); ctx.stroke();
            }

            // Draw Scenery Elements
            entities.scenery.forEach(s => {
                if (s.type === 'summer_tree') drawSummerTree(ctx, s.x, s.y, s.radius);
                else if (s.type === 'sunflower') drawSunflower(ctx, s.x, s.y, s.radius);
                else if (s.type === 'fallen_leaf') drawFallenLeaf(ctx, s.x, s.y, s.radius);
            });

            // Draw Collectibles
            entities.collectibles.forEach(c => {
                c.pulse += 0.1;
                ctx.fillStyle = '#facc15';
                ctx.shadowColor = '#facc15';
                ctx.shadowBlur = 10 + Math.sin(c.pulse) * 4;
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0; // reset
            });

            // Draw Projectiles
            ctx.fillStyle = '#e11d48';
            entities.projectiles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Bees (LetterBubbles)
            entities.letterBubbles.forEach(b => drawLetterBubble(ctx, b));

            // Draw Player character
            drawPlayer(ctx, player.x, player.y);

            ctx.restore();
        }

        let lastTime = performance.now();
        function gameLoop(now) {
            let dt = (now - lastTime) / 1000;
            lastTime = now;
            if (dt > 0.1) dt = 0.1;

            updateGame(dt);
            render();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            player.hp = player.maxHp;
            player.xp = 0;
            player.level = 1;
            player.x = 0;
            player.y = 0;
            game.score = 0;
            game.correctPops = 0;
            game.incorrectPops = 0;
            entities.letterBubbles = [];
            entities.projectiles = [];
            entities.collectibles = [];
            
            initScenery();
            changeTargetLetter();
            
            document.getElementById('overlay-screen').classList.add('hidden');
            document.getElementById('exit-btn').classList.remove('hidden'); // ကစားနေစဉ် Exit ပြသရန်
            game.running = true;
        }

        function returnToMainPage() {
            game.running = false;
            window.location.href = 'index.html?fromGame=true';
        }

        function gameOver() {
            game.running = false;
            document.getElementById('exit-btn').classList.add('hidden');
            
            document.getElementById('stat-coins').innerText = game.correctPops;
            document.getElementById('stat-kills').innerText = game.incorrectPops;
            document.getElementById('stat-level').innerText = `Lvl ${player.level}`;
            document.getElementById('game-stats').classList.remove('hidden');
            
            document.getElementById('start-btn').innerText = "🔄 ပြန်လည်ကစားမည်";
            document.getElementById('overlay-screen').classList.remove('hidden');
        }

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('exit-btn').onclick = returnToMainPage;
        document.getElementById('main-page-btn').onclick = returnToMainPage;

        setInterval(spawnLetterBubble, 1000);

        window.onload = function() {
            requestAnimationFrame(gameLoop);
        };
    </script>
</body>
</html>
