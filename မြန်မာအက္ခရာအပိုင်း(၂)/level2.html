<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>မြန်မာစာအက္ခရာ သင်ခန်းစာ - Level 2</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Premium Dreamy Pastel Cartoon Background */
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 40%, #a1c4fd 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            height: 100svh; /* Prevents mobile browser navigation bar from cutting layout */
            box-sizing: border-box;
            padding: 10px 15px;
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- Beautiful Background Animation Particles --- */
        .bg-decorations {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.75);
            border-radius: 100px;
            filter: blur(4px);
            animation: floatCloud 25s infinite linear;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.75);
            border-radius: 50%;
        }
        .cloud-1 { width: 120px; height: 40px; top: 15%; left: -150px; animation-delay: 0s; }
        .cloud-1::before { width: 50px; height: 50px; top: -25px; left: 15px; }
        .cloud-1::after { width: 70px; height: 70px; top: -35px; left: 45px; }

        .cloud-2 { width: 160px; height: 50px; top: 65%; left: -200px; animation-duration: 35s; animation-delay: 8s; opacity: 0.6; }
        .cloud-2::before { width: 60px; height: 60px; top: -30px; left: 20px; }
        .cloud-2::after { width: 90px; height: 90px; top: -45px; left: 55px; }

        @keyframes floatCloud {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(calc(100vw + 200px)); }
        }

        /* --- UI Components Styling & Animations --- */
        .header-container {
            text-align: center;
            margin-bottom: 2px;
            margin-top: 5px;
            z-index: 5;
            width: 100%;
        }

        .instruction-title {
            font-size: 16px; /* Optimized smaller text for mobile screens */
            color: #d81b60; /* Darker rose pink for better contrast on white clouds */
            font-weight: bold;
            text-shadow: 1px 1px 1px #fff, 0px 0px 8px rgba(255, 255, 255, 0.8);
            margin: 6px 0;
            animation: softPulse 2s infinite ease-in-out;
        }

        .mode-badge {
            background: linear-gradient(135deg, #ff9800, #ffb74d);
            color: white;
            padding: 5px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(255, 152, 0, 0.35);
            border: 2px solid #ffffff;
        }

        .stars-container {
            display: flex;
            gap: 8px;
            margin: 2px 0;
            font-size: 24px;
            justify-content: center;
            z-index: 5;
        }

        .star {
            color: #e2e8f0;
            text-shadow: 0 1px 3px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .star.active {
            color: #ffca28;
            transform: scale(1.2) rotate(15deg);
            text-shadow: 0 0 10px rgba(255,202,40,0.8), 1px 1px 0px #e65100;
        }

        /* Modern Premium Floating Canvas Box Frame - Fully Responsive */
        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 260px; /* Scaled down compact size */
            height: 35svh; /* Dynamic ratio based on screen height */
            max-height: 260px;
            aspect-ratio: 1 / 1;
            background-color: white;
            border: 6px solid #ffb74d;
            border-radius: 24px;
            box-shadow: 0px 10px 25px rgba(255, 152, 0, 0.15), 0px 4px 10px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            background-image: radial-gradient(#f1f5f9 15%, transparent 15%);
            background-size: 14px 14px;
            box-sizing: border-box;
        }

        .giant-text-letter {
            font-size: 140px; /* Proportional text fitting for the smaller box */
            font-weight: bold;
            color: #ff4a70;
            text-shadow: 3px 3px 0px #f5f5f5, 5px 5px 0px rgba(0,0,0,0.03);
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: letterFloat 3.5s infinite ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes letterFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-4px) scale(1.02); }
        }
        @keyframes softPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 18px;
            touch-action: none;
            z-index: 2;
            cursor: pointer;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        /* Juicy Cartoon Controls - Compact and Perfectly Sized */
        .controls {
            display: flex;
            gap: 12px;
            margin-top: 5px;
            align-items: center;
            justify-content: center;
            width: 100%;
            z-index: 5;
        }

        .action-btn {
            font-size: 15px; /* Compact sleek button size */
            font-weight: bold;
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0px 4px 0px rgba(0,0,0,0.15);
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
        }

        .action-btn:active:not(:disabled) {
            transform: translateY(3px);
            box-shadow: 0px 1px 0px rgba(0,0,0,0.15);
        }

        .action-btn:disabled {
            background: #cbd5e1 !important;
            color: #94a3b8 !important;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.7;
            transform: none !important;
        }

        .clear-btn {
            background: linear-gradient(135deg, #ff8a80, #e57373);
            color: white;
            border: 2px solid #ffffff;
        }

        .practice-btn {
            background: linear-gradient(135deg, #4caf50, #81c784);
            color: white;
            font-size: 16px;
            padding: 10px 24px;
            border: 2px solid #ffffff;
            box-shadow: 0px 4px 0px #2e7d32;
        }
        .practice-btn:active:not(:disabled) {
            box-shadow: 0px 1px 0px #2e7d32;
        }

        /* Navigation Layout with Premium Home Button */
        .nav-container {
            display: flex;
            gap: 20px;
            margin-top: 5px;
            margin-bottom: 5px;
            z-index: 5;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .nav-circle-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: white;
            border: 3px solid #ffb74d;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(255, 183, 77, 0.3);
            transition: all 0.2s ease;
            color: #ff9800;
        }
        
        .nav-circle-btn:hover:not(:disabled) {
            background-color: #fff8e1;
        }
        .nav-circle-btn:active:not(:disabled) { transform: scale(0.95); }
        .nav-circle-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

        /* 🏠 Home Button Styling */
        .home-btn {
            background: linear-gradient(135deg, #2196f3, #00bcd4);
            border: 3px solid #ffffff;
            color: white;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(33, 150, 243, 0.4);
        }

        /* ==========================================================================
           INTRO OVERLAY SCREEN (မိတ်ဆက်စာမျက်နှာ စတိုင်)
           ========================================================================== */
        .intro-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #a1c4fd 100%);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        
        .intro-overlay.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .intro-title {
            font-size: 30px;
            color: #ff4a70;
            font-weight: 900;
            text-shadow: 2px 2px 0px #fff, 0px 5px 15px rgba(255, 74, 112, 0.2);
            margin-bottom: 5px;
            animation: letterFloat 3s infinite ease-in-out;
        }

        .intro-subtitle {
            font-size: 16px;
            color: #4338ca;
            font-weight: bold;
            margin-bottom: 30px;
            background-color: rgba(255,255,255,0.6);
            padding: 5px 16px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .intro-badge-icon {
            font-size: 60px;
            margin-bottom: 15px;
            animation: softPulse 2.5s infinite ease-in-out;
        }

        .start-play-btn {
            font-size: 20px;
            font-weight: bold;
            color: white;
            padding: 12px 36px;
            background: linear-gradient(135deg, #ff4a70, #ff7693);
            border: 3px solid #ffffff;
            border-radius: 35px;
            cursor: pointer;
            box-shadow: 0px 6px 0px #c92a4a, 0px 10px 20px rgba(255, 74, 112, 0.35);
            transition: all 0.1s ease;
            animation: startButtonPulse 2s infinite ease-in-out;
        }

        .start-play-btn:active {
            transform: translateY(4px);
            box-shadow: 0px 2px 0px #c92a4a, 0px 4px 8px rgba(255, 74, 112, 0.2);
        }

        @keyframes startButtonPulse {
            0%, 100% { box-shadow: 0px 6px 0px #c92a4a, 0px 10px 20px rgba(255, 74, 112, 0.35); }
            50% { box-shadow: 0px 6px 0px #c92a4a, 0px 15px 25px rgba(255, 74, 112, 0.5); transform: scale(1.03); }
        }
    </style>
</head>
<body>

    <div id="introOverlay" class="intro-overlay">
        <div class="intro-badge-icon">🎨✍️🔊</div>
        <h1 class="intro-title">မြန်မာစာအက္ခရာ သင်ခန်းစာ</h1>
        <div class="intro-subtitle">အဆင့် (၂) - စ၊ ဆ၊ ဇ၊ ဈ၊ ည</div>
        <button class="start-play-btn" onclick="startLesson()">သင်ခန်းစာ စတင်မည် 🚀</button>
    </div>

    <div class="bg-decorations">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
    </div>

    <div class="header-container">
        <div id="modeBadge" class="mode-badge">အဆင့် (၁) - နားထောင်စို့ 🔊</div>
        <div id="instructionTitle" class="instruction-title">စာလုံးလေးကို နှိပ်ပြီး အသံနားထောင်မယ် 🎧</div>
    </div>

    <div class="stars-container" id="starsRow">
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
    </div>

    <div class="canvas-container" id="boardContainer">
        <div id="giantText" class="giant-text-letter">စ</div>
        <canvas id="paintCanvas"></canvas>
    </div>

    <div class="controls">
        <button id="clearBtn" class="action-btn clear-btn" onclick="clearCanvas()">ဖျက်ပါ 🧼</button>
        <button id="actionBtn" class="action-btn practice-btn" onclick="handleActionProgress()" disabled>နောက်တစ်ခု 🔄 +⭐</button>
    </div>

    <div class="nav-container">
        <button id="prevBtn" class="nav-circle-btn" onclick="navigateLetter(-1)">◀</button>
        <button id="homeBtn" class="nav-circle-btn home-btn" onclick="returnToMainPage()">🏠</button>
        <button id="nextBtn" class="nav-circle-btn" onclick="navigateLetter(1)" disabled>▶</button>
    </div>

    <script>
        const alphabetData = [
            { name: "စ", traceImg: "sa.png", audioSource: "sa.mp3", requiredStrokes: 2 },
            { name: "ဆ", traceImg: "hsa.png", audioSource: "hsa.mp3", requiredStrokes: 2 },
            { name: "ဇ", traceImg: "za.png", audioSource: "za.mp3", requiredStrokes: 1 },
            { name: "ဈ", traceImg: "zha.png", audioSource: "zha.mp3", requiredStrokes: 3 },
            { name: "ည", traceImg: "nya.png", audioSource: "nya.mp3", requiredStrokes: 2 }
        ];

        let currentIndex = 0;
        let currentMode = "LISTEN";
        let currentStars = 0;
        let strokeCount = 0;
        let isDrawing = false;

        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const giantText = document.getElementById('giantText');
        const actionBtn = document.getElementById('actionBtn');
        const clearBtn = document.getElementById('clearBtn');
        const modeBadge = document.getElementById('modeBadge');
        const instructionTitle = document.getElementById('instructionTitle');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const boardContainer = document.getElementById('boardContainer');

        let letterAudio = new Audio();

        // Responsive Canvas Setup inside resize function
        function resizeCanvas() {
            const rect = boardContainer.getBoundingClientRect();
            const width = rect.width - 12; // Adjusted for padding/borders
            const height = rect.height - 12;
            
            const scale = window.devicePixelRatio || 2;
            canvas.width = width * scale;
            canvas.height = height * scale;
            canvas.style.width = width + "px";
            canvas.style.height = height + "px";
            
            ctx.scale(scale, scale);
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.lineWidth = 12; 
            ctx.strokeStyle = '#ffffff'; 
        }

        window.onload = () => {
            loadAlphabetLevel();
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
        };

        function startLesson() {
            document.getElementById('introOverlay').classList.add('hide');
            playVocal(); 
        }

        function returnToMainPage() {
            window.location.href = 'index.html?fromGame=true';
        }

        function loadAlphabetLevel() {
            currentStars = 0;
            strokeCount = 0;
            updateStarsUI();
            
            const data = alphabetData[currentIndex];
            letterAudio.src = data.audioSource;

            prevBtn.disabled = (currentIndex === 0);
            nextBtn.disabled = true; 
            setGameMode("LISTEN");
        }

        function setGameMode(mode) {
            currentMode = mode;
            const data = alphabetData[currentIndex];
            clearCanvas();
            actionBtn.disabled = true;

            if (currentMode === "LISTEN") {
                modeBadge.innerText = "အဆင့် (၁) - နားထောင်စို့ 🔊";
                modeBadge.style.background = "linear-gradient(135deg, #ff9800, #ffb74d)";
                modeBadge.style.boxShadow = "0 4px 15px rgba(255, 152, 0, 0.35)";
                instructionTitle.innerText = "စာလုံးလေးကို နှိပ်ပြီး အသံနားထောင်မယ် 🎧";
                
                giantText.style.display = "flex";
                giantText.innerText = data.name;
                canvas.style.backgroundImage = "none";
                clearBtn.style.display = "none";
                
                if(document.getElementById('introOverlay').classList.contains('hide')) {
                    playVocal();
                }
            } else {
                modeBadge.innerText = "အဆင့် (၂) - လိုက်ဆွဲစို့ ✍️";
                modeBadge.style.background = "linear-gradient(135deg, #4caf50, #81c784)";
                modeBadge.style.boxShadow = "0 4px 15px rgba(76, 175, 80, 0.35)";
                instructionTitle.innerText = "မြားအညွှန်းအတိုင်း လမ်းကြောင်းလိုက်ဆွဲပါ 🎨";
                
                giantText.style.display = "none";
                canvas.style.backgroundImage = `url('${data.traceImg}')`;
                canvas.style.backgroundSize = "contain";
                canvas.style.backgroundPosition = "center";
                canvas.style.backgroundRepeat = "no-repeat";
                clearBtn.style.display = "inline-block";
            }
        }

        function playVocal() {
            letterAudio.play().catch(e => console.log("Audio waiting for user gesture."));
        }

        function handleActionProgress() {
            if (currentMode === "LISTEN") {
                currentStars++;
                if (currentStars < 5) {
                    updateStarsUI();
                    actionBtn.disabled = true;
                    playVocal();
                } else {
                    currentStars = 0;
                    updateStarsUI();
                    setGameMode("TRACING");
                }
            } else {
                currentStars++;
                if (currentStars < 5) {
                    updateStarsUI();
                    clearCanvas();
                } else {
                    updateStarsUI();
                    if (currentIndex < alphabetData.length - 1) {
                        nextBtn.disabled = false;
                    }
                    instructionTitle.innerText = "အောင်မြင်ပါပြီ။ နောက်စာလုံးကို သွားပါ 🎉";
                    actionBtn.innerText = "ပြီးပါပြီ 🌟";
                    actionBtn.disabled = true;
                }
            }
        }

        function updateStarsUI() {
            const stars = document.querySelectorAll('.star');
            stars.forEach((star, idx) => {
                if (idx < currentStars) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });

            if (currentStars < 5) {
                actionBtn.innerText = "နောက်တစ်ကြိမ် ထပ်လုပ်ပါ 🔄 +⭐";
            }
        }

        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startLine(e) {
            e.preventDefault();
            if (currentMode === "LISTEN") {
                playVocal();
                actionBtn.disabled = false;
                return;
            }
            const coords = getCanvasCoords(e);
            isDrawing = true;
            strokeCount++;
            ctx.beginPath();
            ctx.moveTo(coords.x, coords.y);
        }

        function traceLine(e) {
            e.preventDefault();
            if (!isDrawing || currentMode === "LISTEN") return;
            const coords = getCanvasCoords(e);
            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
        }

        function stopLine() {
            if (!isDrawing) return;
            isDrawing = false;
            ctx.beginPath();

            if (currentMode === "TRACING") {
                const data = alphabetData[currentIndex];
                if (strokeCount >= data.requiredStrokes) {
                    actionBtn.disabled = false;
                }
            }
        }

        canvas.addEventListener('mousedown', startLine);
        canvas.addEventListener('mousemove', traceLine);
        canvas.addEventListener('mouseup', stopLine);

        canvas.addEventListener('touchstart', startLine);
        canvas.addEventListener('touchmove', traceLine);
        canvas.addEventListener('touchend', stopLine);

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (currentMode === "TRACING") {
                strokeCount = 0;
                actionBtn.disabled = true;
            }
        }

        function navigateLetter(direction) {
            currentIndex += direction;
            if (currentIndex >= 0 && currentIndex < alphabetData.length) {
                loadAlphabetLevel();
            }
        }
    </script>
</body>
</html>
