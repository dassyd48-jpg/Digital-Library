<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dassy's Alphabet Quest - Mobile Portrait</title>
    <!-- Tailwind CSS for sleek UI overlay -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght=400;700;900&family=Pyidaungsu:wght=400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0c1033;
            font-family: 'Fredoka One', 'Pyidaungsu', 'Montserrat', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        .burmese-font {
            font-family: 'Pyidaungsu', 'Myanmar3', 'Yunghkio', sans-serif;
        }
    </style>
</head>
<body class="relative">

    <!-- VERTICAL MOBILE HUD OVERLAY -->
    <div id="hud" class="absolute top-4 left-3 right-3 pointer-events-none z-30 flex flex-col gap-2">
        <!-- Top Status: Target, Level and Score split row -->
        <div class="flex justify-between items-center gap-2">
            <!-- Left: Target Indicator -->
            <div class="flex items-center gap-2 bg-black/50 backdrop-blur-md px-3 py-1.5 rounded-xl border border-white/10 flex-1">
                <span class="text-white font-black text-[10px] uppercase tracking-wider">Get:</span>
                <span id="target-letter-display" class="burmese-font text-xl text-amber-400 font-bold">စ</span>
                <!-- XP Bar inside target box for clean design -->
                <div class="relative flex-1 h-2 bg-white/10 rounded-full overflow-hidden ml-1">
                    <div id="xp-bar" class="absolute top-0 left-0 h-full bg-gradient-to-r from-amber-500 to-pink-500 w-0 transition-all"></div>
                </div>
            </div>

            <!-- Right: Score & Level -->
            <div class="flex items-center gap-2 flex-1 justify-end">
                <div class="bg-black/50 backdrop-blur-md px-3 py-1.5 rounded-xl border border-white/10 text-center min-w-[70px]">
                    <span id="score-display" class="text-white text-sm font-black block">0</span>
                </div>
                <div id="level-display" class="text-white font-black text-xs bg-indigo-600/60 px-2.5 py-2 rounded-xl border border-white/20">L1</div>
            </div>
        </div>

        <!-- Second Row: Hearts & Exit button -->
        <div class="flex justify-between items-center gap-2">
            <div id="health-grid" class="bg-black/50 backdrop-blur-md px-3 py-2 rounded-xl border border-white/10 flex gap-1 items-center flex-1 h-[38px]">
                <!-- Hearts fill here -->
            </div>
            <button id="exit-btn" class="bg-rose-600/90 border border-rose-400 text-white font-bold px-3 text-xs h-[38px] rounded-xl active:translate-y-0.5 transition-all flex items-center gap-1 burmese-font pointer-events-auto">
                <span>🚪</span> ထွက်မည်
            </button>
        </div>
    </div>

    <!-- MOBILE CANVAS LAYER -->
    <canvas id="gameCanvas"></canvas>

    <!-- OVERLAY START/GAMEOVER SCREEN -->
    <div id="overlay-screen" class="absolute inset-0 bg-slate-950/90 backdrop-blur-lg z-50 flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-gradient-to-b from-indigo-950 to-slate-900 border border-indigo-500/30 rounded-[28px] p-6 text-center shadow-2xl relative overflow-hidden">
            <h1 id="menu-title" class="text-2xl md:text-3xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-amber-400 via-rose-400 to-pink-500 mb-1">SUNSET HILLS</h1>
            <p id="menu-subtitle" class="text-indigo-200/60 font-bold text-[10px] uppercase tracking-widest mb-6">Mobile Alphabet Quest</p>

            <!-- STATS FOR MOBILE -->
            <div id="game-stats" class="hidden bg-black/40 border border-white/5 rounded-xl p-4 mb-6 text-left space-y-2.5 burmese-font text-sm">
                <div class="flex justify-between items-center border-b border-white/5 pb-1.5">
                    <span class="text-emerald-400 font-bold">🟢 မှန်ကန်သော အက္ခရာများ :</span>
                    <span id="stat-coins" class="text-white font-black">0</span>
                </div>
                <div class="flex justify-between items-center border-b border-white/5 pb-1.5">
                    <span class="text-rose-400 font-bold">🔴 မှားယွင်းသော အက္ခရာများ :</span>
                    <span id="stat-kills" class="text-white font-black">0</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-amber-400 font-bold">👑 ရောက်ရှိသွားသော အဆင့် :</span>
                    <span id="stat-level" class="text-white font-black">Lvl 1</span>
                </div>
            </div>

            <div id="levelup-alert" class="hidden mb-6 animate-bounce">
                <div class="text-4xl mb-1">🌅✨</div>
                <h3 class="text-xl font-black text-amber-400 uppercase">Sunset Level Up!</h3>
            </div>

            <div class="space-y-2.5">
                <button id="start-btn" class="w-full bg-gradient-to-r from-amber-500 to-pink-500 text-white font-black text-md py-3.5 px-6 rounded-xl shadow-lg active:translate-y-0.5 transition-all uppercase">
                    စတင်ကစားမည်
                </button>
                <button id="main-page-btn" class="w-full bg-slate-800/80 border border-white/10 text-indigo-200 font-bold py-3 px-6 rounded-xl text-xs burmese-font">
                    🏠 ပင်မစာမျက်နှာသို့ ပြန်မည်
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Mobile Dynamic Aspect Ratio (ဖုန်း Screen အလိုက် Dynamic ဖြစ်စေရန်)
        let CANVAS_WIDTH = window.innerWidth;
        let CANVAS_HEIGHT = window.innerHeight;

        function updateCanvasSize() {
            CANVAS_WIDTH = window.innerWidth;
            CANVAS_HEIGHT = window.innerHeight;
            canvas.width = CANVAS_WIDTH;
            canvas.height = CANVAS_HEIGHT;
            if(game.running) {
                player.y = CANVAS_HEIGHT - 75;
                initScenery();
            }
        }
        window.addEventListener('resize', updateCanvasSize);

        // Sound System
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'fail') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(110, audioCtx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.25);
                osc.start(); osc.stop(audioCtx.currentTime + 0.25);
            } else if (type === 'levelUp') {
                osc.type = 'triangle';
                const notes = [523.25, 659.25, 783.99];
                notes.forEach((freq, idx) => {
                    const localOsc = audioCtx.createOscillator();
                    const localGain = audioCtx.createGain();
                    localOsc.type = 'triangle';
                    localOsc.frequency.setValueAtTime(freq, audioCtx.currentTime + idx * 0.08);
                    localGain.gain.setValueAtTime(0.1, audioCtx.currentTime + idx * 0.08);
                    localGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + idx * 0.08 + 0.15);
                    localOsc.connect(localGain);
                    localGain.connect(audioCtx.destination);
                    localOsc.start(audioCtx.currentTime + idx * 0.08);
                    localOsc.stop(audioCtx.currentTime + idx * 0.08 + 0.15);
                });
            }
        }

        let game = { running: false, score: 0, correctPops: 0, incorrectPops: 0 };
        let player = { x: 0, y: 0, radius: 20, hp: 5, maxHp: 5, xp: 0, xpToNextLevel: 100, level: 1 };
        let entities = { letterBubbles: [], projectiles: [] };
        let input = { left: false, right: false, isMouseOrTouch: false, targetX: 0 };
        let scenery = { mountains: [], stars: [] };

        let TARGET_LETTER = "စ";
        const ALL_BURMESE_LETTERS = ["က", "ခ", "ဂ", "ဃ", "င", "စ", "ဆ", "ဇ", "ဈ", "ည", "တ", "ထ", "ဒ", "န", "ပ", "ဖ", "ဗ", "မ", "ယ", "ရ", "လ", "ဝ", "သ", "အ"];

        function initScenery() {
            scenery.mountains = [];
            scenery.stars = [];
            scenery.mountains.push({ x: 0, y: CANVAS_HEIGHT - 110, width: CANVAS_WIDTH * 2, height: 120, color: '#2e1065' });
            scenery.mountains.push({ x: -100, y: CANVAS_HEIGHT - 80, width: CANVAS_WIDTH * 2, height: 100, color: '#4c1d95' });
            
            for (let i = 0; i < 25; i++) {
                scenery.stars.push({
                    x: Math.random() * CANVAS_WIDTH,
                    y: Math.random() * (CANVAS_HEIGHT - 150),
                    size: Math.random() * 1.5 + 1,
                    alpha: Math.random(),
                    glowSpeed: 0.02 + Math.random() * 0.03
                });
            }
        }

        function createBubble() {
            const radius = 24; // Mobile optimized size
            const x = radius + Math.random() * (CANVAS_WIDTH - radius * 2);
            const y = -radius;
            const isTarget = Math.random() < 0.4;
            const letter = isTarget ? TARGET_LETTER : ALL_BURMESE_LETTERS[Math.floor(Math.random() * ALL_BURMESE_LETTERS.length)];
            const colorHue = isTarget ? 35 : 275;
            
            entities.letterBubbles.push({
                x, y, radius, letter, isTarget,
                speed: (1.5 + Math.random() * 1.0) * (1 + (player.level - 1) * 0.12),
                hue: colorHue, pulse: 0, pulseSpeed: 0.05
            });
        }

        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : e.clientX);
            return ((clientX - rect.left) / rect.width) * CANVAS_WIDTH;
        }

        // Touch input handling
        canvas.addEventListener('mousemove', (e) => { input.isMouseOrTouch = true; input.targetX = getCanvasCoords(e); });
        canvas.addEventListener('touchstart', (e) => { input.isMouseOrTouch = true; input.targetX = getCanvasCoords(e); }, { passive: true });
        canvas.addEventListener('touchmove', (e) => { input.isMouseOrTouch = true; input.targetX = getCanvasCoords(e); }, { passive: true });

        function updateGame(dt) {
            if (!game.running) return;

            if (!game.timeAcc) game.timeAcc = 0;
            game.timeAcc += dt;
            if (game.timeAcc >= 1.0) { game.score += 1; game.timeAcc = 0; updateHUD(); }

            if (input.isMouseOrTouch) {
                player.x = input.targetX;
            }

            if (player.x < player.radius) player.x = player.radius;
            if (player.x > CANVAS_WIDTH - player.radius) player.x = CANVAS_WIDTH - player.radius;

            // Projectile auto-fire
            if (!player.lastShot) player.lastShot = 0;
            player.lastShot += dt;
            if (player.lastShot >= 0.35) {
                entities.projectiles.push({ x: player.x, y: player.y - player.radius, radius: 4, speed: 500 });
                player.lastShot = 0;
            }

            for (let i = entities.projectiles.length - 1; i >= 0; i--) {
                const p = entities.projectiles[i];
                p.y -= p.speed * dt;
                if (p.y < -p.radius) entities.projectiles.splice(i, 1);
            }

            // Spawning
            if (!game.lastSpawn) game.lastSpawn = 0;
            game.lastSpawn += dt;
            if (game.lastSpawn >= Math.max(0.7, 1.5 - (player.level * 0.1))) {
                createBubble();
                game.lastSpawn = 0;
            }

            // Bubble math & interaction
            for (let i = entities.letterBubbles.length - 1; i >= 0; i--) {
                const b = entities.letterBubbles[i];
                b.y += b.speed;
                b.pulse += b.pulseSpeed;

                const distToPlayer = Math.hypot(b.x - player.x, b.y - player.y);
                if (distToPlayer < b.radius + player.radius) {
                    if (b.isTarget) handleCorrectCollection(); else handleIncorrectImpact();
                    entities.letterBubbles.splice(i, 1); continue;
                }

                let destroyed = false;
                for (let j = entities.projectiles.length - 1; j >= 0; j--) {
                    const p = entities.projectiles[j];
                    if (Math.hypot(b.x - p.x, b.y - p.y) < b.radius + p.radius) {
                        entities.projectiles.splice(j, 1); destroyed = true;
                        if (b.isTarget) handleCorrectCollection(); else { playSound('pop'); game.incorrectPops++; }
                        break;
                    }
                }

                if (destroyed) { entities.letterBubbles.splice(i, 1); continue; }

                if (b.y > CANVAS_HEIGHT + b.radius) {
                    if (b.isTarget) { player.hp--; playSound('fail'); updateHUD(); if (player.hp <= 0) gameOver(); }
                    entities.letterBubbles.splice(i, 1);
                }
            }

            scenery.stars.forEach(s => {
                s.alpha += s.glowSpeed;
                if (s.alpha > 1 || s.alpha < 0.2) s.glowSpeed = -s.glowSpeed;
            });
        }

        function handleCorrectCollection() {
            playSound('pop'); game.score += 10; game.correctPops++; player.xp += 20;
            if (player.xp >= player.xpToNextLevel) triggerLevelUp();
            updateHUD();
        }

        function handleIncorrectImpact() {
            player.hp--; playSound('fail'); game.incorrectPops++; updateHUD();
            if (player.hp <= 0) gameOver();
        }

        function triggerLevelUp() {
            player.level++; player.xp = 0; playSound('levelUp');
            game.running = false;
            document.getElementById('menu-title').innerText = "LEVEL UP!";
            document.getElementById('levelup-alert').classList.remove('hidden');
            document.getElementById('game-stats').classList.add('hidden');
            document.getElementById('start-btn').innerText = "နောက်တစ်ဆင့် သွားမည်";
            document.getElementById('overlay-screen').classList.remove('hidden');
        }

        function updateHUD() {
            document.getElementById('score-display').innerText = game.score;
            document.getElementById('level-display').innerText = `L${player.level}`;
            const pct = Math.min(100, (player.xp / player.xpToNextLevel) * 100);
            document.getElementById('xp-bar').style.width = `${pct}%`;

            const grid = document.getElementById('health-grid');
            grid.innerHTML = '';
            for (let i = 0; i < player.maxHp; i++) {
                const heart = document.createElement('span');
                heart.className = `text-sm ${i < player.hp ? 'opacity-100' : 'opacity-20'}`;
                heart.innerText = '❤️';
                grid.appendChild(heart);
            }
        }

        function render() {
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Sky Background
            let skyGrad = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
            skyGrad.addColorStop(0, '#0c1033'); skyGrad.addColorStop(0.5, '#2e1065'); skyGrad.addColorStop(1, '#f97316');
            ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Stars
            scenery.stars.forEach(s => {
                ctx.fillStyle = `rgba(254, 240, 138, ${s.alpha})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
            });

            // Mountains
            scenery.mountains.forEach(m => {
                ctx.fillStyle = m.color; ctx.beginPath(); ctx.moveTo(m.x, CANVAS_HEIGHT);
                for (let i = 0; i <= CANVAS_WIDTH + 100; i += 20) {
                    ctx.lineTo(i, m.y + Math.sin((i + m.x) * 0.006) * 30);
                }
                ctx.lineTo(CANVAS_WIDTH, CANVAS_HEIGHT); ctx.closePath(); ctx.fill();
            });

            // Green Ground Line
            ctx.fillStyle = '#15803d'; ctx.fillRect(0, CANVAS_HEIGHT - 25, CANVAS_WIDTH, 25);

            // Draw Vector Player Ship (ဝိုင်းစက်စက် အချိုးကျ ပုံစံမှန်ဖြစ်အောင် ရေးဆွဲထားသည်)
            ctx.save();
            ctx.translate(player.x, player.y);
            
            ctx.fillStyle = '#ffffff'; ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(0, -24); ctx.lineTo(16, 12); ctx.lineTo(0, 4); ctx.lineTo(-16, 12);
            ctx.closePath(); ctx.fill(); ctx.stroke();

            ctx.fillStyle = '#38bdf8'; ctx.beginPath(); ctx.arc(0, -4, 6, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            // Projectiles
            ctx.fillStyle = '#f43f5e';
            entities.projectiles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2); ctx.fill();
            });

            // Draw Letters Inside PERFECT ROUND CIRCLES (လုံးဝ ဝိုင်းစက်နေစေရန် မူရင်း Canvas Coords ဖြင့်သာဆွဲသည်)
            entities.letterBubbles.forEach(b => {
                ctx.save();
                ctx.translate(b.x, b.y);

                let bubbleGrad = ctx.createRadialGradient(-3, -3, 1, 0, 0, b.radius);
                bubbleGrad.addColorStop(0, `hsla(${b.hue}, 95%, 85%, 0.9)`);
                bubbleGrad.addColorStop(0.5, `hsla(${b.hue}, 85%, 60%, 0.4)`);
                bubbleGrad.addColorStop(1, `hsla(${b.hue}, 100%, 45%, 0.15)`);
                
                ctx.fillStyle = bubbleGrad;
                ctx.strokeStyle = `hsla(${b.hue}, 100%, 70%, 0.8)`;
                ctx.lineWidth = 2.5;
                
                ctx.beginPath(); ctx.arc(0, 0, b.radius, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

                // Letter text
                ctx.fillStyle = '#ffffff';
                ctx.font = "bold 24px 'Pyidaungsu', sans-serif";
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(b.letter, 0, 1);
                ctx.restore();
            });
        }

        let lastTime = 0;
        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            if (dt > 0.1) dt = 0.1;

            updateGame(dt);
            render();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            updateCanvasSize();
            player.hp = player.maxHp; player.xp = 0; player.level = 1;
            player.x = CANVAS_WIDTH / 2; player.y = CANVAS_HEIGHT - 65;
            game.score = 0; game.correctPops = 0; game.incorrectPops = 0;
            entities.letterBubbles = []; entities.projectiles = [];
            input.targetX = CANVAS_WIDTH / 2;
            
            initScenery(); updateHUD();
            document.getElementById('exit-btn').classList.remove('hidden');
            document.getElementById('overlay-screen').classList.add('hidden');
            game.running = true;
        }

        function gameOver() {
            game.running = false;
            document.getElementById('exit-btn').classList.add('hidden');
            document.getElementById('stat-coins').innerText = game.correctPops;
            document.getElementById('stat-kills').innerText = game.incorrectPops;
            document.getElementById('stat-level').innerText = `Lvl ${player.level}`;
            document.getElementById('game-stats').classList.remove('hidden');
            
            document.getElementById('menu-title').innerText = "GAME OVER";
            document.getElementById('start-btn').innerText = "🔄 ပြန်လည်ကစားမည်";
            document.getElementById('overlay-screen').classList.remove('hidden');
        }

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('exit-btn').onclick = () => { game.running = false; window.location.href = 'index.html?fromGame=true'; };
        document.getElementById('main-page-btn').onclick = () => { window.location.href = 'index.html?fromGame=true'; };

        window.onload = () => { updateCanvasSize(); initScenery(); updateHUD(); requestAnimationFrame(gameLoop); };
    </script>
</body>
</html>
