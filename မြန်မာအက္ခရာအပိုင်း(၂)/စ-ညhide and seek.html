<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>မြန်မာအက္ခရာ ပုန်းတမ်းကစားနည်း - သင်ခန်းစာ ၂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Noto+Sans+Myanmar:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; user-select: none; -webkit-user-select: none; }
    
    body {
      font-family: 'Fredoka', 'Noto Sans Myanmar', system-ui, sans-serif;
      background: linear-gradient(to bottom, #e3f2fd 0%, #f1f8e9 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 10px;
    }

    /* ==========================================================================
       HEADER PANEL & INSTRUCTIONS (Responsive Friendly)
       ========================================================================= */
    .header-panel {
      width: 100%; max-width: 800px; background: white; border: 4px solid #8bc34a;
      border-radius: 20px; padding: 8px 16px; display: flex; align-items: center;
      justify-content: space-between; gap: 10px; box-shadow: 0 8px 16px rgba(0,0,0,0.06);
      z-index: 10; margin-bottom: 10px; flex-wrap: wrap;
    }
    .instruction { font-size: 18px; font-weight: 700; color: #33691e; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .target-box {
      font-family: 'Noto Sans Myanmar', sans-serif; font-size: 28px; font-weight: 900;
      color: white; background: #ff9800; padding: 2px 20px; border-radius: 14px;
      box-shadow: 0 4px 0 #f57c00; animation: pulseTarget 1s infinite alternate;
    }
    @keyframes pulseTarget { 0% { transform: scale(1); } 100% { transform: scale(1.06); } }
    .score-stars { font-size: 24px; color: #ffca28; letter-spacing: 3px; white-space: nowrap; }
    
    /* Exit Button Style */
    .btn-exit {
      background: #e53935; color: white; border: none; padding: 6px 14px; 
      font-family: 'Noto Sans Myanmar', sans-serif; font-size: 14px; font-weight: 700;
      border-radius: 12px; cursor: pointer; box-shadow: 0 4px 0 #b71c1c;
      transition: transform 0.1s; z-index: 15;
    }
    .btn-exit:active { transform: translateY(2px); box-shadow: 0 2px 0 #b71c1c; }

    /* ==========================================================================
       GAME STAGE (POND & GARDEN THEME)
       ========================================================================= */
    .game-stage {
      position: relative; width: 100%; max-width: 800px; aspect-ratio: 16/10;
      background: linear-gradient(to bottom, #b3e5fc 0%, #e1f5fe 40%, #fff9c4 75%);
      border: 6px solid #558b2f; border-radius: 24px; overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.12);
    }

    /* Lawn Background Grass */
    .garden-lawn {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
      background: linear-gradient(to bottom, #7cb342 0%, #558b2f 100%);
      z-index: 2; box-shadow: inset 0 6px 0 #a2d85b;
    }

    /* Pretty Cartoon Pond */
    .garden-pond {
      position: absolute; bottom: -10px; left: -20px; width: 340px; height: 160px;
      background: linear-gradient(to bottom, #29b6f6 0%, #0288d1 100%);
      border-radius: 50%; border: 6px solid #81d4fa; z-index: 3;
      box-shadow: inset 0 10px 20px rgba(0,0,0,0.15), 0 4px 10px rgba(0,0,0,0.1);
    }

    /* Sky Fluffy Clouds */
    .sky-cloud { position: absolute; background: white; border-radius: 50%; opacity: 0.85; z-index: 1; }
    .cloud-1 { top: 12%; left: 8%; width: 95px; height: 35px; box-shadow: 40px 0 0 -5px white, -30px 5px 0 -2px white; animation: floatCloud 6s infinite alternate ease-in-out; }
    .cloud-2 { top: 18%; right: 12%; width: 115px; height: 40px; box-shadow: 45px 5px 0 -5px white, -35px 0 0 0 white; opacity: 0.7; animation: floatCloud 8s infinite alternate-reverse ease-in-out; }
    
    @keyframes floatCloud { 0% { transform: translateX(0px); } 100% { transform: translateX(25px); } }

    /* ==========================================================================
       HIDING SLOTS & SCENERY GRAPHICS
       ========================================================================= */
    .spot-container { position: absolute; z-index: 4; cursor: pointer; }
    .object-layer { position: absolute; inset: 0; z-index: 6; pointer-events: none; }

    .spot-lotus { bottom: 6%; left: 8%; width: 120px; height: 75px; z-index: 4; }
    .organic-lotus {
      position: absolute; inset: 0; background: #00897b; border-radius: 50%;
      box-shadow: inset -10px -8px 0 #004d40, 0 4px 6px rgba(0,0,0,0.1);
    }
    .organic-lotus-cut {
      position: absolute; top: 0; left: 45px; width: 30px; height: 35px;
      background: #0288d1; clip-path: polygon(50% 100%, 0% 0%, 100% 0%);
    }

    .spot-sunflower { bottom: 34%; left: 32%; width: 100px; height: 160px; }
    .organic-flower-stem { position: absolute; bottom: 0; left: 44px; width: 12px; height: 110px; background: #4caf50; border-radius: 6px; }
    .organic-flower-leaf { position: absolute; bottom: 50px; left: 20px; width: 30px; height: 16px; background: #388e3c; border-radius: 15px 0 15px 0; transform: rotate(-15deg); }
    .organic-flower-head { position: absolute; top: 0; left: 0; width: 100px; height: 100px; background: #ffeb3b; border-radius: 50%; border: 8px dashed #fbc02d; box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
    .organic-flower-center { position: absolute; top: 20px; left: 20px; width: 44px; height: 44px; background: #5d4037; border-radius: 50%; }

    .spot-well { bottom: 30%; right: 28%; width: 130px; height: 130px; }
    .organic-well-brick { position: absolute; bottom: 0; left: 10px; width: 110px; height: 75px; background: #b0bec5; border: 4px solid #78909c; border-radius: 12px 12px 4px 4px; box-shadow: inset -15px -10px 0 #90a4ae; }
    .organic-well-roof-post { position: absolute; bottom: 70px; left: 22px; width: 8px; height: 50px; background: #8d6e63; box-shadow: 78px 0 0 #8d6e63; }
    .organic-well-roof { position: absolute; top: 0; left: 0; width: 130px; height: 36px; background: #b22222; border-radius: 20px 20px 4px 4px; }

    .spot-fence { bottom: 26%; right: 4%; width: 150px; height: 90px; }
    .organic-fence-board { position: absolute; bottom: 0; width: 22px; height: 85px; background: #ffe0b2; border: 3px solid #b78d65; border-radius: 6px 6px 0 0; box-shadow: inset -4px 0 0 #f5cda2; }
    .fb-1 { left: 10px; } .fb-2 { left: 45px; } .fb-3 { left: 80px; } .fb-4 { left: 115px; }
    .organic-fence-rail { position: absolute; bottom: 20px; left: 0; width: 150px; height: 12px; background: #d7ccc8; border: 2px solid #b78d65; box-shadow: 0 24px 0 #d7ccc8; }

    .spot-mushroom { bottom: 4%; right: 6%; width: 150px; height: 125px; }
    .organic-shroom-stem { position: absolute; bottom: 0; left: 40px; width: 70px; height: 75px; background: #fff9c4; border: 3px solid #fbc02d; border-radius: 30px 30px 10px 10px; }
    .organic-shroom-door { position: absolute; bottom: 0; left: 62px; width: 26px; height: 42px; background: #ffb74d; border-radius: 10px 10px 0 0; }
    .organic-shroom-cap { position: absolute; top: 0; left: 0; width: 150px; height: 60px; background: #e53935; border-radius: 75px 75px 15px 15px; box-shadow: inset -15px -10px 0 #b71c1c, 0 6px 10px rgba(0,0,0,0.12); }
    .organic-shroom-dot { position: absolute; background: white; border-radius: 50%; }
    .sd-1 { top: 14%; left: 25px; width: 16px; height: 16px; }
    .sd-2 { top: 25%; left: 65px; width: 22px; height: 22px; }
    .sd-3 { top: 16%; right: 25px; width: 18px; height: 18px; }

    /* ==========================================================================
       KIDS CHARACTER SYSTEM
       ========================================================================= */
    .kid-character {
      position: absolute; width: 70px; height: 100px; display: flex; flex-direction: column; align-items: center;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.25); z-index: 3; pointer-events: none;
    }
    
    .spot-lotus .kid-character { left: 25px; bottom: 5px; }
    .spot-sunflower .kid-character { left: 15px; bottom: 30px; }
    .spot-well .kid-character { right: -15px; bottom: 10px; }
    .spot-fence .kid-character { left: 40px; bottom: -10px; }
    .spot-mushroom .kid-character { left: 5px; bottom: 20px; }

    .held-letter {
      position: absolute; top: -46px; left: 50%; transform: translateX(-50%) scale(0);
      font-family: 'Noto Sans Myanmar', sans-serif; font-size: 26px; font-weight: 900;
      background: #fffde7; color: #d84315; border: 3px solid #ff5722;
      padding: 2px 14px; border-radius: 14px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2);
      box-shadow: 0 6px 12px rgba(0,0,0,0.12); line-height: 1.2; z-index: 9;
    }
    .held-letter::after {
      content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
      border-width: 8px 8px 0; border-style: solid; border-color: #ff5722 transparent; display: block; width: 0;
    }

    .kid-head { width: 42px; height: 42px; background: #ffebd2; border-radius: 50%; position: relative; border: 2px solid #5d4037; z-index: 4; }
    .kid-hair { position: absolute; top: -2px; left: -2px; right: -2px; height: 18px; background: #3e2723; border-radius: 20px 20px 0 0; }
    .kid-eyes { position: absolute; top: 16px; left: 8px; right: 8px; display: flex; justify-content: space-between; }
    .kid-eyes::before, .kid-eyes::after { content: ''; width: 6px; height: 6px; background: #212121; border-radius: 50%; }
    .kid-smile { position: absolute; bottom: 6px; left: 16px; width: 10px; height: 6px; border-bottom: 2px solid #212121; border-radius: 0 0 5px 5px; }
    
    .kid-body { 
      width: 38px; height: 45px; background: #e91e63; border-radius: 12px 12px 0 0; margin-top: -2px; position: relative; z-index: 3;
      opacity: 0; transform: translateY(10px); transition: opacity 0.3s ease, transform 0.3s ease;
    }

    /* Peeking & Success States */
    .spot-lotus.peek .kid-character { transform: translateY(-45px); }
    .spot-sunflower.peek .kid-character { transform: translateX(45px) translateY(-25px); }
    .spot-well.peek .kid-character { transform: translateX(35px) translateY(-15px); }
    .spot-fence.peek .kid-character { transform: translateY(-48px); }
    .spot-mushroom.peek .kid-character { transform: translateX(-35px) translateY(-25px); }

    .spot-container.peek .held-letter { transform: translateX(-50%) scale(1); }
    .spot-container.peek .kid-body { opacity: 1; transform: translateY(0); }

    .spot-lotus.success .kid-character { animation: winJumpL 0.4s infinite alternate; }
    @keyframes winJumpL { 0% { transform: translateY(-40px); } 100% { transform: translateY(-62px); } }
    .spot-sunflower.success .kid-character { animation: winJumpSF 0.4s infinite alternate; }
    @keyframes winJumpSF { 0% { transform: translateX(45px) translateY(-25px); } 100% { transform: translateX(45px) translateY(-48px); } }
    .spot-well.success .kid-character { animation: winJumpW 0.4s infinite alternate; }
    @keyframes winJumpW { 0% { transform: translateX(35px) translateY(-15px); } 100% { transform: translateX(35px) translateY(-38px); } }
    .spot-fence.success .kid-character { animation: winJumpF 0.4s infinite alternate; }
    @keyframes winJumpF { 0% { transform: translateY(-45px); } 100% { transform: translateY(-68px); } }
    .spot-mushroom.success .kid-character { animation: winJumpM 0.4s infinite alternate; }
    @keyframes winJumpM { 0% { transform: translateX(-35px) translateY(-25px); } 100% { transform: translateX(-35px) translateY(-48px); } }

    .spot-container.success .kid-body { opacity: 1; transform: translateY(0); }

    /* Shaking Errors */
    .spot-lotus.wrong .kid-character, .spot-fence.wrong .kid-character { animation: shakeV 0.4s ease; }
    @keyframes shakeV { 0%, 100% { transform: translateY(-45px); } 25% { transform: translateX(-6px) translateY(-45px); } 75% { transform: translateX(6px) translateY(-45px); } }
    .spot-sunflower.wrong .kid-character { animation: shakeSF 0.4s ease; }
    @keyframes shakeSF { 0%, 100% { transform: translateX(45px) translateY(-25px); } 25% { transform: translateX(39px) translateY(-25px); } 75% { transform: translateX(51px) translateY(-25px); } }
    .spot-well.wrong .kid-character { animation: shakeW 0.4s ease; }
    @keyframes shakeW { 0%, 100% { transform: translateX(35px) translateY(-15px); } 25% { transform: translateX(29px) translateY(-15px); } 75% { transform: translateX(41px) translateY(-15px); } }
    .spot-mushroom.wrong .kid-character { animation: shakeM 0.4s ease; }
    @keyframes shakeM { 0%, 100% { transform: translateX(-35px) translateY(-25px); } 25% { transform: translateX(-41px) translateY(-25px); } 75% { transform: translateX(-29px) translateY(-25px); } }

    /* ==========================================================================
       SUPER ANIMATED INTRO SCREEN SYSTEM (Full Overhaul)
       ========================================================================= */
    .intro-screen {
      position: absolute; inset: 0; 
      background: linear-gradient(to bottom, #b3e5fc 0%, #e1f5fe 50%, #fff9c4 100%);
      z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px; text-align: center; overflow: hidden; transition: opacity 0.4s ease, pointer-events 0.4s;
    }
    .intro-screen.hide { opacity: 0; pointer-events: none; }
    
    /* Sun Graphic Element in Intro */
    .intro-sun {
      position: absolute; top: 30px; right: 40px; width: 75px; height: 75px;
      background: #ffb300; border-radius: 50%; border: 6px dashed #ff6f00;
      animation: rotateSun 16s linear infinite;
    }
    @keyframes rotateSun { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Moving clouds just for Intro */
    .intro-cloud-decor {
      position: absolute; background: white; border-radius: 40px; opacity: 0.9; z-index: 1;
      animation: introCloudMove 12s infinite alternate ease-in-out;
    }
    .ic-1 { top: 60px; left: -20px; width: 140px; height: 45px; box-shadow: 30px -15px 0 white; }
    .ic-2 { bottom: 80px; right: -30px; width: 16px; height: 50px; box-shadow: -30px 10px 0 white, -70px 0 0 white; }
    @keyframes introCloudMove { 0% { transform: translateX(-10px); } 100% { transform: translateX(30px); } }

    /* Floating Sparkle Stars decor */
    .intro-sparkle { position: absolute; font-size: 24px; color: #ffca28; animation: floatSparkle 3s infinite ease-in-out; opacity: 0.8; }
    .sp-1 { top: 25%; left: 18%; animation-delay: 0s; }
    .sp-2 { top: 60%; left: 12%; animation-delay: 0.8s; color: #ff7043; }
    .sp-3 { top: 20%; right: 22%; animation-delay: 0.4s; color: #4caf50; }
    .sp-4 { bottom: 25%; right: 15%; animation-delay: 1.2s; }
    @keyframes floatSparkle { 0%, 100% { transform: translateY(0) scale(0.8); opacity: 0.5; } 50% { transform: translateY(-15px) scale(1.2); opacity: 1; } }

    /* Welcome Title Package */
    .intro-title-container { position: relative; z-index: 5; margin-bottom: 5px; }
    .intro-title { 
      font-family: 'Noto Sans Myanmar', sans-serif; font-size: 38px; font-weight: 900; 
      color: #2e7d32; text-shadow: 3px 3px 0px white, 5px 5px 0px #a2d85b;
      margin-bottom: 4px; animation: welcomeBounce 1.2s infinite alternate ease-in-out; 
    }
    @keyframes welcomeBounce { 0% { transform: translateY(0); } 100% { transform: translateY(-12px); } }

    .intro-badge { 
      background: #ff9800; color: white; padding: 6px 24px; border-radius: 20px; 
      font-weight: 700; font-size: 18px; display: inline-block;
      box-shadow: 0 5px 0 #f57c00; text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }

    /* Animated Welcome Character Avatar */
    .intro-avatar-area { position: relative; width: 100px; height: 130px; margin-bottom: 20px; z-index: 5; }
    .intro-kid { animation: introKidJump 0.6s infinite alternate cubic-bezier(0.455, 0.03, 0.515, 0.955); }
    .intro-kid .kid-body { opacity: 1; transform: translateY(0); }
    @keyframes introKidJump { 0% { transform: translateY(10px) scaleQ(0.95); } 100% { transform: translateY(-25px) scaleQ(1.05); } }

    /* Premium Big Wiggle Play Action Button */
    .btn-action {
      font-family: 'Noto Sans Myanmar', sans-serif; padding: 14px 45px; font-size: 22px; font-weight: 900;
      color: white; background: #8bc34a; border: none; border-radius: 20px; cursor: pointer; 
      box-shadow: 0 8px 0 #558b2f; transition: transform 0.1s; z-index: 5;
      animation: autoWiggleBtn 3s infinite ease-in-out;
    }
    .btn-action:active { transform: translateY(4px); box-shadow: 0 4px 0 #558b2f; animation: none; }
    
    @keyframes autoWiggleBtn {
      0%, 80%, 100% { transform: rotate(0deg); }
      85% { transform: rotate(3deg) scale(1.03); }
      90% { transform: rotate(-3deg) scale(1.03); }
      95% { transform: rotate(2deg) scale(1.03); }
    }

    /* ==========================================================================
       REWARD OVERLAYS
       ========================================================================= */
    .reward-backdrop {
      position: absolute; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .reward-backdrop.show { opacity: 1; pointer-events: auto; }
    .reward-box {
      background: white; border: 5px solid #ffca28; border-radius: 24px; padding: 30px;
      width: 90%; max-width: 440px; text-align: center; transform: scale(0.7); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.25);
    }
    .reward-backdrop.show .reward-box { transform: scale(1); }
    .reward-title { font-family: 'Noto Sans Myanmar', sans-serif; font-size: 26px; font-weight: 900; color: #e64a19; margin-bottom: 8px; }
    .reward-letter-display { font-family: 'Noto Sans Myanmar', sans-serif; font-size: 58px; font-weight: 900; color: #8bc34a; margin: 8px 0; }
    
    .stats-container { background: #f9f9f9; padding: 10px; border-radius: 12px; margin-bottom: 15px; border: 1px dashed #ccc; font-size: 14px; color: #555; text-align: left; }
    .stats-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-family: 'Noto Sans Myanmar', sans-serif; }
  </style>
</head>
<body>

  <!-- Dashboard Top Menu -->
  <div class="header-panel">
    <div class="instruction">
      <span>ရှာဖွေရမည့် အက္ခရာ:</span>
      <div class="target-box" id="targetDisplay">စ</div>
      <span style="color:#666; font-size:15px;">(တိုးတက်မှုအခြေအနေ:)</span>
    </div>
    <div class="score-stars" id="starContainer">☆☆☆☆☆</div>
    <button class="btn-exit" onclick="exitToMain()">🚪 ထွက်မည်</button>
  </div>

  <!-- Main Game Frame -->
  <div class="game-stage">
    <!-- Intro Splash View Screen with Rich Graphics -->
    <div class="intro-screen" id="welcomePanel">
      <div class="intro-sun"></div>
      <div class="intro-cloud-decor ic-1"></div>
      <div class="intro-cloud-decor ic-2"></div>
      
      <div class="intro-sparkle sp-1">★</div>
      <div class="intro-sparkle sp-2">✦</div>
      <div class="intro-sparkle sp-3">★</div>
      <div class="intro-sparkle sp-4">✦</div>

      <div class="intro-title-container">
        <h1 class="intro-title">မြန်မာအက္ခရာ ပုန်းတမ်းကစားနည်း</h1>
        <div class="intro-badge">သင်ခန်းစာ ၂ : စ ၊ ဆ ၊ ဇ ၊ ဈ ၊ ည</div>
      </div>

      <!-- Jumping Welcome Mascot -->
      <div class="intro-avatar-area">
        <div class="kid-character intro-kid" style="left:15px; top:15px;">
          <div class="kid-head"><div class="kid-hair" style="background:#ff6f00;"></div><div class="kid-eyes"></div><div class="kid-smile"></div></div>
          <div class="kid-body" style="background:#ff7043;"></div>
        </div>
      </div>

      <button class="btn-action" onclick="startGame()">ဂိမ်းစတင်ဆော့မည်</button>
    </div>

    <div class="sky-cloud cloud-1"></div>
    <div class="sky-cloud cloud-2"></div>
    <div class="garden-lawn"></div>
    <div class="garden-pond"></div>
    
    <!-- Slot 1: Lotus Leaf -->
    <div class="spot-container spot-lotus" onclick="handleSpotClick(0)">
      <div class="kid-character" id="kid0">
        <div class="held-letter" id="letter0">-</div>
        <div class="kid-head"><div class="kid-hair" style="background:#ad1457;"></div><div class="kid-eyes"></div><div class="kid-smile"></div></div>
        <div class="kid-body" style="background:#ec407a;"></div>
      </div>
      <div class="object-layer">
        <div class="organic-lotus"></div>
        <div class="organic-lotus-cut"></div>
      </div>
    </div>

    <!-- Slot 2: Sunflower -->
    <div class="spot-container spot-sunflower" onclick="handleSpotClick(1)">
      <div class="kid-character" id="kid1">
        <div class="held-letter" id="letter1">-</div>
        <div class="kid-head"><div class="kid-hair" style="background:#ff6f00;"></div><div class="kid-eyes"></div><div class="kid-smile"></div></div>
        <div class="kid-body" style="background:#ab47bc;"></div>
      </div>
      <div class="object-layer">
        <div class="organic-flower-stem"></div>
        <div class="organic-flower-leaf"></div>
        <div class="organic-flower-head"></div>
        <div class="organic-flower-center"></div>
      </div>
    </div>

    <!-- Slot 3: Water Well -->
    <div class="spot-container spot-well" onclick="handleSpotClick(2)">
      <div class="kid-character" id="kid2">
        <div class="held-letter" id="letter2">-</div>
        <div class="kid-head"><div class="kid-hair" style="background:#37474f;"></div><div class="kid-eyes"></div><div class="kid-smile"></div></div>
        <div class="kid-body" style="background:#26a69a;"></div>
      </div>
      <div class="object-layer">
        <div class="organic-well-roof-post"></div>
        <div class="organic-well-brick"></div>
        <div class="organic-well-roof"></div>
      </div>
    </div>

    <!-- Slot 4: Fence -->
    <div class="spot-container spot-fence" onclick="handleSpotClick(3)">
      <div class="kid-character" id="kid3">
        <div class="held-letter" id="letter3">-</div>
        <div class="kid-head"><div class="kid-hair" style="background:#1565c0;"></div><div class="kid-eyes"></div><div class="kid-smile"></div></div>
        <div class="kid-body" style="background:#ff7043;"></div>
      </div>
      <div class="object-layer">
        <div class="organic-fence-rail"></div>
        <div class="organic-fence-board fb-1"></div>
        <div class="organic-fence-board fb-2"></div>
        <div class="organic-fence-board fb-3"></div>
        <div class="organic-fence-board fb-4"></div>
      </div>
    </div>

    <!-- Slot 5: Mushroom House -->
    <div class="spot-container spot-mushroom" onclick="handleSpotClick(4)">
      <div class="kid-character" id="kid4">
        <div class="held-letter" id="letter4">-</div>
        <div class="kid-head"><div class="kid-hair" style="background:#2e7d32;"></div><div class="kid-eyes"></div><div class="kid-smile"></div></div>
        <div class="kid-body" style="background:#29b6f6;"></div>
      </div>
      <div class="object-layer">
        <div class="organic-shroom-stem"></div>
        <div class="organic-shroom-door"></div>
        <div class="organic-shroom-cap"></div>
        <div class="organic-shroom-dot sd-1"></div>
        <div class="organic-shroom-dot sd-2"></div>
        <div class="organic-shroom-dot sd-3"></div>
      </div>
    </div>
  </div>

  <!-- Victory / Status Reward Overlay Panel -->
  <div class="reward-backdrop" id="rewardPanel">
    <div class="reward-box">
      <h2 class="reward-title" id="rewardTitleText">မှန်သွားပြီ! ထူးချွန်တယ်! 🎉</h2>
      <p style="font-family:'Noto Sans Myanmar'; color:#546e7a;" id="rewardSubText">သူငယ်ချင်းလေးဆီက ရှာတွေ့လိုက်တဲ့ အက္ခရာကတော့ -</p>
      <div class="reward-letter-display" id="rewardLetterBox">စ</div>
      
      <!-- Performance Evaluation Box -->
      <div class="stats-container" id="statsContainer" style="display:none;">
        <div class="stats-row"><span>ရှာဖွေမှု အောင်မြင်မှုနှုန်း:</span><span id="statSuccessCount" style="color:#4caf50; font-weight:bold;">5 ကြိမ်</span></div>
        <div class="stats-row"><span>မှားယွင်းနှိပ်မိမှု အကြိမ်ရေ:</span><span id="statWrongCount" style="color:#f44336; font-weight:bold;">0 ကြိမ်</span></div>
      </div>

      <button class="btn-action" id="rewardActionBtn" style="background:#ff9800; box-shadow:0 6px 0 #e65100; margin-top: 5px;" onclick="advanceToNextRound()">နောက်တစ်ဆင့်သို့</button>
    </div>
  </div>

  <!-- AUDIO GENERATOR AND APPLICATION LOGIC -->
  <script>
    const lettersPoolList = ['စ', 'ဆ', 'ဇ', 'ဈ', 'ည'];
    let assignedPositions = [];
    let scoreProgress = 0;
    let currentTargetLetter = '';
    let isTransitioning = false;
    let wrongClicksCounter = 0;

    // Web Audio API Synthesizer Sound Engine
    const AudioEngineCtx = new (window.AudioContext || window.webkitAudioContext)();

    function triggerAudioEffect(type) {
      if (AudioEngineCtx.state === 'suspended') AudioEngineCtx.resume();
      const timeNow = AudioEngineCtx.currentTime;

      if (type === 'coinSuccess') {
        const oscNode = AudioEngineCtx.createOscillator();
        const gainNode = AudioEngineCtx.createGain();
        oscNode.type = 'sine';
        oscNode.frequency.setValueAtTime(587.33, timeNow);
        oscNode.frequency.exponentialRampToValueAtTime(880, timeNow + 0.1);
        gainNode.gain.setValueAtTime(0.15, timeNow);
        gainNode.gain.exponentialRampToValueAtTime(0.001, timeNow + 0.15);
        oscNode.connect(gainNode); gainNode.connect(AudioEngineCtx.destination);
        oscNode.start(timeNow); oscNode.stop(timeNow + 0.15);
      } 
      else if (type === 'errorWrong') {
        const oscNode = AudioEngineCtx.createOscillator();
        const gainNode = AudioEngineCtx.createGain();
        oscNode.type = 'sawtooth';
        oscNode.frequency.setValueAtTime(180, timeNow);
        oscNode.frequency.linearRampToValueAtTime(90, timeNow + 0.25);
        gainNode.gain.setValueAtTime(0.2, timeNow);
        gainNode.gain.exponentialRampToValueAtTime(0.001, timeNow + 0.25);
        oscNode.connect(gainNode); gainNode.connect(AudioEngineCtx.destination);
        oscNode.start(timeNow); oscNode.stop(timeNow + 0.25);
      } 
      else if (type === 'victoryFanfare') {
        const notesList = [261.63, 329.63, 392.00, 523.25];
        notesList.forEach((frequency, index) => {
          const oscSeq = AudioEngineCtx.createOscillator();
          const gainSeq = AudioEngineCtx.createGain();
          oscSeq.type = 'triangle';
          oscSeq.frequency.setValueAtTime(frequency, timeNow + index * 0.08);
          gainSeq.gain.setValueAtTime(0.12, timeNow + index * 0.08);
          gainSeq.gain.exponentialRampToValueAtTime(0.001, timeNow + index * 0.08 + 0.2);
          oscSeq.connect(gainSeq); gainSeq.connect(AudioEngineCtx.destination);
          oscSeq.start(timeNow + index * 0.08); oscSeq.stop(timeNow + index * 0.08 + 0.2);
        });
      }
    }

    function exitToMain() {
      window.location.href = 'index.html?fromGame=true';
    }

    function startGame() {
      document.getElementById('welcomePanel').classList.add('hide');
      scoreProgress = 0;
      wrongClicksCounter = 0;
      document.getElementById('statsContainer').style.display = 'none';
      setupNewTargetRound();
    }

    function setupNewTargetRound() {
      isTransitioning = false;
      currentTargetLetter = lettersPoolList[scoreProgress];
      
      let tempLettersArray = [...lettersPoolList];
      assignedPositions = [];
      
      for(let i = 0; i < 5; i++) {
        let randomIndex = Math.floor(Math.random() * tempLettersArray.length);
        assignedPositions.push(tempLettersArray.splice(randomIndex, 1)[0]);
        
        document.getElementById(`letter${i}`).textContent = assignedPositions[i];
        const parentElementNode = document.getElementById(`kid${i}`).parentElement;
        parentElementNode.classList.remove('peek', 'success', 'wrong');
      }
      
      renderDashboardUI();
    }

    function renderDashboardUI() {
      document.getElementById('targetDisplay').textContent = currentTargetLetter;
      
      let starMarkup = '';
      for(let i = 0; i < 5; i++) {
        starMarkup += (i < scoreProgress) ? '★' : '☆';
      }
      document.getElementById('starContainer').textContent = starMarkup;
    }

    function handleSpotClick(spotIndex) {
      if(isTransitioning) return;
      
      isTransitioning = true;
      const clickedSpotContainer = document.getElementById(`kid${spotIndex}`).parentElement;
      const discoveredLetter = assignedPositions[spotIndex];

      clickedSpotContainer.classList.remove('wrong', 'peek', 'success');
      void clickedSpotContainer.offsetWidth; 
      clickedSpotContainer.classList.add('peek');

      setTimeout(() => {
        if(discoveredLetter === currentTargetLetter) {
          triggerAudioEffect('coinSuccess');
          clickedSpotContainer.classList.remove('peek');
          clickedSpotContainer.classList.add('success');
          
          document.getElementById('rewardLetterBox').textContent = currentTargetLetter;
          scoreProgress++;
          
          setTimeout(() => {
            if(scoreProgress >= 5) {
              triggerAudioEffect('victoryFanfare');
              document.getElementById('rewardTitleText').textContent = "🌟 ဂိမ်းတစ်ခုလုံး အောင်မြင်သွားပါပြီ! 🌟";
              document.getElementById('rewardSubText').textContent = "အက္ခရာသူငယ်ချင်း (၅) လုံးလုံးကို ရှာဖွေတွေ့ရှိသွားပါပြီ။";
              document.getElementById('rewardLetterBox').textContent = "⭐⭐⭐⭐•";
              
              document.getElementById('statSuccessCount').textContent = "5 ကြိမ် ကွက်တိ";
              document.getElementById('statWrongCount').textContent = wrongClicksCounter + " ကြိမ်";
              document.getElementById('statsContainer').style.display = 'block';
              
              document.getElementById('rewardActionBtn').textContent = "🏠 ပင်မစာမျက်နှာသို့ ပြန်မည်";
              document.getElementById('rewardActionBtn').onclick = exitToMain;
            } else {
              document.getElementById('rewardTitleText').textContent = "မှန်သွားပြီ! ထူးချွန်တယ်! 🎉";
              document.getElementById('rewardSubText').textContent = "သူငယ်ချင်းလေးဆီက ရှာတွေ့လိုက်တဲ့ အက္ခရာကတော့ -";
              document.getElementById('rewardActionBtn').textContent = "နောက်တစ်ဆင့်သို့";
              document.getElementById('rewardActionBtn').onclick = advanceToNextRound;
            }
            document.getElementById('rewardPanel').classList.add('show');
          }, 950);

        } else {
          triggerAudioEffect('errorWrong');
          wrongClicksCounter++;
          clickedSpotContainer.classList.add('wrong');
          setTimeout(() => {
            clickedSpotContainer.classList.remove('wrong', 'peek');
            isTransitioning = false;
          }, 1200);
        }
      }, 400);
    }

    function advanceToNextRound() {
      document.getElementById('rewardPanel').classList.remove('show');
      if(scoreProgress >= 5) {
        scoreProgress = 0;
      }
      setupNewTargetRound();
    }
  </script>
</body>
</html>
