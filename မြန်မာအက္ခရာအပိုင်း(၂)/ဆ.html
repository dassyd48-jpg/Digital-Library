<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COSMIC ALPHABET QUEST - SPACE EXPEDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pyidaungsu:wght@400;700;900&family=Fredoka+One&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020208; /* Deep Space Base */
            font-family: 'Fredoka One', 'Pyidaungsu', 'Montserrat', sans-serif;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .burmese-font {
            font-family: 'Pyidaungsu', 'Myanmar3', 'Yunghkio', sans-serif;
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(244, 63, 94, 0.4); }
            50% { box-shadow: 0 0 30px rgba(244, 63, 94, 0.8); }
        }
        .animate-pulse-glow {
            animation: pulse-glow 2s infinite;
        }
    </style>
</head>
<body class="relative bg-slate-950 select-none">

    <div id="hud" class="absolute top-4 left-4 right-4 pointer-events-none z-30 flex flex-col space-y-2 max-w-md">
        <div class="flex items-center space-x-3 bg-slate-950/90 backdrop-blur-md p-3 rounded-2xl border border-pink-500/20 shadow-lg">
            <span class="text-xs font-black text-pink-400 tracking-wider uppercase">Learning Progress</span>
            <div class="flex-1 bg-black/40 h-4 rounded-full overflow-hidden p-0.5 border border-white/5">
                <div id="xp-bar" class="bg-gradient-to-r from-amber-500 via-rose-500 to-pink-500 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <span id="level-display" class="bg-pink-500 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Lvl 1</span>
        </div>
        
        <div class="flex items-center space-x-3">
            <div class="flex items-center space-x-2 bg-slate-950/90 backdrop-blur-md px-4 py-2 rounded-2xl border border-pink-500/20 shadow-lg">
                <span class="text-xl">⭐</span>
                <span id="cash-display" class="text-white font-black tracking-widest text-sm">0</span>
            </div>
            <div class="flex items-center space-x-2 bg-gradient-to-r from-amber-500/20 to-rose-500/20 backdrop-blur-md px-4 py-2 rounded-2xl border border-amber-500/40 shadow-lg animate-pulse">
                <span class="text-xs font-bold text-amber-400 tracking-wider burmese-font">စုဆောင်းရမည့်အက္ခရာ:</span>
                <span id="target-letter-display" class="burmese-font text-2xl font-black text-amber-300">ဆ</span>
            </div>
        </div>
    </div>

    <div class="absolute top-4 right-4 z-40 flex items-center space-x-3">
        <div class="pointer-events-none flex items-center space-x-2 bg-slate-950/90 backdrop-blur-md px-4 py-2 rounded-2xl border border-pink-500/20 shadow-lg">
            <span class="text-lg">❤️</span>
            <span id="hp-display" class="text-rose-500 font-black tracking-wider text-sm">100 / 100</span>
        </div>
        <button id="exit-btn" class="hidden pointer-events-auto flex items-center justify-center bg-rose-600 hover:bg-rose-500 text-white font-black px-4 py-2.5 rounded-2xl border-b-4 border-rose-800 active:scale-95 transition-all shadow-lg text-sm">
            🚪 <span class="ml-1 burmese-font text-xs font-bold tracking-wide">ထွက်မည်</span>
        </button>
    </div>

    <div id="upgrade-modal" class="hidden absolute inset-0 bg-black/85 backdrop-blur-md z-[100] flex items-center justify-center p-6 transition-all duration-300">
        <div class="bg-[#0f172a] border-2 border-pink-500/20 rounded-[3rem] p-10 max-w-md w-full text-center shadow-[0_0_100px_rgba(244,63,94,0.15)] scale-95 transition-transform">
            <div class="relative mb-8">
                <div class="text-4xl">🚀🪐✨</div>
            </div>
            <h2 class="text-3xl font-black text-amber-500 tracking-wider mb-2 uppercase">COSMIC LEVEL UP!</h2>
            <p class="text-neutral-400 text-[10px] tracking-widest mb-8 uppercase">Select your magical space power-up</p>
            <div id="upgrade-options" class="space-y-4"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="joystick-zone" class="absolute bottom-12 left-12 w-32 h-32 bg-white/5 border border-white/10 rounded-full flex items-center justify-center pointer-events-auto touch-none z-30 shadow-2xl active:bg-white/10 transition-colors">
        <div id="joystick-knob" class="w-12 h-12 bg-rose-500 rounded-full shadow-lg shadow-rose-500/50 transform transition-transform duration-75"></div>
    </div>

    <div id="overlay-screen" class="absolute inset-0 bg-slate-950/95 backdrop-blur-md z-[90] flex flex-col items-center justify-center text-center p-8">
        <h1 class="text-4xl sm:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-400 via-rose-500 to-pink-500 tracking-widest mb-2 uppercase drop-shadow-[0_0_30px_rgba(244,63,94,0.3)]">COSMIC QUEST</h1>
        <p class="text-amber-400 text-[10px] uppercase font-black tracking-[0.5em] mb-12">Dassy's Burmese Alphabet Quest: "ဆ"</p>
        
        <div id="game-stats" class="hidden bg-white/5 border border-white/5 rounded-3xl p-6 mb-10 max-w-xs w-full text-left space-y-3 font-sans">
            <div class="flex justify-between items-center"><span class="text-neutral-400 burmese-font text-xs">🟢 မှန်ကန်သော အက္ခရာများ</span><span id="stat-coins" class="text-white font-bold text-sm">0</span></div>
            <div class="flex justify-between items-center"><span class="text-neutral-400 burmese-font text-xs">🔴 မှားယွင်းသော အက္ခရာများ</span><span id="stat-kills" class="text-white font-bold text-sm">0</span></div>
            <div class="flex justify-between items-center"><span class="text-neutral-400 burmese-font text-xs">👑 ရောက်ရှိသွားသော အဆင့်</span><span id="stat-level" class="text-pink-400 font-bold text-sm">Lvl 1</span></div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center items-center pointer-events-auto w-full max-w-md">
            <button id="start-btn" class="w-full sm:w-auto px-12 py-5 bg-rose-600 hover:bg-rose-500 text-white font-black text-xs uppercase tracking-[0.2em] rounded-full transition-all shadow-[0_15px_40px_rgba(244,63,94,0.3)] border-b-4 border-rose-800 active:scale-95 burmese-font">
                🔄 စတင်ကစားမည်
            </button>
            <button id="main-page-btn" class="w-full sm:w-auto px-12 py-5 bg-indigo-600 hover:bg-indigo-500 text-white font-black text-xs uppercase tracking-[0.2em] rounded-full transition-all shadow-[0_15px_40px_rgba(67,56,202,0.3)] border-b-4 border-indigo-800 active:scale-95 burmese-font">
                🚪 ပင်မစာမျက်နှာ (Main Page)
            </button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;
            if (type === 'shoot') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(550, now);
                osc.frequency.exponentialRampToValueAtTime(180, now + 0.1);
                gainNode.gain.setValueAtTime(0.08, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'hit') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.12);
                gainNode.gain.setValueAtTime(0.06, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
                osc.start(now);
                osc.stop(now + 0.12);
            } else if (type === 'coin') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.setValueAtTime(1200, now + 0.08);
                gainNode.gain.setValueAtTime(0.12, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.22);
                osc.start(now);
                osc.stop(now + 0.22);
            } else if (type === 'fail') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.linearRampToValueAtTime(70, now + 0.25);
                gainNode.gain.setValueAtTime(0.12, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            } else if (type === 'levelup') {
                const freqs = [300, 400, 500, 600, 800];
                freqs.forEach((f, i) => {
                    const oscSeq = audioCtx.createOscillator();
                    const gainSeq = audioCtx.createGain();
                    oscSeq.connect(gainSeq);
                    gainSeq.connect(audioCtx.destination);
                    oscSeq.type = 'sine';
                    oscSeq.frequency.setValueAtTime(f, now + i * 0.06);
                    gainSeq.gain.setValueAtTime(0.06, now + i * 0.06);
                    gainSeq.gain.exponentialRampToValueAtTime(0.01, now + i * 0.06 + 0.15);
                    oscSeq.start(now + i * 0.06);
                    oscSeq.stop(now + i * 0.06 + 0.15);
                });
            }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const burmeseAlphabets = [
            'က', 'ခ', 'ဂ', 'ဃ', 'င', 'စ', 'ဆ', 'ဇ', 'ဈ', 'ည',
            'တ', 'ထ', 'ဒ', 'ဓ', 'န', 'ပ', 'ဖ', 'ဗ', 'ဘ', 'မ',
            'ယ', 'ရ', 'လ', 'ဝ', 'သ', 'ဟ', 'ဠ', 'အ'
        ];

        const game = {
            running: false,
            paused: false,
            score: 0,
            correctPops: 0,
            incorrectPops: 0,
            targetLetter: 'ဆ',
            camera: { x: 0, y: 0 }
        };

        const player = {
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            radius: 20,
            hp: 100,
            maxHp: 100,
            xp: 0,
            maxXp: 100,
            level: 1,
            speed: 4.2,
            range: 180,
            damage: 50,
            shootCooldown: 0.3,
            lastShotTime: 0
        };

        const keys = {};
        const entities = {
            projectiles: [],
            letterBubbles: [],
            collectibles: [],
            scenery: [],
            stars: []
        };

        function initScenery() {
            entities.scenery = [];
            entities.stars = [];
            const mapRadius = 1600;

            for (let i = 0; i < 150; i++) {
                entities.stars.push({
                    x: (Math.random() - 0.5) * mapRadius * 2,
                    y: (Math.random() - 0.5) * mapRadius * 2,
                    size: 1 + Math.random() * 2,
                    phase: Math.random() * Math.PI * 2,
                    speed: 0.02 + Math.random() * 0.03
                });
            }

            entities.scenery.push({
                type: 'black_hole',
                x: 0,
                y: 0,
                radius: 120
            });

            const planetColors = ['#8b5cf6', '#ec4899', '#3b82f6', '#10b981', '#fbbf24'];
            for (let i = 0; i < 20; i++) {
                entities.scenery.push({
                    type: 'planet',
                    x: (Math.random() - 0.5) * mapRadius * 2,
                    y: (Math.random() - 0.5) * mapRadius * 2,
                    radius: 35 + Math.random() * 45,
                    color: planetColors[Math.floor(Math.random() * planetColors.length)]
                });
            }

            for (let i = 0; i < 25; i++) {
                entities.scenery.push({
                    type: 'asteroid',
                    x: (Math.random() - 0.5) * mapRadius * 2,
                    y: (Math.random() - 0.5) * mapRadius * 2,
                    radius: 15 + Math.random() * 15
                });
            }

            for (let i = 0; i < 10; i++) {
                entities.scenery.push({
                    type: 'satellite',
                    x: (Math.random() - 0.5) * mapRadius * 2,
                    y: (Math.random() - 0.5) * mapRadius * 2
                });
            }
        }

        function changeTargetLetter() {
            game.targetLetter = 'ဆ';
            document.getElementById('target-letter-display').innerText = game.targetLetter;
        }

        function drawBlackHole(ctx, x, y) {
            const t = Date.now() * 0.001;
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(t);
            
            const grad = ctx.createRadialGradient(0, 0, 10, 0, 0, 110);
            grad.addColorStop(0, '#ec4899');
            grad.addColorStop(0.3, '#7303c0');
            grad.addColorStop(0.7, 'rgba(15, 23, 42, 0.2)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.ellipse(0, 0, 110, 38, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.restore();

            ctx.fillStyle = '#020206';
            ctx.beginPath();
            ctx.arc(x, y, 24, 0, Math.PI*2);
            ctx.fill();
        }

        function drawPlanet(ctx, x, y, radius, color) {
            const grad = ctx.createRadialGradient(x - radius*0.3, y - radius*0.3, 2, x, y, radius);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.5, color);
            grad.addColorStop(1, '#090514');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();

            if (radius > 45) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.ellipse(x, y, radius * 1.5, radius * 0.3, -Math.PI/6, 0, Math.PI*2);
                ctx.stroke();
            }
        }

        function drawAsteroid(ctx, x, y, radius) {
            ctx.fillStyle = '#475569';
            ctx.beginPath();
            const points = 6;
            for (let i = 0; i < points; i++) {
                const angle = (i / points) * Math.PI * 2;
                const r = radius * (0.8 + Math.sin(angle * 3) * 0.2);
                const px = x + Math.cos(angle) * r;
                const py = y + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#334155';
            ctx.beginPath();
            ctx.arc(x - radius * 0.3, y - radius * 0.2, radius * 0.25, 0, Math.PI * 2);
            ctx.arc(x + radius * 0.4, y + radius * 0.3, radius * 0.15, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawSatellite(ctx, x, y) {
            ctx.fillStyle = '#94a3b8';
            ctx.fillRect(x - 6, y - 6, 12, 12);
            ctx.fillStyle = '#0284c7';
            ctx.fillRect(x - 20, y - 2, 14, 4);
            ctx.fillRect(x + 6, y - 2, 14, 4);
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x, y - 6);
            ctx.lineTo(x, y - 15);
            ctx.stroke();
        }

        function drawPlayer(ctx, x, y) {
            ctx.fillStyle = 'rgba(15, 23, 42, 0.4)';
            ctx.beginPath();
            ctx.ellipse(x, y + 24, 20, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = 'rgba(244, 63, 94, 0.35)';
            ctx.lineWidth = 2.5;
            ctx.setLineDash([8, 6]);
            ctx.beginPath();
            ctx.arc(x, y, player.range, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#4338ca';
            ctx.beginPath();
            ctx.moveTo(x - 16, y + 22);
            ctx.lineTo(x + 16, y + 22);
            ctx.lineTo(x + 22, y - 4);
            ctx.lineTo(x, y - 26);
            ctx.lineTo(x - 22, y - 4);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#6366f1';
            ctx.beginPath();
            ctx.moveTo(x - 12, y + 18);
            ctx.lineTo(x + 12, y + 18);
            ctx.lineTo(x + 16, y - 2);
            ctx.lineTo(x, y - 20);
            ctx.lineTo(x - 16, y - 2);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = '#38bdf8';
            ctx.beginPath();
            ctx.arc(x, y - 4, 9, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(x - 3, y - 6, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#fbbf24';
            ctx.fillRect(x - 4, y + 22, 3, 6);
            ctx.fillRect(x + 1, y + 22, 3, 6);
        }

        function spawnLetterBubble() {
            if (!game.running || game.paused) return;
            if (entities.letterBubbles.length > 22) return;

            const angle = Math.random() * Math.PI * 2;
            // ပိုမိုနီးကပ်စွာ ပေါ်လာစေရန် အကွာအဝေးကို 280 + Math.random() * 120 သို့ ပြင်ဆင်ထားပါသည်
            const spawnDistance = 280 + Math.random() * 120;
            const x = player.x + Math.cos(angle) * spawnDistance;
            const y = player.y + Math.sin(angle) * spawnDistance;

            const isTarget = Math.random() < 0.40;
            let letter = game.targetLetter;
            if (!isTarget) {
                const choices = burmeseAlphabets.filter(l => l !== game.targetLetter);
                letter = choices[Math.floor(Math.random() * choices.length)];
            }

            entities.letterBubbles.push({
                x, y, letter,
                isTarget,
                radius: 26,
                vx: (Math.random() - 0.5) * 1.5,
                vy: (Math.random() - 0.5) * 1.5,
                pulse: Math.random() * Math.PI,
                hp: isTarget ? 40 : 20
            });
        }

        function fireProjectile(targetX, targetY) {
            const now = Date.now() / 1000;
            if (now - player.lastShotTime < player.shootCooldown) return;

            playSound('shoot');
            const dx = targetX - (player.x - game.camera.x);
            const dy = targetY - (player.y - game.camera.y);
            const dist = Math.hypot(dx, dy);
            entities.projectiles.push({
                x: player.x,
                y: player.y,
                vx: (dx / dist) * 10,
                vy: (dy / dist) * 10,
                radius: 6,
                life: 1.2
            });
            player.lastShotTime = now;
        }

        canvas.addEventListener('click', (e) => {
            if (!game.running || game.paused) return;
            fireProjectile(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            if (!game.running || game.paused) return;
            const touch = e.touches[0];
            const target = e.target;
            if (target.id === 'joystick-zone' || target.id === 'joystick-knob' || document.getElementById('joystick-zone').contains(target)) {
                return;
            }
            fireProjectile(touch.clientX, touch.clientY);
        });

        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        let joystickActive = false;
        let joystickStart = { x: 0, y: 0 };
        let joystickDir = { x: 0, y: 0 };

        joystickZone.addEventListener('touchstart', (e) => {
            joystickActive = true;
            const touch = e.touches[0];
            joystickStart = { x: touch.clientX, y: touch.clientY };
            joystickDir = { x: 0, y: 0 };
            e.preventDefault();
        }, { passive: false });

        joystickZone.addEventListener('touchmove', (e) => {
            if (!joystickActive) return;
            const touch = e.touches[0];
            const dx = touch.clientX - joystickStart.x;
            const dy = touch.clientY - joystickStart.y;
            const dist = Math.hypot(dx, dy);

            if (dist > 0) {
                const angle = Math.atan2(dy, dx);
                const boundedDist = Math.min(dist, 50);
                joystickDir = { x: Math.cos(angle), y: Math.sin(angle) };
                joystickKnob.style.transform = `translate(${joystickDir.x * boundedDist}px, ${joystickDir.y * boundedDist}px)`;
            } else {
                joystickDir = { x: 0, y: 0 };
            }
            e.preventDefault();
        }, { passive: false });

        joystickZone.addEventListener('touchend', (e) => {
            joystickActive = false;
            joystickDir = { x: 0, y: 0 };
            joystickKnob.style.transform = 'translate(0px, 0px)';
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        const UPGRADE_POOL = [
            { id: 'fire_speed', name: 'Plasma Injector', desc: '+35% Blaster Fire Rate Acceleration', stat: 'shootCooldown', factor: 0.65 },
            { id: 'engine_boost', name: 'Warp Drive', desc: '+25% Navigation Thruster Speed', stat: 'speed', factor: 1.25 },
            { id: 'hull_repair', name: 'Shield Nanites', desc: 'Instantly Restore +40 Structural Integrity', stat: 'heal', factor: 40 }
        ];

        function triggerLevelUp() {
            playSound('levelup');
            player.level++;
            player.xp = 0;
            player.maxXp = Math.round(player.maxXp * 1.5);

            const optionsContainer = document.getElementById('upgrade-options');
            optionsContainer.innerHTML = '';

            const shuffled = [...UPGRADE_POOL].sort(() => 0.5 - Math.random()).slice(0, 2);
            shuffled.forEach(upg => {
                const btn = document.createElement('button');
                btn.className = "w-full p-5 bg-slate-900/90 border border-pink-500/30 hover:border-pink-500 rounded-2xl flex items-center justify-between text-left transition-all active:scale-95";
                btn.innerHTML = `<div><h4 class="text-amber-400 font-black text-sm tracking-wide uppercase">${upg.name}</h4><p class="text-neutral-400 text-[10px] mt-1 uppercase tracking-wider">${upg.desc}</p></div><span class="text-xl">✨</span>`;
                btn.onclick = () => {
                    if (upg.stat === 'heal') {
                        player.hp = Math.min(player.maxHp, player.hp + upg.factor);
                    } else if (upg.stat === 'shootCooldown') {
                        player[upg.stat] *= upg.factor;
                    } else {
                        player[upg.stat] *= upg.factor;
                    }
                    document.getElementById('hp-display').innerText = `${Math.round(player.hp)} / ${player.maxHp}`;
                    document.getElementById('upgrade-modal').classList.add('hidden');
                    game.paused = false;
                };
                optionsContainer.appendChild(btn);
            });

            game.paused = true;
            document.getElementById('upgrade-modal').classList.remove('hidden');
        }

        function updateGame(dt) {
            if (!game.running || game.paused) return;

            let moveX = 0;
            let moveY = 0;

            if (keys['w'] || keys['arrowup']) moveY = -1;
            if (keys['s'] || keys['arrowdown']) moveY = 1;
            if (keys['a'] || keys['arrowleft']) moveX = -1;
            if (keys['d'] || keys['arrowright']) moveX = 1;

            if (joystickActive) {
                moveX = joystickDir.x;
                moveY = joystickDir.y;
            }

            if (moveX !== 0 && moveY !== 0) {
                const length = Math.hypot(moveX, moveY);
                moveX /= length;
                moveY /= length;
            }

            player.vx = moveX * player.speed;
            player.vy = moveY * player.speed;

            player.x += player.vx * dt;
            player.y += player.vy * dt;

            const bound = 1600;
            player.x = Math.max(-bound, Math.min(bound, player.x));
            player.y = Math.max(-bound, Math.min(bound, player.y));

            game.camera.x = player.x - canvas.width / 2;
            game.camera.y = player.y - canvas.height / 2;

            for (let i = entities.projectiles.length - 1; i >= 0; i--) {
                const p = entities.projectiles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= 0.016 * dt;

                if (p.life <= 0) {
                    entities.projectiles.splice(i, 1);
                    continue;
                }

                for (let j = entities.letterBubbles.length - 1; j >= 0; j--) {
                    const bubble = entities.letterBubbles[j];
                    if (Math.hypot(p.x - bubble.x, p.y - bubble.y) < bubble.radius + p.radius) {
                        entities.projectiles.splice(i, 1);
                        bubble.hp -= player.damage;
                        playSound('hit');

                        if (bubble.hp <= 0) {
                            if (bubble.isTarget) {
                                playSound('coin');
                                game.correctPops++;
                                game.score += 25;
                                player.xp += 30;
                                entities.collectibles.push({
                                    x: bubble.x, y: bubble.y, pulse: 0,
                                    targetX: player.x, targetY: player.y
                                });
                                if (player.xp >= player.maxXp) triggerLevelUp();
                            } else {
                                playSound('fail');
                                game.incorrectPops++;
                                player.hp = Math.max(0, player.hp - 10);
                                if (player.hp <= 0) gameOver();
                            }
                            entities.letterBubbles.splice(j, 1);
                        }
                        break;
                    }
                }
            }

            for (let i = entities.letterBubbles.length - 1; i >= 0; i--) {
                const bubble = entities.letterBubbles[i];
                bubble.x += bubble.vx * dt;
                bubble.y += bubble.vy * dt;
                bubble.pulse += 0.04 * dt;

                const distToPlayer = Math.hypot(player.x - bubble.x, player.y - bubble.y);
                if (distToPlayer < player.radius + bubble.radius) {
                    if (bubble.isTarget) {
                        playSound('coin');
                        game.correctPops++;
                        game.score += 15;
                        player.xp += 15;
                        if (player.xp >= player.maxXp) triggerLevelUp();
                    } else {
                        playSound('fail');
                        game.incorrectPops++;
                        player.hp = Math.max(0, player.hp - 15);
                        if (player.hp <= 0) gameOver();
                    }
                    entities.letterBubbles.splice(i, 1);
                    continue;
                }

                if (distToPlayer > 1000) {
                    entities.letterBubbles.splice(i, 1);
                }
            }

            for (let i = entities.collectibles.length - 1; i >= 0; i--) {
                const c = entities.collectibles[i];
                c.pulse += 0.1 * dt;
                const dx = player.x - c.x;
                const dy = player.y - c.y;
                const dist = Math.hypot(dx, dy);
                if (dist < player.radius + 15) {
                    entities.collectibles.splice(i, 1);
                } else {
                    c.x += (dx / dist) * 6 * dt;
                    c.y += (dy / dist) * 6 * dt;
                }
            }

            document.getElementById('hp-display').innerText = `${Math.round(player.hp)} / ${player.maxHp}`;
            document.getElementById('cash-display').innerText = game.correctPops;
            
            const xpPct = Math.min(100, (player.xp / player.maxXp) * 100);
            document.getElementById('xp-bar').style.width = `${xpPct}%`;
            document.getElementById('level-display').innerText = `Lvl ${player.level}`;
        }

        function render() {
            ctx.fillStyle = '#020208';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            entities.stars.forEach(s => {
                const starX = ((s.x - game.camera.x) % 3200 + 3200) % 3200 - 1600;
                const starY = ((s.y - game.camera.y) % 3200 + 3200) % 3200 - 1600;
                const pulseAlpha = 0.3 + Math.sin(Date.now() * s.speed + s.phase) * 0.4;
                ctx.fillStyle = `rgba(255, 255, 255, ${pulseAlpha})`;
                ctx.fillRect(starX + cx, starY + cy, s.size, s.size);
            });

            entities.scenery.forEach(item => {
                const scX = item.x - game.camera.x;
                const scY = item.y - game.camera.y;
                if (item.type === 'black_hole') drawBlackHole(ctx, scX, scY);
                else if (item.type === 'planet') drawPlanet(ctx, scX, scY, item.radius, item.color);
                else if (item.type === 'asteroid') drawAsteroid(ctx, scX, scY, item.radius);
                else if (item.type === 'satellite') drawSatellite(ctx, scX, scY);
            });

            entities.projectiles.forEach(p => {
                ctx.fillStyle = '#f43f5e';
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#f43f5e';
                ctx.beginPath();
                ctx.arc(p.x - game.camera.x, p.y - game.camera.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            entities.letterBubbles.forEach(bubble => {
                const bX = bubble.x - game.camera.x;
                const bY = bubble.y - game.camera.y;
                const sizeMod = Math.sin(bubble.pulse) * 2;
                const r = bubble.radius + sizeMod;

                ctx.fillStyle = bubble.isTarget ? 'rgba(251, 191, 36, 0.15)' : 'rgba(168, 85, 247, 0.1)';
                ctx.beginPath();
                ctx.arc(bX, bY, r, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = bubble.isTarget ? '#fbbf24' : '#a855f7';
                ctx.lineWidth = bubble.isTarget ? 3 : 2;
                ctx.shadowBlur = bubble.isTarget ? 15 : 5;
                ctx.shadowColor = bubble.isTarget ? '#fbbf24' : '#a855f7';
                ctx.beginPath();
                ctx.arc(bX, bY, r, 0, Math.PI * 2);
                ctx.stroke();
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 22px "Pyidaungsu", "Fredoka One", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(bubble.letter, bX, bY + 2);
            });

            entities.collectibles.forEach(c => {
                const colX = c.x - game.camera.x;
                const colY = c.y - game.camera.y;
                const size = 6 + Math.sin(c.pulse) * 2;
                ctx.fillStyle = '#fbbf24';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#fbbf24';
                ctx.beginPath();
                ctx.arc(colX, colY, size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            drawPlayer(ctx, player.x - game.camera.x, player.y - game.camera.y);
        }

        let lastTime = performance.now();
        function gameLoop(currentTime) {
            let dt = (currentTime - lastTime) / 16.666;
            lastTime = currentTime;
            if (dt > 4) dt = 4;

            updateGame(dt);
            render();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            player.hp = player.maxHp;
            player.xp = 0;
            player.level = 1;
            player.x = 0;
            player.y = 0;
            game.score = 0;
            game.correctPops = 0;
            game.incorrectPops = 0;
            entities.letterBubbles = [];
            entities.projectiles = [];
            entities.collectibles = [];
            
            initScenery();
            changeTargetLetter();
            
            document.getElementById('overlay-screen').classList.add('hidden');
            document.getElementById('exit-btn').classList.remove('hidden');
            game.running = true;
        }

        function returnToMainPage() {
            game.running = false;
            window.location.href = 'index.html?fromGame=true';
        }

        function gameOver() {
            game.running = false;
            document.getElementById('exit-btn').classList.add('hidden');
            
            document.getElementById('stat-coins').innerText = game.correctPops;
            document.getElementById('stat-kills').innerText = game.incorrectPops;
            document.getElementById('stat-level').innerText = `Lvl ${player.level}`;
            document.getElementById('game-stats').classList.remove('hidden');
            
            document.getElementById('start-btn').innerText = "🔄 ပြန်လည်ကစားမည်";
            document.getElementById('overlay-screen').classList.remove('hidden');
        }

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('exit-btn').onclick = returnToMainPage;
        document.getElementById('main-page-btn').onclick = returnToMainPage;

        setInterval(spawnLetterBubble, 900);

        window.onload = function() {
            requestAnimationFrame(gameLoop);
        };
    </script>
</body>
