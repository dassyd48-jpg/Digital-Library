<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE IRREPLACEABLE QUEEN | DASSY DIGITAL LIBRARY</title>
    
    <meta name="description" content="Official Digital Library of DASSY. Psychological insights into 'The Irreplaceable Queen' - Mastering relationship dynamics.">
    <meta name="author" content="DASSY">
    
    <meta property="og:title" content="THE IRREPLACEABLE QUEEN | DASSY">
    <meta property="og:description" content="Master the psychology of high-value choices.">
    <meta property="og:type" content="book">
    <meta property="og:image" content="cover.jpg">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "DigitalDocument",
      "name": "The Irreplaceable Queen",
      "author": { "@type": "Person", "name": "DASSY" },
      "publisher": "DASSY DIGITAL LIBRARY"
    }
    </script>
<script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
<script src="turn.js"></script>

    <style>
        :root { 
            --gold: #D4AF37; 
            --royal-purple: #12011b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; filter: brightness(0.4); transition: opacity 1s ease; }
        
        /* Lock Screen Style - Purple/Gold Theme */
        #lock { 
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; 
            flex-direction: column; z-index: 20; 
            background: radial-gradient(circle, rgba(18, 1, 27, 0.8) 0%, rgba(0, 0, 0, 0.95) 100%); 
            backdrop-filter: blur(8px); color: #fff; text-align: center; padding: 20px; 
        }
        
        .brand-label { font-size: 11px; color: var(--gold); letter-spacing: 5px; margin-bottom: 25px; font-weight: bold; opacity: 0.9; }
        
        .book-title-container { margin-bottom: 45px; }
        .book-title-my { color: #fff; font-size: clamp(28px, 6vw, 45px); font-weight: 900; letter-spacing: 2px; margin: 0; }
        .book-title-en { color: var(--gold); font-size: 14px; letter-spacing: 3px; font-weight: bold; margin-top: 10px; text-transform: uppercase; }

        #lock input { 
            padding: 16px; width: 300px; border: 1px solid rgba(212, 175, 55, 0.4); 
            background: rgba(255, 255, 255, 0.05); color: #fff; text-align: center; 
            font-size: 16px; outline: none; margin-bottom: 25px; border-radius: 4px;
            letter-spacing: 2px;
        }
        #lock input::placeholder { color: rgba(255,255,255,0.3); }

        #lock button { 
            padding: 15px 80px; 
            background: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728); 
            color: #000; border: none; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; border-radius: 4px; letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(191, 149, 63, 0.3);
            transition: 0.3s;
        }
        #lock button:hover { transform: scale(1.05); opacity: 0.9; }

        .request-link { 
            margin-top: 35px; color: #ff00ff; text-decoration: none; 
            font-size: 12px; font-weight: bold; letter-spacing: 1px;
            text-transform: uppercase;
        }

        #book-container { display: none; width: 100vw; height: 100vh; position: relative; z-index: 10; opacity: 0; }
        #flipbook-wrapper { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; padding-bottom: 35px; background: #000; position: relative; }
        
        .page { background: #000; width: 100%; height: 100%; position: relative; overflow: hidden; }
        .page img { width: 100%; height: 100%; object-fit: fill !important; display: block; pointer-events: none; }
        .page iframe { width: 100% !important; height: 100% !important; border: none !important; display: block; background: #000; position: absolute; top: 0; left: 0; }

        .watermark { 
            position: absolute; bottom: 20px; width: 100%; text-align: center; 
            font-size: 10px; color: var(--gold); opacity: 0.4; letter-spacing: 4px; pointer-events: none; z-index: 15;
        }

        /* ============================================================
           NEW — Expanded flip-trigger zone (right 35% of the book)
           This sits ABOVE the page images so taps/drags anywhere in
           it trigger a flip, but it is switched OFF (pointer-events:none)
           whenever a quiz/iframe page is showing, so quiz clicks are
           never blocked.
        ============================================================ */
        #flip-zone-right {
            position: absolute;
            z-index: 16;
            cursor: pointer;
            background: transparent;
            touch-action: pan-y;
        }
        #flip-zone-right.disabled { pointer-events: none; }

        /* ============================================================
           NEW — Periodic "peel" hint shown on page 1 before any
           interaction. Purely decorative, pointer-events:none so it
           never interferes with taps underneath it.
        ============================================================ */
        .peel-hint {
            position: absolute;
            z-index: 17;
            pointer-events: none;
            width: 110px;
            height: 110px;
            opacity: 0;
            transform-origin: bottom right;
            background:
                linear-gradient(135deg, transparent 48%, rgba(212,175,55,0.55) 50%, rgba(212,175,55,0.18) 62%, transparent 78%);
            clip-path: polygon(100% 0, 100% 100%, 0 100%);
            filter: drop-shadow(-2px -2px 6px rgba(0,0,0,0.45));
            animation: peelPulse 2.8s ease-in-out infinite;
        }
        @keyframes peelPulse {
            0%   { opacity: 0;    transform: translate(0,0) rotate(0deg); }
            12%  { opacity: 0.95; transform: translate(-14px,-14px) rotate(-10deg); }
            26%  { opacity: 0.55; transform: translate(-6px,-6px) rotate(-5deg); }
            40%  { opacity: 0;    transform: translate(0,0) rotate(0deg); }
            100% { opacity: 0;    transform: translate(0,0) rotate(0deg); }
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline><source src="video.mp4" type="video/mp4"></video>

    <div id="lock">
        <span class="brand-label">DASSY DIGITAL LIBRARY PRESENTS</span>
        <div class="book-title-container">
            <h1 class="book-title-my">မစွန့်လွှတ်နိုင်သော ဧကရီ</h1>
            <div class="book-title-en">(THE IRREPLACEABLE QUEEN)</div>
        </div>
        
        <input type="password" id="pass" placeholder="ACCESS KEY">
        <button onclick="unlock()">ENTER THE MIRROR</button>
        
        <a href="https://t.me/Dassy_digital_Library" target="_blank" class="request-link">
            REQUEST PRIVATE ACCESS FROM DASSY
        </a>
    </div>

    <div id="book-container">
        <div id="flipbook-wrapper"><div id="flipbook"></div></div>
        <div class="watermark">PROPRIETARY MATERIAL | © DASSY DIGITAL LIBRARY</div>
    </div>

    <audio id="sound" src="flip.mp3" preload="auto"></audio>

    <script>
        // စာအုပ်အသစ်အတွက် အချက်အလက်များ
        const myPassword = "D2026@QUEEN"; 
        const maxPages = 59; // စာမျက်နှာ စုစုပေါင်း
        const quizPages = [2, 11, 16, 21, 26, 31, 36, 41, 46, 51, 56]; // Quiz ရှိသော စာမျက်နှာများ
        let isQuizLocked = false; 

        // 🛠️ FIX 2: Password တစ်ခါပဲ ထည့်ရအောင် စစ်ဆေးပေးသော Logic
        $(document).ready(function() {
            const isUnlocked = localStorage.getItem("tiq_unlocked");
            if (isUnlocked === "true") {
                $("#lock, #bg-video").hide();
                $("#book-container").show().css("opacity", 1);
                loadAndInit();
            }
        });

        // 🛠️ FIX 1: စာမျက်နှာ Ratio ကို Mobile/Tablet ကွက်တိဖြစ်အောင် တွက်ချက်ပေးသော Logic
        function getBookSize() {
            let w = window.innerWidth;
            let h = window.innerHeight - 40; 

            if (window.innerWidth < 600) {
                w = window.innerWidth;
            } else {
                let tabletH = window.innerHeight * 0.85;
                let tabletW = tabletH * 0.707;
                if (w / h > 0.707) { w = tabletW; h = tabletH; } else { h = w / 0.707; }
            }
            return { w, h };
        }

        // Quiz ဖြေပြီးသွားလျှင် Lock ဖွင့်ပေးရန် Message လက်ခံခြင်း
        window.addEventListener("message", function(event) {
            if (event.data === "quizCompleted") {
                isQuizLocked = false; 
                setTimeout(() => { $("#flipbook").turn("next"); }, 300);
            }
        }, false);

        function unlock() {
            if(document.getElementById("pass").value === myPassword) {
                // 🛠️ FIX 2: Password မှန်ကန်လျှင် နောက်တစ်ကြိမ် ထပ်မတောင်းရန် မှတ်သားခြင်း
                localStorage.setItem("tiq_unlocked", "true");
                $("#lock").fadeOut(600, () => {
                    $("#bg-video").fadeOut(600);
                    $("#book-container").css("display", "block").animate({opacity: 1}, 1000);
                    loadAndInit();
                });
            } else { 
                alert("ACCESS DENIED: ကုဒ်မှားယွင်းနေပါသည်။ DASSY ထံမှ ကုဒ်ရယူပါ။"); 
            }
        }

        // ============================================================
        // NEW — state for the expanded flip-zone + peel hint
        // ============================================================
        let $flipZone = null;
        let $peelHint = null;
        let hintActive = true;         // becomes false permanently after first interaction / leaving page 1
        let touchStartX = null;
        let touchStartY = null;
        let touchStartTime = 0;

        function loadAndInit() {
            const flipbook = $("#flipbook");
            if (flipbook.children().length > 0) return;

            const { w, h } = getBookSize();

            for(let i=1; i<=maxPages; i++) {
                const pageDiv = $('<div class="page"></div>');
                
                // Quiz စာမျက်နှာများအတွက် iframe ထည့်ခြင်း
                if(quizPages.includes(i)) {
                    const fileName = (i === 2) ? "intro_quiz.html" : `page${i}.html`;
                    pageDiv.append(`<iframe src="${fileName}" style="width:100%; height:100%; border:none; overflow:hidden;" scrolling="no"></iframe>`);
                } 
                // ပုံမှန်စာမျက်နှာများ (Page.jpg)
                else if (i < maxPages) {
                    pageDiv.append($('<img />').attr('src', `page${i}.jpg`));
                } 
                // နောက်ဆုံးစာမျက်နှာ
                else {
                    pageDiv.append('<div style="width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; color:#555; font-size:12px;">END OF PREVIEW</div>');
                }
                flipbook.append(pageDiv);
            }

            // Turn.js စတင်ခြင်း
            setTimeout(() => {
                flipbook.turn({
                    width: w, height: h, autoCenter: true, display: 'single', acceleration: true, duration: 400,
                    when: {
                        turning: function(e, page) {
                            if (isQuizLocked) { e.preventDefault(); return; }
                            const s = document.getElementById("sound");
                            if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
                        },
                        turned: function(e, page) {
                            // 🛠️ FIX 3: ဖတ်နေတဲ့စာမျက်နှာကို LocalStorage ထဲ သိမ်းဆည်းခြင်း
                            localStorage.setItem("tiq_last_page", page);
                            
                            // Quiz စာမျက်နှာဆိုလျှင် နောက်တစ်ရွက်လှန်မရအောင် Lock ချခြင်း
                            isQuizLocked = quizPages.includes(page);

                            // NEW — disable the flip overlay on quiz/iframe pages so
                            // taps/drags reach the iframe underneath, un-disable otherwise.
                            if ($flipZone) {
                                if (quizPages.includes(page)) {
                                    $flipZone.addClass("disabled");
                                } else {
                                    $flipZone.removeClass("disabled");
                                }
                            }

                            // NEW — the peel hint is only ever relevant on page 1.
                            // The moment the reader leaves page 1, kill it for good.
                            if (page !== 1) {
                                stopPeelHint();
                            }
                        }
                    }
                });

                // 🛠️ FIX 3: ဖတ်လက်စ စာမျက်နှာကို ပြန်ခေါ်ယူဖွင့်ပေးခြင်း Logic
                const savedPage = localStorage.getItem("tiq_last_page");
                if (savedPage) {
                    flipbook.turn("page", parseInt(savedPage));
                } else {
                    flipbook.turn("page", 1);
                }

                // NEW — build the expanded flip zone + peel hint once the book exists
                initFlipZoneAndHint();
                if (savedPage && parseInt(savedPage) !== 1) {
                    stopPeelHint(); // returning reader, not on page 1 — no hint needed
                }
            }, 100);
        }

        // ============================================================
        // NEW — Expanded right-side flip zone (whole right 35% of page)
        // ============================================================
        function initFlipZoneAndHint() {
            if (!$flipZone) {
                $flipZone = $('<div id="flip-zone-right"></div>');
                $("#flipbook-wrapper").append($flipZone);

                $flipZone.on("touchstart mousedown", function(e) {
                    registerInteraction(); // any touch permanently stops the hint
                    const p = (e.type === "touchstart") ? e.originalEvent.touches[0] : e;
                    touchStartX = p.clientX;
                    touchStartY = p.clientY;
                    touchStartTime = Date.now();
                });

                $flipZone.on("touchend mouseup", function(e) {
                    if (isQuizLocked || touchStartX === null) return;
                    const p = (e.type === "touchend") ? e.originalEvent.changedTouches[0] : e;
                    const dx = p.clientX - touchStartX;
                    const dy = p.clientY - touchStartY;
                    touchStartX = null;

                    // Ignore what looks like a vertical scroll gesture
                    if (Math.abs(dy) > Math.abs(dx) * 1.5) return;

                    if (dx < -18) {
                        $("#flipbook").turn("next");       // swipe left -> next
                    } else if (dx > 18) {
                        $("#flipbook").turn("previous");   // swipe right -> previous
                    } else {
                        $("#flipbook").turn("next");       // simple tap -> next
                    }
                });

                // Prevent double-triggering from a synthetic click after touchend
                $flipZone.on("click", function(e) { e.preventDefault(); });
            }

            if (!$peelHint) {
                $peelHint = $('<div class="peel-hint"></div>');
                $("#flipbook-wrapper").append($peelHint);
            }

            positionOverlays();

            // Stop the hint permanently on the very first interaction anywhere
            $(document).one("touchstart mousedown", registerInteraction);
        }

        function positionOverlays() {
            const bookEl = document.getElementById("flipbook");
            const wrapEl = document.getElementById("flipbook-wrapper");
            if (!bookEl || !wrapEl) return;

            const bookRect = bookEl.getBoundingClientRect();
            const wrapRect = wrapEl.getBoundingClientRect();
            const left = bookRect.left - wrapRect.left;
            const top = bookRect.top - wrapRect.top;

            if ($flipZone) {
                $flipZone.css({
                    left: left + bookRect.width * 0.65,
                    top: top,
                    width: bookRect.width * 0.35,
                    height: bookRect.height
                });
            }
            if ($peelHint) {
                const size = Math.min(110, bookRect.width * 0.35, bookRect.height * 0.35);
                $peelHint.css({
                    width: size,
                    height: size,
                    left: left + bookRect.width - size,
                    top: top + bookRect.height - size
                });
            }
        }

        function registerInteraction() {
            if (hintActive) stopPeelHint();
        }

        function stopPeelHint() {
            hintActive = false;
            if ($peelHint) {
                $peelHint.stop(true, true).fadeOut(200, function() { $(this).remove(); });
                $peelHint = null;
            }
        }

        // Screen Size ပြောင်းလဲလျှင် Flipbook Size လိုက်ညှိရန်
        $(window).resize(function() {
            const { w, h } = getBookSize();
            if ($("#flipbook").turn("is")) {
                $("#flipbook").turn("size", w, h);
            }
            positionOverlays();
        });
    </script>
</body>
</html>
