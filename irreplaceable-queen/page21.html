<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Irreplaceable Queen - Page 20 Quiz</title>
    <style>
        body { 
            background: #12011b; /* Royal Dark Purple Theme */
            color: #d4af37;
            font-family: sans-serif; 
            margin: 0; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            box-sizing: border-box;
        }
        .quiz-container { 
            width: 100%;
            max-width: 480px; 
            background: rgba(0, 0, 0, 0.75); 
            border: 1px solid #d4af37; 
            border-radius: 12px; 
            padding: 25px; 
            text-align: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(10px);
        }
        .phase-label { 
            font-size: 11px; 
            color: #d4af37; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-weight: bold;
            display: block; 
            margin-bottom: 15px;
        }
        h2 { 
            font-size: 16px; 
            line-height: 1.6; 
            color: #fff; 
            margin-bottom: 25px;
            font-weight: normal; 
            text-align: left;
        }
        .options-group {
            display: block;
        }
        .option { 
            display: block;
            width: 100%; 
            padding: 15px; 
            margin: 12px 0; 
            background: rgba(212, 175, 55, 0.03); 
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: #eee; 
            border-radius: 6px; 
            cursor: pointer; 
            text-align: left; 
            transition: 0.3s; 
            font-size: 14px;
            line-height: 1.5;
        }
        .option:hover { 
            background: #d4af37; 
            color: #000;
            font-weight: bold;
        }
        #result-box { 
            display: none; 
            animation: fadeIn 0.8s ease;
            text-align: left;
        }
        .res-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .res-type { 
            font-size: 15px; 
            font-weight: bold; 
            color: #000; 
            background: #d4af37;
            padding: 10px 15px; 
            border-radius: 4px; 
            display: inline-block; 
            margin-bottom: 15px; 
            text-align: left;
            line-height: 1.5;
            width: 100%;
            box-sizing: border-box;
        }
        .res-section-title {
            font-weight: bold;
            color: #d4af37;
            margin-top: 15px;
            font-size: 14.5px;
            display: block;
        }
        .res-desc { 
            color: #ddd;
            font-size: 14px; 
            line-height: 1.7; 
            margin-bottom: 15px; 
        }
        .warn-box {
            background: rgba(212, 175, 55, 0.05);
            border-left: 4px solid #d4af37;
            padding: 12px;
            font-size: 13.5px;
            line-height: 1.6;
            color: #eee;
            margin-bottom: 25px;
        }
        .next-btn { 
            display: block;
            width: 100%;
            background: transparent;
            border: 1px solid #d4af37; 
            color: #d4af37; 
            padding: 15px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 13px;
            text-transform: uppercase; 
            letter-spacing: 2px;
            transition: 0.3s;
            font-weight: bold;
            text-align: center;
        }
        .next-btn:hover { 
            background: #d4af37; 
            color: #000;
        }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-flow">
        <span class="phase-label">အခန်း (၃) ၏ စမ်းသပ်ချက်ကျမ်း (Interactive Test III)</span>
        <h2 id="q-text">မေးခွန်း - လက်တွဲဖော်သည် သူ၏ လုပ်ငန်းခွင် သို့မဟုတ် လူမှုရေး အောင်မြင်မှုတစ်ခုကို သင့်အား လာရောက် ပြောပြသောအခါ သင် မည်သို့ တုံ့ပြန်မည်နည်း။</h2>
        
        <div class="options-group" id="options-group">
            <button class="option" onclick="showAnalysis('ka')">(က) 'ဒါကတော့ သာမန်ပါပဲ၊ ငါ့မှာလည်း ဒီထက်မက အောင်မြင်တာတွေ ရှိတယ်' ဟု ပြိုင်ဆိုင်ပြောဆိုသည်။</button>
            <button class="option" onclick="showAnalysis('kha')">(ခ) 'အော်... ကောင်းတာပေါ့' ဟု ဆိုကာ စိတ်မပါသကဲ့သို့ ခေါင်းညိတ်၍ အခြားအာရုံသို့ ချက်ချင်း ပြောင်းသွားသည်။</button>
            <button class="option" onclick="showAnalysis('ga')">(ဂ) ၎င်း၏ ကြိုးစားမှုကို ထိထိမိမိ အသိအမှတ်ပြု ချီးမွမ်းပေးပြီးနောက်၊ သူမမျှော်လင့်ထားသော မေးခွန်းတစ်ခုဖြင့် ပဟေဠိဆန်စွာ အဆုံးသတ်ကာ ဆွဲဆောင်သည်။</button>
        </div>
    </div>

    <div id="result-box">
        <div class="res-header">
            <span class="phase-label">ANALYSIS RESULT</span>
            <div class="res-type" id="res-choice"></div>
        </div>
        
        <span class="res-section-title">🧐 သင်သည် မည်သို့သောသူမျိုးလဲ? -</span>
        <p class="res-desc" id="res-desc"></p>
        
        <span class="res-section-title">⚠️ လက်တွေ့အကျိုးဆက် -</span>
        <div class="warn-box" id="res-warn"></div>
        
        <button onclick="completeQuiz()" class="next-btn">နောက်တစ်မျက်နှာသို့ သွားရန် →</button>
    </div>
</div>

<script>
    const analysisData = {
        ka: {
            choice: "(က) 'ဒါကတော့ သာမန်ပါပဲ၊ ငါ့မှာလည်း ဒီထက်မက အောင်မြင်တာတွေ ရှိတယ်' ဟု ပြိုင်ဆိုင်ပြောဆိုသည်။",
            desc: "သင်သည် ချစ်သူနှင့်ပင် အောင်မြင်မှု ပြိုင်ဆိုင်လိုသည့် မနာလိုစိတ် သို့မဟုတ် အတ္တ (Ego) ကြီးမားသူ ဖြစ်၏။ တစ်ဖက်လူကို မြှောက်စားပေးဖို့ထက် မိမိကိုယ်ကိုယ်သာ လူသိရှင်ကြား ဂုဏ်ဖော်လိုတတ်သည်။",
            warn: "ယောက်ျားတစ်ယောက်သည် မိမိအမျိုးသမီးထံမှ ပြိုင်ဆိုင်မှုကို ခံရသောအခါ ၎င်း၏ ယောက်ျားပီသမှု (Masculinity) ထိခိုက်သွားတတ်ပြီး၊ မိမိအား ချီးမွမ်းအသိမှတ်ပြုပေးမည့် အခြားသော မိန်းမသားများထံသို့ အာရုံလွဲသွားတတ်သည်။"
        },
        kha: {
            choice: "(ခ) 'အော်... ကောင်းတာပေါ့' ဟု ဆိုကာ စိတ်မပါသကဲ့သို့ ခေါင်းညိတ်၍ အခြားအာရုံသို့ ချက်ချင်း ပြောင်းသွားသည်။",
            desc: "သင်သည် တစ်ဖက်လူရဲ့ စိတ်ခံစားချက်ကို လျစ်လျူရှုတတ်ပြီး၊ အချစ်ရေးတွင် ဆွဲဆောင်မှုဓာတ် ပျယ်လွင့်နေသော အေးစက်စက် အခြေအနေမျိုးတွင် ရှိနေသူ ဖြစ်၏။",
            warn: "သင့်ထံမှ မည်သည့် စိတ်လှုပ်ရှားမှုနှင့် အသိအမှတ်ပြုမှုကိုမျှ မရရှိသောအခါ၊ ထိုယောက်ျားသည် သင့်အနားတွင် နေရခြင်းကို ပျင်းရိငြီးငွေ့လာပြီး ဘဝရဲ့ ပျော်ရွှင်စရာများကို သင့်အား မျှဝေချင်စိတ် လုံးဝမရှိတော့ချေ။"
        },
        ga: {
            choice: "(ဂ) ၎င်း၏ ကြိုးစားမှုကို ထိထိမိမိ အသိအမှတ်ပြု ချီးမွမ်းပေးပြီးနောက်၊ သူမမျှော်လင့်ထားသော မေးခွန်းတစ်ခုဖြင့် ပဟေဠိဆန်စွာ အဆုံးသတ်ကာ ဆွဲဆောင်သည်။",
            desc: "သင်သည် ယောက်ျားတို့ရဲ့ 'သူရဲကောင်းဗီဇ' ကို ဉာဏ်ပညာဖြင့် မြှောက်စားပေးနိုင်သော ပါးနပ်လှသည့် အမျိုးသမီး ဖြစ်၏။ ၎င်းအား အောက်ကျို့ခြင်းမရှိဘဲ စကားလုံးဖြင့် ဆုလာဘ်ပေးတတ်သူ ဖြစ်သည်။",
            warn: "သင့်အနားမှာ ရှိနေချိန်မှာသာ မိမိကိုယ်ကိုယ် ပိုပြီး စွမ်းဆောင်ရည်ရှိတယ်လို့ ခံစားရတာကြောင့်၊ ထိုယောက်ျားသည် သင့်ထံမှ ထိုအသိအမှတ်ပြုမှု ဆုလာဘ်ကို ထပ်မံရရှိဖို့အတွက် သင့်အလိုကျ ပိုမိုကြိုးစားအားထုတ်လာပါလိမ့်မည်။"
        }
    };

    function showAnalysis(answerKey) {
        // Hide Question UI
        document.getElementById('quiz-flow').style.display = 'none';
        
        // Load Selected Data
        const data = analysisData[answerKey];
        document.getElementById('res-choice').innerText = data.choice;
        document.getElementById('res-desc').innerText = data.desc;
        document.getElementById('res-warn').innerText = data.warn;
        
        // Show Result UI
        document.getElementById('result-box').style.display = 'block';
    }

    function completeQuiz() {
        // Send unlock message to index.html parent frame
        window.parent.postMessage("quizCompleted", "*");
    }
</script>

</body>
</html>
