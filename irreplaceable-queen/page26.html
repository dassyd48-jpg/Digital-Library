<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Irreplaceable Queen - Page 25 Quiz</title>
    <style>
        body { 
            background: #12011b; /* Royal Dark Purple Theme */
            color: #d4af37;
            font-family: sans-serif; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        
        .quiz-container { 
            width: 100%;
            max-width: 480px; 
            max-height: 95vh; /* ဖုန်းမျက်နှာပြင်အမြင့်ထက် မကျော်စေရန် */
            background: rgba(0, 0, 0, 0.85); 
            border: 1px solid #d4af37; 
            border-radius: 12px; 
            padding: 15px 20px; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* စာသားရှည်လျားပါက အတွင်းထဲတွင်တင် အပေါ်အောက် လှိမ့်ဖတ်နိုင်မည့် စနစ် */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
            margin-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }

        /* Scrollbar အား ပါးပါးလျလျနှင့် လှပအောင် ပြုပြင်ခြင်း */
        .scrollable-content::-webkit-scrollbar {
            width: 4px;
        }
        .scrollable-content::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.3);
            border-radius: 4px;
        }

        .phase-label { 
            font-size: 11px; 
            color: #d4af37; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-weight: bold;
            display: block; 
            margin-bottom: 12px;
            text-align: center;
        }
        
        h2 { 
            font-size: 14.5px; 
            line-height: 1.6; 
            color: #fff; 
            margin-bottom: 20px;
            font-weight: normal; 
            text-align: left;
        }
        
        .options-group {
            display: block;
        }
        
        .option { 
            display: block;
            width: 100%; 
            padding: 13px 15px; 
            margin: 8px 0; 
            background: rgba(212, 175, 55, 0.03); 
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: #eee; 
            border-radius: 6px; 
            cursor: pointer; 
            text-align: left; 
            transition: 0.2s; 
            font-size: 13.5px;
            line-height: 1.5;
        }
        
        .option:hover, .option:active { 
            background: #d4af37; 
            color: #000;
            font-weight: bold;
            border-color: #d4af37;
        }
        
        #result-box { 
            display: none; 
            animation: fadeIn 0.5s ease;
            text-align: left;
        }
        
        .res-header {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .res-type { 
            font-size: 14px; 
            font-weight: bold; 
            color: #000; 
            background: #d4af37;
            padding: 10px 12px; 
            border-radius: 4px; 
            display: block; 
            margin-bottom: 12px; 
            text-align: left;
            line-height: 1.5;
            width: 100%;
            box-sizing: border-box;
        }
        
        .res-section-title {
            font-weight: bold;
            color: #d4af37;
            margin-top: 12px;
            font-size: 14px;
            display: block;
        }
        
        .res-desc { 
            color: #ddd;
            font-size: 13.5px; 
            line-height: 1.6; 
            margin-bottom: 10px; 
        }
        
        .warn-box {
            background: rgba(212, 175, 55, 0.05);
            border-left: 4px solid #d4af37;
            padding: 10px 12px;
            font-size: 13px;
            line-height: 1.6;
            color: #eee;
            margin-bottom: 15px;
        }

        /* အောက်ခြေခလုတ်အကွက် - မျက်နှာပြင်တွင် ကပ်နေစေပြီး လုံးဝနစ်မသွားစေရန် */
        .action-container {
            width: 100%;
            padding-top: 5px;
            flex-shrink: 0;
        }
        
        .next-btn { 
            display: block;
            width: 100%;
            background: transparent;
            border: 1px solid #d4af37; 
            color: #d4af37; 
            padding: 14px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 13px;
            text-transform: uppercase; 
            letter-spacing: 2px;
            transition: 0.3s;
            font-weight: bold;
            text-align: center;
        }
        
        .next-btn:hover, .next-btn:active { 
            background: #d4af37; 
            color: #000;
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(8px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

<div class="quiz-container">
    
    <div class="scrollable-content">
        
        <div id="quiz-flow">
            <span class="phase-label">အခန်း (၄) ၏ စမ်းသပ်ချက်ကျမ်း (Interactive Test IV)</span>
            <h2 id="q-text">မေးခွန်း - သင်သည် လက်တွဲဖော်နှင့် စကားပြောဆိုရာတွင် မိမိ၏ တစ်ကိုယ်ရေ အကြောင်းအရာများနှင့် စိတ်ခံစားချက်များကို မည်မျှအထိ ထုတ်ဖော်ပြောပြတတ်သနည်း။</h2>
            
            <div class="options-group" id="options-group">
                <button class="option" onclick="showAnalysis('ka')">(က) စိတ်ထဲရှိသမျှ၊ ကြုံတွေ့ရသမျှ အရာအားလုံးကို အစအဆုံး အသေးစိတ် တစ်ထိုင်တည်း ဗလာကျင်း ပြောပြပစ်သည်။</button>
                <button class="option" onclick="showAnalysis('kha')">(ခ) လျှို့ဝှက်လွန်းသဖြင့် မည်သည့်အရာကိုမျှ မပြောဘဲ နေသောကြောင့် သံသယနှင့် ရန်ပွဲများကို ဖိတ်ခေါ်သည်။</button>
                <button class="option" onclick="showAnalysis('ga')">(ဂ) အရေးကြီးသော အချက်အလက်အချို့ကိုသာ မျှဝေပြီး ကျန်သောအရာများကိုမူ ပဟေဠိဆန်စွာဖြင့် ဆက်လက်သိချင်အောင် ထားတတ်သည်။</button>
            </div>
        </div>

        <div id="result-box">
            <div class="res-header">
                <span class="phase-label">ANALYSIS RESULT</span>
            </div>
            
            <div class="res-type" id="res-choice"></div>
            
            <span class="res-section-title">🧐 သင်သည် မည်သို့သောသူမျိုးလဲ? -</span>
            <p class="res-desc" id="res-desc"></p>
            
            <span class="res-section-title">⚠️ လက်တွေ့အကျိုးဆက် -</span>
            <div class="warn-box" id="res-warn"></div>
        </div>

    </div> <div class="action-container" id="action-wrapper" style="display: none;">
        <button onclick="completeQuiz()" class="next-btn">နောက်တစ်မျက်နှာသို့ သွားရန် →</button>
    </div>
    
</div>

<script>
    const analysisData = {
        ka: {
            choice: "(က) စိတ်ထဲရှိသမျှ၊ ကြုံတွေ့ရသမျှ အရာအားလုံးကို အစအဆုံး အသေးစိတ် တစ်ထိုင်တည်း ဗလာကျင်း ပြောပြပစ်သည်။",
            desc: "သင်သည် လျှို့ဝှက်ချက်မရှိ၊ မိမိကိုယ်ကိုယ် အကုန်အစင် ပုံအပ်ပြတတ်သည့် ရိုးအလွန်းသောသူ ဖြစ်၏။ ရင်းနှီးမှုအစစ်အမှန်သည် အကုန်ထုတ်ပြောခြင်းဟု မှားယွင်းစွာ ယူဆထားတတ်သည်။",
            warn: "အစအဆုံး အကုန်ဖတ်ပြီးသား စာအုပ်တစ်အုပ်ကို လူတွေ ပြန်မလှန်ချင်တော့သလိုပဲ၊ သင့်အကြောင်းကို အကုန်ခန့်မှန်းလို့ ရသွားတဲ့အခါ ယောက်ျားတစ်ယောက်ရဲ့ရင်ထဲမှာ သင့်ကို စူးစမ်းချင်စိတ် (Mystique) လုံးဝ ကုန်ဆုံးသွားပါလိမ့်မည်။"
        },
        kha: {
            choice: "(ခ) လျှို့ဝှက်လွန်းသဖြင့် မည်သည့်အရာကိုမျှ မပြောဘဲ နေသောကြောင့် သံသယနှင့် ရန်ပွဲများကို ဖိတ်ခေါ်သည်။",
            desc: "သင်သည် ဂိတ်တံခါးကို အလွန်အမင်း ပိတ်ထားပြီး တစ်ဖက်လူအပေါ် အယုံအကြည်ကင်းမဲ့ကာ လွန်ကဲစွာ လျှို့ဝှက်တတ်သူ ဖြစ်၏။",
            warn: "ဤသို့ မပြောမဆို အေးစက်လွန်းခြင်းသည် ဆွဲဆောင်မှုမဖြစ်စေဘဲ တစ်ဖက်လူကို သံသယဝင်စေကာ အချစ်ရေးတွင် မလိုအပ်သော ဒေါသနှင့် ရန်ပွဲများကိုသာ တောက်လျှောက် ဖိတ်ခေါ်ရာ ရောက်ပေသည်။"
        },
        ga: {
            choice: "(ဂ) အရေးကြီးသော အချက်အလက်အချို့ကိုသာ မျှဝေပြီး ကျန်သောအရာများကိုမူ ပဟေဠိဆန်စွာဖြင့် ဆက်လက်သိချင်အောင် ထားတတ်သည်။",
            desc: "သင်သည် ဆိတ်ငြိမ်ခြင်း (Silence) ရဲ့ အာဏာကို ကောင်းစွာ အသုံးချတတ်ပြီး မိမိကိုယ်ကိုယ် ဆွဲဆောင်မှုအတိ ခြုံလွှမ်းထားနိုင်သည့် ဧကရီ ဖြစ်၏။",
            warn: "သင်၏ နောက်ထပ်ခြေလှမ်းက ဘာဖြစ်မလဲဆိုတာ ခန့်မှန်းရ ခက်ခဲနေစေခြင်းက... ပုရိသတို့အား သင့်ကို အမြဲတမ်း စိတ်ဝင်တစား တန်ဖိုးထားပြီး ထာဝရ လိုက်လံဖမ်းဆွဲချင်စိတ် ပေါက်နေအောင် ပြုလုပ်နိုင်စွမ်း ရှိပေသည်။"
        }
    };

    function showAnalysis(answerKey) {
        // Hide Question UI
        document.getElementById('quiz-flow').style.display = 'none';
        
        // Load Selected Data
        const data = analysisData[answerKey];
        document.getElementById('res-choice').innerText = data.choice;
        document.getElementById('res-desc').innerText = data.desc;
        document.getElementById('res-warn').innerText = data.warn;
        
        // Show Result UI and Next Button
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('action-wrapper').style.display = 'block';
        
        // Scroll back to top smoothly to read results
        document.querySelector('.scrollable-content').scrollTop = 0;
    }

    function completeQuiz() {
        // Send unlock message to index.html parent frame
        window.parent.postMessage("quizCompleted", "*");
    }
</script>

</body>
</html>
