    <!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE MIRROR OF TRUTH</title>
    <style>
        :root { 
            --gold: #D4AF37; 
            --deep-purple: #1a052e; 
            --dark-purple: #0d0216;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', 'Pyidaungsu', sans-serif; }
        
        #bg-video { 
            position: fixed; inset: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 0; 
            filter: brightness(0.5) saturate(0.8);
        }
        
        #lock { 
            position: fixed; inset: 0; display: flex; justify-content: center; 
            align-items: center; flex-direction: column; z-index: 2000; 
            background: radial-gradient(circle, rgba(26, 5, 46, 0.7) 0%, rgba(5, 1, 10, 0.85) 100%);
            backdrop-filter: blur(4px); color: #fff; text-align: center; padding: 20px; 
        }

        .brand-label { font-size: 10px; color: var(--gold); letter-spacing: 4px; margin-bottom: 15px; font-weight: bold; }
        
        .book-title { 
            color: #f8f4ff; font-weight: 900; font-size: clamp(24px, 7vw, 36px); 
            margin-bottom: 30px; text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            line-height: 1.4;
        }

        #lock input { 
            padding: 14px; width: 260px; border: 1px solid rgba(212, 175, 55, 0.4);
            background: rgba(0, 0, 0, 0.5); color: #fff; text-align: center; 
            margin-bottom: 25px; border-radius: 4px; outline: none;
        }

        #lock button { 
            padding: 14px 70px; 
            background: linear-gradient(135deg, #BF953F 0%, #FCF6BA 50%, #B38728 100%); 
            color: #1a052e; border: none; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; border-radius: 4px; letter-spacing: 1px;
        }

        .request-link {
    margin-top: 20px; /* Computer မှာ တခြားဟာနဲ့ မကပ်အောင် နေရာချန်သည် */
    color: #BF00FF; /* Bright Purple */
    text-decoration: none;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 1px;
    text-shadow: 0 0 10px rgba(191, 0, 255, 0.4);
    transition: 0.3s;
}

/* ဖုန်းအတွက် သီးသန့်ပြင်ဆင်ချက် */
@media screen and (max-width: 600px) {
    .request-link {
        margin-top: 10px; /* ဖုန်းမှာ အပေါ်ကို နည်းနည်း ပိုတက်လာစေရန် */
        margin-bottom: 40px; /* အောက်ခြေနဲ့ အရမ်းမကပ်စေရန် */
    }
}
        .footer-copyright {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 10px;
            color: #D4AF37;
            opacity: 0.6;
            z-index: 5000;
            letter-spacing: 2px;
            pointer-events: none;
            text-transform: uppercase;
        }

        @media screen and (max-width: 600px) {
            .footer-copyright {
                bottom: 80px; /* ဖုန်းမှာ အပေါ်ကို တွန်းတင်ရန် */
                font-size: 9px;
            }
        }

        /* Book Container: Design မူလအတိုင်းထားပြီး Rendering Error ကာကွယ်ထားသည် */
        #book-container {
            display: none; 
            width: 100vw; 
            height: 100vh;
            position: relative; 
            z-index: 10;
            background: var(--emerald-bg);
            opacity: 0;
            /* မှိတ်တုတ်မှိတ်တုတ်မဖြစ်စေရန် GPU Acceleration သုံးထားသည် */
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        #flipbook-wrapper { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #flipbook .page { background-color: #000; background-size: 100% 100%; }
        
        /* Quiz Styles */
        #quiz-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 4000; justify-content: center; align-items: center; padding: 15px; }
        #quiz-content { width: 100%; max-width: 420px; background: #0a0a0a; padding: 18px; border: 1px solid var(--gold); border-radius: 12px; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        #options-container { overflow-y: auto; flex-grow: 1; margin-top: 5px; }
        #test-question { font-size: 13.5px; line-height: 1.6; margin-bottom: 15px; color: #ddd; }
        .quiz-option { padding: 10px 12px; margin-bottom: 8px; border: 1px solid rgba(212,175,55,0.25); color: #fff; font-size: 11.5px; cursor: pointer; border-radius: 6px; background: rgba(255,255,255,0.03); transition: 0.3s; }
        .quiz-option:active { background: rgba(212,175,55,0.2); }
        .btn-continue { width: 100%; padding: 14px; background: var(--gold); color: #000; border: none; font-size: 13px; font-weight: bold; margin-top: 15px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <div id="lock">
        <span class="brand-label">DASSY DIGITAL LIBRARY PRESENTS</span>
        <h1 class="book-title">ဩဇာ၏ နိယာမ<br><span style="font-size:14px; color:var(--gold);">(THE DOMINANCE CODE)</span></h1>
        <input type="password" id="pass" placeholder="ACCESS KEY">
        <button onclick="unlock()">ENTER THE MIRROR</button>
        <a href="https://t.me/Dassy_digital_Library" target="_blank" class="request-link" style="color: #BF00FF; text-shadow: 0 0 10px rgba(191, 0, 255, 0.5);">REQUEST PRIVATE ACCESS FROM DASSY</a>
    </div>

    <div id="book-container">
        <div id="flipbook-wrapper">
            <div id="flipbook"></div>
        </div>
        
        <div style="position:absolute; bottom:15px; width:100%; text-align:center; font-size:9px; color:var(--gold); opacity:0.6; z-index:5000; pointer-events:none; letter-spacing:1px;">
            © DASSY DIGITAL LIBRARY | ALL RIGHTS RESERVED
        </div>
    </div>

    <div id="quiz-overlay">
        <div id="quiz-content">
            <div id="test-title" style="color:var(--gold); font-size:16px; margin-bottom:15px; text-align:center; font-weight:bold; letter-spacing:1px;"></div>
            <div id="test-question"></div>
            <div id="options-container"></div>
        </div>
    </div>

    <audio id="sound-flip" src="flip.mp3" preload="auto"></audio>
    <audio id="bgm-dark" src="dark-theme.mp3" loop preload="auto"></audio>
    <audio id="bgm-light" src="light-theme.mp3" loop preload="auto"></audio>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="turn.min.js"></script>
    <script src="intro-quiz.js"></script>
    <script src="psychologyTests_Part1.js"></script> 
    <script src="psychologyTests_Part2.js"></script>

    <script>
    const totalPages = 84; 
    const quizPages = [12, 16, 20, 24, 28, 32, 36, 40, 44, 48, 52, 56, 60, 64, 68, 72, 76, 80];
    let isQuizLocked = false;
    const myPassword = "DC@MIRROR";

    function getBookSize() {
        const padding = 10;
        let w = window.innerWidth - padding;
        let h = window.innerHeight - padding;
        const ratio = 3 / 4;
        if (w / h > ratio) { w = h * ratio; } else { h = w / ratio; }
        return { w, h };
    }

    function unlock() {
        if(document.getElementById("pass").value === myPassword) {
            startIntroQuiz();
        } else {
            alert("ACCESS DENIED: ကုဒ်မှားယွင်းနေပါသည်။");
        }
    }

    function startIntroQuiz() {
        const data = introQuiz["1"];
        if(!data) { initBook(); return; }
        $("#lock, #bg-video").fadeOut(500);
        $("#test-title").text(data.title);
        renderIntroScenario(data, 0);
        $("#quiz-overlay").fadeIn().css("display", "flex");
    }

    function renderIntroScenario(data, index) {
        let introScores = window.introScores || { A: 0, B: 0, C: 0 };
        window.introScores = introScores;

        if (index >= data.scenarios.length) {
            let resultKey = Object.keys(introScores).reduce((a, b) => introScores[a] > introScores[b] ? a : b);
            $("#test-question").html(`<div style="color:var(--gold); margin-bottom:10px; font-weight:bold;">Analysis Result:</div><div style="font-size:13px;">${data.results[resultKey]}</div>`);
            $("#options-container").html('<button class="btn-continue" onclick="initBook()">စာအုပ်ကို စတင်ဖတ်ရှုမည်</button>');
            return;
        }
        const sc = data.scenarios[index];
        $("#test-question").text(sc.q);
        $("#options-container").empty();
        sc.options.forEach(opt => {
            const btn = $('<div class="quiz-option"></div>').text(opt.t);
            btn.on('click', () => { 
                if(opt.v) introScores[opt.v]++; 
                renderIntroScenario(data, index + 1); 
            });
            $("#options-container").append(btn);
        });
    }

    function initBook() {
        $("#quiz-overlay").fadeOut(400);
        $("#lock, #bg-video").fadeOut(400, function() {
            $(this).remove();
        });

        // မူလအတိုင်း Animate ပြန်လုပ်ထားပါသည်
        $("#book-container").show().animate({ opacity: 1 }, 800);
        
        loadAndInit();
        document.getElementById("bgm-dark").play().catch(()=>{});
    }

    function loadAndInit() {
        const flipbook = $("#flipbook");
        const { w, h } = getBookSize();

        if (flipbook.children().length > 0) return; 

        for (let i = 1; i <= totalPages; i++) {
            const pageDiv = $('<div />').addClass('page').css({
                'background-image': `url('pages/page${i}.jpg')`,
                'background-size': '100% 100%',
                'background-color': '#000'
            });
            flipbook.append(pageDiv);
        }

        flipbook.turn({
            width: w, height: h, 
            autoCenter: true, display: 'single', 
            pages: totalPages, acceleration: false,
            elevation: 0, gradients: false, duration: 500, 
            when: {
                turning: function(e, page) {
                    if (isQuizLocked) { e.preventDefault(); return; }
                    document.getElementById("sound-flip").play().catch(()=>{});
                },
                turned: function(e, page) {
                    handleMusic(page);
                    if (quizPages.includes(page)) {
                        triggerPsychologyTest(page);
                    }
                }
            }
        });
    }

    function triggerPsychologyTest(pageNumber) {
        const test = psychologyTests[pageNumber];
        if (!test) return;
        
        isQuizLocked = true;
        $("#test-title").text(test.title);
        $("#test-question").text(test.q);
        $("#options-container").empty();
        
        test.options.forEach(opt => {
            const btn = $('<div class="quiz-option"></div>').text(opt.t);
            btn.on('click', () => {
                $("#test-question").html(`<div style='color:var(--gold); font-weight:bold; margin-bottom:12px;'>Result Analysis:</div><div style='background:rgba(255,255,255,0.05); padding:12px; border-radius:5px;'>${opt.r}</div>`);
                $("#options-container").empty().html('<button class="btn-continue" onclick="closeQuiz()">ဆက်လက်ဖတ်ရှုမည်</button>');
            });
            $("#options-container").append(btn);
        });
        $("#quiz-overlay").fadeIn().css("display", "flex");
    }

    function closeQuiz() { 
        $("#quiz-overlay").fadeOut(() => { isQuizLocked = false; }); 
    }

    function handleMusic(page) {
        const dark = document.getElementById("bgm-dark");
        const light = document.getElementById("bgm-light");
        if (page <= 43) { 
            if (dark.paused) { light.pause(); dark.play().catch(()=>{}); } 
        } else { 
            if (light.paused) { dark.pause(); light.play().catch(()=>{}); } 
        }
    }

    $(window).resize(() => {
        const { w, h } = getBookSize();
        $("#flipbook").turn("size", w, h);
    });
    </script>
</body>
</html>
