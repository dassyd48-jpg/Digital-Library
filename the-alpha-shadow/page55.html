<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #001a1d; color: #4ed9e6; font-family: sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .quiz-container { width: 100%; max-width: 480px; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(78, 217, 230, 0.2); border-radius: 12px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        .phase-label { font-size: 10px; color: #ffab40; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; opacity: 0.8; }
        h2 { font-size: 16px; line-height: 1.5; margin: 15px 0; color: #fff; }
        .option { display: block; width: 100%; padding: 14px; margin: 10px 0; background: rgba(78, 217, 230, 0.05); border: 1px solid rgba(78, 217, 230, 0.2); color: #4ed9e6; border-radius: 6px; cursor: pointer; text-align: left; transition: 0.2s; font-size: 13px; line-height: 1.4; }
        .option:hover { background: #4ed9e6; color: #000; font-weight: bold; }
        #result-box { display: none; margin-top: 5px; padding: 20px; border: 1px solid #ffab40; background: rgba(255, 171, 64, 0.05); border-radius: 8px; animation: fadeInUp 0.4s ease-out; }
        .res-title { font-size: 15px; font-weight: bold; color: #ffab40; margin-bottom: 12px; display: block; border-left: 4px solid #ffab40; padding-left: 10px; }
        .res-desc { color: #fff; font-size: 13px; line-height: 1.6; margin-bottom: 20px; }
        .next-btn { display: block; width: 100%; padding: 15px; background: #ffab40; color: #000; border: none; border-radius: 6px; font-weight: 900; cursor: pointer; text-align: center; text-transform: uppercase; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="quiz-container">
    <span class="phase-label">FINAL ANALYSIS: PHASE 55 (SOVEREIGNTY)</span>
    <h2 id="q-text">သင့်ဘဝရဲ့ ပျော်ရွှင်မှုဟာ သူ့အပေါ်မှာ ဘယ်လောက်အထိ မှီခိုနေသလဲ?</h2>
    <div id="options-group">
        <button class="option" onclick="showAnalysis('THE INDEPENDENT QUEEN', 'သင်ဟာ သင့်ကိုယ်ပိုင် အာဏာစက်ကို တည်ဆောက်နိုင်ပါပြီ။ သင်ပျော်ရွှင်ဖို့ သူ့ကို မလိုအပ်တော့တာက သူ့ကို သင့်ဆီ ပိုဆွဲဆောင်စေမယ့် အချက်ပါပဲ။')">၁။ သူရှိရှိ မရှိရှိ ကျွန်မကတော့ ပျော်အောင် နေတတ်နေပါပြီ</button>
        <button class="option" onclick="showAnalysis('THE STRATEGIC PARTNER', 'သင်ဟာ ဂိမ်းကို ဘယ်လိုကစားရမလဲဆိုတာ သိသွားပါပြီ။ ဒါဟာ Emotional Intelligence မြင့်မားတဲ့ လက္ခဏာပါ။')">၂။ သူ့ရဲ့ စရိုက်ကို နားလည်သွားတဲ့အတွက် အရင်လို စိတ်မဆင်းရဲတော့ဘဲ ကိုင်တွယ်တတ်လာတယ်</button>
        <button class="option" onclick="showAnalysis('THE EMOTIONAL RELIANT', 'သင့်ရဲ့ Key (သော့) က သူ့လက်ထဲမှာ ရှိနေတုန်းပါ။ ဗျူဟာ - သင့်ရဲ့ ကိုယ်ပိုင် ဝါသနာနဲ့ သူငယ်ချင်းတွေဆီ အချိန်ပြန်ပေးပါ။')">၃။ သူက ကျွန်မကို ဂရုစိုက်မှပဲ ကျွန်မ စိတ်ချမ်းသာနိုင်မယ်လို့ ခံစားရတုန်းပဲ</button>
        <button class="option" onclick="showAnalysis('THE AWAKENED SOUL', 'သင်ဟာ Shadow တွေကို မြင်သွားပါပြီ။ ဗျူဟာ - အမှန်တရားကို လက်ခံပြီး သင့်အတွက် အကောင်းဆုံးလမ်းကို ရွေးချယ်ပါ။')">၄။ သူ့ရဲ့ အားနည်းချက်တွေကို မြင်သွားတဲ့အတွက် သူ့အပေါ် ထားတဲ့ မျှော်လင့်ချက်တွေကို လျှော့ချလိုက်နိုင်ပြီ</button>
        <button class="option" onclick="showAnalysis('THE EMPOWERED ALPHA', 'သင်ဟာ ဆက်ဆံရေးရဲ့ Lead (ဦးဆောင်သူ) ဖြစ်လာပါပြီ။ ဗျူဟာ - ဒီအာဏာကို တည်ငြိမ်စွာနဲ့ အသုံးချပါ။')">၅။ အခုဆိုရင် ကျွန်မကပဲ သူ့ကို လွှမ်းမိုးနိုင်စွမ်း ရှိလာပြီလို့ ခံစားရတယ်</button>
        <button class="option" onclick="showAnalysis('THE TRANSFOPRMED', 'ဒါဟာ အောင်မြင်မှုပါပဲ။ စာအုပ်ရဲ့ ရည်ရွယ်ချက်ကို သင် အပြည့်အဝ ရရှိသွားပါပြီ။')">၆။ ကျွန်မကိုယ်ကျွန်မ အရင်ကထက် ပိုချစ်လာပြီး ပိုတန်ဖိုးထားတတ်လာတယ်</button>
    </div>
    <div id="result-box">
        <span class="res-title" id="res-title"></span>
        <p class="res-desc" id="res-desc"></p>
        <button onclick="unlockFinalPages()" class="next-btn">THE SOVEREIGN MIND UNLOCKED</button>
    </div>
</div>

<script>
    function showAnalysis(t, d) {
        document.getElementById('options-group').style.display='none';
        document.getElementById('q-text').style.opacity='0.3';
        document.getElementById('res-title').innerText=t;
        document.getElementById('res-desc').innerText=d;
        document.getElementById('result-box').style.display='block';
    }

    // 🛠️ ဒီ function က index.html ဆီကို "စာမျက်နှာလှန်တော့" လို့ အချက်ပြမှာပါ
    function unlockFinalPages() {
        window.parent.postMessage("quizCompleted", "*");
    }
</script>
</body>
</html>
