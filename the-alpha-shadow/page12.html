<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            background: #001a1d; color: #4ed9e6; font-family: sans-serif; 
            margin: 0; padding: 15px; display: flex; justify-content: center; 
            align-items: center; min-height: 100vh; box-sizing: border-box; 
        }
        .quiz-container { 
            width: 100%; max-width: 480px; background: rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(78, 217, 230, 0.2); border-radius: 12px; 
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            text-align: center;
        }
        .phase-label { 
            font-size: 10px; color: #ffab40; letter-spacing: 2px; 
            text-transform: uppercase; font-weight: bold; opacity: 0.8;
            display: block; margin-bottom: 10px;
        }
        h2 { font-size: 16px; line-height: 1.5; margin: 15px 0; color: #fff; text-align: left; }
        .option { 
            display: block; width: 100%; padding: 14px; margin: 10px 0; 
            background: rgba(78, 217, 230, 0.05); border: 1px solid rgba(78, 217, 230, 0.2); 
            color: #4ed9e6; border-radius: 6px; cursor: pointer; text-align: left; 
            transition: 0.2s; font-size: 13px; line-height: 1.4;
        }
        .option:hover { background: #4ed9e6; color: #000; font-weight: bold; }
        #result-box { 
            display: none; margin-top: 5px; padding: 20px; 
            border: 1px solid #ffab40; background: rgba(255, 171, 64, 0.05); 
            border-radius: 8px; animation: fadeInUp 0.4s ease-out; 
        }
        .res-title { 
            font-size: 15px; font-weight: bold; color: #ffab40; 
            margin-bottom: 12px; display: block; border-left: 4px solid #ffab40; 
            padding-left: 10px; text-align: left;
        }
        .res-desc { color: #fff; font-size: 13px; line-height: 1.6; margin-bottom: 20px; text-align: left; }
        .next-btn { 
            display: block; width: 100%; padding: 15px; background: #ffab40; 
            color: #000; border: none; border-radius: 6px; font-weight: 900; 
            cursor: pointer; text-align: center; text-transform: uppercase;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="quiz-container">
    <span class="phase-label">ANALYSIS: PHASE 12 (THE MASK)</span>
    <h2 id="q-text">သူ့ရဲ့ လုပ်နိုင်စွမ်း ဒါမှမဟုတ် သူ့ရဲ့ ဂုဏ်သိက္ခာကို တစ်စုံတစ်ယောက်က ဝေဖန်လိုက်တဲ့အခါ သူ ဘယ်လို တုံ့ပြန်တတ်သလဲ?</h2>
    
    <div id="options-group">
        <button class="option" onclick="showAnalysis('THE VOLCANO', 'သူဟာ အားနည်းသူအဖြစ် အမြင်မခံနိုင်တဲ့ အကြောက်တရား ရှိနေတာပါ။ ဒေါသက သူ့ရဲ့ အကာအကွယ်မျက်နှာဖုံးပါပဲ။', 'ဗျူဟာ: သူ ဒေါသထွက်နေချိန်မှာ ယုတ္တိဗေဒ (Logic) နဲ့ သွားမရှင်းပါနဲ့။ သူ ငြိမ်သွားတဲ့အထိ စောင့်ပြီးမှ အေးအေးဆေးဆေး စကားပြောပါ။')">၁။ ချက်ချင်း ဒေါသတကြီးနဲ့ အော်ဟစ်တုံ့ပြန်တယ် (သို့မဟုတ်) ရန်ရှာတတ်တယ်</button>
        <button class="option" onclick="showAnalysis('THE ICEBERG', 'သူဟာ စိတ်ဒဏ်ရာရမှာကို ကြောက်လို့ လူတွေကို အနားမကပ်ခိုင်းတာပါ။ အေးစက်ခြင်းက သူ့ရဲ့ ခံတပ်မျက်နှာဖုံးပါပဲ။', 'ဗျူဟာ: သူ့ကို အတင်းစကားမပြောခိုင်းပါနဲ့။ သင်က သူ့ဘက်မှာ ရှိနေတယ်ဆိုတာကို အမူအရာနဲ့ပဲ ပြသပါ။')">၂။ ဘာမှမပြောတော့ဘဲ ချက်ချင်း အေးစက်သွားပြီး လူသေလို ငြိမ်ကျသွားတယ်</button>
        <button class="option" onclick="showAnalysis('THE DEFENDER', 'သူဟာ အမြဲတမ်း မှန်နေချင်သူပါ။ ရှုံးနိမ့်မှာကို အရမ်းကြောက်တတ်ပါတယ်။', 'ဗျူဟာ: သူ့အမှားကို တိုက်ရိုက်မထောက်ပြပါနဲ့။ &quot;ငါ နင့်ဘက်က နားလည်ပါတယ်၊ ဒါပေမဲ့...&quot; ဆိုတဲ့ ပုံစံမျိုးနဲ့ ချဉ်းကပ်ပါ။')">၃။ သူ့အမှား မဟုတ်ကြောင်း အတင်းအကျပ် ဆင်ခြေပေးပြီး ကိုယ့်ကိုယ်ကိုယ် ပြန်ကာကွယ်တယ်</button>
        <button class="option" onclick="showAnalysis('THE ESCAPIST', 'သူဟာ ပဋိပက္ခတွေကို မရင်ဆိုင်ရဲသူပါ။ ပြဿနာကနေ ထွက်ပြေးခြင်းက သူ့ရဲ့ လွတ်မြောက်ရာလမ်းပါပဲ။', 'ဗျူဟာ: သူထွက်သွားတာကို မတားပါနဲ့။ သူ ပြန်လာတဲ့အခါမှ ပြဿနာကို လေးလေးနက်နက် ဆွေးနွေးပါ။')">၄။ အဲဒီနေရာကနေ ချက်ချင်း ထွက်သွားတယ် (သို့မဟုတ်) ဖုန်းထဲမှာပဲ နစ်မြုပ်သွားတယ်</button>
        <button class="option" onclick="showAnalysis('THE OVER-COMPENSATOR', 'သူဟာ လူတကာရဲ့ အသိအမှတ်ပြုမှုကို လိုချင်သူပါ။ သူ့ကိုယ်သူ ယုံကြည်မှု အားနည်းနေတာကို ဟာသနဲ့ ဖုံးကွယ်တတ်ပါတယ်။', 'ဗျူဟာ: သူ့ရဲ့ ဟာသကို လိုက်ရယ်ပေးပါ။ ဒါပေမဲ့ သူ့ရဲ့ တကယ့်စိတ်ရင်းကို သိအောင် သီးသန့် အချိန်ပေး စကားပြောပါ။')">၅။ ဟာသလုပ်ပြီး အခြေအနေကို လှောင်ပြောင်ပစ်လိုက်တယ်</button>
        <button class="option" onclick="showAnalysis('THE SECURE OBSERVER', 'ဒါဟာ ရင့်ကျက်တဲ့ အမျိုးသားတစ်ယောက်ရဲ့ လက္ခဏာပါ။ ဒါပေမဲ့ သူက သင့်ကို အကဲခတ်နေတာဆိုတာ မမေ့ပါနဲ့။', 'ဗျူဟာ: သူ့ရဲ့ တည်ငြိမ်မှုကို ချီးမွမ်းပေးပါ။ ဒါက သင့်ကို သူ ပိုပြီး လေးစားလာစေပါလိမ့်မယ်။')">၆။ အေးအေးဆေးဆေး နားထောင်ပြီးမှ လိုအပ်တာကိုပဲ တည်တည်ငြိမ်ငြိမ် ပြန်ပြောတယ်</button>
    </div>

    <div id="result-box">
        <span class="res-title" id="res-title"></span>
        <p class="res-desc" id="res-desc"></p>
        <div id="strategy-note" style="font-size: 12px; color: #4ed9e6; font-style: italic; background: rgba(78, 217, 230, 0.1); padding: 10px; border-radius: 4px; margin-bottom: 15px; text-align: left;"></div>
        
        <button onclick="completeQuiz()" class="next-btn">UNLOCK NEXT SHADOW →</button>
    </div>
</div>

<script>
    function showAnalysis(title, desc, strat) {
        document.getElementById('options-group').style.display = 'none';
        document.getElementById('q-text').style.opacity = '0.3';
        document.getElementById('res-title').innerText = title;
        document.getElementById('res-desc').innerText = desc;
        document.getElementById('strategy-note').innerText = strat;
        document.getElementById('result-box').style.display = 'block';
    }

    function completeQuiz() {
        // Main Flip Book (index.html) ဆီသို့ message ပို့ခြင်း
        window.parent.postMessage("quizCompleted", "*");
    }
</script>

</body>
</html>
