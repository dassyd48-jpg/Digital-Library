<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASSY BLOCK VAULT | PREMIUM ACCESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            /* လင်းလက်သော Metallic Gold */
            --bright-gold: #f7e1ad;
            --main-gold: #d4af37;
            --shadow-gold: #8a6d3b;
            /* ပိုမိုမှောင်သော အနီနက်ရောင် */
            --header-dark-crimson: #120000;
            --body-black: #050505;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--body-black);
            color: #888;
            font-family: 'Special Elite', cursive;
            display: flex; flex-direction: column; align-items: center;
        }

        header {
            text-align: center; padding: 120px 20px;
            width: 100%;
            background: radial-gradient(circle, #2a0000 0%, var(--header-dark-crimson) 100%);
            border-bottom: 1px solid #330000;
            overflow: hidden;
        }

        /* Animated Metallic Shine Effect */
        header h1 {
            font-family: 'Cinzel Decorative', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            margin: 0;
            letter-spacing: 12px;
            text-transform: uppercase;
            font-weight: 900;
            
            /* Gold Gradient */
            background: linear-gradient(
                to right, 
                var(--shadow-gold) 0%, 
                var(--main-gold) 25%, 
                var(--bright-gold) 50%, 
                var(--main-gold) 75%, 
                var(--shadow-gold) 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Shining Animation */
            animation: shine 4s linear infinite;
            
            /* စာလုံးကြွစေရန် Glow */
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        header p {
            color: #550000;
            font-size: 1rem;
            margin-top: 25px;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: bold;
            opacity: 0.8;
        }

        /* Content Container */
        .shelf {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px; width: 90%; max-width: 1200px; padding: 80px 0;
        }

        .vault-item {
            background: #080808;
            border: 1px solid #1a1a1a;
            padding: 30px;
            transition: 0.5s;
            box-shadow: 0 20px 50px rgba(0,0,0,1);
        }

        .vault-item:hover {
            transform: translateY(-15px);
            border-color: var(--main-gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
        }

        .vault-item img {
            width: 100%; height: 400px; object-fit: cover;
            filter: grayscale(20%) brightness(80%);
            border-bottom: 1px solid #222;
            margin-bottom: 25px;
        }

        .price {
            font-size: 1.5rem; color: var(--main-gold);
            margin: 20px 0 30px; font-weight: bold;
            text-align: center;
        }

        .btn-buy {
            display: block; text-decoration: none; padding: 18px;
            background: linear-gradient(135deg, #660000, #330000);
            color: #fff; text-align: center; font-weight: bold;
            letter-spacing: 3px; border: 1px solid #440000;
            transition: 0.4s;
        }

        .btn-buy:hover {
            background: #8b0000;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.5);
            transform: scale(1.02);
        }

        footer {
            padding: 100px; color: #150000; font-size: 0.8rem;
            letter-spacing: 6px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>
    <h1>DASSY BLOCK VAULT</h1>
    <p>THE GATE TO FORBIDDEN SECRETS</p>
</header>

<div class="shelf">
    <div class="vault-item">
        <img src="dream-woman/page1.jpg" alt="Dream Woman">
        <div class="price">5,490 MMK</div>
        <a href="https://wa.me/95948432100" class="btn-buy">UNLOCK ACCESS</a>
    </div>

    <div class="vault-item">
        <img src="https://via.placeholder.com/350x500/000/200?text=DARK+ROMANCE" alt="English Story">
        <div class="price">5,490 MMK</div>
        <a href="https://wa.me/95948432100" class="btn-buy">UNLOCK ACCESS</a>
    </div>

    <div class="vault-item">
        <img src="https://via.placeholder.com/350x500/000/111?text=KIDS+STORY" alt="Kids Story">
        <div class="price">5,490 MMK</div>
        <a href="https://wa.me/95948432100" class="btn-buy">UNLOCK ACCESS</a>
    </div>
</div>

<footer>OFFICIAL DIGITAL VAULT</footer>

</body>
</html>
