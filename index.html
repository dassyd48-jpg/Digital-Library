<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASSY BLOCK VAULT | FORBIDDEN KNOWLEDGE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #050505;
            --antique-gold: #8b7355;
            --deep-crimson: #660000;
            --text-gray: #a0a0a0;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--obsidian);
            color: var(--text-gray);
            font-family: 'Special Elite', cursive;
            display: flex; flex-direction: column; align-items: center;
        }

        header {
            text-align: center; padding: 80px 20px;
            border-bottom: 1px solid rgba(139, 115, 85, 0.2);
            width: 100%;
            background: linear-gradient(to bottom, #110000, var(--obsidian));
        }

        header h1 {
            font-family: 'Cinzel Decorative', serif;
            color: var(--antique-gold);
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin: 0;
            letter-spacing: 8px;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.8), 0 0 20px rgba(139, 115, 85, 0.3);
        }

        header p {
            color: var(--deep-crimson);
            font-size: 1rem;
            margin-top: 15px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .shelf {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px; width: 90%; max-width: 1200px; padding: 60px 0;
        }

        .vault-item {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            padding: 30px;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,1);
        }

        .vault-item:hover {
            transform: translateY(-15px);
            border-color: var(--antique-gold);
            box-shadow: 0 0 30px rgba(139, 115, 85, 0.1);

</body>
</html>
