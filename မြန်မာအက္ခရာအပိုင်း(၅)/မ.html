<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dassy's Alphabet Quest - Mystic Pegasus Islands</title>
    <!-- Tailwind CSS for sleek UI overlay -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght=400;700;900&family=Pyidaungsu:wght=400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1e1b4b; /* Deep Indigo Sky */
            font-family: 'Fredoka One', 'Pyidaungsu', 'Montserrat', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .burmese-font {
            font-family: 'Pyidaungsu', 'Myanmar3', 'Yunghkio', sans-serif;
        }

        /* Responsive UI Scaling */
        #hud {
            top: clamp(1rem, 2vh, 1.5rem);
            left: clamp(7rem, 15vw, 9rem); 
            right: clamp(1rem, 2vw, 1.5rem);
            max-width: clamp(280px, 45vw, 450px);
        }

        #hp-panel {
            top: clamp(1rem, 2vh, 1.5rem);
            right: clamp(1rem, 2vw, 1.5rem);
        }

        .adaptive-panel {
            width: clamp(280px, 90vw, 420px);
            padding: clamp(1.5rem, 4vw, 2.5rem);
            border-radius: clamp(1.5rem, 5vw, 3rem);
        }

        @media (max-width: 768px) {
            #hud {
                left: 6.5rem;
                top: 0.75rem;
            }
            #hp-panel {
                top: auto;
                bottom: 1rem;
                right: 1rem;
            }
            .adaptive-panel {
                transform: scale(0.9);
            }
        }
    </style>
</head>
<body class="relative">

    <!-- TOP NAVIGATION BUTTONS (HOME & RESET) -->
    <div class="absolute top-4 left-4 z-50 flex gap-2 pointer-events-auto">
      <button onclick="location.href='index.html?fromGame=true'" class="w-10 h-10 bg-indigo-950 text-white rounded-xl shadow-md border-2 border-purple-500 flex items-center justify-center cursor-pointer transform active:scale-95 transition-transform text-xl animate-pulse" title="ပင်မစာမျက်နှာ">
        🏠
      </button>
      <button id="btnTopReset" class="w-10 h-10 bg-indigo-950 text-white rounded-xl shadow-md border-2 border-purple-500 flex items-center justify-center cursor-pointer transform active:scale-95 transition-transform text-xl" title="ပြန်စမည်">
        🔄
      </button>
    </div>

    <!-- HUD / Learning Progress & Score Top Overlay -->
    <div id="hud" class="absolute pointer-events-none z-30 flex flex-col space-y-2">
        <!-- Learning Progress Bar -->
        <div class="flex items-center space-x-3 bg-indigo-950/90 backdrop-blur-md p-3 rounded-2xl border border-purple-500/20 shadow-lg">
            <span class="text-[10px] sm:text-xs font-black text-purple-400 tracking-wider uppercase burmese-font">တိုးတက်မှု</span>
            <div class="flex-1 bg-black/40 h-3 sm:h-4 rounded-full overflow-hidden p-0.5 border border-white/5">
                <div id="xp-bar" class="bg-gradient-to-r from-purple-400 via-pink-400 to-fuchsia-400 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <span id="level-display" class="bg-indigo-600 text-white text-[9px] sm:text-[10px] font-black px-2 sm:px-3 py-1 rounded-full uppercase tracking-widest burmese-font">အဆင့် ၁</span>
        </div>
        
        <!-- Score Counter & Active Target Letter Display -->
        <div class="flex items-center space-x-3">
            <div class="flex items-center space-x-2 bg-indigo-950/90 backdrop-blur-md px-3 py-1.5 sm:px-4 sm:py-2 rounded-2xl border border-purple-500/20 shadow-lg">
                <span class="text-lg sm:text-xl">⭐</span>
                <span id="cash-display" class="text-white font-black tracking-widest text-xs sm:text-sm">0</span>
            </div>
            <!-- Dynamic Educational Goal Frame -->
            <div class="flex items-center space-x-2 bg-gradient-to-r from-indigo-500/20 to-purple-500/20 backdrop-blur-md px-3 py-1.5 sm:px-4 sm:py-2 rounded-2xl border border-purple-500/40 shadow-lg animate-pulse">
                <span class="text-[9px] sm:text-xs font-black text-purple-400 uppercase tracking-wider burmese-font">ပစ်မှတ်:</span>
                <span id="target-letter-display" class="burmese-font text-xl sm:text-2xl font-bold text-purple-300">မ</span>
            </div>
        </div>
    </div>

    <!-- Health Indicator -->
    <div id="hp-panel" class="absolute z-30 pointer-events-none flex items-center space-x-2 bg-indigo-950/90 backdrop-blur-md px-4 py-2 rounded-2xl border border-purple-500/20 shadow-lg">
        <span class="text-base sm:text-lg">💖</span>
        <span id="hp-display" class="text-purple-400 font-black tracking-wider text-xs sm:text-sm">100 / 100</span>
    </div>

    <!-- Upgrade / Level Up Modal -->
    <div id="upgrade-modal" class="hidden absolute inset-0 bg-black/85 backdrop-blur-md z-[100] flex items-center justify-center p-6 transition-all duration-300">
        <div class="bg-[#1e1b4b] border-2 border-purple-500/20 adaptive-panel text-center shadow-[0_0_100px_rgba(168,85,247,0.15)] scale-95 transition-transform">
            <div class="relative mb-6">
                <div class="text-3xl sm:text-4xl">🦄✨🌤️</div>
            </div>
            <h2 class="text-2xl sm:text-3xl font-black text-purple-400 tracking-wider mb-2 uppercase burmese-font">မြင်းပျံကြီး အစွမ်းမြှင့်ရန်!</h2>
            <p class="text-purple-200 text-[10px] sm:text-xs tracking-widest mb-6 uppercase burmese-font">ပိုမိုသန်မာလာစေရန် စကြဝဠာအစွမ်းတစ်ခုရွေးချယ်ပါ</p>
            
            <div id="upgrade-options" class="space-y-3 sm:space-y-4">
                <!-- Filled dynamically via javascript -->
            </div>
        </div>
    </div>

    <!-- Main Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- Start / GameOver Screens -->
    <div id="overlay-screen" class="absolute inset-0 bg-indigo-950/95 backdrop-blur-md z-[90] flex flex-col items-center justify-center text-center p-6">
        <h1 class="text-4xl sm:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-pink-400 to-fuchsia-300 tracking-widest mb-2 uppercase drop-shadow-[0_0_30px_rgba(168,85,247,0.3)] burmese-font">မှော်ဝင်မြင်းပျံကျွန်းစု</h1>
        <p class="text-purple-400 text-[9px] sm:text-[10px] uppercase font-black tracking-[0.3em] mb-12 burmese-font">"မ"အက္ခရာ စွန့်စားခန်းဂိမ်း</p>
        
        <div id="game-stats" class="hidden bg-white/5 border border-white/5 rounded-3xl p-5 mb-8 max-w-xs w-full text-left space-y-3 font-sans">
            <div class="flex justify-between"><span class="text-indigo-200 burmese-font">မှန်ကန်စွာ ပစ်ခတ်နိုင်မှု</span><span id="stat-coins" class="text-white font-bold">0</span></div>
            <div class="flex justify-between"><span class="text-indigo-200 burmese-font">မှားယွင်းမှု ရှောင်ရှားနိုင်မှု</span><span id="stat-kills" class="text-white font-bold">0</span></div>
            <div class="flex justify-between"><span class="text-indigo-200 burmese-font">ကောင်းကင်သို့ ပျံသန်းမှုအဆင့်</span><span id="stat-level" class="text-purple-400 font-bold">အဆင့် ၁</span></div>
        </div>

        <button id="start-btn" class="px-12 py-5 sm:px-16 sm:py-6 bg-purple-600 hover:bg-purple-500 text-white font-black text-xs sm:text-sm uppercase tracking-[0.2em] rounded-full transition-all shadow-[0_20px_50px_rgba(168,85,247,0.3)] border-b-4 border-purple-800 active:scale-95 pointer-events-auto burmese-font">စတင်ပျံသန်းမည်</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'shoot') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500, now);
                osc.frequency.exponentialRampToValueAtTime(250, now + 0.12);
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
                osc.start(now);
                osc.stop(now + 0.12);
            } else if (type === 'hit') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.08);
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.start(now);
                osc.stop(now + 0.08);
            } else if (type === 'coin') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(650, now);
                osc.frequency.setValueAtTime(1150, now + 0.04);
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'fail') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(140, now);
                osc.frequency.linearRampToValueAtTime(70, now + 0.25);
                gainNode.gain.setValueAtTime(0.08, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            } else if (type === 'levelup') {
                const freqs = [400, 500, 650, 850, 1100];
                freqs.forEach((f, i) => {
                    const oscSeq = audioCtx.createOscillator();
                    const gainSeq = audioCtx.createGain();
                    oscSeq.connect(gainSeq);
                    gainSeq.connect(audioCtx.destination);
                    oscSeq.type = 'sine';
                    oscSeq.frequency.setValueAtTime(f, now + i * 0.04);
                    gainSeq.gain.setValueAtTime(0.04, now + i * 0.04);
                    gainSeq.gain.exponentialRampToValueAtTime(0.01, now + i * 0.04 + 0.1);
                    oscSeq.start(now + i * 0.04);
                    oscSeq.stop(now + i * 0.04 + 0.1);
                });
            }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const burmeseAlphabets = [
            'က', 'ခ', 'ဂ', 'ဃ', 'င', 'စ', 'ဆ', 'ဇ', 'ဈ', 'ည',
            'တ', 'ဌ', 'ထ', 'ဒ', 'ဓ', 'န', 'ပ', 'ဖ', 'ဗ', 'ဘ', 'မ',
            'ယ', 'ရ', 'လ', 'ဝ', 'သ', 'ဟ', 'ဠ', 'အ', 'ဏ', 'ဎ'
        ];

        const game = {
            running: false,
            paused: false,
            score: 0,
            correctPops: 0,
            incorrectPops: 0,
            targetLetter: 'မ',
            camera: { x: 0, y: 0 }
        };

        const player = {
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            angle: 0,
            radius: 22, 
            hp: 100,
            maxHp: 100,
            xp: 0,
            maxXp: 100,
            level: 1,
            speed: 5.2, // Pegasus flies swift and light
            baseSpeed: 5.2,
            range: 290,         
            damage: 50,
            shootCooldown: 0.20, 
            lastShotTime: 0
        };

        const keys = {};
        const entities = {
            projectiles: [],
            letterBubbles: [], 
            collectibles: [],  
            scenery: []        
        };

        function initScenery() {
            entities.scenery = [];
            const mapRadius = 1600;

            // 1. Twinkling Sky Stars (ကောင်းကင်ကြယ်လေးများ)
            for (let i = 0; i < 45; i++) {
                entities.scenery.push({
                    type: 'star',
                    x: (Math.random() - 0.5) * mapRadius * 2,
                    y: (Math.random() - 0.5) * mapRadius * 2,
                    radius: 1 + Math.random() * 2,
                    pulseSpeed: 0.02 + Math.random() * 0.05,
                    pulseOffset: Math.random() * Math.PI
                });
            }

            // 2. Floating Ancient Islands (ကျွန်းပျံလေးများ)
            for (let i = 0; i < 18; i++) {
                entities.scenery.push({
                    type: 'island',
                    x: (Math.random() - 0.5) * mapRadius * 2,
                    y: (Math.random() - 0.5) * mapRadius * 2,
                    width: 70 + Math.random() * 60,
                    height: 35 + Math.random() * 25
                });
            }
        }

        // Keep target letter strictly as "မ"
        function changeTargetLetter() {
            game.targetLetter = 'မ';
            document.getElementById('target-letter-display').innerText = game.targetLetter;
        }

        function drawStar(ctx, star) {
            ctx.save();
            const glow = star.radius * (1 + Math.sin(Date.now() * star.pulseSpeed + star.pulseOffset) * 0.4);
            ctx.fillStyle = Math.random() > 0.3 ? '#fef08a' : '#ffffff';
            ctx.beginPath();
            ctx.arc(star.x, star.y, glow, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawIsland(ctx, x, y, w, h) {
            ctx.save();
            ctx.translate(x, y);
            
            // Base rock structure
            ctx.fillStyle = '#4b5563';
            ctx.beginPath();
            ctx.moveTo(-w/2, 0);
            ctx.lineTo(0, h);
            ctx.lineTo(w/2, 0);
            ctx.closePath();
            ctx.fill();

            // Grassy green top
            ctx.fillStyle = '#a3e635';
            ctx.beginPath();
            ctx.ellipse(0, 0, w/2, h/3, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawPlayer(ctx, x, y) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(player.angle);

            // Shadow on ground/clouds below
            ctx.fillStyle = 'rgba(15, 23, 42, 0.2)';
            ctx.beginPath();
            ctx.ellipse(0, 12, 16, 22, 0, 0, Math.PI * 2);
            ctx.fill();

            // Magic Pegasus Wings (မြင်းပျံအတောင်ပံများ)
            const wingOsc = Math.sin(Date.now() * 0.015) * 12;
            ctx.fillStyle = '#f0fdfa';
            ctx.strokeStyle = '#c084fc';
            ctx.lineWidth = 1.5;

            // Left Wing
            ctx.save();
            ctx.translate(-14, -2);
            ctx.rotate(-Math.PI / 4 + wingOsc * Math.PI / 180);
            ctx.beginPath();
            ctx.ellipse(0, 0, 6, 20, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.restore();

            // Right Wing
            ctx.save();
            ctx.translate(14, -2);
            ctx.rotate(Math.PI / 4 - wingOsc * Math.PI / 180);
            ctx.beginPath();
            ctx.ellipse(0, 0, 6, 20, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.restore();

            // Main Pegasus Elegant Body (မြင်းပျံကိုယ်ထည်)
            ctx.fillStyle = '#ffffff'; 
            ctx.beginPath();
            ctx.ellipse(0, 0, 13, 22, 0, 0, Math.PI * 2);
            ctx.fill();

            // Mane / Hair (မြင်းလည်ဆံမွှေး ပန်းရောင်စုတ်ဖွားလေး)
            ctx.fillStyle = '#f472b6';
            ctx.beginPath();
            ctx.ellipse(0, -18, 5, 8, 0, 0, Math.PI * 2);
            ctx.fill();

            // Head (မြင်းခေါင်းပုံသဏ္ဍာန်)
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.ellipse(0, -16, 9, 12, 0, 0, Math.PI * 2);
            ctx.fill();

            // Golden Magic Horn (ရွှေရောင်ဦးချိုလေး)
            ctx.fillStyle = '#fbbf24';
            ctx.beginPath();
            ctx.moveTo(0, -28);
            ctx.lineTo(-3, -20);
            ctx.lineTo(3, -20);
            ctx.closePath();
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#c084fc'; // Purple Magical Eyes
            ctx.beginPath();
            ctx.arc(-4, -18, 2, 0, Math.PI * 2);
            ctx.arc(4, -18, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // Sonar magic radar ring
            ctx.strokeStyle = 'rgba(192, 132, 252, 0.2)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.arc(x, y, player.range, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]); 
        }

        function drawThunderCloud(ctx, cloud) {
            const { x, y, letter, scale } = cloud;
            const isTarget = letter === game.targetLetter;

            ctx.save();
            ctx.translate(x, y);

            const floating = Math.sin(Date.now() * 0.005 + cloud.angleOffset) * 5;
            ctx.translate(0, floating);

            let coreColor = isTarget ? '#a855f7' : '#475569'; // Purple vs Grey Slate
            let glowColor = isTarget ? 'rgba(168, 85, 247, 0.35)' : 'rgba(71, 85, 105, 0.2)';

            // Ambient Glow Rim
            ctx.fillStyle = glowColor;
            ctx.beginPath();
            ctx.arc(0, 0, 30 * scale, 0, Math.PI * 2);
            ctx.fill();

            // Fluffy Cloud Geometry Shapes (Arcs union)
            ctx.fillStyle = coreColor;
            ctx.beginPath();
            ctx.arc(0, 0, 16 * scale, 0, Math.PI * 2);
            ctx.arc(-14 * scale, 2 * scale, 12 * scale, 0, Math.PI * 2);
            ctx.arc(14 * scale, 2 * scale, 12 * scale, 0, Math.PI * 2);
            ctx.arc(-6 * scale, -10 * scale, 13 * scale, 0, Math.PI * 2);
            ctx.arc(6 * scale, -10 * scale, 13 * scale, 0, Math.PI * 2);
            ctx.closePath();
            ctx.fill();

            // Inner Core Plate for Text readability
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(0, 0, 13 * scale, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // Burmese Font Text Configuration
            ctx.save();
            ctx.translate(x, y + floating);
            ctx.fillStyle = isTarget ? '#581c87' : '#1e293b';
            ctx.font = `bold ${21 * scale}px Pyidaungsu, "Myanmar3", "Yunghkio", sans-serif`;
            ctx.textBaseline = 'middle';
            ctx.textAlign = 'center';
            ctx.fillText(letter, 0, 0);
            ctx.restore();
        }

        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        canvas.addEventListener('mousedown', (e) => {
            if (!game.running || game.paused) return;
            fireManualProjectile(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            if (!game.running || game.paused) return;
            const touch = e.touches[0];
            fireManualProjectile(touch.clientX, touch.clientY);
        }, { passive: true });

        function fireManualProjectile(screenX, screenY) {
            const now = Date.now() / 1000;
            if (now - player.lastShotTime < player.shootCooldown) return;

            const worldX = screenX + game.camera.x;
            const worldY = screenY + game.camera.y;

            const dx = worldX - player.x;
            const dy = worldY - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist === 0) return;

            playSound('shoot');
            entities.projectiles.push({
                x: player.x,
                y: player.y,
                vx: (dx / dist) * 15, // Light star beams are fast
                vy: (dy / dist) * 15,
                radius: 6
            });

            player.lastShotTime = now;
        }

        function spawnLetterBubble() {
            if (!game.running || game.paused) return;

            const angle = Math.random() * Math.PI * 2;
            const dist = 360 + Math.random() * 200;
            const x = player.x + Math.cos(angle) * dist;
            const y = player.y + Math.sin(angle) * dist;

            const isTargetSpawn = Math.random() < 0.45;
            let chosenLetter = game.targetLetter; 
            if (!isTargetSpawn) {
                const filtered = burmeseAlphabets.filter(char => char !== game.targetLetter);
                chosenLetter = filtered[Math.floor(Math.random() * filtered.length)];
            }

            entities.letterBubbles.push({
                x,
                y,
                letter: chosenLetter,
                scale: 1.0 + Math.random() * 0.25,
                speed: 0.5 + Math.random() * 0.4, 
                angleOffset: Math.random() * Math.PI * 2,
                hp: 1,
                spawnTime: Date.now() 
            });
        }

        setInterval(spawnLetterBubble, 880);

        const UPGRADE_POOL = [
            { id: 'dmg', name: "စူပါနိုဗာ ရောင်ခြည်တန်း", desc: '+၂၅% ကြယ်တာရာ လေဆာ ထိခိုက်မှုအား ပိုမိုပြင်းထန်လာခြင်း', stat: 'damage', factor: 1.25 },
            { id: 'rng', name: 'ကောင်းကင်မျက်လုံး ရေဒါ', desc: '+၁၅% မြင်းပျံကြီး၏ သတင်းအာရုံခံ နယ်ပယ် ကျယ်ပြန့်လာခြင်း', stat: 'range', factor: 1.15 },
            { id: 'spd', name: 'မုန်တိုင်းတောင်ပံ စွမ်းအား', desc: '+၁၅% ဝေဟင်ပျံသန်းမှု အရှိန်နှုန်း ပိုမိုမြန်ဆန်လာခြင်း', stat: 'baseSpeed', factor: 1.15 },
            { id: 'rate', name: 'ကြယ်တာရာ အလျင်အမြန်ပစ်ခတ်ခြင်း', desc: '-၁၅% ဂျိုမှ မှော်အလင်းတန်း ထုတ်လွှတ်မှု အေးခဲချိန် လျော့ကျခြင်း', stat: 'shootCooldown', factor: 0.85 }
        ];

        function triggerLevelUp() {
            playSound('levelup');
            player.level++;
            player.xp = 0;
            player.maxXp = Math.round(player.maxXp * 1.5);
            
            const optionsContainer = document.getElementById('upgrade-options');
            optionsContainer.innerHTML = '';
            
            const shuffled = [...UPGRADE_POOL].sort(() => 0.5 - Math.random()).slice(0, 3);
            shuffled.forEach(upg => {
                const btn = document.createElement('button');
                btn.className = "w-full p-4 sm:p-5 bg-[#3b0764]/40 border border-purple-500/20 hover:border-purple-400 rounded-2xl flex items-center justify-between text-left transition-all active:scale-95 pointer-events-auto";
                btn.innerHTML = `
                    <div class="burmese-font">
                        <h4 class="text-white font-black text-xs sm:text-sm tracking-wide uppercase">${upg.name}</h4>
                        <p class="text-purple-200 text-[9px] sm:text-[10px] mt-1 uppercase tracking-wider">${upg.desc}</p>
                    </div>
                    <span class="text-lg">🦄</span>
                `;
                btn.onclick = () => applyUpgrade(upg);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('upgrade-modal').classList.remove('hidden');
            game.paused = true;
        }

        function applyUpgrade(upg) {
            player[upg.stat] *= upg.factor;
            if (upg.stat === 'baseSpeed') player.speed = player.baseSpeed;
            document.getElementById('upgrade-modal').classList.add('hidden');
            game.paused = false;
        }

        let lastTime = performance.now();

        function updateGame(dt) {
            if (!game.running || game.paused) return;

            let moveX = 0;
            let moveY = 0;

            if (keys['w'] || keys['arrowup']) moveY = -1;
            if (keys['s'] || keys['arrowdown']) moveY = 1;
            if (keys['a'] || keys['arrowleft']) moveX = -1;
            if (keys['d'] || keys['arrowright']) moveX = 1;

            if (moveX !== 0 && moveY !== 0) {
                moveX *= 0.7071;
                moveY *= 0.7071;
            }

            player.x += moveX * player.speed * dt;
            player.y += moveY * player.speed * dt;

            if (moveX !== 0 || moveY !== 0) {
                player.angle = Math.atan2(moveY, moveX) + Math.PI/2;
            }

            const mapLimit = 1500;
            player.x = Math.max(-mapLimit, Math.min(mapLimit, player.x));
            player.y = Math.max(-mapLimit, Math.min(mapLimit, player.y));

            game.camera.x += (player.x - window.innerWidth / 2 - game.camera.x) * 0.1 * dt;
            game.camera.y += (player.y - window.innerHeight / 2 - game.camera.y) * 0.1 * dt;

            for (let i = entities.projectiles.length - 1; i >= 0; i--) {
                const proj = entities.projectiles[i];
                proj.x += proj.vx * dt;
                proj.y += proj.vy * dt;

                const flightDistance = Math.sqrt((proj.x - player.x) ** 2 + (proj.y - player.y) ** 2);
                if (flightDistance > player.range + 200) {
                    entities.projectiles.splice(i, 1);
                    continue;
                }

                let projectileHit = false;

                for (let j = entities.letterBubbles.length - 1; j >= 0; j--) {
                    const bubble = entities.letterBubbles[j];
                    const dx = bubble.x - proj.x;
                    const dy = bubble.y - proj.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < (22 * bubble.scale) + proj.radius) {
                        projectileHit = true;
                        
                        if (bubble.letter === game.targetLetter) {
                            playSound('hit');
                            entities.letterBubbles.splice(j, 1);
                            
                            game.correctPops++;
                            game.score += 15;
                            player.xp += 25; 
                            if (player.xp >= player.maxXp) triggerLevelUp();

                            entities.collectibles.push({
                                x: bubble.x,
                                y: bubble.y,
                                value: 25
                            });

                            changeTargetLetter(); 
                        } else {
                            playSound('fail');
                            game.incorrectPops++;
                            entities.letterBubbles.splice(j, 1);
                        }
                        break; 
                    }
                }

                if (projectileHit) {
                    entities.projectiles.splice(i, 1);
                }
            }

            for (let idx = entities.letterBubbles.length - 1; idx >= 0; idx--) {
                const bubble = entities.letterBubbles[idx];

                if (bubble.letter !== game.targetLetter && (Date.now() - bubble.spawnTime > 5000)) {
                    entities.letterBubbles.splice(idx, 1);
                    continue;
                }

                const driftTime = Date.now() * 0.001 + bubble.angleOffset;
                bubble.x += Math.sin(driftTime) * 0.8 * dt;
                bubble.y += Math.cos(driftTime * 0.3) * 0.5 * dt;

                const dx = player.x - bubble.x;
                const dy = player.y - bubble.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < player.radius + 18) {
                    if (bubble.letter === game.targetLetter) {
                        playSound('coin');
                        game.correctPops++;
                        game.score += 25;
                        player.xp += 30;
                        if (player.xp >= player.maxXp) triggerLevelUp();
                        entities.letterBubbles.splice(idx, 1);
                        changeTargetLetter();
                    } else {
                        playSound('fail');
                        entities.letterBubbles.splice(idx, 1);
                        player.hp = Math.max(0, player.hp - 15);
                    }
                }

                if (Math.abs(bubble.y - player.y) > 600 || Math.abs(bubble.x - player.x) > 800) {
                    entities.letterBubbles.splice(idx, 1);
                }
            }

            for (let i = entities.collectibles.length - 1; i >= 0; i--) {
                const item = entities.collectibles[i];
                const dx = player.x - item.x;
                const dy = player.y - item.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < player.range) {
                    item.x += (dx / dist) * 7.5 * dt;
                    item.y += (dy / dist) * 7.5 * dt;
                }

                if (dist < player.radius + 10) {
                    playSound('coin');
                    player.xp += item.value;
                    if (player.xp >= player.maxXp) triggerLevelUp();
                    entities.collectibles.splice(i, 1);
                }
            }

            document.getElementById('xp-bar').style.width = `${(player.xp / player.maxXp) * 100}%`;
            document.getElementById('level-display').innerText = `အဆင့် ${player.level}`;
            document.getElementById('cash-display').innerText = game.score;
            document.getElementById('hp-display').innerText = `${Math.max(0, Math.round(player.hp))} / ${player.maxHp}`;
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-game.camera.x, -game.camera.y);

            // Sky Backdrop Map boundary limits
            ctx.fillStyle = '#13113c'; 
            ctx.fillRect(player.x - 2000, player.y - 2000, 4000, 4000);

            // Render Sky Stars
            entities.scenery.forEach(item => {
                if (item.type === 'star') drawStar(ctx, item);
            });

            // Render Floating Islands
            entities.scenery.forEach(item => {
                if (item.type === 'island') drawIsland(ctx, item.x, item.y, item.width, item.height);
            });

            // Render Stardust Crystals (Collectibles)
            entities.collectibles.forEach(item => {
                ctx.fillStyle = '#f472b6'; 
                ctx.beginPath();
                ctx.arc(item.x, item.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });

            // Render Star Laser Beams (Projectiles)
            entities.projectiles.forEach(proj => {
                ctx.save();
                ctx.fillStyle = '#fae8ff';
                ctx.shadowColor = '#e9d5ff';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(proj.x, proj.y, proj.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });

            // Render Floating Thunder Clouds containing Letters
            entities.letterBubbles.forEach(bubble => drawThunderCloud(ctx, bubble));

            // Render Player (Elegant Pegasus)
            drawPlayer(ctx, player.x, player.y);

            ctx.restore();
        }

        function gameLoop(now) {
            let dt = (now - lastTime) / 16.666;
            lastTime = now;
            if (dt > 4) dt = 4; 

            updateGame(dt);
            render();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            player.hp = player.maxHp;
            player.xp = 0;
            player.level = 1;
            player.x = 0;
            player.y = 0;
            player.angle = 0;
            game.score = 0;
            game.correctPops = 0;
            game.incorrectPops = 0;
            entities.letterBubbles = [];
            entities.projectiles = [];
            entities.collectibles = [];
            
            initScenery();
            changeTargetLetter();
            
            document.getElementById('overlay-screen').classList.add('hidden');
            game.running = true;
        }

        function gameOver() {
            game.running = false;
            document.getElementById('stat-coins').innerText = game.correctPops;
            document.getElementById('stat-kills').innerText = game.incorrectPops;
            document.getElementById('stat-level').innerText = `အဆင့် ${player.level}`;
            document.getElementById('game-stats').classList.remove('hidden');
            document.getElementById('start-btn').innerText = "ပြန်လည်ပျံသန်းမည်";
            document.getElementById('overlay-screen').classList.remove('hidden');
        }

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('btnTopReset').onclick = startGame;

        window.onload = function() {
            requestAnimationFrame(gameLoop);
        };
    </script>
</body>
</html>
