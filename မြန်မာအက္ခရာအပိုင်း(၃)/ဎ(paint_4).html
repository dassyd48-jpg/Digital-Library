<!DOCTYPE html>
<html lang="my">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Burmese Letter ဎ Mastery - 3 Levels Challenge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght=500;600;700&family=Noto+Sans+Myanmar:wght=600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    
    body {
      font-family: 'Fredoka', 'Noto Sans Myanmar', system-ui, sans-serif; min-height: 100vh;
      position: relative;
      background-color: #bae6fd;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    /* ==========================================================================
        BIG TREE & LANDSCAPE BACKGROUND COMPONENT
       ========================================================================== */
    .nature-bg {
      position: absolute; inset: 0; pointer-events: none;
      background: linear-gradient(180deg, #bae6fd 0%, #fed7aa 50%, #ffedd5 100%); z-index: 1;
    }
    .nature-bg::before {
      content: ''; position: absolute; left: 0; right: 0; bottom: 0; height: 26vh;
      background: linear-gradient(180deg, #4ade80 0%, #16a34a 100%); border-top: 6px solid #15803d; z-index: 2;
    }
    .nature-bg::after {
      content: ''; position: absolute; left: -10%; right: -10%; bottom: -4vh; height: 22vh;
      background: linear-gradient(180deg, #22c55e 0%, #14532d 100%); border-radius: 50% 50% 0 0; z-index: 3;
    }

    .big-tree-trunk {
      position: absolute; right: 12%; bottom: 15vh; width: 130px; height: 55vh;
      background: linear-gradient(90deg, #78350f 0%, #92400e 40%, #b45309 70%, #78350f 100%);
      border-radius: 12px 12px 0 0; z-index: 4; box-shadow: inset -10px 0 20px rgba(0,0,0,0.3);
    }
    .big-tree-foliage {
      position: absolute; right: -5%; bottom: 55vh; width: 440px; height: 440px;
      background: radial-gradient(circle at 40% 40%, #22c55e 0%, #16a34a 50%, #14532d 100%);
      border-radius: 50%; z-index: 5; filter: drop-shadow(0 15px 25px rgba(20,83,45,0.4));
    }
    .big-tree-foliage::before {
      content: ''; position: absolute; bottom: -30px; left: -40px; width: 220px; height: 220px;
      background: radial-gradient(circle at 40% 40%, #4ade80 0%, #15803d 100%); border-radius: 50%;
    }

    /* ==========================================================================
        TOP HEADER TOOLBAR COMPONENT
       ========================================================================== */
    .top-bar {
      position: absolute; top: 20px; left: 20px; right: 20px;
      display: flex; justify-content: space-between; align-items: center; z-index: 500;
    }
    .circle-btn {
      width: 54px; height: 54px; background: #ffffff; border: 3.5px solid #16a34a;
      border-radius: 50%; font-size: 1.5rem; display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: 0 6px 0 #14532d, 0 10px 15px rgba(0,0,0,0.15); transition: transform 0.1s;
    }
    .circle-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #14532d; }
    
    .badge-box {
      background: #ffffff; border: 3.5px solid #16a34a; padding: 6px 18px; border-radius: 20px;
      display: flex; align-items: center; gap: 8px; box-shadow: 0 6px 0 #14532d;
    }
    .badge-label { font-size: 0.9rem; font-weight: 700; color: #16a34a; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-value { font-size: 1.2rem; font-weight: 800; color: #14532d; }

    /* ==========================================================================
        INTRO WELCOME DIALOG OVERLAY SCREEN
       ========================================================================== */
    .intro-overlay {
      position: fixed; inset: 0; background: rgba(15, 23, 42, 0.45); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center; z-index: 800; opacity: 1; transition: opacity 0.4s ease;
    }
    .intro-box {
      background: #ffffff; border: 6px solid #16a34a; padding: 40px; border-radius: 36px;
      text-align: center; max-width: 500px; width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.2), 0 12px 0 #14532d;
      transform: scale(1); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .intro-glyph {
      font-size: 6rem; font-weight: 800; color: #15803d; line-height: 1.1; margin-bottom: 10px;
      filter: drop-shadow(0 4px 0 #bbf7d0);
    }
    .intro-title { font-size: 2.2rem; font-weight: 800; color: #14532d; margin-bottom: 15px; }
    .intro-text { font-size: 1.1rem; color: #334155; font-weight: 600; line-height: 1.6; margin-bottom: 30px; }

    /* ==========================================================================
        INTERACTIVE LESSON DISPLAY WRAPPER
       ========================================================================== */
    .stage-wrapper {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 10;
    }
    
    #paintCanvas {
      background: #ffffff; border: 6px solid #16a34a; border-radius: 36px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15); cursor: crosshair; touch-action: none;
    }

    /* ==========================================================================
        BOTTOM PANEL TOOLBARBAR COMPONENT
       ========================================================================== */
    .bottom-bar {
      position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 20px; z-index: 50; width: auto;
    }
    .palette-card {
      background: #ffffff; border: 3.5px solid #16a34a; padding: 10px 22px;
      border-radius: 32px; display: flex; gap: 14px; box-shadow: 0 8px 0 #14532d;
    }
    .color-swatch {
      width: 44px; height: 44px; border-radius: 50%; border: 3px solid #e2e8f0;
      cursor: pointer; transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .color-swatch.active { transform: scale(1.25) translateY(-5px); border-color: #16a34a; box-shadow: 0 6px 10px rgba(0,0,0,0.15); }
    
    .action-pill {
      background: #ffffff; border: 3.5px solid #16a34a; padding: 10px 26px; border-radius: 22px;
      font-size: 1rem; font-weight: 700; color: #16a34a; cursor: pointer; box-shadow: 0 6px 0 #14532d;
      transition: transform 0.1s; display: flex; align-items: center; gap: 6px;
    }
    .action-pill:active { transform: translateY(4px); box-shadow: 0 2px 0 #14532d; }
    
    .big-action-btn {
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
      border: 3.5px solid #ffffff; color: #ffffff; font-size: 1.1rem; font-weight: 800;
      padding: 12px 32px; border-radius: 22px; cursor: pointer; box-shadow: 0 6px 0 #14532d, 0 10px 20px rgba(0,0,0,0.2);
    }
    .big-action-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #14532d; }

    /* ==========================================================================
        🍁 AUTUMN FALLING PUZZLE INTERACTIVE SYSTEM
       ========================================================================== */
    .puzzle-workspace {
      position: absolute; inset: 0; z-index: 100; display: none; overflow: hidden;
    }
    .puzzle-workspace.active { display: block; }

    .leaf-node {
      position: absolute; width: 85px; height: 85px; border-radius: 50% 0 50% 0;
      border: 3px solid #ffffff; font-family: 'Noto Sans Myanmar', sans-serif;
      font-size: 1.8rem; font-weight: 800; color: #ffffff; display: flex; align-items: center;
      justify-content: center; cursor: pointer; box-shadow: inset -4px -4px 12px rgba(0,0,0,0.25), 0 10px 20px rgba(0,0,0,0.15);
      transform-style: preserve-3d; transition: transform 0.1s linear;
    }
    .leaf-node::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      border-radius: 50% 0 50% 0; background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%); pointer-events: none;
    }

    .leaf-hue-1 { background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); }
    .leaf-hue-2 { background: linear-gradient(135deg, #f97316 0%, #c2410c 100%); }
    .leaf-hue-3 { background: linear-gradient(135deg, #facc15 0%, #a16207 100%); }
    .leaf-hue-4 { background: linear-gradient(135deg, #a855f7 0%, #6b21a8 100%); }

    .shake-err { animation: leafShakeTrigger 0.4s ease-in-out; }
    @keyframes leafShakeTrigger {
      0%, 100% { transform: translateX(0) rotate(var(--r, 0deg)); }
      20%, 60% { transform: translateX(-12px) rotate(calc(var(--r, 0deg) - 8deg)); }
      40%, 80% { transform: translateX(12px) rotate(calc(var(--r, 0deg) + 8deg)); }
    }

    /* Overlay Screens definitions */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(4px);
      display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 900;
    }
    .modal-backdrop.active { display: flex; }
    
    .popup-btn {
      background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); color: #ffffff;
      border: 4px solid #ffffff; font-size: 2rem; font-weight: 800; padding: 14px 60px;
      border-radius: 24px; cursor: pointer; box-shadow: 0 10px 0 #92400e, 0 15px 30px rgba(0,0,0,0.3);
      animation: bounceActionPulse 1s infinite alternate;
    }
    @keyframes bounceActionPulse {
      0% { transform: scale(1); }
      100% { transform: scale(1.06); }
    }

    #particleEmitter { position: fixed; inset: 0; pointer-events: none; z-index: 999; }
    .sparkle-dot { position: absolute; font-size: 2rem; animation: explosiveFly 1.2s ease-out forwards; }
    @keyframes explosiveFly {
      0% { transform: translate(0,0) scale(0.5); opacity: 1; }
      100% { transform: translate(var(--mx), var(--my)) scale(1.2) rotate(270deg); opacity: 0; }
    }

    /* ==========================================================================
        📱 MOBILE RESPONSIVE ADJUSTMENTS (FIXED FOR SCREEN OVERFLOW)
       ========================================================================== */
    @media (max-width: 760px) {
      /* ၁။ Background နှင့် သစ်ပင်ကြီးကို ဖုန်းမျက်နှာပြင်နှင့် ကိုက်ညီအောင် ဖြတ်ချခြင်း */
      .nature-bg::before { height: 18vh; }
      .nature-bg::after { height: 22vh; }
      .big-tree-trunk { height: 42vh; bottom: 8vh; width: 80px; right: 4%; }
      .big-tree-foliage { width: 280px; height: 280px; right: -15%; bottom: 35vh; }
      .big-tree-foliage::before { width: 140px; height: 140px; bottom: -15px; left: -20px; }

      /* ၂။ Navigation အိုင်ကွန်များ ချုံ့ခြင်း */
      .top-bar { top: 12px; left: 12px; right: 12px; }
      .circle-btn { width: 44px; height: 44px; font-size: 1.2rem; border-width: 2.5px; box-shadow: 0 4px 0 #14532d; }
      .badge-box { padding: 4px 10px; border-radius: 14px; border-width: 2.5px; box-shadow: 0 3px 0 #14532d; }

      /* ၃။ Intro မိတ်ဆက်ဘုတ်ကို ဖုန်းမျက်နှာပြင်နှင့် ကိုက်ညီအောင် ညှိခြင်း */
      .intro-box { padding: 20px; border-radius: 24px; border-width: 4px; box-shadow: 0 12px 0 #14532d; }
      .intro-glyph { font-size: 4rem; }
      .intro-title { font-size: 1.6rem; margin-bottom: 10px; }
      .intro-text { font-size: 0.95rem; margin-bottom: 20px; }

      /* ၄။ အပိုင်း (၁) ဆေးရောင်ခြယ် Canvas ကို ကျစ်ကျစ်လျစ်လျစ် ဖြစ်စေရန် ချုံ့ခြင်း */
      .stage-wrapper { padding-top: 60px; align-items: flex-start; }
      #paintCanvas { 
        max-width: 260px; 
        max-height: 260px; 
        border-radius: 24px; 
        border-width: 4px; 
        margin-top: 10px;
      }

      /* ၅။ အောက်ခြေ Palette ဘားတန်းကို အပေါ်သို့ ဆွဲတင်ပြီး အလယ်ညှိခြင်း */
      .bottom-bar { bottom: 12px; gap: 10px; width: 92%; justify-content: center; }
      .palette-card { padding: 6px 12px; gap: 8px; border-radius: 24px; border-width: 2.5px; box-shadow: 0 5px 0 #14532d; }
      .color-swatch { width: 34px; height: 34px; border-width: 2px; }
      .color-swatch.active { transform: scale(1.15) translateY(-2px); }
      .action-pill { padding: 6px 16px; border-radius: 14px; border-width: 2.5px; box-shadow: 0 3px 0 #14532d; }

      /* ၆။ အပိုင်း (၂) အရွက်ဖမ်းသည့် နေရာရှိ စာသားဘောင်များ အပေါ်သို့ ဆွဲတင်ခြင်း */
      #puzzleToolbar { bottom: auto; top: 72px; }
      #puzzleToolbar .badge-box { box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
      
      /* ၇။ ဖုန်းမျက်နှာပြင်နှင့် ကိုက်ညီအောင် 'ဎ' သစ်ရွက်များ ချုံ့ခြင်း */
      .leaf-node { width: 62px; height: 62px; font-size: 1.4rem; border-width: 2px; }
    }
  </style>
</head>
<body>

  <div class="intro-overlay" id="welcomeIntroScreen">
    <div class="intro-box">
      <div class="intro-glyph">ဎ</div>
      <h1 class="intro-title">ဗျည်းအက္ခရာ "ဎ"</h1>
      <p class="intro-text">ဉာဏ်ကျယ်လေးတို့ရေ... "ဎ" အက္ခရာလေးကို လှလှပပ ဆေးရောင်ခြယ်ပြီး ရောင်စုံကြွေကျလာမယ့် "ဎ" သစ်ရွက်လေးတွေကို ပျော်ပျော်ပါးပါး ဖမ်းကြရအောင်။</p>
      <button class="big-action-btn" id="startLessonBtn" style="padding: 14px 44px; font-size: 1.3rem;">စတင်မည် 🚀</button>
    </div>
  </div>

  <header class="top-bar" id="gameHeader">
    <button class="circle-btn" id="goBackBtn" title="နောက်သို့ ပြန်သွားရန်">🔙</button>
    <div class="badge-box" id="levelIndicator">
      <span class="badge-label">သင်ခန်းစာ:</span>
      <span class="badge-value">ဎ (ဆေးရောင်ခြယ်)</span>
    </div>
    <button class="circle-btn" id="goHomeBtn" title="ပင်မစာမျက်နှာသို့">🏠</button>
  </header>

  <div class="nature-bg">
    <div class="big-tree-trunk"></div>
    <div class="big-tree-foliage"></div>
  </div>

  <main class="stage-wrapper" id="paintStage">
    <canvas id="paintCanvas" width="500" height="500"></canvas>
    
    <footer class="bottom-bar" id="paintControlPanel">
      <button class="action-pill" id="clearBtn">🧼 ဖျက်မည်</button>
      <div class="palette-card" id="swatchGrid"></div>
      <button class="big-action-btn" id="submitBtn">→ ရှေ့သို့</button>
    </footer>
  </main>

  <div class="puzzle-workspace" id="puzzleWrapper">
    <div class="top-bar" id="puzzleToolbar" style="justify-content: center;">
      <div class="badge-box">
        <span class="badge-label" id="lblLevel">အဆင့်: ၁</span>
        <span class="badge-label">•</span>
        <span class="badge-value" id="lblScore">ဖမ်းမိသောအရွက်: ၀ / ၅</span>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="victoryModal">
    <button class="popup-btn" id="modalActionBtn">ပြီးပါပြီ ✨</button>
  </div>

  <div id="particleEmitter"></div>

  <script>
    // ==========================================================================
    // AUDIO PROCESSING ENGINE CORE COMPONENTS
    // ==========================================================================
    let audioContextInstance = null;

    function activateAudioContext() {
      if (!audioContextInstance) {
        audioContextInstance = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContextInstance.state === 'suspended') {
        audioContextInstance.resume();
      }
    }

    function playSFX(mode) {
      activateAudioContext();
      if (!audioContextInstance) return;
      
      const osc = audioContextInstance.createOscillator();
      const volumeNode = audioContextInstance.createGain();
      osc.connect(volumeNode);
      volumeNode.connect(audioContextInstance.destination);
      
      const timestamp = audioContextInstance.currentTime;
      
      if (mode === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(520, timestamp);
        volumeNode.gain.setValueAtTime(0.12, timestamp);
        volumeNode.gain.exponentialRampToValueAtTime(0.01, timestamp + 0.06);
        osc.start(timestamp); osc.stop(timestamp + 0.06);
      } else if (mode === 'pop') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(280, timestamp);
        osc.frequency.exponentialRampToValueAtTime(620, timestamp + 0.12);
        volumeNode.gain.setValueAtTime(0.18, timestamp);
        volumeNode.gain.exponentialRampToValueAtTime(0.01, timestamp + 0.12);
        osc.start(timestamp); osc.stop(timestamp + 0.12);
      } else if (mode === 'victory') {
        const chordNotes = [523.25, 659.25, 783.99, 1046.50];
        chordNotes.forEach((pitch, step) => {
          const o = audioContextInstance.createOscillator();
          const g = audioContextInstance.createGain();
          o.connect(g); g.connect(audioContextInstance.destination);
          o.type = 'sine'; o.frequency.setValueAtTime(pitch, timestamp + (step * 0.07));
          g.gain.setValueAtTime(0.14, timestamp + (step * 0.07));
          g.gain.exponentialRampToValueAtTime(0.005, timestamp + (step * 0.07) + 0.25);
          o.start(timestamp + (step * 0.07)); o.stop(timestamp + (step * 0.07) + 0.25);
        });
      }
    }

    // INTRO TRIGGER EVENTS
    document.getElementById('startLessonBtn').onclick = () => {
      playSFX('pop');
      const intro = document.getElementById('welcomeIntroScreen');
      intro.style.opacity = '0';
      setTimeout(() => intro.remove(), 400);
    };

    // ==========================================================================
    // DRAWING INTERACTIVE VECTOR ENGINE MANAGEMENT
    // ==========================================================================
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    let selectedColor = '#f59e0b';
    let lineThickness = 25;
    let prevX = 0, prevY = 0;

    const designPalettes = ['#f59e0b', '#ef4444', '#3b82f6', '#22c55e', '#ec4899', '#8b5cf6'];

    function buildPaletteUI() {
      const wrapper = document.getElementById('swatchGrid');
      designPalettes.forEach((colorHex, idx) => {
        const item = document.createElement('div');
        item.className = 'color-swatch' + (idx === 0 ? ' active' : '');
        item.style.backgroundColor = colorHex;
        item.onclick = () => {
          playSFX('click');
          selectedColor = colorHex;
          document.querySelectorAll('.color-swatch').forEach(el => el.classList.remove('active'));
          item.classList.add('active');
        };
        wrapper.appendChild(item);
      });
    }

    function startDrawing(e) {
      activateAudioContext();
      isDrawing = true;
      const boundingBox = canvas.getBoundingClientRect();
      prevX = ((e.clientX || e.touches[0].clientX) - boundingBox.left) * (canvas.width / boundingBox.width);
      prevY = ((e.clientY || e.touches[0].clientY) - boundingBox.top) * (canvas.height / boundingBox.height);
    }

    function draw(e) {
      if (!isDrawing) return;
      const boundingBox = canvas.getBoundingClientRect();
      const currentX = ((e.clientX || e.touches[0].clientX) - boundingBox.left) * (canvas.width / boundingBox.width);
      const currentY = ((e.clientY || e.touches[0].clientY) - boundingBox.top) * (canvas.height / boundingBox.height);

      ctx.lineWidth = lineThickness;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = selectedColor;

      ctx.beginPath();
      ctx.moveTo(prevX, prevY);
      ctx.lineTo(currentX, currentY);
      ctx.stroke();

      prevX = currentX;
      prevY = currentY;
    }

    function stopDrawing() { isDrawing = false; ctx.beginPath(); }

    document.getElementById('clearBtn').onclick = () => {
      playSFX('click');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    };

    document.getElementById('submitBtn').onclick = () => {
      playSFX('victory');
      document.getElementById('paintStage').style.display = 'none';
      document.getElementById('levelIndicator').style.display = 'none';
      document.getElementById('puzzleWrapper').classList.add('active');
      initiatePuzzleChallenge();
    };

    // ==========================================================================
    // AUTUMN LEAVES SIMULATION GAME LOGIC FIELD
    // ==========================================================================
    let currentStageLevel = 1;
    let quotaLeavesTarget = 5;
    let accruedLeavesScore = 0;
    let leafSpawningInterval = null;
    const distractingGlyphs = ['တ', 'ဌ', 'ဍ', 'ထ', 'ဓ'];

    function initiatePuzzleChallenge() {
      currentStageLevel = 1;
      launchStageDifficulty(1);
    }

    function launchStageDifficulty(lvlNum) {
      currentStageLevel = lvlNum;
      accruedLeavesScore = 0;
      quotaLeavesTarget = lvlNum === 1 ? 5 : (lvlNum === 2 ? 10 : 15);
      
      document.getElementById('lblLevel').textContent = `အဆင့်: ${currentStageLevel}`;
      refreshScoreDisplay();

      if (leafSpawningInterval) clearInterval(leafSpawningInterval);
      const productionFrequency = Math.max(1200 - (lvlNum * 220), 500);
      leafSpawningInterval = setInterval(generateLeafParticle, productionFrequency);
    }

    function refreshScoreDisplay() {
      document.getElementById('lblScore').textContent = `ဖမ်းမိသောအရွက်: ${accruedLeavesScore} / ${quotaLeavesTarget}`;
    }

    function generateLeafParticle() {
      const container = document.getElementById('puzzleWrapper');
      if (!container || !container.classList.contains('active')) return;

      const leaf = document.createElement('div');
      const randomHueClass = `leaf-hue-${Math.floor(Math.random() * 4) + 1}`;
      leaf.className = `leaf-node ${randomHueClass}`;

      const targetValidity = Math.random() > 0.4;
      const characterLabel = targetValidity ? 'ဎ' : distractingGlyphs[Math.floor(Math.random() * distractingGlyphs.length)];
      leaf.innerHTML = `<span>${characterLabel}</span>`;

      let horizontalX = Math.random() * (window.innerWidth - 90);
      let verticalY = -95;
      let descentVelocity = 1.5 + (currentStageLevel * 0.5) + Math.random() * 1.5;
      
      let waveAngle = 0;
      let waveFrequency = 0.02 + Math.random() * 0.03;
      let waveAmplitude = 15 + Math.random() * 25;
      let continuousRotation = Math.random() * 360;

      leaf.style.left = horizontalX + 'px';
      leaf.style.top = verticalY + 'px';
      leaf.style.setProperty('--r', continuousRotation + 'deg');
      container.appendChild(leaf);

      function cascadeTick() {
        if (!leaf.parentNode) return;
        verticalY += descentVelocity;
        waveAngle += waveFrequency;
        
        const deltaX = Math.sin(waveAngle) * waveAmplitude;
        leaf.style.top = verticalY + 'px';
        leaf.style.transform = `translateX(${deltaX}px) rotate(${continuousRotation + (waveAngle * 15)}deg)`;

        if (verticalY > window.innerHeight) {
          leaf.remove();
        } else {
          requestAnimationFrame(cascadeTick);
        }
      }
      requestAnimationFrame(cascadeTick);

      const claimTargetLeaf = (event) => {
        event.preventDefault();
        event.stopPropagation();
        
        if (targetValidity) {
          playSFX('pop');
          accruedLeavesScore++;
          createExplosionCloud(leaf.offsetLeft + 35, leaf.offsetTop + 35);
          leaf.remove();
          refreshScoreDisplay();
          
          if (accruedLeavesScore >= quotaLeavesTarget) {
            evaluateGameProgression();
          }
        } else {
          playSFX('click');
          leaf.classList.add('shake-err');
          setTimeout(() => leaf.classList.remove('shake-err'), 400);
        }
      };

      leaf.addEventListener('mousedown', claimTargetLeaf);
      leaf.addEventListener('touchstart', claimTargetLeaf, { passive: false });
    }

    function evaluateGameProgression() {
      clearInterval(leafSpawningInterval);
      document.querySelectorAll('.leaf-node').forEach(n => n.remove());
      playSFX('victory');

      const modal = document.getElementById('victoryModal');
      const actionBtn = document.getElementById('modalActionBtn');

      if (currentStageLevel < 3) {
        actionBtn.textContent = `Level ${currentStageLevel + 1} သို့ တက်လှမ်းမည် →`;
        modal.classList.add('active');
      } else {
        actionBtn.textContent = `ပြီးပါပြီ ✨`;
        modal.classList.add('active');
      }
    }

    document.getElementById('modalActionBtn').onclick = () => {
      playSFX('click');
      document.getElementById('victoryModal').classList.remove('active');
      
      if (currentStageLevel < 3) {
        launchStageDifficulty(currentStageLevel + 1);
      } else {
        window.location.href = 'index.html?stage=5';
      }
    };

    function createExplosionCloud(posX, posY) {
      const parent = document.getElementById('particleEmitter');
      const symbols = ['🍁', '🍂', '✨', '💛', '🧡'];
      for (let i = 0; i < 8; i++) {
        const dot = document.createElement('div');
        dot.className = 'sparkle-dot';
        dot.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        dot.style.left = posX + 'px';
        dot.style.top = posY + 'px';
        
        const polarAngle = Math.random() * Math.PI * 2;
        const radiusDist = 35 + Math.random() * 65;
        dot.style.setProperty('--mx', Math.cos(polarAngle) * radiusDist + 'px');
        dot.style.setProperty('--my', Math.sin(polarAngle) * radiusDist + 'px');
        
        parent.appendChild(dot);
        setTimeout(() => dot.remove(), 1100);
      }
    }

    function setupPaintingStage() {
      document.getElementById('puzzleWrapper').classList.remove('active');
      document.getElementById('paintStage').style.display = 'flex';
      document.getElementById('levelIndicator').style.display = 'flex';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // ==========================================================================
    // SYSTEM LIFECYCLE INITIALIZATION BINDINGS
    // ==========================================================================
    buildPaletteUI();

    document.getElementById('goHomeBtn').onclick = () => {
      playSFX('click');
      if (leafSpawningInterval) clearInterval(leafSpawningInterval);
      window.location.href = 'index.html?fromGame=true';
    };

    document.getElementById('goBackBtn').onclick = () => {
      playSFX('click');
      const isPuzzleActive = document.getElementById('puzzleWrapper').classList.contains('active');
      
      if (isPuzzleActive) {
        if (leafSpawningInterval) clearInterval(leafSpawningInterval);
        setupPaintingStage();
      } else {
        window.location.href = 'index.html?stage=2';
      }
    };

    // Canvas Events Binding Configuration
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mousemove', draw);
    
    canvas.addEventListener('touchstart', (e) => { startDrawing(e.touches[0]); e.preventDefault(); }, { passive: false });
    canvas.addEventListener('touchend', stopDrawing);
    canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); }, { passive: false });

    // "ဎ" Guideline Trace SVG Overlay Vector Definition
    canvas.style.backgroundImage = "url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='500' height='500'><text x='50%' y='74%' font-family='Noto Sans Myanmar' font-size='380' font-weight='800' fill='none' stroke='%23cbd5e1' stroke-width='4' stroke-dasharray='12,12' text-anchor='middle'>ဎ</text></svg>\")";
    canvas.style.backgroundSize = "100% 100%";
  </script>
</body>
</html>
