<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dassy's Alphabet Quest - Park Skateboard Ride (ဍ)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght=400;700;900&family=Pyidaungsu:wght=400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Fredoka One', 'Pyidaungsu', 'Montserrat', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .burmese-font {
            font-family: 'Pyidaungsu', 'Myanmar3', 'Yunghkio', sans-serif;
        }

        /* မျက်နှာပြင်အလိုက် အချိုးကျ Responsive ဖြစ်စေရန် ညှိနှိုင်းမှုများ */
        #hud {
            top: clamp(0.5rem, 2vw, 1.5rem);
            left: clamp(0.5rem, 3vw, 2rem);
            right: clamp(0.5rem, 3vw, 2rem);
            gap: clamp(0.5rem, 2vw, 1.5rem);
        }

        .hud-panel {
            padding: clamp(0.4rem, 1.5vw, 0.75rem) clamp(0.75rem, 2vw, 1.5rem);
            gap: clamp(0.5rem, 1.5vw, 1rem);
        }

        .hud-text-title {
            font-size: clamp(0.6rem, 1vw, 0.75rem);
        }

        .hud-text-value {
            font-size: clamp(1.2rem, 2vw, 1.75rem);
        }

        .nav-btn {
            width: clamp(2.5rem, 5vw, 3.2rem);
            height: clamp(2.5rem, 5vw, 3.2rem);
            font-size: clamp(1rem, 2vw, 1.3rem);
        }

        /* Responsive Modal Card Container */
        .modal-card {
            width: clamp(280px, 90vw, 450px);
            padding: clamp(1.5rem, 4vh, 2.5rem);
            max-height: 90vh;
            overflow-y: auto;
        }

        /* Mobile Screen Constraints & Scaling */
        @media (max-width: 768px) {
            #hud {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
            .hud-panel {
                transform: scale(0.9);
                transform-origin: right top;
            }
            #game-title {
                font-size: clamp(1.8rem, 6vw, 2.5rem);
            }
            #game-subtitle {
                font-size: clamp(0.9rem, 3vw, 1.1rem);
            }
        }
    </style>
</head>
<body class="relative flex items-center justify-center">

    <!-- HUD Layout Interface Area -->
    <div id="hud" class="absolute flex justify-between items-center z-10 pointer-events-none w-[calc(100%-2*clamp(0.5rem,3vw,2rem))]">
        <div class="flex gap-2 pointer-events-auto items-center">
            <button id="back-btn" class="nav-btn bg-gradient-to-b from-indigo-400 to-indigo-600 border-2 border-indigo-200 text-white font-bold rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform">⬅️</button>
            <button id="home-btn" class="nav-btn bg-gradient-to-b from-amber-400 to-amber-600 border-2 border-amber-200 text-white font-bold rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform">🏠</button>
        </div>
        <div class="hud-panel flex items-center bg-slate-900/80 border border-slate-700/60 rounded-2xl backdrop-blur shadow-xl pointer-events-auto select-none">
            <div class="text-center">
                <p class="hud-text-title text-slate-400 font-bold uppercase tracking-wider">ရှာဖွေရမည့်အက္ခရာ</p>
                <p id="target-letter-display" class="hud-text-value text-amber-400 font-black font-bold burmese-font">ဍ</p>
            </div>
            <div class="h-8 w-px bg-slate-700"></div>
            <div>
                <p class="hud-text-title text-slate-400 font-bold uppercase tracking-wider text-center">အဆင့်</p>
                <p id="hud-level" class="hud-text-value text-emerald-400 font-extrabold text-center">1</p>
            </div>
            <div class="h-8 w-px bg-slate-700"></div>
            <div>
                <p class="hud-text-title text-slate-400 font-bold uppercase tracking-wider">ပစ်မှတ်ရမှတ်</p>
                <p id="hud-score" class="hud-text-value text-blue-400 font-extrabold text-center">0 / 5</p>
            </div>
        </div>
    </div>

    <!-- Screen Flow Controls Overlay Layer -->
    <div id="overlay-screen" class="absolute inset-0 bg-slate-950/85 backdrop-blur-sm z-20 flex flex-col items-center justify-center p-4 text-center transition-opacity duration-300">
        <div class="modal-card bg-slate-900 border-2 border-slate-800 rounded-3xl shadow-2xl relative overflow-hidden">
            <div class="absolute -top-12 -right-12 w-32 h-32 bg-indigo-500/10 rounded-full blur-xl"></div>
            <div class="absolute -bottom-12 -left-12 w-32 h-32 bg-emerald-500/10 rounded-full blur-xl"></div>
            
            <h1 id="game-title" class="text-4xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 drop-shadow-sm">Skaters Run! 🛹</h1>
            <h2 id="game-subtitle" class="text-lg font-bold text-slate-300 mb-6 burmese-font">"ဍ" အက္ခရာလေးတွေကို လိုက်ဖမ်းကြရအောင်</h2>
            
            <div id="game-stats" class="hidden bg-slate-950/60 border border-slate-800 rounded-2xl p-4 mb-6 text-left space-y-3">
                <p id="stat-header" class="text-slate-400 text-xs font-black uppercase tracking-widest text-center mb-1 border-b border-slate-800 pb-2">📊 ဂိမ်းရလဒ်မှတ်တမ်း</p>
                <div class="flex justify-between items-center"><span class="text-slate-400 text-sm font-bold burmese-font">မိအောင်ဖမ်းနိုင်ခဲ့သော 'ဍ':</span><span id="stat-coins" class="text-emerald-400 font-black text-lg">0</span></div>
                <div class="flex justify-between items-center"><span class="text-slate-400 text-sm font-bold burmese-font">အခြားမှားယွင်းဖမ်းမိမှု:</span><span id="stat-kills" class="text-rose-400 font-black text-lg">0</span></div>
            </div>
            
            <div class="flex flex-col gap-3">
                <button id="start-btn" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-extrabold py-3.5 px-6 rounded-2xl text-lg shadow-lg shadow-emerald-900/40 border-b-4 border-emerald-700 active:scale-95 transition-all uppercase tracking-wide burmese-font">🚀 စတင်ကစားမည်</button>
                <button id="next-letter-btn" class="hidden w-full bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-400 hover:to-orange-500 text-white font-extrabold py-3.5 px-6 rounded-2xl text-lg shadow-lg border-b-4 border-orange-700 active:scale-95 transition-all uppercase tracking-wide burmese-font">➡️ နောက်ထပ် အက္ခရာတစ်ခုသို့</button>
                <button id="main-page-btn" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-2.5 px-4 rounded-2xl text-sm border border-slate-700 active:scale-95 transition-all burmese-font">📍 ပင်မမြေပုံသို့ ပြန်သွားမည်</button>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Screen Size ပြောင်းလဲသွားရင်လည်း ဇာတ်ကောင် အနေအထားကို လမ်းကြောင်းပေါ် အလိုအလျောက် ချိန်ညှိပေးရန်
            if (typeof game !== 'undefined' && game.running) {
                player.y = getLaneY(player.lane);
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startSynthBgMusic();
            }
        }

        function playSFX(type) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            if (type === 'click') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, now);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.05);
            } 
            else if (type === 'score') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(659.25, now + 0.08);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.2);
            } 
            else if (type === 'hit-wrong') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.linearRampToValueAtTime(90, now + 0.25);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.25);
            }
            else if (type === 'level-up') {
                const chord = [261.63, 329.63, 392.00, 523.25, 659.25];
                chord.forEach((freq, idx) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + idx * 0.05);
                    gain.gain.setValueAtTime(0.1, now + idx * 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.005, now + idx * 0.05 + 0.3);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(now + idx * 0.05); osc.stop(now + idx * 0.05 + 0.3);
                });
            }
        }

        let bgMusicStarted = false;
        function startSynthBgMusic() {
            if (bgMusicStarted) return;
            bgMusicStarted = true;
            
            const bassLoop = [110.00, 110.00, 130.81, 146.83, 110.00, 110.00, 164.81, 146.83];
            let step = 0;
            
            function playBassStep() {
                if (!game.running) {
                    setTimeout(playBassStep, 250);
                    return;
                }
                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(bassLoop[step], now);
                gain.gain.setValueAtTime(0.04, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
                
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.22);
                
                step = (step + 1) % bassLoop.length;
                setTimeout(playBassStep, 250);
            }
            playBassStep();
        }

        const alphabetPool = ['က', 'ခ', 'ဂ', 'င', 'စ', 'ဆ', 'တ', 'ထ', 'ဒ', 'န', 'ပ', 'ဖ', 'မ', 'ယ', 'လ', 'ဝ', 'သ', 'ဟ', 'ဠ', 'အ', 'ဋ', 'ဌ', 'ဍ', 'ဎ'];
        const targetLetter = 'ဍ';

        const levelTargets = { 1: 5, 2: 10, 3: 15 };
        const levelSpeeds = { 1: 1.0, 2: 1.35, 3: 1.75 };

        const game = {
            running: false, currentLevel: 1, correctPops: 0, incorrectPops: 0,
            speedMultiplier: 1.0, distanceTraveled: 0
        };

        const player = {
            x: 150, y: 0, targetY: 0, width: 75, height: 95,
            lane: 0, // လမ်းကြောင်း ၂ ခုစနစ် (0 သို့မဟုတ် 1)
            boardRotation: 0, wheelRotation: 0
        };

        const entities = { bubbles: [], particles: [], decorations: [] };

        // လမ်းကြောင်း ၂ ခုစနစ်ကို ပုံရိပ်အချိုးကျ တွက်ချက်ခြင်း
        function getLaneY(laneIndex) {
            const laneSpacing = canvas.height * 0.22;
            const centerY = canvas.height * 0.58;
            return centerY + (laneIndex - 0.5) * laneSpacing;
        }

        function initScenery() {
            entities.decorations = [];
            for (let i = 0; i < 6; i++) {
                entities.decorations.push({
                    x: i * (canvas.width / 4),
                    y: canvas.height * 0.42,
                    radius: 80 + Math.random() * 60,
                    color: Math.random() > 0.5 ? '#1e3a8a' : '#1e40af',
                    speedFactor: 0.15
                });
            }
            for (let i = 0; i < 4; i++) {
                entities.decorations.push({
                    x: i * (canvas.width / 2.5) + Math.random() * 100,
                    y: canvas.height * 0.38,
                    type: 'tree',
                    height: 120 + Math.random() * 40,
                    speedFactor: 0.3
                });
            }
        }

        function spawnLetterBubble() {
            if (!game.running) return;
            
            const lane = Math.floor(Math.random() * 2); // လမ်းကြောင်း ၂ ကြောင်းသာ ဖြစ်ပေါ်စေမည်
            const isTarget = Math.random() < 0.45;
            const text = isTarget ? targetLetter : alphabetPool[Math.floor(Math.random() * alphabetPool.length)];
            
            entities.bubbles.push({
                x: canvas.width + 60,
                y: getLaneY(lane),
                lane: lane,
                text: text,
                isTarget: isTarget,
                radius: 36,
                colorHue: Math.random() * 360
            });

            const baseDelay = 1600 / game.speedMultiplier;
            const variableDelay = baseDelay + Math.random() * 800;
            setTimeout(spawnLetterBubble, variableDelay);
        }

        function triggerBurstParticles(x, y, color) {
            for (let i = 0; i < 12; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 6;
                entities.particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed - (game.speedMultiplier * 2),
                    vy: Math.sin(angle) * speed,
                    radius: 3 + Math.random() * 4,
                    color: color, alpha: 1,
                    decay: 0.02 + Math.random() * 0.02
                });
            }
        }

        function handleScreenTouch(clientX, clientY) {
            if (!game.running) return;
            
            // Screen ကို အပေါ်အောက် တစ်ဝက်ခွဲ၍ လမ်းကြောင်းပြောင်းလဲခြင်း
            if (clientY < canvas.height / 2) {
                player.lane = 0;
            } else {
                player.lane = 1;
            }
            playSFX('click');
        }

        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                initAudio();
                handleScreenTouch(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        window.addEventListener('mousedown', (e) => {
            initAudio();
            handleScreenTouch(e.clientX, e.clientY);
        });

        window.addEventListener('keydown', (e) => {
            if (!game.running) return;
            if ((e.key === 'ArrowUp' || e.key.toLowerCase() === 'w')) { player.lane = 0; playSFX('click'); }
            if ((e.key === 'ArrowDown' || e.key.toLowerCase() === 's')) { player.lane = 1; playSFX('click'); }
        });

        function updateGame(dt) {
            if (!game.running) return;

            const baseSpeed = 300; // ကလေးငယ်များ ရှင်းရှင်းလင်းလင်းမြင်နိုင်ရန် အမြန်နှုန်းအနည်းငယ်လျှော့ညှိထားသည်
            const currentSpeed = baseSpeed * game.speedMultiplier * dt;
            
            game.distanceTraveled += currentSpeed;

            player.targetY = getLaneY(player.lane);
            player.y += (player.targetY - player.y) * 12 * dt;
            
            // ဖုန်းမျက်နှာပြင်များပေါ်တွင် Player ၏ တည်နေရာကို ကွက်တိဖြစ်စေရန် Adaptive Anchoring
            player.x = Math.min(180, canvas.width * 0.2); 

            entities.decorations.forEach(dec => {
                dec.x -= currentSpeed * (dec.speedFactor * 0.3);
                if (dec.type === 'tree' && dec.x < -100) dec.x = canvas.width + 100 + Math.random() * 200;
                if (!dec.type && dec.x < -dec.radius) dec.x = canvas.width + dec.radius + Math.random() * 100;
            });

            const currentTarget = levelTargets[game.currentLevel];

            for (let i = entities.bubbles.length - 1; i >= 0; i--) {
                const b = entities.bubbles[i];
                b.x -= currentSpeed;

                const dx = b.x - player.x;
                const dy = b.y - player.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < b.radius + player.width / 2.2) {
                    if (b.isTarget) {
                        game.correctPops++;
                        playSFX('score');
                        triggerBurstParticles(b.x, b.y, '#34d399');

                        if (game.correctPops >= currentTarget) {
                            if (game.currentLevel < 3) {
                                game.currentLevel++;
                                game.correctPops = 0;
                                game.speedMultiplier = levelSpeeds[game.currentLevel];
                                playSFX('level-up');
                            } else {
                                triggerUltimateVictory();
                                entities.bubbles.splice(i, 1);
                                continue;
                            }
                        }
                    } else {
                        game.incorrectPops++;
                        playSFX('hit-wrong');
                        triggerBurstParticles(b.x, b.y, '#f87171');
                    }

                    const updatedTarget = levelTargets[game.currentLevel];
                    document.getElementById('hud-score').innerText = `${game.correctPops} / ${updatedTarget}`;
                    document.getElementById('hud-level').innerText = game.currentLevel;

                    entities.bubbles.splice(i, 1);
                    continue;
                }

                if (b.x < -b.radius) {
                    entities.bubbles.splice(i, 1);
                }
            }

            for (let i = entities.particles.length - 1; i >= 0; i--) {
                const p = entities.particles[i];
                p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
                if (p.alpha <= 0) entities.particles.splice(i, 1);
            }
        }

        function render() {
            const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGrad.addColorStop(0, '#0f172a');
            skyGrad.addColorStop(0.4, '#1e1b4b');
            skyGrad.addColorStop(0.6, '#2e1065');
            skyGrad.addColorStop(1, '#3b0764');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            entities.decorations.forEach(dec => {
                if (!dec.type) {
                    ctx.beginPath();
                    ctx.fillStyle = dec.color;
                    ctx.arc(dec.x, dec.y, dec.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            const horizonY = canvas.height * 0.42;
            ctx.fillStyle = '#4c1d95'; 
            ctx.fillRect(0, horizonY, canvas.width, canvas.height - horizonY);

            entities.decorations.forEach(dec => {
                if (dec.type === 'tree') {
                    ctx.fillStyle = '#1e1b4b';
                    ctx.fillRect(dec.x - 6, dec.y - dec.height, 12, dec.height);
                    ctx.beginPath();
                    ctx.fillStyle = '#6366f1';
                    ctx.arc(dec.x, dec.y - dec.height, 45, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.fillStyle = '#818cf8';
                    ctx.arc(dec.x - 15, dec.y - dec.height - 10, 30, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // လမ်းကြောင်း ၂ ကြောင်းအတွက် လမ်းကြောင်းမျဉ်းဆွဲခြင်း
            ctx.strokeStyle = 'rgba(129, 140, 248, 0.2)';
            ctx.lineWidth = 6;
            for (let i = 0; i < 2; i++) {
                const ly = getLaneY(i);
                ctx.beginPath();
                ctx.moveTo(0, ly);
                ctx.lineTo(canvas.width, ly);
                ctx.stroke();

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
                ctx.lineWidth = 4;
                ctx.setLineDash([35, 55]);
                ctx.beginPath();
                ctx.moveTo(0, ly);
                ctx.lineTo(canvas.width, ly);
                ctx.stroke();
                ctx.setLineDash([]); 
            }

            // အက္ခရာပူဖောင်းများ ဆွဲခြင်း
            entities.bubbles.forEach(b => {
                ctx.save();
                ctx.translate(b.x, b.y);

                const glow = ctx.createRadialGradient(0, 0, b.radius * 0.2, 0, 0, b.radius);
                glow.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
                glow.addColorStop(0.5, b.isTarget ? 'rgba(52, 211, 153, 0.5)' : `hsla(${b.colorHue}, 80%, 70%, 0.4)`);
                glow.addColorStop(1, b.isTarget ? 'rgba(16, 185, 129, 0)' : `hsla(${b.colorHue}, 80%, 40%, 0)`);
                
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(0, 0, b.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = b.isTarget ? '#10b981' : `hsl(${b.colorHue}, 70%, 50%)`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, b.radius - 2, 0, Math.PI * 2);
                ctx.stroke();

                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(-b.radius * 0.3, -b.radius * 0.3, b.radius * 0.12, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = b.isTarget ? '#064e3b' : '#0f172a';
                ctx.font = '900 36px "Pyidaungsu", "Noto Sans Myanmar", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(b.text, 0, 2);

                ctx.restore();
            });

            // Player နှင့် စကိတ်ဘုတ်ဆွဲခြင်း (Mobile ပေါ်တွင် အချိုးကျ Scale ချုံ့နိုင်ရန်)
            ctx.save();
            ctx.translate(player.x, player.y);

            // Screen အရွယ်အစားအလိုက် စကိတ်သမားကို responsive scale ချိန်ညှိခြင်း
            const responsiveScale = canvas.width < 768 ? 0.85 : 1.0;
            ctx.scale(responsiveScale, responsiveScale);

            ctx.fillStyle = '#fbbf24'; 
            ctx.strokeStyle = '#d97706';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.roundRect(-player.width / 1.1, player.height * 0.15, player.width * 1.8, 14, 7);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = '#475569';
            ctx.fillRect(-player.width * 0.6, player.height * 0.15 + 2, player.width * 1.2, 3);

            ctx.fillStyle = '#ef4444'; 
            const wheelY = player.height * 0.15 + 14 + 5;
            
            ctx.beginPath(); ctx.arc(player.width * 0.5, wheelY, 9, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(-player.width * 0.5, wheelY, 9, 0, Math.PI * 2); ctx.fill();

            ctx.translate(0, -player.height * 0.35);

            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(0, player.height * 0.5, 24, 6, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#6366f1'; 
            ctx.beginPath();
            ctx.roundRect(-26, -30, 52, 65, [25, 25, 12, 12]);
            ctx.fill();

            ctx.fillStyle = '#ec4899'; 
            ctx.beginPath();
            ctx.roundRect(-26, 0, 52, 35, [0, 0, 10, 10]);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 13px Montserrat, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("04", 0, 18);

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(0, -10, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#1e1b4b';
            ctx.beginPath();
            ctx.arc(2, -10, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(4, -12, 2.5, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#f43f5e';
            ctx.beginPath();
            ctx.arc(0, -26, 27, Math.PI, 0); 
            ctx.fill();
            ctx.fillRect(-3, -29, 38, 5);

            ctx.restore();

            entities.particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        let lastTime = performance.now();
        function gameLoop(now) {
            let dt = (now - lastTime) / 1000;
            lastTime = now;
            if (dt > 0.1) dt = 0.1;
            updateGame(dt);
            render();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            game.currentLevel = 1; game.correctPops = 0; game.incorrectPops = 0;
            game.speedMultiplier = levelSpeeds[1]; game.distanceTraveled = 0;
            
            player.lane = 0;
            player.y = getLaneY(0);

            entities.bubbles = []; entities.particles = [];

            const initialTarget = levelTargets[1];
            document.getElementById('hud-score').innerText = `0 / ${initialTarget}`;
            document.getElementById('hud-level').innerText = "1";

            initScenery();
            
            document.getElementById('overlay-screen').classList.add('opacity-0');
            setTimeout(() => {
                document.getElementById('overlay-screen').classList.add('hidden');
                document.getElementById('start-btn').classList.remove('hidden');
                document.getElementById('next-letter-btn').classList.add('hidden');
            }, 300);

            game.running = true;
            setTimeout(spawnLetterBubble, 800);
        }

        function triggerUltimateVictory() {
            game.running = false;
            playSFX('level-up');

            document.getElementById('stat-header').innerText = "🎉 သာဓုပါ ကလေးတို့ရေ! 🎉";
            document.getElementById('stat-coins').innerText = "အောင်မြင်ပြီးမြောက်";
            document.getElementById('stat-kills').innerText = game.incorrectPops + " ကြိမ်";

            document.getElementById('game-title').innerText = "ပြီးဆုံးပါပြီ! 🏆";
            document.getElementById('game-subtitle').innerText = "💎 သာဓုပါ ကလေးတို့ရေ! 'ဍ' အက္ခရာကို အဆင့် ၃ ဆင့်စလုံးမှာ ပိုင်နိုင်စွာ မှတ်မိပြီး ရတနာသိုက်ကြီးကို အောင်မြင်စွာ ရယူနိုင်ခဲ့ပါပြီ။";
            
            document.getElementById('start-btn').classList.add('hidden');
            document.getElementById('next-letter-btn').classList.remove('hidden');
            
            document.getElementById('game-stats').classList.remove('hidden');
            document.getElementById('overlay-screen').classList.remove('hidden');
            setTimeout(() => { document.getElementById('overlay-screen').classList.remove('opacity-0'); }, 50);
        }

        document.getElementById('start-btn').onclick = () => { initAudio(); playSFX('click'); startGame(); };
        
        document.getElementById('next-letter-btn').onclick = () => {
            playSFX('click'); window.location.href = 'index.html?stage=3';
        };

        document.getElementById('home-btn').onclick = () => { 
            playSFX('click'); game.running = false; window.location.href = 'index.html?fromGame=true'; 
        };
        
        document.getElementById('back-btn').onclick = () => { 
            playSFX('click'); game.running = false; window.location.href = 'index.html?stage=3'; 
        };
        
        document.getElementById('main-page-btn').onclick = () => { 
            playSFX('click'); game.running = false; window.location.href = 'index.html?fromGame=true'; 
        };

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
