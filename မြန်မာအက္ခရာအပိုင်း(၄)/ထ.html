<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>မိုးရေထဲက ထီးဆောင်းစွန့်စားခန်း - "ထ" စာလုံး</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght@400;700;900&family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #022c22; 
            font-family: 'Fredoka One', 'Pyidaungsu', 'Montserrat', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .burmese-font {
            font-family: 'Pyidaungsu', sans-serif;
        }
    </style>
</head>
<body class="relative select-none">

    <div id="hud" class="absolute top-4 left-4 right-4 pointer-events-none z-30 flex flex-col space-y-2 max-w-md burmese-font">
        <div class="flex items-center space-x-3 bg-slate-950/90 backdrop-blur-md p-3 rounded-2xl border border-emerald-500/20 shadow-lg">
            <span class="text-xs font-black text-emerald-400 tracking-wider uppercase">ထီးဆောင်းတိုးတက်မှု 🌟</span>
            <div class="flex-1 bg-black/40 h-4 rounded-full overflow-hidden p-0.5 border border-white/5">
                <div id="xp-bar" class="bg-gradient-to-r from-emerald-400 via-teal-400 to-cyan-400 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <span id="level-display" class="bg-emerald-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Lvl 1</span>
        </div>
        
        <div class="flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="flex items-center space-x-2 bg-slate-950/90 backdrop-blur-md px-4 py-2 rounded-2xl border border-emerald-500/20 shadow-lg">
                    <span class="text-xl">☔</span>
                    <span id="cash-display" class="text-white font-black tracking-widest text-sm">0</span>
                </div>
                <div class="flex items-center space-x-2 bg-gradient-to-r from-emerald-500/20 to-teal-500/20 backdrop-blur-md px-4 py-2 rounded-2xl border border-emerald-500/40 shadow-lg animate-pulse">
                    <span class="text-xs font-black text-emerald-400 uppercase tracking-wider">ဖမ်းရမည့်စာလုံး -</span>
                    <span id="target-letter-display" class="burmese-font text-2xl font-bold text-yellow-300">ထ</span>
                </div>
            </div>

            <div class="flex space-x-2 pointer-events-auto">
                <a href="index.html?fromGame=true" class="px-3 py-2 bg-slate-950/90 hover:bg-slate-900 border border-teal-500/30 rounded-xl text-xs text-white flex items-center space-x-1 shadow-md transition-all active:scale-95 cursor-pointer">
                    <span>🏠</span> <span class="hidden sm:inline">ပင်မမြေပုံ</span>
                </a>
                <a href="index.html?fromGame=true&showPopup=stage3" class="px-3 py-2 bg-slate-950/90 hover:bg-slate-900 border border-amber-500/30 rounded-xl text-xs text-white flex items-center space-x-1 shadow-md transition-all active:scale-95 cursor-pointer">
                    <span>↩️</span> <span class="hidden sm:inline">နောက်သို့</span>
                </a>
            </div>
        </div>
    </div>

    <div class="absolute top-4 right-4 z-30 pointer-events-none flex items-center space-x-2 bg-slate-950/90 backdrop-blur-md px-4 py-2 rounded-2xl border border-emerald-500/20 shadow-lg">
        <span class="text-lg">❤️</span>
        <span id="hp-display" class="text-rose-500 font-black tracking-wider text-sm">100 / 100</span>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="overlay-screen" class="absolute inset-0 bg-slate-950/95 backdrop-blur-md z-[90] flex flex-col items-center justify-center text-center p-8 burmese-font">
        <h1 class="text-1xl sm:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 via-teal-300 to-cyan-400 tracking-widest mb-2 uppercase drop-shadow-[0_0_30px_rgba(16,185,129,0.3)]">UMBRELLA CATCH</h1>
        <p class="text-amber-400 text-[18px] uppercase font-black tracking-[0.5em] mb-16">"ထ" စာလုံး ထီးဆောင်းစွန့်စားခန်း</p>
        
        <div id="game-stats" class="hidden bg-white/5 border border-white/5 rounded-3xl p-6 mb-10 max-w-xs w-full text-left space-y-3 font-sans">
            <div class="flex justify-between"><span class="text-neutral-400 burmese-font">မှန်ကန်စွာ ဖမ်းမိသော ထီး</span><span id="stat-coins" class="text-white font-bold">0</span></div>
            <div class="flex justify-between"><span class="text-neutral-400 burmese-font">မှားယွင်းစွာ ဖမ်းမိသော ထီး</span><span id="stat-kills" class="text-white font-bold">0</span></div>
            <div class="flex justify-between"><span class="text-neutral-400 burmese-font">စွန့်စားသူအဆင့် ရောက်ရှိမှု</span><span id="stat-level" class="text-emerald-400 font-bold">Lvl 1</span></div>
        </div>

        <button id="start-btn" class="px-16 py-6 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-black text-xs uppercase tracking-[0.3em] rounded-full transition-all shadow-[0_20px_50px_rgba(16,185,129,0.3)] border-b-4 border-emerald-800 pointer-events-auto cursor-pointer">ဂိမ်းစတင်မည်</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'catch_correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); osc.frequency.setValueAtTime(700, now + 0.08);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'catch_wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, now); osc.frequency.linearRampToValueAtTime(110, now + 0.2);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now); osc.stop(now + 0.2);
            } else if (type === 'levelup') {
                const freqs = [440, 554, 659, 880];
                freqs.forEach((f, i) => {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination); o.type = 'sine';
                    o.frequency.setValueAtTime(f, now + i * 0.06); g.gain.setValueAtTime(0.06, now + i * 0.06);
                    g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.06 + 0.15); o.start(now + i * 0.06); o.stop(now + i * 0.06 + 0.15);
                });
            }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', resizeCanvas);

        const burmeseAlphabets = ['က','ခ','ဂ','င','စ','ဆ','ည','တ','ထ','ဒ','ဓ','န','ပ','ဖ','ဗ','မ','ယ','ရ','လ','ဝ','သ','ဟ','အ'];

        const game = { running: false, score: 0, correctPops: 0, incorrectPops: 0, targetLetter: 'ထ' };
        
        // Player Object (Target Position ပါဝင်သည်)
        const player = { 
            x: window.innerWidth / 2, 
            y: window.innerHeight - 130, 
            targetX: window.innerWidth / 2,
            targetY: window.innerHeight - 130,
            width: 54, 
            height: 70, 
            hp: 100, 
            maxHp: 100, 
            xp: 0, 
            maxXp: 100, 
            level: 1, 
            walkCycle: 0, 
            isMoving: false,
            isDragging: false 
        };

        const entities = { umbrellas: [], rainDrops: [], splashEffects: [] };

        function initRain() {
            entities.rainDrops = [];
            for (let i = 0; i < 65; i++) {
                entities.rainDrops.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, speed: 9 + Math.random() * 6, length: 16 + Math.random() * 10 });
            }
        }

        // 🏃‍♂️ ချစ်စရာကောင်းသော လက်၊ ခြေထောက်များ ပါဝင်သည့် Player Renderer
        function drawPlayer(ctx, p) {
            ctx.save();
            ctx.translate(p.x, p.y);

            // လမ်းလျှောက်လှုပ်ရှားလျှင် ကိုယ်ထည်ခုန်ဆွဖြစ်စေရန်
            let bounce = 0;
            let tilt = 0;
            if (p.isMoving) {
                bounce = Math.sin(p.walkCycle) * 3.5;
                tilt = Math.cos(p.walkCycle) * 0.05;
                ctx.translate(0, bounce);
                ctx.rotate(tilt);
            }

            // အရိပ်ညိုလေး
            ctx.fillStyle = 'rgba(2, 28, 34, 0.4)';
            ctx.beginPath(); ctx.ellipse(0, p.height/2 + 2, p.width/2 - 4, 5, 0, 0, Math.PI*2); ctx.fill();

            const leftFootSwing = p.isMoving ? Math.sin(p.walkCycle) * 8 : 0;
            const rightFootSwing = p.isMoving ? -Math.sin(p.walkCycle) * 8 : 0;
            const armSwing = p.isMoving ? Math.cos(p.walkCycle) * 6 : 0;

            // 🦶 ချစ်စရာ ခြေထောက်နှစ်ဖက် (Cute Yellow Rain Boots)
            ctx.fillStyle = '#f59e0b';
            // ဘယ်ခြေထောက်
            ctx.beginPath(); 
            ctx.roundRect(-14 + leftFootSwing/2, p.height/2 - 2 + (leftFootSwing < 0 ? leftFootSwing/3 : 0), 10, 10, [4, 4, 2, 2]); 
            ctx.fill();
            // ညာခြေထောက်
            ctx.beginPath(); 
            ctx.roundRect(4 + rightFootSwing/2, p.height/2 - 2 + (rightFootSwing < 0 ? rightFootSwing/3 : 0), 10, 10, [4, 4, 2, 2]); 
            ctx.fill();

            // 🧥 မိုးကာအင်္ကျီကိုယ်ထည်
            ctx.fillStyle = '#06b6d4'; 
            ctx.beginPath(); ctx.roundRect(-p.width/2, -p.height/2 + 15, p.width, p.height - 15, [14, 14, 4, 4]); ctx.fill();

            // 👋 ချစ်စရာ လက်ကလေးနှစ်ဖက် (Cute Cyan Arms)
            ctx.fillStyle = '#0891b2';
            // ဘယ်ဘက်လက်
            ctx.save();
            ctx.translate(-p.width/2 - 2, -p.height/2 + 26);
            ctx.rotate(-0.2 + armSwing * 0.03);
            ctx.beginPath(); ctx.roundRect(-4, 0, 6, 16, [4, 4, 4, 4]); ctx.fill();
            ctx.restore();

            // ညာဘက်လက်
            ctx.save();
            ctx.translate(p.width/2 + 2, -p.height/2 + 26);
            ctx.rotate(0.2 - armSwing * 0.03);
            ctx.beginPath(); ctx.roundRect(-2, 0, 6, 16, [4, 4, 4, 4]); ctx.fill();
            ctx.restore();

            // မိုးကာဦးထုပ် (Hood)
            ctx.fillStyle = '#0891b2';
            ctx.beginPath(); ctx.arc(0, -p.height/2 + 18, 22, Math.PI, 0, false); ctx.fill();

            // ကလေးမျက်နှာ
            ctx.fillStyle = '#ffedd5';
            ctx.beginPath(); ctx.arc(0, -p.height/2 + 20, 15, 0, Math.PI * 2); ctx.fill();

            // မျက်လုံးစက်ဝိုင်းလေးများ
            ctx.fillStyle = '#1e293b'; 
            ctx.beginPath(); ctx.arc(-5, -p.height/2 + 18, 2.5, 0, Math.PI*2); ctx.arc(5, -p.height/2 + 18, 2.5, 0, Math.PI*2); ctx.fill();

            // ပြုံးနေသောပါးစပ်လေး
            ctx.strokeStyle = '#e11d48'; ctx.lineWidth = 2; 
            ctx.beginPath(); ctx.arc(0, -p.height/2 + 22, 4, 0, Math.PI); ctx.stroke();

            ctx.restore();
        }

        function drawUmbrella(ctx, u) {
            ctx.save();
            const isTarget = u.letter === game.targetLetter;
            
            ctx.strokeStyle = '#64748b'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(u.x, u.y - 10); ctx.lineTo(u.x, u.y + 25); ctx.stroke();
            ctx.beginPath(); ctx.arc(u.x - 4, u.y + 25, 4, 0, Math.PI); ctx.stroke();

            ctx.fillStyle = isTarget ? '#10b981' : '#f43f5e';
            if (isTarget) { ctx.shadowColor = '#34d399'; ctx.shadowBlur = 14; }
            ctx.beginPath(); ctx.arc(u.x, u.y, u.radius, Math.PI, 0, false); ctx.fill();

            ctx.fillStyle = '#022c22';
            for(let i = -2; i <= 2; i += 2) {
                ctx.beginPath(); ctx.arc(u.x + (i * u.radius/3), u.y, 4, 0, Math.PI * 2); ctx.fill();
            }

            ctx.save();
            ctx.fillStyle = '#ffffff'; ctx.font = `bold ${19}px Pyidaungsu, sans-serif`;
            ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
            ctx.fillText(u.letter, u.x, u.y - 12);
            ctx.restore();
            ctx.restore();
        }

        function spawnUmbrella() {
            if (!game.running) return;
            const radius = 28;
            const x = radius + Math.random() * (canvas.width - radius * 2);
            const isTargetSpawn = Math.random() < 0.45;
            let chosenLetter = game.targetLetter;
            if (!isTargetSpawn) {
                const filtered = burmeseAlphabets.filter(c => c !== game.targetLetter);
                chosenLetter = filtered[Math.floor(Math.random() * filtered.length)];
            }
            entities.umbrellas.push({ x: x, y: -40, radius: radius, letter: chosenLetter, speed: 2.2 + Math.random() * 2.2 });
        }

        setInterval(spawnUmbrella, 1100);

        // 👆 DIRECT TOUCH & DRAG SYSTEM (အရုပ်ကို ဖိဆွဲပြီးကစားနည်းစနစ်)
        function getTouchPos(clientX, clientY) {
            return { x: clientX, y: clientY };
        }

        function handleStart(clientX, clientY) {
            if (!game.running) return;
            const pos = getTouchPos(clientX, clientY);
            // အရုပ်ဧရိယာကို နှိပ်မိသလား စစ်ဆေးခြင်း
            const dist = Math.hypot(pos.x - player.x, pos.y - player.y);
            if (dist < 75) { // နှိပ်ရလွယ်ကူအောင် Boundary အဝိုင်းကို ကျယ်ကျယ်ပေးထားပါသည်
                player.isDragging = true;
                player.targetX = pos.x;
                player.targetY = pos.y;
            }
        }

        function handleMove(clientX, clientY) {
            if (!player.isDragging) return;
            const pos = getTouchPos(clientX, clientY);
            player.targetX = pos.x;
            player.targetY = pos.y;
        }

        function handleEnd() {
            player.isDragging = false;
        }

        // Touch Interaction Event Listeners
        window.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            handleStart(touch.clientX, touch.clientY);
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            handleMove(touch.clientX, touch.clientY);
        }, { passive: true });

        window.addEventListener('touchend', handleEnd);

        // Mouse Interaction Event Listeners
        window.addEventListener('mousedown', (e) => { handleStart(e.clientX, e.clientY); });
        window.addEventListener('mousemove', (e) => { handleMove(e.clientX, e.clientY); });
        window.addEventListener('mouseup', handleEnd);

        function updateGame(dt) {
            if (!game.running) return;

            // အရုပ်လေး လက်နောက်ကို ညက်ညောစွာ လိုက်ပါလာစေမည့် Linear Interpolation Smooth Logic
            if (player.isDragging) {
                const dx = player.targetX - player.x;
                const dy = player.targetY - player.y;
                const distance = Math.hypot(dx, dy);

                if (distance > 2) {
                    player.isMoving = true;
                    player.walkCycle += 0.28 * dt; // လမ်းလျှောက်မှု သက်ဝင်လှုပ်ရှားနှုန်း
                    
                    // တစ်ဆင့်ချင်း ညက်ညောစွာ ကပ်သွားစေရန်
                    player.x += dx * 0.25 * dt;
                    player.y += dy * 0.25 * dt;
                } else {
                    player.isMoving = false;
                }
            } else {
                player.isMoving = false;
                player.walkCycle = 0;
            }

            // Screen Boundaries (ကစားကွက်ဘောင်ကျော်မသွားစေရန်)
            player.x = Math.max(player.width/2 + 10, Math.min(canvas.width - player.width/2 - 10, player.x));
            player.y = Math.max(player.height/2 + 100, Math.min(canvas.height - player.height/2 - 20, player.y));

            // Background Rain Loop
            entities.rainDrops.forEach(drop => {
                drop.y += drop.speed * dt;
                if (drop.y > canvas.height) { drop.y = -20; drop.x = Math.random() * canvas.width; }
            });

            // Splash Animation
            for (let i = entities.splashEffects.length - 1; i >= 0; i--) {
                const s = entities.splashEffects[i]; s.y += s.vy * dt; s.x += s.vx * dt; s.alpha -= 0.04 * dt;
                if (s.alpha <= 0) entities.splashEffects.splice(i, 1);
            }

            // Umbrellas Collision Loop
            for (let i = entities.umbrellas.length - 1; i >= 0; i--) {
                const u = entities.umbrellas[i]; u.y += u.speed * dt;

                if (u.y > canvas.height + 40) { entities.umbrellas.splice(i, 1); continue; }

                // Precision Body Check for Touching Umbrella
                const pTopY = player.y - player.height/2;
                const distanceX = Math.abs(u.x - player.x);
                const distanceY = Math.abs((u.y + 12) - pTopY);

                if (distanceX < (u.radius + player.width/2 - 4) && distanceY < 24) {
                    if (u.letter === game.targetLetter) {
                        playSound('catch_correct'); game.score += 20; player.xp += 25;
                        game.correctPops++;
                        if (player.xp >= player.maxXp) {
                            playSound('levelup'); player.level++; player.xp = 0; player.maxXp = Math.round(player.maxXp * 1.4);
                        }
                        for(let k=0; k<12; k++) {
                            entities.splashEffects.push({ x: u.x, y: u.y, vx: (Math.random() - 0.5) * 6, vy: -2 - Math.random() * 4, alpha: 1 });
                        }
                    } else {
                        playSound('catch_wrong'); game.incorrectPops++; player.hp = Math.max(0, player.hp - 15);
                        if (player.hp <= 0) gameOver();
                    }
                    entities.umbrellas.splice(i, 1);
                }
            }

            document.getElementById('xp-bar').style.width = `${(player.xp / player.maxXp) * 100}%`;
            document.getElementById('level-display').innerText = `Lvl ${player.level}`;
            document.getElementById('cash-display').innerText = game.score;
            document.getElementById('hp-display').innerText = `${Math.max(0, Math.round(player.hp))} / ${player.maxHp}`;
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGrad.addColorStop(0, '#022c22'); bgGrad.addColorStop(1, '#064e3b');
            ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(165, 243, 252, 0.22)'; ctx.lineWidth = 1.5;
            entities.rainDrops.forEach(drop => {
                ctx.beginPath(); ctx.moveTo(drop.x, drop.y); ctx.lineTo(drop.x, drop.y + drop.length); ctx.stroke();
            });

            entities.splashEffects.forEach(s => {
                ctx.fillStyle = `rgba(165, 243, 252, ${s.alpha})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, 3, 0, Math.PI * 2); ctx.fill();
            });

            entities.umbrellas.forEach(u => drawUmbrella(ctx, u));
            drawPlayer(ctx, player);
        }

        let lastTime = performance.now();
        function gameLoop(now) {
            let dt = (now - lastTime) / 16.666; lastTime = now; if (dt > 4) dt = 4;
            updateGame(dt); render(); requestAnimationFrame(gameLoop);
        }

        function startGame() {
            player.hp = player.maxHp; player.xp = 0; player.level = 1;
            player.x = canvas.width / 2; player.y = canvas.height - 130;
            player.targetX = canvas.width / 2; player.targetY = canvas.height - 130;
            game.score = 0; game.correctPops = 0; game.incorrectPops = 0;
            entities.umbrellas = []; entities.splashEffects = [];
            initRain();
            document.getElementById('overlay-screen').classList.add('hidden'); game.running = true;
        }

        function gameOver() {
            game.running = false;
            document.getElementById('stat-coins').innerText = game.correctPops;
            document.getElementById('stat-kills').innerText = game.incorrectPops;
            document.getElementById('stat-level').innerText = `Lvl ${player.level}`;
            document.getElementById('game-stats').classList.remove('hidden');
            document.getElementById('start-btn').innerText = "ပြန်လည်ကြိုးစားမည် 🔄";
            document.getElementById('overlay-screen').classList.remove('hidden');
        }

        document.getElementById('start-btn').onclick = startGame;
        window.onload = function() { 
            resizeCanvas(); 
            initRain(); 
            requestAnimationFrame(gameLoop); 
        };
    </script>
</body>
</html>
