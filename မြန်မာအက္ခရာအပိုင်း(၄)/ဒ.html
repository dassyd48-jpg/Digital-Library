<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>မှော်ဝင်ဒေါင်းလေးရဲ့ အမြီးလှလှ - "ဒ" စာလုံး</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght@400;700;900&family=Pyidaungsu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #030712; 
            font-family: 'Fredoka One', 'Pyidaungsu', 'Montserrat', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .burmese-font {
            font-family: 'Pyidaungsu', sans-serif;
        }
    </style>
</head>
<body class="relative select-none">

    <div id="hud" class="absolute top-4 left-4 right-4 pointer-events-none z-30 flex flex-col space-y-2 max-w-md burmese-font">
        <div class="flex items-center space-x-3 bg-slate-950/90 backdrop-blur-md p-3 rounded-2xl border border-teal-500/20 shadow-lg">
            <span class="text-xs font-black text-teal-400 tracking-wider uppercase">ဒေါင်းအမြီး အလှဆင်မှု 🌟</span>
            <div class="flex-1 bg-black/40 h-4 rounded-full overflow-hidden p-0.5 border border-white/5">
                <div id="xp-bar" class="bg-gradient-to-r from-teal-400 via-emerald-400 to-cyan-400 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <span id="level-display" class="bg-teal-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Level 1</span>
        </div>
        
        <div class="flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="flex items-center space-x-2 bg-slate-950/90 backdrop-blur-md px-4 py-2 rounded-2xl border border-teal-500/20 shadow-lg">
                    <span class="text-xl">🦚</span>
                    <span id="cash-display" class="text-white font-black tracking-widest text-sm">0</span>
                </div>
                <div class="flex items-center space-x-2 bg-gradient-to-r from-teal-500/20 to-emerald-500/20 backdrop-blur-md px-4 py-2 rounded-2xl border border-teal-500/40 shadow-lg animate-pulse">
                    <span class="text-xs font-black text-teal-400 uppercase tracking-wider">ရှာရမည့်စာလုံး -</span>
                    <span id="target-letter-display" class="burmese-font text-2xl font-bold text-yellow-300">ဒ</span>
                </div>
            </div>

            <div class="flex space-x-2 pointer-events-auto">
                <a href="index.html?fromGame=true" class="px-3 py-2 bg-slate-950/90 hover:bg-slate-900 border border-teal-500/30 rounded-xl text-xs text-white flex items-center space-x-1 shadow-md transition-all active:scale-95 cursor-pointer">
                    <span>🏠</span> <span class="hidden sm:inline">ပင်မမြေပုံ</span>
                </a>
                <a href="index.html?fromGame=true&showPopup=stage3" class="px-3 py-2 bg-slate-950/90 hover:bg-slate-900 border border-amber-500/30 rounded-xl text-xs text-white flex items-center space-x-1 shadow-md transition-all active:scale-95 cursor-pointer">
                    <span>↩️</span> <span class="hidden sm:inline">နောက်သို့</span>
                </a>
            </div>
        </div>
    </div>

    <div class="absolute top-4 right-4 z-30 pointer-events-none flex items-center space-x-2 bg-slate-950/90 backdrop-blur-md px-4 py-2 rounded-2xl border border-teal-500/20 shadow-lg">
        <span class="text-lg">❤️</span>
        <span id="hp-display" class="text-rose-500 font-black tracking-wider text-sm">100 / 100</span>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="overlay-screen" class="absolute inset-0 bg-slate-950/95 backdrop-blur-md z-[90] flex flex-col items-center justify-center text-center p-8 burmese-font">
        <h1 class="text-1xl sm:text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-400 via-emerald-300 to-cyan-400 tracking-widest mb-2 uppercase drop-shadow-[0_0_30px_rgba(20,184,166,0.3)]">PEACOCK FEATHER MATCHER</h1>
        <p class="text-amber-400 text-[18px] uppercase font-black tracking-[0.4em] mb-16">"ဒ" စာလုံး ဒေါင်းလေးရဲ့အမြီးလှလှဂိမ်း</p>
        
        <div id="game-stats" class="hidden bg-white/5 border border-white/5 rounded-3xl p-6 mb-10 max-w-xs w-full text-left space-y-3 font-sans">
            <div class="flex justify-between"><span class="text-neutral-400 burmese-font">မှန်ကန်စွာ ဆွဲထည့်နိုင်မှု</span><span id="stat-coins" class="text-white font-bold">0</span></div>
            <div class="flex justify-between"><span class="text-neutral-400 burmese-font">မှားယွင်းစွာ ဆွဲထည့်မှု</span><span id="stat-kills" class="text-white font-bold">0</span></div>
            <div class="flex justify-between"><span class="text-neutral-400 burmese-font">ရောက်ရှိသွားသည့် အဆင့်</span><span id="stat-level" class="text-teal-400 font-bold">Level 1</span></div>
        </div>

        <button id="start-btn" class="px-16 py-6 bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-teal-500 hover:to-emerald-500 text-white font-black text-xs uppercase tracking-[0.3em] rounded-full transition-all shadow-[0_20px_50px_rgba(20,184,166,0.3)] border-b-4 border-teal-800 pointer-events-auto cursor-pointer">ဂိမ်းစတင်မည်</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'match_correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(659.25, now + 0.08); osc.frequency.setValueAtTime(783.99, now + 0.15);
                gainNode.gain.setValueAtTime(0.08, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'match_wrong') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(180, now); osc.frequency.linearRampToValueAtTime(90, now + 0.25);
                gainNode.gain.setValueAtTime(0.12, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now); osc.stop(now + 0.25);
            } else if (type === 'levelup') {
                const notes = [261.63, 329.63, 392.00, 523.25];
                notes.forEach((f, i) => {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination); o.type = 'sine';
                    o.frequency.setValueAtTime(f, now + i * 0.06); g.gain.setValueAtTime(0.06, now + i * 0.06);
                    g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.06 + 0.2); o.start(now + i * 0.06); o.stop(now + i * 0.06 + 0.2);
                });
            }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (peacock) {
                peacock.x = canvas.width / 2;
                peacock.y = canvas.height / 2 + 100;
            }
        }
        window.addEventListener('resize', resizeCanvas);

        const burmeseAlphabets = ['က','ခ','ဂ','င','စ','ဆ','ည','တ','ထ','ဒ','ဓ','န','ပ','ဖ','ဗ','မ','ယ','ရ','လ','ဝ','သ','ဟ','အ'];
        
        const game = { running: false, score: 0, correctPops: 0, incorrectPops: 0, targetLetter: 'ဒ' };
        const player = { hp: 100, level: 1 };

        const peacock = {
            x: window.innerWidth / 2,
            y: window.innerHeight / 2 + 100,
            bodyRadius: 36,
            headRadius: 20,
            headYOffset: -60,
            danceTimer: 0,
            reactionMode: 'idle', 
            reactionTimer: 0,
            tailSlots: [] 
        };

        const entities = { feathers: [], magicStars: [] };
        let draggedFeather = null;

        function initTailSlots() {
            peacock.tailSlots = [];
            let totalSlots = 6; 
            let radius = 130;

            if (player.level === 2) {
                totalSlots = 10; 
                radius = 150;
            } else if (player.level >= 3) {
                totalSlots = 15; 
                radius = 170;
            }

            const startAngle = Math.PI + 0.2; 
            const endAngle = Math.PI * 2 - 0.2;

            for (let i = 0; i < totalSlots; i++) {
                const angle = startAngle + (endAngle - startAngle) * (i / (totalSlots - 1));
                peacock.tailSlots.push({
                    angle: angle,
                    radius: radius,
                    filled: false,
                    pulse: 0
                });
            }
        }

        function drawPeacock(ctx, p) {
            ctx.save();
            ctx.translate(p.x, p.y);

            // 🦚 Tail Background Slots Drawing
            p.tailSlots.forEach((slot) => {
                const sx = Math.cos(slot.angle) * slot.radius;
                const sy = Math.sin(slot.angle) * slot.radius;

                ctx.save();
                ctx.translate(sx, sy);
                
                if (slot.filled) {
                    ctx.save();
                    ctx.rotate(slot.angle + Math.PI/2);
                    // ဗဟိုကို (0, 0) မှာပဲ အတိအကျထားပါတယ်
                    const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, 22);
                    grad.addColorStop(0, '#f59e0b');
                    grad.addColorStop(0.3, '#0d9488');
                    grad.addColorStop(0.7, '#1e3a8a');
                    grad.addColorStop(1, 'transparent');
                    ctx.fillStyle = grad;
                    ctx.beginPath(); ctx.ellipse(0, 0, 18, 25, 0, 0, Math.PI*2); ctx.fill();
                    ctx.strokeStyle = '#14b8a6'; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.moveTo(0, 25); ctx.lineTo(0, 10); ctx.stroke();
                    ctx.restore();

                    // စာလုံးဗဟို (0, 0) တည့်တည့်
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 20px Pyidaungsu, sans-serif';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(game.targetLetter, 0, 0);
                } else {
                    slot.pulse += 0.06;
                    
                    ctx.save();
                    ctx.rotate(slot.angle + Math.PI/2);
                    ctx.strokeStyle = 'rgba(20, 184, 166, 0.4)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([4, 4]);
                    ctx.beginPath(); ctx.ellipse(0, 0, 16, 22, 0, 0, Math.PI*2); ctx.stroke();
                    ctx.restore();
                    
                    // လမ်းညွှန်စာလုံးဗဟို (0, 0) တည့်တည့်
                    ctx.fillStyle = 'rgba(20, 184, 166, 0.4)';
                    ctx.font = 'bold 18px Pyidaungsu, sans-serif';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(game.targetLetter, 0, 0);
                }
                ctx.restore();
            });

            // ဒေါင်းခြေထောက်ကလေးများ
            ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(-12, p.bodyRadius - 5); ctx.lineTo(-14, p.bodyRadius + 20); ctx.lineTo(-20, p.bodyRadius + 24);
            ctx.moveTo(-14, p.bodyRadius + 20); ctx.lineTo(-10, p.bodyRadius + 24); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(12, p.bodyRadius - 5); ctx.lineTo(14, p.bodyRadius + 20); ctx.lineTo(10, p.bodyRadius + 24);
            ctx.moveTo(14, p.bodyRadius + 20); ctx.lineTo(20, p.bodyRadius + 24); ctx.stroke();

            // ဒေါင်းကိုယ်ထည် (Main Body)
            const bodyGrad = ctx.createLinearGradient(0, -p.bodyRadius, 0, p.bodyRadius);
            bodyGrad.addColorStop(0, '#0284c7'); bodyGrad.addColorStop(1, '#1e3a8a');
            ctx.fillStyle = bodyGrad;
            ctx.beginPath(); ctx.arc(0, 0, p.bodyRadius, 0, Math.PI * 2); ctx.fill();

            // ဒေါင်းလည်ပင်းနှင့် မျက်နှာ
            let hx = 0; let hy = p.headYOffset;
            if (p.reactionMode === 'happy') {
                hy += Math.sin(p.danceTimer * 2.5) * 5; 
            } else if (p.reactionMode === 'sad') {
                hx += Math.sin(p.danceTimer * 3.5) * 4; 
            } else {
                hy += Math.sin(p.danceTimer) * 1.5; 
            }

            ctx.strokeStyle = '#0284c7'; ctx.lineWidth = 14; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(hx, hy + 10); ctx.stroke();

            // ဦးခေါင်း (Head)
            ctx.fillStyle = '#0369a1';
            ctx.beginPath(); ctx.arc(hx, hy, p.headRadius, 0, Math.PI * 2); ctx.fill();

            // 👑 ဒေါင်းမောက်လေး
            ctx.fillStyle = '#14b8a6';
            for (let i = -1; i <= 1; i++) {
                const cx = hx + i * 7; const cy = hy - p.headRadius - 8;
                ctx.beginPath(); ctx.moveTo(hx, hy - p.headRadius + 2); ctx.lineTo(cx, cy); ctx.stroke();
                ctx.beginPath(); ctx.arc(cx, cy, 3, 0, Math.PI*2); ctx.fill();
            }

            // မျက်လုံးများ
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(hx - 6, hy - 4, 5, 0, Math.PI*2); ctx.arc(hx + 6, hy - 4, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#0f172a';
            ctx.beginPath(); ctx.arc(hx - 6, hy - 4, 2.5, 0, Math.PI*2); ctx.arc(hx + 6, hy - 4, 2.5, 0, Math.PI*2); ctx.fill();

            // နှုတ်သီး
            ctx.fillStyle = '#f59e0b';
            ctx.beginPath(); ctx.moveTo(hx - 5, hy + 3); ctx.lineTo(hx + 5, hy + 3); ctx.lineTo(hx, hy + 13); ctx.closePath(); ctx.fill();

            ctx.restore();
        }

        function drawFeather(ctx, f) {
            ctx.save();
            ctx.translate(f.x, f.y);

            if (f === draggedFeather) {
                ctx.shadowColor = '#06b6d4'; ctx.shadowBlur = 20;
            }

            // ရိုးတံလေးကို ဗဟို (0, 0) နဲ့ကိုက်အောင် ဆွဲပါတယ်
            ctx.strokeStyle = '#2dd4bf'; ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.moveTo(0, 20); ctx.lineTo(0, -20); ctx.stroke();

            // ငှက်မွှေးအမိုးအဝိုင်းကို (0, 0) တည့်တည့်မှာ ထားလိုက်ပါတယ်
            const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, 18);
            const isTarget = f.letter === game.targetLetter;
            grad.addColorStop(0, isTarget ? '#2dd4bf' : '#f43f5e');
            grad.addColorStop(0.4, '#0f766e');
            grad.addColorStop(0.8, '#1e1b4b');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.ellipse(0, 0, 15, 22, 0, 0, Math.PI * 2); ctx.fill();

            // ကျဆင်းလာမည့်စာလုံး ဗဟို (0, 0) ကွက်တိ
            ctx.fillStyle = '#ffffff'; 
            ctx.font = 'bold 18px Pyidaungsu, sans-serif';
            ctx.textAlign = 'center'; 
            ctx.textBaseline = 'middle';
            ctx.fillText(f.letter, 0, 0); 

            ctx.restore();
        }

        function spawnFeather() {
            if (!game.running) return;
            if (entities.feathers.length >= 6) return;

            const x = 40 + Math.random() * (canvas.width - 80);
            const isTargetSpawn = Math.random() < 0.45;
            let chosenLetter = game.targetLetter;
            if (!isTargetSpawn) {
                const filtered = burmeseAlphabets.filter(c => c !== game.targetLetter);
                chosenLetter = filtered[Math.floor(Math.random() * filtered.length)];
            }

            entities.feathers.push({
                id: Math.random(), x: x, y: -40, letter: chosenLetter,
                speedY: 1.0 + Math.random() * 1.3, 
                waveSpeed: 0.02 + Math.random() * 0.02,
                waveParam: Math.random() * 100
            });
        }

        setInterval(spawnFeather, 1500);

        function getCanvasTouchCoords(clientX, clientY) {
            return { x: clientX, y: clientY };
        }

        function handleDragStart(clientX, clientY) {
            if (!game.running) return;
            const pos = getCanvasTouchCoords(clientX, clientY);

            for (let i = entities.feathers.length - 1; i >= 0; i--) {
                const f = entities.feathers[i];
                const dist = Math.hypot(pos.x - f.x, pos.y - f.y); 
                if (dist < 45) {
                    draggedFeather = f;
                    break;
                }
            }
        }

        function handleDragMove(clientX, clientY) {
            if (!draggedFeather) return;
            const pos = getCanvasTouchCoords(clientX, clientY);
            draggedFeather.x = pos.x;
            draggedFeather.y = pos.y; 
        }

        function handleDragEnd() {
            if (!draggedFeather) return;

            let matched = false;
            for (let i = 0; i < peacock.tailSlots.length; i++) {
                const slot = peacock.tailSlots[i];
                const sx = peacock.x + Math.cos(slot.angle) * slot.radius;
                const sy = peacock.y + Math.sin(slot.angle) * slot.radius;
                const distToSlot = Math.hypot(draggedFeather.x - sx, draggedFeather.y - sy);

                if (distToSlot < 55) {
                    if (draggedFeather.letter === game.targetLetter) {
                        if (!slot.filled) {
                            playSound('match_correct');
                            slot.filled = true; game.score += 20; game.correctPops++;
                            peacock.reactionMode = 'happy'; peacock.reactionTimer = 40;
                            
                            for (let k = 0; k < 15; k++) {
                                entities.magicStars.push({ x: sx, y: sy, vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5, size: 2 + Math.random() * 4, alpha: 1 });
                            }
                            matched = true;
                            checkLevelComplete();
                        }
                    } else {
                        playSound('match_wrong');
                        game.incorrectPops++; player.hp = Math.max(0, player.hp - 15);
                        peacock.reactionMode = 'sad'; peacock.reactionTimer = 45;
                        if (player.hp <= 0) gameOver();
                        matched = true; 
                    }
                    break;
                }
            }

            if (matched || draggedFeather.y > canvas.height + 40) {
                entities.feathers = entities.feathers.filter(item => item.id !== draggedFeather.id);
            }
            draggedFeather = null;
        }

        window.addEventListener('touchstart', (e) => {
            const t = e.touches[0]; handleDragStart(t.clientX, t.clientY);
        }, { passive: true });
        window.addEventListener('touchmove', (e) => {
            const t = e.touches[0]; handleDragMove(t.clientX, t.clientY);
        }, { passive: true });
        window.addEventListener('touchend', handleDragEnd);

        window.addEventListener('mousedown', (e) => { handleDragStart(e.clientX, e.clientY); });
        window.addEventListener('mousemove', (e) => { handleDragMove(e.clientX, e.clientY); });
        window.addEventListener('mouseup', handleDragEnd);

        function checkLevelComplete() {
            const allFilled = peacock.tailSlots.every(slot => slot.filled);
            if (allFilled) {
                playSound('levelup');
                player.level++;
                
                setTimeout(() => {
                    if (player.level > 3) {
                        alert("ဂုဏ်ယူပါတယ် Dassy ရေ! အဆင့်အားလုံးကို အောင်မြင်စွာ ဆော့ရုံပြီးပါပြီရှင်။ 🎉");
                        player.level = 1;
                    }
                    initTailSlots();
                }, 1500);
            }
        }

        function updateGame(dt) {
            peacock.danceTimer += 0.05 * dt;

            if (peacock.reactionTimer > 0) {
                peacock.reactionTimer -= 1 * dt;
                if (peacock.reactionTimer <= 0) peacock.reactionMode = 'idle';
            }

            entities.feathers.forEach(f => {
                if (f !== draggedFeather) {
                    f.waveParam += f.waveSpeed * dt;
                    f.y += f.speedY * dt;
                    f.x += Math.sin(f.waveParam) * 0.5 * dt; 
                }
            });

            for (let i = entities.feathers.length - 1; i >= 0; i--) {
                if (entities.feathers[i].y > canvas.height + 40 && entities.feathers[i] !== draggedFeather) {
                    entities.feathers.splice(i, 1);
                }
            }

            for (let i = entities.magicStars.length - 1; i >= 0; i--) {
                const s = entities.magicStars[i]; s.x += s.vx * dt; s.y += s.vy * dt; s.alpha -= 0.03 * dt;
                if (s.alpha <= 0) entities.magicStars.splice(i, 1);
            }

            let totalInCurrentLevel = peacock.tailSlots.length;
            let filledCount = peacock.tailSlots.filter(s => s.filled).length;
            document.getElementById('xp-bar').style.width = `${(filledCount / totalInCurrentLevel) * 100}%`;
            
            document.getElementById('level-display').innerText = `Level ${player.level}`;
            document.getElementById('cash-display').innerText = game.score;
            document.getElementById('hp-display').innerText = `${Math.round(player.hp)} / 100`;
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGrad.addColorStop(0, '#020617'); bgGrad.addColorStop(1, '#0f172a');
            ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            for(let i=1; i<=5; i++) {
                ctx.beginPath(); ctx.arc((canvas.width/6)*i, 100 + Math.sin(peacock.danceTimer + i)*12, 1.5, 0, Math.PI*2); ctx.fill();
            }

            entities.magicStars.forEach(s => {
                ctx.fillStyle = `rgba(45, 212, 191, ${s.alpha})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
            });

            drawPeacock(ctx, peacock);
            entities.feathers.forEach(f => drawFeather(ctx, f));
        }

        let lastTime = performance.now();
        function gameLoop(now) {
            let dt = (now - lastTime) / 16.666; lastTime = now; if (dt > 4) dt = 4;
            updateGame(dt); render(); requestAnimationFrame(gameLoop);
        }

        function startGame() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            player.hp = 100; player.level = 1;
            game.score = 0; game.correctPops = 0; game.incorrectPops = 0;
            entities.feathers = []; entities.magicStars = [];
            peacock.reactionMode = 'idle';
            initTailSlots();
            resizeCanvas();
            document.getElementById('overlay-screen').classList.add('hidden'); game.running = true;
        }

        function gameOver() {
            game.running = false;
            document.getElementById('stat-coins').innerText = game.correctPops;
            document.getElementById('stat-kills').innerText = game.incorrectPops;
            document.getElementById('stat-level').innerText = `Level ${player.level}`;
            document.getElementById('game-stats').classList.remove('hidden');
            document.getElementById('start-btn').innerText = "ပြန်လည်ကြိုးစားမည် 🔄";
            document.getElementById('overlay-screen').classList.remove('hidden');
        }

        document.getElementById('start-btn').onclick = startGame;
        window.onload = function() { resizeCanvas(); requestAnimationFrame(gameLoop); };
    </script>
</body>
</html>
