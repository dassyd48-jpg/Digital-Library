<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Burmese Alphabet Hide & Seek - Lesson 4 (Under the Sea)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght=600;700&family=Noto+Sans+Myanmar:wght=700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; user-select: none; }
    
    body {
      font-family: 'Fredoka', 'Noto Sans Myanmar', system-ui, sans-serif;
      background: linear-gradient(to bottom, #006064 0%, #00acc1 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 10px;
    }

    /* ==========================================================================
       HEADER PANEL & NAV BUTTONS
       ========================================================================= */
    .header-panel {
      width: 100%; max-width: 800px; background: white; border: 4px solid #00838f;
      border-radius: 20px; padding: 10px 20px; display: flex; align-items: center;
      justify-content: space-between; box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      z-index: 10; margin-bottom: 12px; position: relative;
    }
    .instruction { font-size: 20px; font-weight: 700; color: #006064; display: flex; align-items: center; gap: 12px; }
    .target-box {
      font-family: 'Noto Sans Myanmar', sans-serif; font-size: 34px; font-weight: 900;
      color: white; background: #00acc1; padding: 2px 24px; border-radius: 14px;
      box-shadow: 0 4px 0 #00838f; animation: pulseTarget 1s infinite alternate;
    }
    @keyframes pulseTarget { 0% { transform: scale(1); } 100% { transform: scale(1.06); } }
    
    .right-header-area { display: flex; align-items: center; gap: 15px; }
    .score-stars { font-size: 24px; color: #ffb300; letter-spacing: 3px; }
    
    /* In-Game Home Button */
    .btn-home-nav {
      font-family: 'Noto Sans Myanmar', sans-serif; background: #e0f7fa; color: #00838f;
      border: 2px solid #00838f; padding: 4px 14px; border-radius: 12px; font-weight: 700;
      font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px;
      transition: all 0.2s ease; box-shadow: 0 3px 0 #00838f;
    }
    .btn-home-nav:active { transform: translateY(2px); box-shadow: 0 1px 0 #00838f; }

    /* ==========================================================================
       GAME STAGE (UNDERWATER ARENA) - RESPONSIVE OPTIMIZED
       ========================================================================= */
    .game-stage {
      position: relative; width: 100%; max-width: 800px; aspect-ratio: 16/10;
      background: linear-gradient(to bottom, #00b0ff 0%, #00838f 60%, #004d40 100%);
      border: 6px solid #00838f; border-radius: 24px; overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .sea-floor {
      position: absolute; bottom: 0; left: 0; right: 0; height: 18%;
      background: linear-gradient(to bottom, #e0a96d 0%, #c58c54 100%);
      z-index: 3; border-top: 4px solid #b77f49;
    }

    .light-rays {
      position: absolute; top: 0; left: 0; right: 0; height: 60%;
      background: linear-gradient(105deg, rgba(255,255,255,0.2) 0%, transparent 40%, rgba(255,255,255,0.15) 60%, transparent 100%);
      z-index: 1; pointer-events: none; opacity: 0.6;
    }

    .bubble { position: absolute; background: rgba(255, 255, 255, 0.3); border: 1px solid rgba(255,255,255,0.5); border-radius: 50%; bottom: -30px; animation: floatUpSystem 7s infinite ease-in-out; pointer-events: none; z-index: 2; }
    .bubble::after { content: ''; position: absolute; top: 2px; left: 3px; width: 4px; height: 4px; background: rgba(255,255,255,0.6); border-radius: 50%; }
    
    @keyframes floatUpSystem {
      0% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 0.7; }
      50% { transform: translateY(-200px) translateX(-15px); }
      90% { opacity: 0.7; }
      100% { transform: translateY(-450px) translateX(15px); opacity: 0; }
    }

    /* ==========================================================================
       HIDING SLOTS & SCREEN OVERLAYS
       ========================================================================= */
    .spot-container { position: absolute; z-index: 5; cursor: pointer; }
    .object-layer { position: absolute; inset: 0; z-index: 7; pointer-events: none; }
    .click-capturer { position: absolute; inset: 0; z-index: 8; border-radius: 50%; }

    /* Objects Styles mapping */
    .spot-chest { bottom: 12%; left: 6%; width: 130px; height: 110px; }
    .chest-body { position: absolute; bottom: 0; left: 0; width: 130px; height: 65px; background: #5d4037; border-radius: 4px 4px 12px 12px; border: 4px solid #3e2723; }
    .chest-gold { position: absolute; bottom: 55px; left: 10px; width: 110px; height: 20px; background: #ffd54f; border-radius: 50% 50% 0 0; box-shadow: 0 0 10px #ffca28; }
    .chest-lid { position: absolute; bottom: 62px; left: -2px; width: 134px; height: 35px; background: #8d6e63; border-radius: 20px 20px 4px 4px; border: 4px solid #3e2723; transform-origin: bottom left; }
    .chest-lock { position: absolute; bottom: 45px; left: 55px; width: 20px; height: 25px; background: #ffca28; border: 2px solid #b78a00; border-radius: 4px; }

    .spot-coral { bottom: 10%; left: 28%; width: 140px; height: 140px; }
    .coral-branch-1 { position: absolute; bottom: 10px; left: 20px; width: 45px; height: 100px; background: #ff4081; border-radius: 25px 25px 0 0; box-shadow: inset -6px 0 0 #f50057; }
    .coral-branch-1::before { content: ''; position: absolute; top: 30px; right: -20px; width: 35px; height: 24px; background: #ff4081; border-radius: 0 15px 15px 0; }
    .coral-branch-2 { position: absolute; bottom: 10px; left: 65px; width: 40px; height: 115px; background: #ab47bc; border-radius: 20px 20px 0 0; transform: rotate(10deg); box-shadow: inset -6px 0 0 #7b1fa2; }
    .coral-branch-2::after { content: ''; position: absolute; top: 40px; left: -20px; width: 30px; height: 22px; background: #ab47bc; border-radius: 15px 0 0 15px; }

    .spot-clam { bottom: 8%; left: 52%; width: 120px; height: 85px; }
    .clam-bottom { position: absolute; bottom: 0; left: 5px; width: 110px; height: 50px; background: #ffcc80; border: 4px solid #f57c00; border-radius: 10px 10px 50px 50px; }
    .clam-pearl { position: absolute; bottom: 25px; left: 48px; width: 24px; height: 24px; background: #ffffff; border-radius: 50%; box-shadow: 0 0 15px #ffffff, inset -4px -4px 0 #e0e0e0; z-index: 6; }
    .clam-top { position: absolute; top: 0; left: 0; width: 120px; height: 50px; background: #ffe0b2; border: 4px solid #f57c00; border-radius: 50% 50% 10px 10px; box-shadow: inset 0 8px 0 rgba(255,255,255,0.5); }

    .spot-seaweed { bottom: 12%; right: 24%; width: 110px; height: 160px; }
    .weed-strand { position: absolute; bottom: 0; width: 22px; background: linear-gradient(to top, #2e7d32, #4caf50); border-radius: 15px 15px 0 0; animation: waveWeed 3s infinite ease-in-out alternate; transform-origin: bottom center; }
    .weed-1 { left: 15px; height: 140px; }
    .weed-2 { left: 45px; height: 160px; animation-delay: 0.5s; }
    .weed-3 { left: 75px; height: 125px; animation-delay: 0.2s; }
    @keyframes waveWeed { 0% { transform: rotate(-5deg) skewX(-3deg); } 100% { transform: rotate(8deg) skewX(4deg); } }

    .spot-submarine { bottom: 24%; right: 4%; width: 160px; height: 130px; }
    .sub-body { position: absolute; bottom: 15px; left: 0; width: 140px; height: 85px; background: #ffeb3b; border: 4px solid #f57f17; border-radius: 50px; box-shadow: inset -10px -10px 0 #fbc02d; }
    .sub-window { position: absolute; top: 40px; left: 45px; width: 34px; height: 34px; background: #b3e5fc; border: 4px solid #f57f17; border-radius: 50%; box-shadow: inset 3px 3px 0 rgba(255,255,255,0.7); }
    .sub-tower { position: absolute; top: -12px; left: 50px; width: 35px; height: 35px; background: #ffeb3b; border: 4px solid #f57f17; border-radius: 6px 6px 0 0; }
    .sub-scope { position: absolute; top: -26px; left: 68px; width: 20px; height: 18px; border-top: 5px solid #f57f17; border-right: 5px solid #f57f17; }

    /* ==========================================================================
       CHARACTER ANIMATIONS MECHANICS
       ========================================================================= */
    .kid-character {
      position: absolute; width: 70px; height: 110px; display: flex; flex-direction: column; align-items: center;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.25); z-index: 4; pointer-events: none;
    }
    
    .spot-chest .kid-character { left: 30px; bottom: 5px; }
    .spot-coral .kid-character { left: 55px; bottom: 10px; }
    .spot-clam .kid-character { left: 25px; bottom: -5px; }
    .spot-seaweed .kid-character { left: 20px; bottom: 5px; }
    .spot-submarine .kid-character { left: 20px; bottom: 10px; }

    .held-letter {
      position: absolute; top: -46px; left: 50%; transform: translateX(-50%) scale(0);
      font-family: 'Noto Sans Myanmar', sans-serif; font-size: 26px; font-weight: 900;
      background: #e0f7fa; color: #006064; border: 3px solid #00838f;
      padding: 2px 14px; border-radius: 14px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2);
      box-shadow: 0 6px 12px rgba(0,0,0,0.15); line-height: 1.2; z-index: 10;
    }
    .held-letter::after {
      content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
      border-width: 8px 8px 0; border-style: solid; border-color: #00838f transparent; display: block; width: 0;
    }

    .kid-head { width: 42px; height: 42px; background: #fbe9e7; border-radius: 50%; position: relative; border: 2px solid #37474f; z-index: 5; }
    .kid-hair { position: absolute; top: -2px; left: -2px; right: -2px; height: 16px; background: #e65100; border-radius: 20px 20px 0 0; }
    .kid-eyes { position: absolute; top: 16px; left: 8px; right: 8px; display: flex; justify-content: space-between; }
    .kid-eyes::before, .kid-eyes::after { content: ''; width: 6px; height: 6px; background: #263238; border-radius: 50%; }
    .kid-smile { position: absolute; bottom: 6px; left: 16px; width: 10px; height: 6px; border-bottom: 2px solid #263238; border-radius: 0 0 5px 5px; }
    .kid-goggles { position: absolute; top: 11px; left: 3px; width: 32px; height: 12px; border: 2px solid #00e5ff; background: rgba(0,229,255,0.3); border-radius: 6px; z-index: 6; }

    .kid-body { 
      width: 26px; height: 45px; background: linear-gradient(to bottom, #00e676, #00b0ff); border-radius: 0 0 10px 10px; margin-top: -2px; position: relative; z-index: 4;
      opacity: 0; transform: translateY(10px); transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .kid-body::after {
      content: ''; position: absolute; bottom: -12px; left: -6px; width: 38px; height: 16px;
      background: #00b0ff; clip-path: polygon(0 100%, 50% 0%, 100% 100%, 75% 50%, 25% 50%);
    }

    .spot-chest.peek .kid-character { transform: translateY(-55px); }
    .spot-coral.peek .kid-character { transform: translateX(45px) translateY(-25px); }
    .spot-clam.peek .kid-character { transform: translateY(-50px); }
    .spot-seaweed.peek .kid-character { transform: translateY(-60px); }
    .spot-submarine.peek .kid-character { transform: translateX(-40px) translateY(-20px); }

    .spot-container.peek .held-letter { transform: translateX(-50%) scale(1); }
    .spot-container.peek .kid-body { opacity: 1; transform: translateY(0); }

    /* Win Jumps & Shakes */
    .spot-chest.success .kid-character { animation: swimJumpCH 0.4s infinite alternate; }
    @keyframes swimJumpCH { 0% { transform: translateY(-55px); } 100% { transform: translateY(-75px); } }
    .spot-coral.success .kid-character { animation: swimJumpCR 0.4s infinite alternate; }
    @keyframes swimJumpCR { 0% { transform: translateX(45px) translateY(-25px); } 100% { transform: translateX(45px) translateY(-45px); } }
    .spot-clam.success .kid-character { animation: swimJumpCL 0.4s infinite alternate; }
    @keyframes swimJumpCL { 0% { transform: translateY(-50px); } 100% { transform: translateY(-70px); } }
    .spot-seaweed.success .kid-character { animation: swimJumpSW 0.4s infinite alternate; }
    @keyframes swimJumpSW { 0% { transform: translateY(-60px); } 100% { transform: translateY(-80px); } }
    .spot-submarine.success .kid-character { animation: swimJumpSB 0.4s infinite alternate; }
    @keyframes swimJumpSB { 0% { transform: translateX(-40px) translateY(-20px); } 100% { transform: translateX(-40px) translateY(-40px); } }

    .spot-container.success .kid-body { opacity: 1; transform: translateY(0); }

    .spot-chest.wrong .kid-character { animation: shakeCH 0.4s ease; }
    @keyframes shakeCH { 0%, 100% { transform: translateY(-55px); } 25% { transform: translateX(-6px) translateY(-55px); } 75% { transform: translateX(6px) translateY(-55px); } }
    .spot-coral.wrong .kid-character { animation: shakeCR 0.4s ease; }
    @keyframes shakeCR { 0%, 100% { transform: translateX(45px) translateY(-25px); } 25% { transform: translateX(39px) translateY(-25px); } 75% { transform: translateX(51px) translateY(-25px); } }
    .spot-clam.wrong .kid-character { animation: shakeCL 0.4s ease; }
    @keyframes shakeCL { 0%, 100% { transform: translateY(-50px); } 25% { transform: translateX(-6px) translateY(-50px); } 75% { transform: translateX(6px) translateY(-50px); } }
    .spot-seaweed.wrong .kid-character { animation: shakeSW 0.4s ease; }
    @keyframes shakeSW { 0%, 100% { transform: translateY(-60px); } 25% { transform: translateX(-6px) translateY(-60px); } 75% { transform: translateX(6px) translateY(-60px); } }
    .spot-submarine.wrong .kid-character { animation: shakeSB 0.4s ease; }
    @keyframes shakeSB { 0%, 100% { transform: translateX(-40px) translateY(-20px); } 25% { transform: translateX(-46px) translateY(-20px); } 75% { transform: translateX(-34px) translateY(-20px); } }

    /* ==========================================================================
       RESPONSIVE BREAKPOINTS (ALL DEVICES FIT)
       ========================================================================= */
    @media (max-width: 850px) or (orientation: portrait) {
      body { padding: 5px; justify-content: flex-start; }
      .header-panel { padding: 8px 14px; margin-bottom: 8px; }
      .instruction { font-size: 16px; gap: 8px; }
      .target-box { font-size: 26px; padding: 1px 16px; border-radius: 10px; }
      .score-stars { font-size: 16px; }
      .btn-home-nav { font-size: 12px; padding: 3px 10px; border-radius: 8px; }
      .game-stage { aspect-ratio: auto; height: 72vh; max-height: 520px; }
      
      .spot-chest { bottom: 12%; left: 4%; width: 100px; height: 85px; }
      .chest-body { width: 100px; height: 50px; }
      .chest-lid { width: 104px; height: 26px; bottom: 48px; }
      .chest-gold { bottom: 42px; width: 80px; }
      
      .spot-coral { bottom: 35%; left: 6%; width: 110px; height: 110px; }
      .spot-clam { bottom: 8%; left: 38%; width: 100px; height: 75px; }
      .spot-seaweed { bottom: 28%; right: 4%; width: 90px; height: 130px; }
      .spot-submarine { bottom: 4%; right: 2%; width: 120px; height: 100px; }
      .sub-body { width: 110px; height: 65px; }
      .sub-window { top: 28px; left: 35px; width: 26px; height: 26px; }
      .sub-tower { top: -8px; left: 40px; }
      
      .kid-character { transform: scale(0.85); }
    }

    /* ==========================================================================
       INTRO & MODAL SCREENS SYSTEM
       ========================================================================= */
    .intro-screen {
      position: absolute; inset: 0; 
      background: linear-gradient(to bottom, #b2ebf2 0%, #e0f7fa 100%);
      z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px; text-align: center; transition: opacity 0.4s ease, pointer-events 0.4s;
    }
    .intro-screen.hide { opacity: 0; pointer-events: none; }
    .intro-title { font-family: 'Noto Sans Myanmar', sans-serif; font-size: 38px; font-weight: 900; color: #006064; margin-bottom: 14px; }
    .intro-badge { font-family: 'Fredoka', 'Noto Sans Myanmar', sans-serif; background: #00838f; color: white; padding: 6px 24px; border-radius: 20px; font-weight: 700; margin-bottom: 24px; box-shadow: 0 4px 0 #005662; font-size: 18px; }
    
    .btn-action {
      font-family: 'Noto Sans Myanmar', sans-serif; padding: 12px 48px; font-size: 20px; font-weight: 900;
      color: white; background: #00acc1; border: none; border-radius: 16px; cursor: pointer; box-shadow: 0 6px 0 #007c91; z-index: 5;
    }
    .btn-action:active { transform: translateY(3px); box-shadow: 0 3px 0 #007c91; }

    .reward-backdrop {
      position: absolute; inset: 0; background: rgba(0,0,0,0.6);
      z-index: 200; display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
    }
    .reward-backdrop.show { opacity: 1; pointer-events: auto; }
    .reward-box {
      background: white; border: 5px solid #ffca28; border-radius: 24px; padding: 35px 30px;
      width: 90%; max-width: 440px; text-align: center; transform: scale(0.7); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.25);
    }
    .reward-backdrop.show .reward-box { transform: scale(1); }
    .reward-title { font-family: 'Noto Sans Myanmar', sans-serif; font-size: 26px; font-weight: 900; color: #e64a19; margin-bottom: 10px; }
    .reward-letter-display { font-family: 'Noto Sans Myanmar', sans-serif; font-size: 62px; font-weight: 900; color: #00acc1; margin: 12px 0; }
  </style>
</head>
<body>

  <div class="header-panel">
    <div class="instruction">
      <span>သူငယ်ချင်းတို့ဆီက</span>
      <div class="target-box" id="targetDisplay">တ</div>
      <span>ကို ရှာပေးပါဦး။</span>
    </div>
    <div class="right-header-area">
      <div class="score-stars" id="starContainer">☆☆☆☆☆</div>
      <!-- In-Game Home Trigger -->
      <button class="btn-home-nav" onclick="navigateToMainMenu()">🏠 ပင်မစာမျက်နှာ</button>
    </div>
  </div>

  <div class="game-stage">
    <div class="light-rays"></div>
    
    <div class="bubble" style="left:12%; width:20px; height:20px; animation-delay:0s; animation-duration:7s;"></div>
    <div class="bubble" style="left:35%; width:14px; height:14px; animation-delay:1.5s; animation-duration:5s;"></div>
    <div class="bubble" style="left:55%; width:25px; height:25px; animation-delay:0.5s; animation-duration:8s;"></div>
    <div class="bubble" style="left:78%; width:16px; height:16px; animation-delay:3s; animation-duration:6s;"></div>
    <div class="bubble" style="left:90%; width:22px; height:22px; animation-delay:2s; animation-duration:7.5s;"></div>
    
    <div class="sea-floor"></div>
    
    <div class="spot-container spot-chest" id="container0">
      <div class="click-capturer" onclick="handleSpotClick(0)"></div>
      <div class="kid-character" id="kid0">
        <div class="held-letter" id="letter0">-</div>
        <div class="kid-head"><div class="kid-hair"></div><div class="kid-goggles"></div><div class="kid-eyes"></div><div class="kid-smile"></div></div>
        <div class="kid-body"></div>
      </div>
      <div class="object-layer">
        <div class="chest-gold"></div>
        <div class="chest-body"></div>
        <div class="chest-lid"></div>
        <div class="chest-lock"></div>
      </div>
    </div>

    <div class="spot-container spot-coral" id="container1">
      <div class="click-capturer" onclick="handleSpotClick(1)"></div>
      <div class="kid-character" id="kid1">
        <div class="held-letter" id="letter1">-</div>
        <div class="kid-head"><div class="kid-hair" style="background:#2d1a14;"></div><div class="kid-goggles"></div><div class="kid-eyes"></div><div class="kid-smile"></div></div>
        <div class="kid-body" style="background:linear-gradient(to bottom, #ab47bc, #3f51b5);"></div>
      </div>
      <div class="object-layer">
        <div class="coral-branch-1"></div>
        <div class="coral-branch-2"></div>
      </div>
    </div>

    <div class="spot-container spot-clam" id="container2">
      <div class="click-capturer" onclick="handleSpotClick(2)"></div>
      <div class="kid-character" id="kid2">
        <div class="held-letter" id="letter2">-</div>
        <div class="kid-head"><div class="kid-hair" style="background:#4e342e;"></div><div class="kid-goggles"></div><div class="kid-eyes"></div><div class="kid-smile"></div></div>
        <div class="kid-body" style="background:linear-gradient(to bottom, #ff7043, #ffca28);"></div>
      </div>
      <div class="object-layer">
        <div class="clam-bottom"></div>
        <div class="clam-pearl"></div>
        <div class="clam-top"></div>
      </div>
    </div>

    <div class="spot-container spot-seaweed" id="container3">
      <div class="click-capturer" onclick="handleSpotClick(3)"></div>
      <div class="kid-character" id="kid3">
        <div class="held-letter" id="letter3">-</div>
        <div class="kid-head"><div class="kid-hair" style="background:#ef6c00;"></div><div class="kid-goggles"></div><div class="kid-eyes"></div><div class="kid-smile"></div></div>
        <div class="kid-body" style="background:linear-gradient(to bottom, #ec407a, #7209b7);"></div>
      </div>
      <div class="object-layer">
        <div class="weed-strand weed-1"></div>
        <div class="weed-strand weed-2"></div>
        <div class="weed-strand weed-3"></div>
      </div>
    </div>

    <div class="spot-container spot-submarine" id="container4">
      <div class="click-capturer" onclick="handleSpotClick(4)"></div>
      <div class="kid-character" id="kid4">
        <div class="held-letter" id="letter4">-</div>
        <div class="kid-head"><div class="kid-hair" style="background:#26a69a;"></div><div class="kid-goggles"></div><div class="kid-eyes"></div><div class="kid-smile"></div></div>
        <div class="kid-body" style="background:linear-gradient(to bottom, #ffeb3b, #ef6c00);"></div>
      </div>
      <div class="object-layer">
        <div class="sub-tower"></div>
        <div class="sub-scope"></div>
        <div class="sub-body"></div>
        <div class="sub-window"></div>
      </div>
    </div>

  </div>

  <div class="intro-screen" id="welcomePanel">
    <h1 class="intro-title">အက္ခရာသူငယ်ချင်းတို့ တူတူပုန်းတမ်း</h1>
    <div class="intro-badge">Lesson 4 : တ ၊ ထ ၊ ဒ ၊ ဓ ၊ န</div>
    <button class="btn-action" onclick="startGame()">ဂိမ်းစတင်ဆော့မည်</button>
  </div>

  <!-- Dynamic Feedback Alert Panel -->
  <div class="reward-backdrop" id="rewardPanel">
    <div class="reward-box" id="rewardContentContainer">
      <!-- Generated Dynamically via JS (Round vs Final Win states) -->
    </div>
  </div>

  <script>
    const lettersPoolList = ['တ', 'ထ', 'ဒ', 'ဓ', 'န'];
    let remainingTargets = [...lettersPoolList];
    let assignedPositions = [];
    let scoreProgress = 0;
    let currentTargetLetter = '';
    let isTransitioning = false;
    
    let audioCtx = null;

    function initAudioEngine() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        startAmbientSeaMusic();
      }
    }

    function startAmbientSeaMusic() {
      const bufferSize = audioCtx.sampleRate * 2;
      const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const output = noiseBuffer.getChannelData(0);
      for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
      }
      
      const whiteNoise = audioCtx.createBufferSource();
      whiteNoise.buffer = noiseBuffer;
      whiteNoise.loop = true;

      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(300, audioCtx.currentTime);

      const waveGain = audioCtx.createGain();
      waveGain.gain.setValueAtTime(0.04, audioCtx.currentTime);

      const lfo = audioCtx.createOscillator();
      lfo.frequency.value = 0.15;
      const lfoGain = audioCtx.createGain();
      lfoGain.gain.value = 150;
      lfo.connect(lfoGain);
      lfoGain.connect(filter.frequency);
      
      whiteNoise.connect(filter);
      filter.connect(waveGain);
      waveGain.connect(audioCtx.destination);
      
      whiteNoise.start();
      lfo.start();

      setInterval(() => {
        if(Math.random() > 0.4) playOceanPluckTone();
      }, 3500);
    }

    function playOceanPluckTone() {
      const notes = [130.81, 146.83, 164.81, 196.00, 220.00];
      const freq = notes[Math.floor(Math.random() * notes.length)];
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 3);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 3);
    }

    function playSuccessChime() {
      const now = audioCtx.currentTime;
      const tones = [261.63, 329.63, 392.00, 523.25];
      tones.forEach((freq, index) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.12, now + index * 0.08);
        gain.gain.exponentialRampToValueAtTime(0.001, now + index * 0.08 + 0.4);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now + index * 0.08);
        osc.stop(now + index * 0.08 + 0.4);
      });
    }

    function playWrongSound() {
      const now = audioCtx.currentTime;
      [120, 95].forEach((freq, index) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(freq, now + index * 0.12);
        osc.frequency.linearRampToValueAtTime(freq - 30, now + index * 0.12 + 0.2);
        
        const f = audioCtx.createBiquadFilter();
        f.type = 'lowpass';
        f.frequency.value = 400;

        gain.gain.setValueAtTime(0.15, now + index * 0.12);
        gain.gain.linearRampToValueAtTime(0.001, now + index * 0.12 + 0.2);
        
        osc.connect(f);
        f.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now + index * 0.12);
        osc.stop(now + index * 0.12 + 0.25);
      });
    }

    function speakMyanmarAlphabet(text) {
      if ('speechSynthesis' in window) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'my-MM';
        utterance.rate = 0.85; 
        window.speechSynthesis.speak(utterance);
      }
    }

    // Direct path routing triggers
    function navigateToMainMenu() {
      window.location.href = 'index.html?fromGame=true';
    }

    function startGame() {
      initAudioEngine();
      document.getElementById('welcomePanel').classList.add('hide');
      scoreProgress = 0;
      remainingTargets = [...lettersPoolList];
      setupNewTargetRound();
    }

    function setupNewTargetRound() {
      isTransitioning = false;
      
      if(remainingTargets.length === 0) remainingTargets = [...lettersPoolList];
      const targetIndex = Math.floor(Math.random() * remainingTargets.length);
      currentTargetLetter = remainingTargets.splice(targetIndex, 1)[0];
      
      let tempLettersArray = [...lettersPoolList];
      assignedPositions = [];
      
      for(let i = 0; i < 5; i++) {
        let randomIndex = Math.floor(Math.random() * tempLettersArray.length);
        assignedPositions.push(tempLettersArray.splice(randomIndex, 1)[0]);
        
        document.getElementById(`letter${i}`).textContent = assignedPositions[i];
        
        const parentElementNode = document.getElementById(`container${i}`);
        parentElementNode.classList.remove('peek', 'success', 'wrong');
      }
      
      renderDashboardUI();
      setTimeout(() => speakMyanmarAlphabet(currentTargetLetter), 600);
    }

    function renderDashboardUI() {
      document.getElementById('targetDisplay').textContent = currentTargetLetter;
      
      let starMarkup = '';
      for(let i = 0; i < 5; i++) {
        starMarkup += (i < scoreProgress) ? '★' : '☆';
      }
      document.getElementById('starContainer').textContent = starMarkup;
    }

    function handleSpotClick(spotIndex) {
      if(isTransitioning) return;
      
      isTransitioning = true;
      const clickedSpotContainer = document.getElementById(`container${spotIndex}`);
      const discoveredLetter = assignedPositions[spotIndex];

      clickedSpotContainer.classList.remove('wrong', 'peek', 'success');
      void clickedSpotContainer.offsetWidth;
      clickedSpotContainer.classList.add('peek');

      speakMyanmarAlphabet(discoveredLetter);

      setTimeout(() => {
        if(discoveredLetter === currentTargetLetter) {
          playSuccessChime();
          clickedSpotContainer.classList.remove('peek');
          clickedSpotContainer.classList.add('success');
          
          scoreProgress++;
          
          setTimeout(() => {
            renderModalBoxUI();
            document.getElementById('rewardPanel').classList.add('show');
          }, 950);

        } else {
          playWrongSound();
          clickedSpotContainer.classList.add('wrong');
          setTimeout(() => {
            clickedSpotContainer.classList.remove('wrong', 'peek');
            isTransitioning = false;
          }, 1200);
        }
      }, 400);
    }

    // Dynamic Engine switcher for Round Success vs Game Finished
    function renderModalBoxUI() {
      const boxWrapper = document.getElementById('rewardContentContainer');
      
      if(scoreProgress >= 5) {
        // GRAND FINALE SCREEN FOR FINISHING COMPLETE GAME
        boxWrapper.innerHTML = `
          <h2 class="reward-title" style="color:#2e7d32;">🎉 သင်ခန်းစာ ၄ အောင်မြင်စွာ ပြီးဆုံးပါပြီ! 🎉</h2>
          <p style="font-family:'Noto Sans Myanmar'; color:#37474f; font-weight:700; margin: 15px 0; font-size:16px;">
            သားသားမီးမီးတို့ အက္ခရာသူငယ်ချင်း (၅) လုံးစလုံးကို တော်လိုက်တာဗျာ။
          </p>
          <button class="btn-action" style="background:#4caf50; box-shadow:0 6px 0 #2e7d32; width:100%; margin-top: 10px;" onclick="navigateToMainMenu()">
            ပင်မ စာမျက်နှာသို့ ပြန်သွားမည်
          </button>
        `;
      } else {
        // STANDARD NEXT ROUND MODAL
        boxWrapper.innerHTML = `
          <h2 class="reward-title">🎉 အောင်မြင်စွာ ရှာဖွေနိုင်ခဲ့ပါပြီ! 🎉</h2>
          <p style="font-family:'Noto Sans Myanmar'; color:#546e7a;">သူငယ်ချင်းလေးဆီက ရှာတွေ့လိုက်တဲ့ အက္ခရာကတော့ -</p>
          <div class="reward-letter-display">${currentTargetLetter}</div>
          <button class="btn-action" style="background:#ff9800; box-shadow:0 6px 0 #e65100;" onclick="advanceToNextRound()">
            နောက်ထပ် အက္ခရာအသစ် ရှာမည်
          </button>
        `;
      }
    }

    function advanceToNextRound() {
      document.getElementById('rewardPanel').classList.remove('show');
      setupNewTargetRound();
    }
  </script>
</body>
</html>
