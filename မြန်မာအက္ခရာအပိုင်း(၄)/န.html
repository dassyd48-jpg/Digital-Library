<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>သစ်သီးတင် ချစ်စရာ ရထားတွဲကလေး - "န" စာလုံး</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght=400;700;900&family=Pyidaungsu:wght=400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a; 
            font-family: 'Fredoka One', 'Pyidaungsu', 'Montserrat', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .burmese-font {
            font-family: 'Pyidaungsu', sans-serif;
        }
    </style>
</head>
<body class="relative select-none">

    <!-- 🌟 HUD UI TOP BAR -->
    <div id="hud" class="absolute top-4 left-4 right-4 pointer-events-none z-30 flex flex-col space-y-2 max-w-md burmese-font">
        <div class="flex items-center space-x-3 bg-slate-950/90 backdrop-blur-md p-3 rounded-2xl border border-teal-500/20 shadow-lg">
            <span class="text-xs font-black text-teal-400 tracking-wider uppercase">ရထားတွဲ ဖြည့်တင်းမှု 🚂</span>
            <div class="flex-1 bg-black/40 h-4 rounded-full overflow-hidden p-0.5 border border-white/5">
                <div id="xp-bar" class="bg-gradient-to-r from-teal-400 via-emerald-400 to-green-400 h-full rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <span id="level-display" class="bg-teal-600 text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Level 1</span>
        </div>
        
        <div class="flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="flex items-center space-x-2 bg-slate-950/90 backdrop-blur-md px-4 py-2 rounded-2xl border border-teal-500/20 shadow-lg">
                    <span class="text-xl">🍎</span>
                    <span id="cash-display" class="text-white font-black tracking-widest text-sm">0</span>
                </div>
                <div class="flex items-center space-x-2 bg-gradient-to-r from-teal-500/20 to-emerald-500/20 backdrop-blur-md px-4 py-2 rounded-2xl border border-teal-500/40 shadow-lg animate-pulse">
                    <span class="text-xs font-black text-teal-400 uppercase tracking-wider">ရှာရမည့်စာလုံး -</span>
                    <span id="target-letter-display" class="burmese-font text-2xl font-bold text-green-300">န</span>
                </div>
            </div>

            <!-- 🏠 Navigation Buttons (Dassy တောင်းဆိုထားသည့် လမ်းကြောင်းအမှန်အတိုင်း) -->
            <div class="flex space-x-2 pointer-events-auto">
                <a href="index.html?fromGame=true" class="px-3 py-2 bg-slate-950/90 hover:bg-slate-900 border border-teal-500/30 rounded-xl text-xs text-white flex items-center space-x-1 shadow-md transition-all active:scale-95 cursor-pointer">
                    <span>🏠</span> <span class="hidden sm:inline">ပင်မမြေပုံ</span>
                </a>
                <a href="index.html?fromGame=true&showPopup=stage3" class="px-3 py-2 bg-slate-950/90 hover:bg-slate-900 border border-amber-500/30 rounded-xl text-xs text-white flex items-center space-x-1 shadow-md transition-all active:scale-95 cursor-pointer">
                    <span>↩️</span> <span class="hidden sm:inline">နောက်သို့</span>
                </a>
            </div>
        </div>
    </div>

    <!-- ❤️ HP DISPLAY -->
    <div class="absolute top-4 right-4 z-30 pointer-events-none flex items-center space-x-2 bg-slate-950/90 backdrop-blur-md px-4 py-2 rounded-2xl border border-teal-500/20 shadow-lg">
        <span class="text-lg">❤️</span>
        <span id="hp-display" class="text-rose-500 font-black tracking-wider text-sm">100 / 100</span>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- 🏁 OVERLAY SCREEN -->
    <div id="overlay-screen" class="absolute inset-0 bg-slate-950/95 backdrop-blur-md z-[90] flex flex-col items-center justify-center text-center p-6 burmese-font">
        <!-- 🚂 အင်္ဂလိပ်ခေါင်းစဉ်ကြီး (Size ပြောင်းလဲရန် - text-2xl သို့မဟုတ် sm:text-6xl ကို ပြင်နိုင်သည်) -->
        <h1 class="text-4xl sm:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-teal-400 via-emerald-300 to-green-400 tracking-wider mb-4 uppercase drop-shadow-[0_0_30px_rgba(20,184,166,0.4)] font-sans">
            THE ANIMAL FRUIT TRAIN
        </h1>
        
        <!-- 🍎 မြန်မာမိတ်ဆက်စာလုံး (Size ပြောင်းလဲရန် - text-2xl သို့မဟုတ် sm:text-4xl ကို ပြင်နိုင်သည်) -->
        <p class="text-yellow-300 text-2xl sm:text-2xl font-extrabold tracking-wide mb-12 leading-relaxed drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">
            "န" စာလုံး သစ်သီးများကို ရထားတွင် စုဆောင်းရအောင်
        </p>
        
        <div id="game-stats" class="hidden bg-white/5 border border-white/5 rounded-3xl p-6 mb-10 max-w-xs w-full text-left space-y-3 font-sans">
            <div class="flex justify-between"><span class="text-neutral-400 burmese-font">မှန်ကန်စွာ ထည့်နိုင်မှု</span><span id="stat-coins" class="text-white font-bold">0</span></div>
            <div class="flex justify-between"><span class="text-neutral-400 burmese-font">မှားယွင်းစွာ ထည့်မှု</span><span id="stat-kills" class="text-white font-bold">0</span></div>
            <div class="flex justify-between"><span class="text-neutral-400 burmese-font">ရောက်ရှိသွားသည့် အဆင့်</span><span id="stat-level" class="text-teal-400 font-bold">Level 1</span></div>
        </div>

        <!-- 🕹️ စတင်မည်ခလုတ် (Size ပြောင်းလဲရန် - text-base သို့မဟုတ် sm:text-lg ကို ပြင်နိုင်သည်) -->
        <button id="start-btn" class="px-16 py-6 bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-teal-500 hover:to-emerald-500 text-white font-black text-base sm:text-lg uppercase tracking-[0.2em] rounded-full transition-all shadow-[0_20px_50px_rgba(20,184,166,0.3)] border-b-4 border-teal-800 pointer-events-auto cursor-pointer">
            ဂိမ်းစတင်မည်
        </button>
    </div>

    <script>
        // 🎵 Audio System
        let audioCtx = null;
        function initAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            initAudioContext();
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'match_correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(659.25, now + 0.08); osc.frequency.setValueAtTime(783.99, now + 0.15);
                gainNode.gain.setValueAtTime(0.08, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'match_wrong') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(180, now); osc.frequency.linearRampToValueAtTime(90, now + 0.25);
                gainNode.gain.setValueAtTime(0.1, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now); osc.stop(now + 0.25);
            } else if (type === 'levelup') {
                const notes = [261.63, 329.63, 392.00, 523.25];
                notes.forEach((f, i) => {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination); o.type = 'sine';
                    o.frequency.setValueAtTime(f, now + i * 0.06); g.gain.setValueAtTime(0.06, now + i * 0.06);
                    g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.06 + 0.2); o.start(now + i * 0.06); o.stop(now + i * 0.06 + 0.2);
                });
            }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 🚂 TRAIN WAGON SYSTEM OBJ
        const trainWagon = {
            x: window.innerWidth / 2,
            y: window.innerHeight - 130,
            width: 320,
            height: 90,
            bounceTimer: 0,
            reactionMode: 'idle',
            reactionTimer: 0,
            slots: []
        };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            trainWagon.x = canvas.width / 2;
            trainWagon.y = canvas.height - 130;
        }
        window.addEventListener('resize', resizeCanvas);

        const burmeseAlphabets = ['က','ခ','ဂ','င','စ','ဆ','ည','တ','ထ','ဒ','ဓ','န','ပ','ဖ','ဗ','မ','ယ','ရ','လ','ဝ','သ','ဟ','အ'];
        const game = { running: false, score: 0, correctPops: 0, incorrectPops: 0, targetLetter: 'န' };
        const player = { hp: 100, level: 1 };

        const entities = { fruits: [], magicStars: [] };
        let draggedFruit = null;

        // 🍎 INITIALIZE TRAIN SLOTS
        function initTrainSlots() {
            trainWagon.slots = [];
            let totalSlots = 6; 
            if (player.level === 2) totalSlots = 10;
            else if (player.level >= 3) totalSlots = 15;

            const cols = Math.min(totalSlots, 5);
            const slotSpacingX = 50;
            const slotSpacingY = 30;

            for (let i = 0; i < totalSlots; i++) {
                const row = Math.floor(i / cols);
                const col = i % cols;
                
                const offsetX = (col - (cols - 1) / 2) * slotSpacingX;
                const offsetY = -25 - (row * slotSpacingY);

                trainWagon.slots.push({
                    relX: offsetX,
                    relY: offsetY,
                    filled: false
                });
            }
        }

        // 🎨 DRAW TRAIN WAGON & SLOTS
        function drawTrainWagon(ctx, tw) {
            ctx.save();
            ctx.translate(tw.x, tw.y);

            // သံလမ်းဆွဲခြင်း
            ctx.strokeStyle = '#475569'; ctx.lineWidth = 6;
            ctx.beginPath(); ctx.moveTo(-canvas.width, tw.height/2 + 20); ctx.lineTo(canvas.width, tw.height/2 + 20); ctx.stroke();
            for(let x = -canvas.width; x < canvas.width; x += 40) {
                ctx.beginPath(); ctx.moveTo(x, tw.height/2 + 20); ctx.lineTo(x + 10, tw.height/2 + 35); ctx.stroke();
            }

            // တင်ထားပြီးသော သစ်သီး Slots များဆွဲခြင်း
            tw.slots.forEach((slot) => {
                if (slot.filled) {
                    ctx.save();
                    ctx.translate(slot.relX, slot.relY);
                    
                    // ပန်းသီးပုံဆွဲခြင်း
                    ctx.fillStyle = '#dc2626';
                    ctx.beginPath(); ctx.arc(-7, 0, 14, 0, Math.PI * 2); ctx.arc(7, 0, 14, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.ellipse(0, 4, 12, 12, 0, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#15803d'; ctx.beginPath(); ctx.ellipse(2, -14, 4, 8, Math.PI/4, 0, Math.PI*2); ctx.fill();

                    // စာလုံးနောက်ခံအဖြူဝိုင်း
                    ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(0, 2, 9, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#1e1b4b'; ctx.font = 'bold 12px Pyidaungsu, sans-serif';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(game.targetLetter, 0, 3);
                    ctx.restore();
                } else {
                    ctx.save();
                    ctx.translate(slot.relX, slot.relY);
                    ctx.strokeStyle = 'rgba(20, 184, 166, 0.4)'; ctx.lineWidth = 2; ctx.setLineDash([3, 3]);
                    ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.stroke();
                    ctx.restore();
                }
            });

            // ရထားတွဲ တုန်ခါမှု Animation အကျိုးသက်ရောက်မှု
            let scaleY = 1.0;
            let skewX = 0;
            if (tw.reactionMode === 'happy') scaleY += Math.sin(tw.bounceTimer * 3) * 0.05;
            else if (tw.reactionMode === 'sad') skewX = Math.sin(tw.bounceTimer * 4) * 0.08;
            else scaleY += Math.sin(tw.bounceTimer) * 0.01;
            
            ctx.transform(1, 0, skewX, scaleY, 0, 0);

            // မီးရထားတွဲကိုယ်ထည်
            ctx.fillStyle = '#b45309'; 
            ctx.beginPath(); ctx.roundRect(-tw.width/2, -tw.height/2, tw.width, tw.height, 12); ctx.fill();
            ctx.strokeStyle = '#78350f'; ctx.lineWidth = 4; ctx.stroke();

            // ရထားတွဲ အစင်းကြောင်းများ
            ctx.strokeStyle = '#78350f'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(-tw.width/2, 0); ctx.lineTo(tw.width/2, 0); ctx.stroke();

            // ဘီးများ
            ctx.fillStyle = '#334155';
            ctx.beginPath(); ctx.arc(-tw.width/3, tw.height/2, 22, 0, Math.PI*2); ctx.arc(tw.width/3, tw.height/2, 22, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#cbd5e1';
            ctx.beginPath(); ctx.arc(-tw.width/3, tw.height/2, 8, 0, Math.PI*2); ctx.arc(tw.width/3, tw.height/2, 8, 0, Math.PI*2); ctx.fill();

            // "န" စာလုံး ဆိုင်းဘုတ်ကြီး
            ctx.fillStyle = '#fef08a';
            ctx.font = 'black 40px Pyidaungsu, sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(game.targetLetter, 0, 5);

            ctx.restore();
        }

        // 🎨 DRAW FRUIT (သစ်သီးများ ရေးဆွဲခြင်း)
        function drawFruit(ctx, f) {
            ctx.save();
            ctx.translate(f.x, f.y);

            if (f === draggedFruit) {
                ctx.shadowColor = '#14b8a6'; ctx.shadowBlur = 25;
            }

            if (f.isTarget) {
                // 🍎 ပန်းသီးနီနီပုံစံ
                ctx.fillStyle = '#ef4444';
                ctx.beginPath(); ctx.arc(-10, 0, 20, 0, Math.PI * 2); ctx.arc(10, 0, 20, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(0, 6, 18, 18, 0, 0, Math.PI*2); ctx.fill();
                // ရိုးတံနှင့် အရွက်
                ctx.fillStyle = '#78350f'; ctx.fillRect(-2, -24, 4, 10);
                ctx.fillStyle = '#22c55e'; ctx.beginPath(); ctx.ellipse(4, -22, 5, 9, Math.PI/4, 0, Math.PI*2); ctx.fill();
            } else {
                // 🍊 လိမ္မော်သီးဝါဝါပုံစံ
                ctx.fillStyle = '#f97316';
                ctx.beginPath(); ctx.arc(0, 2, 21, 0, Math.PI * 2); ctx.fill();
                // ရိုးတံနှင့် အရွက်
                ctx.fillStyle = '#78350f'; ctx.fillRect(-2, -23, 3, 8);
                ctx.fillStyle = '#16a34a'; ctx.beginPath(); ctx.ellipse(3, -21, 4, 8, Math.PI/3, 0, Math.PI*2); ctx.fill();
            }

            // ✨ အဖြူရောင်နောက်ခံဆိုင်းဘုတ်ဝိုင်းလေး
            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#451a03';
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(0, 2, 16, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            // အလယ်က မြန်မာအက္ခရာစာလုံးကြီး
            ctx.fillStyle = '#0f172a';
            ctx.font = 'bold 24px Pyidaungsu, sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(f.letter, 0, 3);

            ctx.restore();
        }

        function spawnFruit() {
            if (!game.running) return;
            if (entities.fruits.length >= 5) return;

            const x = 60 + Math.random() * (canvas.width - 120);
            const isTarget = Math.random() < 0.45;
            let chosenLetter = game.targetLetter;

            if (!isTarget) {
                const filtered = burmeseAlphabets.filter(c => c !== game.targetLetter);
                chosenLetter = filtered[Math.floor(Math.random() * filtered.length)];
            }

            entities.fruits.push({
                id: Math.random(), x: x, y: -50, letter: chosenLetter, isTarget: isTarget,
                speedY: 1.0 + Math.random() * 1.3,
                waveSpeed: 0.02 + Math.random() * 0.03,
                waveParam: Math.random() * 100
            });
        }

        setInterval(spawnFruit, 1300);

        function handleDragStart(clientX, clientY) {
            if (!game.running) return;
            for (let i = entities.fruits.length - 1; i >= 0; i--) {
                const f = entities.fruits[i];
                const dist = Math.hypot(clientX - f.x, clientY - f.y);
                if (dist < 45) {
                    draggedFruit = f;
                    break;
                }
            }
        }

        function handleDragMove(clientX, clientY) {
            if (!draggedFruit) return;
            draggedFruit.x = clientX;
            draggedFruit.y = clientY;
        }

        function handleDragEnd() {
            if (!draggedFruit) return;

            let matched = false;
            // ရထားတွဲပေါ် ကွက်တိကျမကျ စစ်ဆေးခြင်း
            const distToTrain = Math.hypot(draggedFruit.x - trainWagon.x, draggedFruit.y - trainWagon.y);

            if (distToTrain < 160) {
                if (draggedFruit.isTarget) {
                    // လွတ်နေသော Slot ကို ရှာဖွေဖြည့်တင်းခြင်း
                    const freeSlot = trainWagon.slots.find(s => !s.filled);
                    if (freeSlot) {
                        playSound('match_correct');
                        freeSlot.filled = true; game.score += 20; game.correctPops++;
                        trainWagon.reactionMode = 'happy'; trainWagon.reactionTimer = 35;
                        
                        const sx = trainWagon.x + freeSlot.relX;
                        const sy = trainWagon.y + freeSlot.relY;
                        for (let k = 0; k < 15; k++) {
                            entities.magicStars.push({ x: sx, y: sy, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, size: 2 + Math.random() * 4, alpha: 1 });
                        }
                        matched = true;
                        checkLevelComplete();
                    }
                } else {
                    playSound('match_wrong');
                    game.incorrectPops++; player.hp = Math.max(0, player.hp - 15);
                    trainWagon.reactionMode = 'sad'; trainWagon.reactionTimer = 40;
                    if (player.hp <= 0) gameOver();
                    matched = true;
                }
            }

            if (matched || draggedFruit.y > canvas.height + 50) {
                entities.fruits = entities.fruits.filter(item => item.id !== draggedFruit.id);
            }
            draggedFruit = null;
        }

        window.addEventListener('touchstart', (e) => { const t = e.touches[0]; handleDragStart(t.clientX, t.clientY); }, { passive: true });
        window.addEventListener('touchmove', (e) => { const t = e.touches[0]; handleDragMove(t.clientX, t.clientY); }, { passive: true });
        window.addEventListener('touchend', handleDragEnd);
        window.addEventListener('mousedown', (e) => { handleDragStart(e.clientX, e.clientY); });
        window.addEventListener('mousemove', (e) => { handleDragMove(e.clientX, e.clientY); });
        window.addEventListener('mouseup', handleDragEnd);

        function checkLevelComplete() {
            const allFilled = trainWagon.slots.every(slot => slot.filled);
            if (allFilled) {
                playSound('levelup');
                player.level++;
                
                setTimeout(() => {
                    if (player.level > 3) {
                        alert("အံ့ဩစရာပဲ Dassy ရေ! 'န' စာလုံး မီးရထားတွဲလေး သစ်သီးအပြည့် တင်ဆောင်လို့ ပြီးသွားပါပြီရှင်။ 🎉");
                        player.level = 1;
                    }
                    initTrainSlots();
                }, 1200);
            }
        }

        function updateGame(dt) {
            if (!game.running) return;
            trainWagon.bounceTimer += 0.06 * dt;

            if (trainWagon.reactionTimer > 0) {
                trainWagon.reactionTimer -= 1 * dt;
                if (trainWagon.reactionTimer <= 0) trainWagon.reactionMode = 'idle';
            }

            entities.fruits.forEach(f => {
                if (f !== draggedFruit) {
                    f.waveParam += f.waveSpeed * dt;
                    f.y += f.speedY * dt;
                    f.x += Math.sin(f.waveParam) * 0.5 * dt;
                }
            });

            for (let i = entities.fruits.length - 1; i >= 0; i--) {
                if (entities.fruits[i].y > canvas.height + 50 && entities.fruits[i] !== draggedFruit) {
                    entities.fruits.splice(i, 1);
                }
            }

            for (let i = entities.magicStars.length - 1; i >= 0; i--) {
                const s = entities.magicStars[i]; s.x += s.vx * dt; s.y += s.vy * dt; s.alpha -= 0.025 * dt;
                if (s.alpha <= 0) entities.magicStars.splice(i, 1);
            }

            let totalInLevel = trainWagon.slots.length;
            let filledCount = trainWagon.slots.filter(s => s.filled).length;
            document.getElementById('xp-bar').style.width = `${(filledCount / totalInLevel) * 100}%`;
            
            document.getElementById('level-display').innerText = `Level ${player.level}`;
            document.getElementById('cash-display').innerText = game.score;
            document.getElementById('hp-display').innerText = `${Math.round(player.hp)} / 100`;
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ချစ်စရာ ကာတွန်းတောအုပ်ညနေခင်း နောက်ခံရောင်
            const bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            bgGrad.addColorStop(0, '#0f172a'); bgGrad.addColorStop(0.6, '#134e4a'); bgGrad.addColorStop(1, '#022c22');
            ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, canvas.width, canvas.height);

            entities.magicStars.forEach(s => {
                ctx.fillStyle = `rgba(45, 212, 191, ${s.alpha})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
            });

            drawTrainWagon(ctx, trainWagon);
            entities.fruits.forEach(f => drawFruit(ctx, f));
        }

        let lastTime = performance.now();
        function gameLoop(now) {
            let dt = (now - lastTime) / 16.666; lastTime = now; if (dt > 4) dt = 4;
            updateGame(dt); render(); requestAnimationFrame(gameLoop);
        }

        function startGame() {
            initAudioContext();
            player.hp = 100; player.level = 1;
            game.score = 0; game.correctPops = 0; game.incorrectPops = 0;
            entities.fruits = []; entities.magicStars = [];
            trainWagon.reactionMode = 'idle';
            initTrainSlots();
            resizeCanvas();
            document.getElementById('overlay-screen').classList.add('hidden'); 
            game.running = true;
        }

        function gameOver() {
            game.running = false;
            document.getElementById('stat-coins').innerText = game.correctPops;
            document.getElementById('stat-kills').innerText = game.incorrectPops;
            document.getElementById('stat-level').innerText = `Level ${player.level}`;
            document.getElementById('game-stats').classList.remove('hidden');
            document.getElementById('start-btn').innerText = "ပြန်လည်ကြိုးစားမည် 🔄";
            document.getElementById('overlay-screen').classList.remove('hidden');
        }

        document.getElementById('start-btn').onclick = startGame;
        window.onload = function() { resizeCanvas(); initTrainSlots(); requestAnimationFrame(gameLoop); };
    </script>
</body>
</html>
