<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Paint the Burmese Letter ခ - Animated Magical Pond</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+Myanmar:wght@600;800&swap" rel="stylesheet" />
  <style>
    /* CSS အားလုံး အတူတူပင်ဖြစ်သည် - Space သက်သာရန် မပြတော့ပါ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    body {
      font-family: 'Fredoka', system-ui, sans-serif;
      background: linear-gradient(to bottom, #bae6fd 0%, #e0f2fe 40%, #ccfbf1 60%, #2dd4bf 60%, #0d9488 100%);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #115e59; position: relative;
    }
    .water-ripples { position: absolute; bottom: 0; left: 0; width: 100%; height: 40%; background: linear-gradient(180deg, rgba(45,212,191,0.4) 0%, rgba(13,148,136,0.6) 100%); pointer-events: none; z-index: 1; }
    .ripple { position: absolute; background: rgba(255,255,255,0.15); border-radius: 50%; animation: rippleWave 6s infinite linear; }
    .ripple.r1 { width: 300px; height: 20px; bottom: 20%; left: 10%; }
    .ripple.r2 { width: 400px; height: 30px; bottom: 10%; right: 5%; animation-delay: 2s; }
    .ripple.r3 { width: 250px; height: 15px; bottom: 32%; left: 45%; animation-delay: 4s; }
    @keyframes rippleWave { 0% { transform: scale(0.8) translateX(-20px); opacity: 0; } 50% { opacity: 1; } 100% { transform: scale(1.2) translateX(20px); opacity: 0; } }
    .lilypad { position: absolute; bottom: 12%; left: 12%; width: 140px; height: 45px; background: #047857; border-radius: 50%; z-index: 2; pointer-events: none; box-shadow: inset -10px -5px 0 #065f46, 0 6px 12px rgba(0,0,0,0.1); }
    .lilypad::after { content: ''; position: absolute; right: 10px; top: 10px; width: 30px; height: 30px; background: inherit; filter: brightness(1.2); border-radius: 50%; }
    .frog { position: absolute; bottom: 30px; left: 40px; width: 55px; height: 45px; background: #22c55e; border-radius: 50% 50% 40% 40%; animation: frogJump 3.5s ease-in-out infinite; transform-origin: bottom center; }
    .frog::before { content: '👀'; position: absolute; top: -14px; left: 12px; font-size: 20px; }
    @keyframes frogJump { 0%, 90%, 100% { transform: scale(1) translateY(0); } 93% { transform: scale(1.1, 0.8) translateY(0); } 95% { transform: scale(0.9, 1.2) translateY(-40px); } 98% { transform: scale(1.05, 0.9) translateY(0); } }
    .intro-screen { position: fixed; inset: 0; background-color: #111827; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; color: #ffffff; transition: opacity 0.5s ease; }
    .intro-screen.hide { opacity: 0; pointer-events: none; }
    .btn-start { font-family: 'Noto Sans Myanmar', sans-serif; background-color: #0d9488; color: white; border: none; padding: 14px 45px; font-size: 22px; font-weight: 700; border-radius: 30px; cursor: pointer; box-shadow: 0 6px 0 #0f766e; }
    .game-container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%; padding: 10px; opacity: 0; transition: opacity 0.5s ease; }
    .game-container.show { opacity: 1; }
    .nav-buttons-container { position: absolute; top: 15px; left: 15px; z-index: 100; display: flex; gap: 10px; }
    .btn-action-back, .btn-action-home { font-family: 'Noto Sans Myanmar', sans-serif; font-weight: 800; color: #ffffff; padding: 10px 22px; border-radius: 16px; border: none; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.3); }
    .btn-action-back { background: #be123c; }
    .btn-action-home { background: #9f1239; }
    .audio-slider-panel { position: absolute; top: 15px; right: 15px; z-index: 100; background: rgba(13, 148, 136, 0.85); border: 2px solid #ccfbf1; padding: 6px 14px; border-radius: 20px; display: flex; align-items: center; gap: 8px; color: #ffffff; }
    .vol-range-input { width: 80px; accent-color: #facc15; cursor: pointer; }
    .stage { display: flex; flex-direction: row; gap: 12px; width: 100%; max-width: 950px; justify-content: center; align-items: center; }
    .wood-frame { padding: 12px; border-radius: 24px; background: #0d9488; box-shadow: inset 0 0 0 4px #ccfbf1; }
    .canvas-container { background: #ffffff; border-radius: 14px; overflow: hidden; }
    canvas { display: block; cursor: crosshair; }
    .panel { width: 140px; background: #f0fdfa; border-radius: 24px; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .btn { min-height: 54px; border-radius: 12px; border: none; color: white; font-weight: 700; cursor: pointer; }
    .btn-reset { background: #0f766e; }
    .btn-next { background: #ea580c; }
    .congrats-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
    .congrats-modal-overlay.show { opacity: 1; pointer-events: auto; }
    .congrats-card { background: white; border-radius: 32px; padding: 40px; text-align: center; max-width: 420px; }
    @media (max-width: 760px) {
      .stage { flex-direction: row; }
      canvas { width: 280px; height: 280px; }
      .panel { width: 110px; }
    }
  </style>
</head>
<body>

  <div class="nav-buttons-container">
    <button class="btn-action-back" id="btnNavigationBack">← Back</button>
    <button class="btn-action-home" onclick="window.location.href='index.html?fromGame=true'">🏠 Home</button>
  </div>

  <div class="audio-slider-panel">
    <span id="volIndicatorIcon">🔊</span>
    <input type="range" id="gameVolumeControl" min="0" max="1" step="0.05" value="0.3" class="vol-range-input" />
  </div>

  <div class="congrats-modal-overlay" id="congratsWindowBox">
    <div class="congrats-card">
      <div style="font-size: 55px; margin-bottom: 10px;">🎉✨⭐</div>
      <div style="font-size: 24px; font-weight: 800; color: #0d9488;">Congratulations!</div>
      <p style="margin: 15px 0; font-family: 'Noto Sans Myanmar';">သားသားမီးမီးတို့ရေ... အက္ခရာ "ခ" လေးကို သေသပ်လှပစွာနဲ့ အရောင်ခြယ်သလို့ ပြီးမြောက်သွားပါပြီ တော်လိုက်တာ ကွယ်။ 🌟</p>
      <button style="background: #2ed573; color: white; border: none; padding: 10px 40px; border-radius: 20px; cursor: pointer;" onclick="window.location.href='index.html?fromGame=true'">ပြီးပြီ</button>
    </div>
  </div>

  <audio id="paintBgmAudio" src="main-bgm.mp3" loop></audio>
  <audio id="applauseSoundEffect" src="clapping.mp3"></audio>

  <div class="intro-screen" id="introScreen">
    <div style="font-size: 40px; margin-bottom: 15px;">🐸🌊🎨</div>
    <h2 style="font-family: 'Noto Sans Myanmar'; font-size: 32px; color: #2dd4bf;">ဆေးရောင်ခြယ် ရေကန်ကမ္ဘာ</h2>
    <p style="font-family: 'Noto Sans Myanmar'; margin: 20px 0; color: #ccfbf1; max-width: 500px;">အက္ခရာ "ခ" လေးကို စိတ်ကြိုက်ဆေးခြယ်ကြမယ်။</p>
    <button class="btn-start" id="btnStart">စတင်ကစားမည်</button>
  </div>

  <div class="game-container" id="gameContainer">
    <h1 style="color:white; margin-bottom:10px; font-family: 'Noto Sans Myanmar';">အရောင်ခြယ်ပါ <span style="color:#facc15">ခ</span> !</h1>
    <div class="stage">
      <div class="wood-frame">
        <div class="canvas-container">
          <canvas id="paintCanvas" width="500" height="500"></canvas>
        </div>
      </div>
      <aside class="panel">
        <div id="eraser" style="padding:10px; background:white; border:2px solid #ccfbf1; border-radius:15px; cursor:pointer; text-align:center;">🧽 Eraser</div>
        <div id="brushGrid" style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;"></div>
        <button class="btn btn-reset" id="btnReset">ပြန်စမယ်</button>
        <button class="btn btn-next" id="btnNext">ပြီးပြီ</button>
      </aside>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d');
    let isPainting = false;
    let currentColor = '#ff4757';
    let currentType = 'solid';
    let currentPattern = '';
    let isEraser = false;
    let brushSize = 30;
    let lastX = 0, lastY = 0;

    const bgMusicAudio = document.getElementById('paintBgmAudio');
    const winApplauseAudio = document.getElementById('applauseSoundEffect');

    const brushes = [
      { id: 'red', type: 'solid', color: '#ff4757' },
      { id: 'orange', type: 'solid', color: '#ffa502' },
      { id: 'yellow', type: 'solid', color: '#eccc68' },
      { id: 'green', type: 'solid', color: '#2ed573' },
      { id: 'blue', type: 'solid', color: '#1e90ff' },
      { id: 'purple', type: 'solid', color: '#a55eea' },
      { id: 'rainbow', type: 'rainbow', color: 'linear-gradient(45deg, red, orange, yellow, green, blue, purple)' }
    ];

    // Drawing Logic (simplified for brevity)
    function startDrawing(e) {
      isPainting = true;
      const rect = canvas.getBoundingClientRect();
      lastX = ((e.clientX || e.touches[0].clientX) - rect.left) * (canvas.width / rect.width);
      lastY = ((e.clientY || e.touches[0].clientY) - rect.top) * (canvas.height / rect.height);
    }
    function stopDrawing() { isPainting = false; ctx.beginPath(); }
    function draw(e) {
      if (!isPainting) return;
      const rect = canvas.getBoundingClientRect();
      const x = ((e.clientX || e.touches[0].clientX) - rect.left) * (canvas.width / rect.width);
      const y = ((e.clientY || e.touches[0].clientY) - rect.top) * (canvas.height / rect.height);

      ctx.lineWidth = brushSize;
      ctx.lineCap = 'round';
      ctx.strokeStyle = isEraser ? '#ffffff' : currentColor;
      ctx.globalCompositeOperation = isEraser ? 'destination-out' : 'source-over';

      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(x, y);
      ctx.stroke();
      lastX = x; lastY = y;
    }

    // Volume Slider Logic (ဤနေရာတွင် ပြင်ထားပါသည်)
    function initUI() {
      const volumeSlider = document.getElementById('gameVolumeControl');
      const iconIndicator = document.getElementById('volIndicatorIcon');

      // အသံကို Slider တန်ဖိုးအတိုင်း စညှိပေးခြင်း
      function updateVolume(volValue) {
        bgMusicAudio.volume = volValue;
        winApplauseAudio.volume = volValue;
        if (volValue == 0) iconIndicator.textContent = '🔇';
        else if (volValue < 0.5) iconIndicator.textContent = '🔈';
        else iconIndicator.textContent = '🔊';
      }

      // စစချင်းမှာ အသံညှိမည် (Slider Default 0.3 အတိုင်း)
      updateVolume(volumeSlider.value);

      // Slider ရွှေ့လိုက်ရင် အလုပ်လုပ်မည့်နေရာ
      volumeSlider.addEventListener('input', (e) => {
        updateVolume(e.target.value);
      });

      document.getElementById('btnStart').onclick = () => {
        document.getElementById('introScreen').classList.add('hide');
        document.getElementById('gameContainer').classList.add('show');
        bgMusicAudio.play().catch(err => console.log("Audio play blocked", err));
      };

      // Brushes Grid
      const grid = document.getElementById('brushGrid');
      brushes.forEach(b => {
        const d = document.createElement('div');
        d.style.width = '40px'; d.style.height = '40px'; d.style.background = b.color;
        d.style.borderRadius = '8px'; d.style.cursor = 'pointer';
        d.onclick = () => { currentColor = b.color; isEraser = false; };
        grid.appendChild(d);
      });

      document.getElementById('eraser').onclick = () => isEraser = true;
      document.getElementById('btnReset').onclick = () => ctx.clearRect(0,0,canvas.width,canvas.height);
      document.getElementById('btnNext').onclick = () => {
        bgMusicAudio.pause();
        winApplauseAudio.play();
        document.getElementById('congratsWindowBox').classList.add('show');
      };
    }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('touchstart', (e) => { startDrawing(e.touches[0]); e.preventDefault(); }, {passive:false});
    canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); }, {passive:false});
    canvas.addEventListener('touchend', stopDrawing);

    // Letter Background
    canvas.style.backgroundImage = "url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='500' height='500'><text x='50%' y='50%' font-family='sans-serif' font-size='350' text-anchor='middle' dominant-baseline='middle' fill='none' stroke='%23ddd' stroke-width='2' stroke-dasharray='10,10'>ခ</text></svg>\")";

    initUI();
  </script>
</body>
</html>
