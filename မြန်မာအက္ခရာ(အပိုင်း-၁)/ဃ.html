<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dassy's Alphabet Quest - Ocean Adventure</title>
    <!-- Tailwind CSS for sleek UI overlay -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Montserrat:wght=400;700;900&family=Pyidaungsu:wght=400;700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0c4a6e;
            font-family: 'Fredoka One', 'Pyidaungsu', 'Montserrat', sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .burmese-font {
            font-family: 'Pyidaungsu', 'Myanmar3', 'Yunghkio', sans-serif;
        }
    </style>
</head>
<body class="relative">

    <!-- XP/Learning Progress & Score Top Overlay -->
    <div id="hud" class="absolute top-4 left-4 right-4 pointer-events-none z-30 flex flex-col space-y-2 max-w-md">
        <!-- Learning Progress Bar -->
        <div class="flex items-center space-x-3 bg-slate-900/95 backdrop-blur-md p-3 rounded-2xl border border-white/10 shadow-lg">
            <span class="text-xs font-black text-[#22d3ee] tracking-wider uppercase">Diving Depth</span>
            <div class="flex-1 bg-black/40 h-4 rounded-full overflow-hidden p-0.5 border border-white/5">
                <div id="xp-bar" class="bg-gradient-to-r from-[#06b6d4] to-[#3b82f6] h-full rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>
            <span id="level-display" class="bg-[#22d3ee] text-black text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Zone 1</span>
        </div>
        
        <!-- Score Counter & Active Target Letter Display -->
        <div class="flex items-center space-x-3">
            <div class="flex items-center space-x-2 bg-slate-900/95 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/10 shadow-lg">
                <span class="text-xl">💎</span>
                <span id="cash-display" class="text-white font-black tracking-widest text-sm">0</span>
            </div>
            <!-- Dynamic Educational Goal Frame -->
            <div class="flex items-center space-x-2 bg-gradient-to-r from-cyan-500/20 to-blue-500/20 backdrop-blur-md px-4 py-2 rounded-2xl border border-cyan-500/40 shadow-lg animate-pulse">
                <span class="text-xs font-black text-cyan-400 uppercase tracking-wider">Rescue:</span>
                <span id="target-letter-display" class="burmese-font text-xl font-bold text-cyan-300">ဃ (0 / 5)</span>
            </div>
        </div>
    </div>

    <!-- Top Right Controls (HP & Exit Button) -->
    <div class="absolute top-4 right-4 z-40 flex items-center space-x-2">
        <div class="pointer-events-none flex items-center space-x-2 bg-slate-900/95 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/10 shadow-lg">
            <span class="text-lg">🧼</span>
            <span id="hp-display" class="text-cyan-400 font-black tracking-wider text-sm">100 / 100</span>
        </div>
        
        <button id="exit-btn" class="hidden pointer-events-auto flex items-center justify-center bg-rose-600 hover:bg-rose-500 text-white font-black px-4 py-2.5 rounded-2xl border-b-4 border-rose-800 active:scale-95 transition-all shadow-lg text-sm">
            🚪 <span class="ml-1 burmese-font text-xs font-bold tracking-wide">ထွက်မည်</span>
        </button>
    </div>

    <!-- Upgrade / Level Up Modal -->
    <div id="upgrade-modal" class="hidden absolute inset-0 bg-black/85 backdrop-blur-md z-[100] flex items-center justify-center p-6 transition-all duration-300">
        <div class="bg-[#0f172a] border-2 border-blue-500/20 rounded-[3rem] p-10 max-w-md w-full text-center shadow-[0_0_100px_rgba(59,130,246,0.15)] scale-95 transition-transform">
            <div class="relative mb-8">
                <div class="text-4xl">🐙🔱🐚</div>
            </div>
            <h2 class="text-2xl font-black text-blue-400 tracking-wider mb-2 uppercase burmese-font">အဆင့်မြှင့်တင်ရန် ရွေးချယ်ပါ</h2>
            <p class="text-neutral-400 text-xs tracking-widest mb-8 uppercase">Select your ancient marine power-up</p>
            
            <div id="upgrade-options" class="space-y-4">
                <!-- Filled dynamically via javascript -->
            </div>
        </div>
    </div>

    <!-- Main Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- Mobile Virtual Joystick Container -->
    <div id="joystick-zone" class="absolute bottom-12 left-12 w-32 h-32 bg-white/5 border border-white/10 rounded-full flex items-center justify-center pointer-events-auto touch-none z-30 shadow-2xl active:bg-white/10 transition-colors">
        <div id="joystick-knob" class="w-12 h-12 bg-white/20 border border-white/40 rounded-full transition-transform duration-75"></div>
    </div>

    <!-- Start / GameOver Screens -->
    <div id="overlay-screen" class="absolute inset-0 bg-black/95 backdrop-blur-md z-[90] flex flex-col items-center justify-center text-center p-8">
        <h1 class="text-5xl sm:text-7xl font-black text-cyan-400 tracking-widest mb-2 uppercase drop-shadow-[0_0_30px_rgba(34,211,238,0.3)]">OCEAN ADVENTURE</h1>
        <p class="text-amber-500 text-[10px] uppercase font-black tracking-[0.5em] mb-12">Dassy's Burmese Alphabet Quest</p>
        
        <div id="game-stats" class="hidden bg-white/5 border border-white/5 rounded-3xl p-6 mb-10 max-w-xs w-full text-left space-y-3 font-sans">
            <div class="flex justify-between"><span class="text-neutral-500 burmese-font">မှန်ကန်သော အက္ခရာများ</span><span id="stat-coins" class="text-white font-bold">0</span></div>
            <div class="flex justify-between"><span class="text-neutral-500 burmese-font">မှားယွင်းသော အက္ခရာများ</span><span id="stat-kills" class="text-white font-bold">0</span></div>
            <div class="flex justify-between"><span class="text-neutral-500 burmese-font">ရောက်ရှိသွားသော အဆင့်</span><span id="stat-level" class="text-[#22d3ee] font-bold">Zone 1</span></div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center items-center pointer-events-auto w-full max-w-md">
            <button id="start-btn" class="w-full sm:w-auto px-10 py-5 bg-cyan-600 hover:bg-cyan-500 text-white font-black text-xs uppercase tracking-[0.2em] rounded-full transition-all shadow-[0_15px_40px_rgba(6,182,212,0.3)] border-b-4 border-cyan-800 active:scale-95 burmese-font">
                🔄 စတင်ကစားမည်
            </button>
            <button id="main-page-btn" class="w-full sm:w-auto px-10 py-5 bg-rose-600 hover:bg-rose-500 text-white font-black text-xs uppercase tracking-[0.2em] rounded-full transition-all shadow-[0_15px_40px_rgba(225,29,72,0.3)] border-b-4 border-rose-800 active:scale-95 burmese-font">
                🚪 ပင်မစာမျက်နှာ (Main Page)
            </button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'shoot') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'hit') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.exponentialRampToValueAtTime(60, now + 0.1);
                gainNode.gain.setValueAtTime(0.08, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'coin') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.setValueAtTime(950, now + 0.08);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'fail') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.linearRampToValueAtTime(80, now + 0.3);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === 'levelup') {
                const freqs = [400, 500, 600, 700, 900];
                freqs.forEach((f, i) => {
                    const oscSeq = audioCtx.createOscillator();
                    const gainSeq = audioCtx.createGain();
                    oscSeq.connect(gainSeq);
                    gainSeq.connect(audioCtx.destination);
                    oscSeq.type = 'sine';
                    oscSeq.frequency.setValueAtTime(f, now + i * 0.05);
                    gainSeq.gain.setValueAtTime(0.05, now + i * 0.05);
                    gainSeq.gain.exponentialRampToValueAtTime(0.01, now + i * 0.05 + 0.12);
                    oscSeq.start(now + i * 0.05);
                    oscSeq.stop(now + i * 0.05 + 0.12);
                });
            }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const burmeseAlphabets = [
            'က', 'ခ', 'ဂ', 'ဃ', 'င', 'စ', 'ဆ', 'ဇ', 'ဈ', 'ည',
            'တ', 'ထ', 'ဒ', 'ဓ', 'န', 'ပ', 'ဖ', 'ဗ', 'ဘ', 'မ',
            'ယ', 'ရ', 'လ', 'ဝ', 'သ', 'ဟ', 'ဠ', 'အ'
        ];

        const game = {
            running: false,
            paused: false,
            score: 0,
            correctPops: 0,
            incorrectPops: 0,
            targetLetter: 'ဃ',
            maxTargetCount: 5,
            camera: { x: 0, y: 0 }
        };

        const player = {
            x: 0, y: 0, vx: 0, vy: 0, radius: 22,
            hp: 100, maxHp: 100, xp: 0, maxXp: 100,
            level: 1, speed: 4.0, range: 190, damage: 50,
            shootCooldown: 0.35, lastShotTime: 0
        };

        const keys = {};
        const entities = { projectiles: [], letterBubbles: [], collectibles: [], scenery: [] };

        function initScenery() {
            entities.scenery = [];
            const size = 3000;
            for (let i = 0; i < 40; i++) {
                entities.scenery.push({
                    type: 'seaweed',
                    x: (Math.random() - 0.5) * size,
                    y: (Math.random() - 0.5) * size,
                    radius: 25 + Math.random() * 30,
                    speed: 0.2 + Math.random() * 0.3
                });
            }
            for (let i = 0; i < 50; i++) {
                entities.scenery.push({
                    type: 'bubble',
                    x: (Math.random() - 0.5) * size,
                    y: (Math.random() - 0.5) * size,
                    radius: 5 + Math.random() * 12,
                    speed: 0.6 + Math.random() * 0.8
                });
            }
            for (let i = 0; i < 10; i++) {
                entities.scenery.push({
                    type: 'jellyfish',
                    x: (Math.random() - 0.5) * size,
                    y: (Math.random() - 0.5) * size,
                    radius: 18,
                    color: `hsl(${180 + Math.random() * 80}, 90%, 70%)`,
                    speed: 0.4 + Math.random() * 0.4
                });
            }
        }

        function updateTargetLetterDisplay() {
            document.getElementById('target-letter-display').innerText = `ဃ (${game.correctPops} / ${game.maxTargetCount})`;
        }

        function drawSeaweed(ctx, x, y, radius) {
            ctx.fillStyle = 'rgba(16, 185, 129, 0.4)';
            ctx.beginPath();
            const wobble = Math.sin(Date.now() * 0.002 + x) * 15;
            ctx.moveTo(x, y + radius);
            ctx.quadraticCurveTo(x - radius + wobble, y, x, y - radius * 1.5);
            ctx.quadraticCurveTo(x + radius + wobble, y, x, y + radius);
            ctx.closePath();
            ctx.fill();
        }

        function drawBubble(ctx, x, y, radius) {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.fill();
        }

        function drawJellyfish(ctx, x, y, color) {
            const pulse = Math.sin(Date.now() * 0.003 + x) * 4;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, 16 + pulse, Math.PI, 0);
            ctx.closePath();
            ctx.fill();
            
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            for(let i = -10; i <= 10; i += 5) {
                ctx.beginPath();
                ctx.moveTo(x + i, y);
                ctx.quadraticCurveTo(x + i + Math.sin(Date.now()*0.005)*5, y + 20, x + i, y + 30);
                ctx.stroke();
            }
        }

        function drawPlayer(ctx, x, y) {
            ctx.fillStyle = 'rgba(0,0,0,0.2)'; 
            ctx.beginPath(); 
            ctx.ellipse(x, y + 18, 22, 6, 0, 0, Math.PI * 2); 
            ctx.fill();

            ctx.fillStyle = '#eab308'; 
            ctx.beginPath(); 
            ctx.ellipse(x, y, 22, 14, 0, 0, Math.PI * 2); 
            ctx.fill();

            ctx.fillStyle = '#ca8a04';
            ctx.fillRect(x - 4, y - 22, 6, 10);
            ctx.fillRect(x - 4, y - 24, 12, 5);

            ctx.fillStyle = '#38bdf8';
            ctx.beginPath();
            ctx.arc(x - 8, y, 4, 0, Math.PI * 2);
            ctx.arc(x + 6, y, 4, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = 'rgba(6, 182, 212, 0.35)'; 
            ctx.lineWidth = 2; 
            ctx.setLineDash([6, 6]); 
            ctx.beginPath(); 
            ctx.arc(x, y, player.range, 0, Math.PI * 2); 
            ctx.stroke(); 
            ctx.setLineDash([]);
        }

        function drawLetterBubble(ctx, clam) {
            const { x, y, letter, scale, angleOffset } = clam;
            const isTarget = letter === game.targetLetter;
            const floatWobble = Math.sin(Date.now() * 0.004 + angleOffset) * 4 * scale;

            ctx.save();
            ctx.translate(x, y + floatWobble);

            ctx.fillStyle = isTarget ? 'rgba(234, 179, 8, 0.2)' : 'rgba(147, 51, 234, 0.15)';
            ctx.beginPath();
            ctx.arc(0, 0, 24 * scale, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = isTarget ? '#eab308' : '#a855f7';
            ctx.beginPath();
            ctx.moveTo(-18 * scale, 10 * scale);
            ctx.quadraticCurveTo(-22 * scale, -15 * scale, 0, -20 * scale);
            ctx.quadraticCurveTo(22 * scale, -15 * scale, 18 * scale, 10 * scale);
            ctx.closePath();
            ctx.fill();

            ctx.fillStyle = isTarget ? '#fef08a' : '#f3e8ff';
            ctx.beginPath();
            ctx.ellipse(0, 2 * scale, 14 * scale, 10 * scale, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            ctx.fillStyle = '#1e1b4b'; 
            ctx.font = `bold ${17 * scale}px Pyidaungsu, "Myanmar3", "Yunghkio", sans-serif`; 
            ctx.textAlign = 'center'; 
            ctx.textBaseline = 'middle'; 
            ctx.fillText(letter, x, y + floatWobble);
        }

        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        let joystickActive = false;
        let joystickStart = { x: 0, y: 0 };
        let joystickDir = { x: 0, y: 0 };

        joystickZone.addEventListener('touchstart', (e) => {
            joystickActive = true;
            const rect = joystickZone.getBoundingClientRect();
            joystickStart = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            e.preventDefault();
        }, { passive: false });

        joystickZone.addEventListener('touchmove', (e) => {
            if (!joystickActive) return;
            const touch = e.touches[0];
            const dx = touch.clientX - joystickStart.x;
            const dy = touch.clientY - joystickStart.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            const maxRadius = 50;

            if (distance === 0) {
                joystickDir = { x: 0, y: 0 }; joystickKnob.style.transform = 'translate(0px, 0px)';
            } else {
                const angle = Math.atan2(dy, dx);
                const boundedDist = Math.min(distance, maxRadius);
                joystickDir = { x: Math.cos(angle), y: Math.sin(angle) };
                joystickKnob.style.transform = `translate(${joystickDir.x * boundedDist}px, ${joystickDir.y * boundedDist}px)`;
            }
            e.preventDefault();
        }, { passive: false });

        joystickZone.addEventListener('touchend', (e) => {
            joystickActive = false; joystickDir = { x: 0, y: 0 }; joystickKnob.style.transform = 'translate(0px, 0px)';
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        canvas.addEventListener('mousedown', (e) => {
            if (!game.running || game.paused) return;
            const exitBtn = document.getElementById('exit-btn');
            const rect = exitBtn.getBoundingClientRect();
            if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) return;
            fireManualProjectile(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            if (!game.running || game.paused) return;
            const touch = e.touches[0];
            const rect = joystickZone.getBoundingClientRect();
            if (touch.clientX >= rect.left && touch.clientX <= rect.right && touch.clientY >= rect.top && touch.clientY <= rect.bottom) return;
            const exitBtn = document.getElementById('exit-btn');
            const exitRect = exitBtn.getBoundingClientRect();
            if (touch.clientX >= exitRect.left && touch.clientX <= exitRect.right && touch.clientY >= exitRect.top && touch.clientY <= exitRect.bottom) return;
            fireManualProjectile(touch.clientX, touch.clientY);
        }, { passive: true });

        function fireManualProjectile(screenX, screenY) {
            const now = Date.now() / 1000;
            if (now - player.lastShotTime < player.shootCooldown) return;

            const worldX = screenX + game.camera.x; const worldY = screenY + game.camera.y;
            const dx = worldX - player.x; const dy = worldY - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy); if (dist === 0) return;

            playSound('shoot');
            entities.projectiles.push({ x: player.x, y: player.y, vx: (dx / dist) * 11.0, vy: (dy / dist) * 11.0, radius: 6 });
            player.lastShotTime = now;
        }

        function spawnLetterBubble() {
            if (!game.running || game.paused) return;

            const angle = Math.random() * Math.PI * 2;
            const dist = 460 + Math.random() * 140;
            const x = player.x + Math.cos(angle) * dist; const y = player.y + Math.sin(angle) * dist;

            const isTargetSpawn = Math.random() < 0.40;
            let chosenLetter = game.targetLetter;
            if (!isTargetSpawn) {
                const filtered = burmeseAlphabets.filter(char => char !== game.targetLetter);
                chosenLetter = filtered[Math.floor(Math.random() * filtered.length)];
            }

            const speedMultiplier = 1.0 + (player.level - 1) * 0.22;

            entities.letterBubbles.push({
                x, y,
                letter: chosenLetter,
                scale: 1.0 + Math.random() * 0.25,
                speed: (1.1 + Math.random() * 0.6) * speedMultiplier,
                angleOffset: Math.random() * Math.PI,
                hp: 1,
                spawnTime: Date.now()
            });
        }

        setInterval(spawnLetterBubble, 1150);

        //// UPGRADE POOL ကို ကလေးများအတွက် မြန်မာစာသားများဖြင့် အပြီးသတ် ပြောင်းလဲထားခြင်း
        const UPGRADE_POOL = [
            { id: 'dmg', name: 'လေဆာရောင်ခြည်စွမ်းအင်', desc: 'စာလုံးပေါက်ကွဲမှုစွမ်းအား ၂၅% ပိုပြင်းမယ်', stat: 'damage', factor: 1.25 },
            { id: 'rng', name: 'မှော်မျက်မှန် ဝိုင်းကြီး', desc: 'စာလုံးလှမ်းဖမ်းနိုင်တဲ့အကွာအဝေး ၁၅% ပိုကျယ်မယ်', stat: 'range', factor: 1.15 },
            { id: 'spd', name: 'အပြေးမြန်တဲ့ ဝမှော်ဖိနပ်', desc: 'သွားတဲ့အရှိန် ၁၅% ပိုမြန်လာမယ်', stat: 'speed', factor: 1.15 },
            { id: 'rate', name: 'ချက်ချင်းပစ် မှော်အလင်း', desc: 'မှော်ပစ်ရတာ စောင့်ရချိန် ၁၅% ပိုမြန်မယ်', stat: 'shootCooldown', factor: 0.85 }
        ];

        function checkTargetProgression() {
            updateTargetLetterDisplay();
            
            if (game.correctPops >= game.maxTargetCount) {
                game.running = false;
                playSound('levelup');
                setTimeout(() => {
                    window.location.href = 'င.html';
                }, 500);
            }
        }

        function triggerLevelUp() {
            if (player.level >= 5) {
                player.xp = player.maxXp; 
                return;
            }
            playSound('levelup'); player.level++; player.xp = 0; player.maxXp = Math.round(player.maxXp * 1.5);
            
            const optionsContainer = document.getElementById('upgrade-options'); optionsContainer.innerHTML = '';
            const shuffled = [...UPGRADE_POOL].sort(() => 0.5 - Math.random()).slice(0, 3);
            shuffled.forEach(upg => {
                const btn = document.createElement('button');
                btn.className = "w-full p-5 bg-[#1e293b] border border-white/5 hover:border-blue-500 rounded-2xl flex items-center justify-between text-left transition-all active:scale-95";
                btn.innerHTML = `<div><h4 class="text-cyan-400 font-black text-base tracking-wide burmese-font">${upg.name}</h4><p class="text-neutral-300 text-xs mt-1 burmese-font">${upg.desc}</p></div><span class="text-lg">🔱</span>`;
                btn.onclick = () => applyUpgrade(upg);
                optionsContainer.appendChild(btn);
            });

            document.getElementById('upgrade-modal').classList.remove('hidden');
            game.paused = true;
        }

        function applyUpgrade(upg) {
            player[upg.stat] *= upg.factor;
            document.getElementById('upgrade-modal').classList.add('hidden');
            game.paused = false;
        }

        let lastTime = performance.now();

        function updateGame(dt) {
            if (!game.running || game.paused) return;

            let moveX = 0; let moveY = 0;
            if (keys['w'] || keys['arrowup']) moveY = -1;
            if (keys['s'] || keys['arrowdown']) moveY = 1;
            if (keys['a'] || keys['arrowleft']) moveX = -1;
            if (keys['d'] || keys['arrowright']) moveX = 1;

            if (moveX !== 0 && moveY !== 0) { moveX *= 0.7071; moveY *= 0.7071; }
            if (joystickActive) { moveX = joystickDir.x; moveY = joystickDir.y; }

            player.x += moveX * player.speed * dt; player.y += moveY * player.speed * dt;
            game.camera.x += (player.x - window.innerWidth / 2 - game.camera.x) * 0.1 * dt;
            game.camera.y += (player.y - window.innerHeight / 2 - game.camera.y) * 0.1 * dt;

            entities.scenery.forEach(item => {
                if (item.type === 'seaweed') {
                    item.x += Math.sin(Date.now() * 0.001 + item.y) * 0.1;
                } else if (item.type === 'bubble') {
                    item.y -= item.speed * dt; item.x += Math.sin(Date.now() * 0.002 + item.y) * 0.3;
                    if (item.y < player.y - 1500) item.y = player.y + 1500;
                } else if (item.type === 'jellyfish') {
                    item.y -= item.speed * dt; item.x += Math.cos(Date.now() * 0.0015 + item.y) * 0.4;
                    if (item.y < player.y - 1500) { item.y = player.y + 1500; item.x = player.x + (Math.random() - 0.5) * 1000; }
                }
            });

            for (let i = entities.projectiles.length - 1; i >= 0; i--) {
                const proj = entities.projectiles[i]; proj.x += proj.vx * dt; proj.y += proj.vy * dt;
                const flightDistance = Math.sqrt((proj.x - player.x) ** 2 + (proj.y - player.y) ** 2);
                if (flightDistance > player.range + 200) { entities.projectiles.splice(i, 1); continue; }

                let projectileHit = false;
                for (let j = entities.letterBubbles.length - 1; j >= 0; j--) {
                    const bubble = entities.letterBubbles[j];
                    const dx = bubble.x - proj.x; const dy = bubble.y - proj.y; const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < (20 * bubble.scale) + proj.radius) {
                        projectileHit = true;
                        if (bubble.letter === game.targetLetter) {
                            playSound('hit'); entities.letterBubbles.splice(j, 1);
                            game.correctPops++; game.score += 15; player.xp += 25;
                            if (player.xp >= player.maxXp) triggerLevelUp();

                            entities.collectibles.push({ x: bubble.x, y: bubble.y, type: 'sea_gem', letter: bubble.letter, value: 25 });
                            checkTargetProgression();
                        } else {
                            playSound('fail'); game.incorrectPops++; entities.letterBubbles.splice(j, 1);
                        }
                        break;
                    }
                }
                if (projectileHit) entities.projectiles.splice(i, 1);
            }

            for (let idx = entities.letterBubbles.length - 1; idx >= 0; idx--) {
                const bubble = entities.letterBubbles[idx];
                if (bubble.letter !== game.targetLetter && (Date.now() - bubble.spawnTime > 5000)) { entities.letterBubbles.splice(idx, 1); continue; }

                const offsetTime = Date.now() * 0.002 + bubble.angleOffset;
                const glideX = Math.cos(offsetTime) * 0.7; const glideY = Math.sin(offsetTime) * 1.2;
                const dx = player.x - bubble.x; const dy = player.y - bubble.y; const dist = Math.sqrt(dx * dx + dy * dy);

                bubble.x += ((dx / dist) * bubble.speed + glideX) * dt; bubble.y += ((dy / dist) * bubble.speed + glideY) * dt;

                if (dist < player.radius + 16) {
                    if (bubble.letter === game.targetLetter) {
                        playSound('coin'); game.correctPops++; game.score += 25; player.xp += 30;
                        if (player.xp >= player.maxXp) triggerLevelUp();
                        entities.letterBubbles.splice(idx, 1);
                        checkTargetProgression();
                    } else {
                        playSound('fail'); entities.letterBubbles.splice(idx, 1);
                        player.hp = Math.max(0, player.hp - 10);
                        if (player.hp <= 0) gameOver();
                    }
                }
            }

            for (let i = entities.collectibles.length - 1; i >= 0; i--) {
                const item = entities.collectibles[i];
                const dx = player.x - item.x; const dy = player.y - item.y; const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < player.range) { item.x += (dx / dist) * 7.5 * dt; item.y += (dy / dist) * 7.5 * dt; }
                if (dist < player.radius + 10) {
                    playSound('coin'); player.xp += item.value;
                    if (player.xp >= player.maxXp) triggerLevelUp();
                    entities.collectibles.splice(i, 1);
                }
            }

            document.getElementById('xp-bar').style.width = `${(player.xp / player.maxXp) * 100}%`;
            document.getElementById('level-display').innerText = `Zone ${player.level}`;
            document.getElementById('cash-display').innerText = game.score;
            document.getElementById('hp-display').innerText = `${Math.max(0, Math.round(player.hp))} / ${player.maxHp}`;
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save(); ctx.translate(-game.camera.x, -game.camera.y);

            ctx.fillStyle = '#075985'; ctx.fillRect(player.x - 2000, player.y - 2000, 4000, 4000);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)'; ctx.lineWidth = 1.5;
            for (let x = -2000; x < 2000; x += 160) { ctx.beginPath(); ctx.moveTo(x, -2000); ctx.lineTo(x, 2000); ctx.stroke(); }
            for (let y = -2000; y < 2000; y += 160) { ctx.beginPath(); ctx.moveTo(-2000, y); ctx.lineTo(2000, y); ctx.stroke(); }

            entities.scenery.forEach(item => {
                if (item.type === 'seaweed') drawSeaweed(ctx, item.x, item.y, item.radius);
                if (item.type === 'bubble') drawBubble(ctx, item.x, item.y, item.radius);
                if (item.type === 'jellyfish') drawJellyfish(ctx, item.x, item.y, item.color);
            });

            entities.collectibles.forEach(item => {
                ctx.fillStyle = '#22d3ee'; ctx.beginPath(); 
                ctx.moveTo(item.x, item.y - 7);
                ctx.lineTo(item.x + 7, item.y);
                ctx.lineTo(item.x, item.y + 7);
                ctx.lineTo(item.x - 7, item.y);
                ctx.closePath(); ctx.fill();
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)'; ctx.beginPath(); ctx.arc(item.x - 2, item.y - 2, 2, 0, Math.PI * 2); ctx.fill();
            });

            entities.projectiles.forEach(proj => {
                ctx.fillStyle = '#38bdf8'; ctx.beginPath(); ctx.arc(proj.x, proj.y, proj.radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(proj.x - 1.5, proj.y - 1.5, 2, 0, Math.PI * 2); ctx.fill();
            });

            entities.letterBubbles.forEach(bubble => drawLetterBubble(ctx, bubble));
            drawPlayer(ctx, player.x, player.y);
            ctx.restore();
        }

        function gameLoop(now) {
            let dt = (now - lastTime) / 16.666; lastTime = now; if (dt > 4) dt = 4;
            updateGame(dt); render(); requestAnimationFrame(gameLoop);
        }

        function startGame() {
            player.hp = player.maxHp; player.xp = 0; player.level = 1; player.x = 0; player.y = 0;
            game.score = 0; game.correctPops = 0; game.incorrectPops = 0;
            entities.letterBubbles = []; entities.projectiles = []; entities.collectibles = [];
            
            initScenery();
            updateTargetLetterDisplay();
            
            document.getElementById('overlay-screen').classList.add('hidden');
            document.getElementById('exit-btn').classList.remove('hidden');
            game.running = true;
        }

        function returnToMainPage() {
            playSound('fail');
            game.running = false;
            window.location.href = 'index.html?fromGame=true';
        }

        function gameOver() {
            game.running = false;
            document.getElementById('exit-btn').classList.add('hidden');
            
            document.getElementById('stat-coins').innerText = game.correctPops;
            document.getElementById('stat-kills').innerText = game.incorrectPops;
            document.getElementById('stat-level').innerText = `Zone ${player.level}`;
            document.getElementById('game-stats').classList.remove('hidden');
            document.getElementById('start-btn').innerText = "🔄 ပြန်လည်ကစားမည်";
            document.getElementById('overlay-screen').classList.remove('hidden');
        }

        document.getElementById('start-btn').onclick = startGame;
        document.getElementById('exit-btn').onclick = returnToMainPage;
        
        document.getElementById('main-page-btn').onclick = function() {
            window.location.href = 'index.html?fromGame=true';
        };

        window.onload = function() {
            requestAnimationFrame(gameLoop);
        };
    </script>
</body>
