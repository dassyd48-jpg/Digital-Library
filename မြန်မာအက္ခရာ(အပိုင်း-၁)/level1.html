<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>မြန်မာစာအက္ခရာ သင်ခန်းစာ - Level 1</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #FFDEE9 0%, #B5FFFC 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* --- Intro Page CSS --- */
        #introScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        .intro-title {
            font-size: 32px;
            color: #FF4A70;
            font-weight: bold;
            text-shadow: 2px 2px 0px #fff;
            margin-bottom: 15px;
        }

        .intro-card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.1);
            border: 6px solid #FFB74D;
            max-width: 400px;
            margin-bottom: 25px;
        }

        .intro-text {
            font-size: 18px;
            color: #555;
            line-height: 1.8;
            margin: 0;
            font-weight: 500;
        }

        .start-game-btn {
            font-size: 22px;
            font-weight: bold;
            padding: 12px 40px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0px 5px 0px #388E3C;
            transition: all 0.1s ease;
        }

        .start-game-btn:active {
            transform: translateY(3px);
            box-shadow: 0px 2px 0px #388E3C;
        }

        /* --- Game Screen CSS --- */
        #gameScreen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            box-sizing: border-box;
        }

        .header-container {
            text-align: center;
            margin-bottom: 10px;
        }

        .instruction-title {
            font-size: 24px;
            color: #FF4A70;
            font-weight: bold;
            text-shadow: 2px 2px 0px #fff;
            margin: 5px 0;
        }

        .mode-badge {
            background-color: #FFB74D;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: bold;
            display: inline-block;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .stars-container {
            display: flex;
            gap: 8px;
            margin: 10px 0;
            font-size: 26px;
            justify-content: center;
        }

        .star {
            color: #E0E0E0;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .star.active {
            color: #FFCA28;
            transform: scale(1.2);
            text-shadow: 0 0 10px rgba(255,202,40,0.6);
        }

        .canvas-container {
            position: relative;
            width: 320px;
            height: 320px;
            background-color: white;
            border: 8px solid #FFB74D;
            border-radius: 20px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .giant-text-letter {
            font-size: 180px;
            font-weight: bold;
            color: #FF4A70;
            text-shadow: 4px 4px 0px #F5F5F5;
            user-select: none;
            pointer-events: none;
            z-index: 1;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            border-radius: 12px;
            touch-action: none;
            z-index: 2;
            cursor: pointer;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            align-items: center;
            height: 50px;
        }

        .action-btn {
            font-size: 18px;
            font-weight: bold;
            padding: 10px 25px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0px 4px 0px rgba(0,0,0,0.2);
            transition: all 0.1s ease;
        }

        .action-btn:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0px 2px 0px rgba(0,0,0,0.2);
        }

        .action-btn:disabled {
            background-color: #BDBDBD !important;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .clear-btn {
            background-color: #E57373;
            color: white;
        }

        .practice-btn {
            background-color: #4CAF50;
            color: white;
            font-size: 20px;
            padding: 10px 35px;
        }

        .nav-container {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            align-items: center;
        }

        .nav-circle-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: white;
            border: 3px solid #FFB74D;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .nav-circle-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .home-btn {
            border-color: #4FC3F7;
            color: #0288D1;
        }
        .back-btn {
            border-color: #BA68C8;
            color: #7B1FA2;
        }

        /* 📱 ဖုန်း Screen သေးသေးလေးတွေအတွက် အထူးပြင်ဆင်ချက် (Responsive Mobile View) */
        @media (max-height: 740px) {
            .instruction-title {
                font-size: 18px;
                margin: 2px 0;
            }
            .mode-badge {
                font-size: 13px;
                padding: 3px 12px;
            }
            .stars-container {
                font-size: 20px;
                margin: 5px 0;
            }
            .canvas-container {
                width: 250px;
                height: 250px;
                border: 6px solid #FFB74D;
            }
            .giant-text-letter {
                font-size: 130px;
            }
            .controls {
                height: 40px;
                margin-top: 10px;
                gap: 10px;
            }
            .action-btn {
                font-size: 13px;
                padding: 8px 18px;
            }
            .practice-btn {
                font-size: 14px;
                padding: 8px 22px;
            }
            .nav-container {
                margin-top: 10px;
                gap: 12px;
            }
            .nav-circle-btn {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div id="introScreen">
        <div class="intro-title">ပျော်ရွှင်စရာ မြန်မာစာ သင်ခန်းစာ 🎉</div>
        <div class="intro-card">
            <p class="intro-text">
                သားတို့ သမီးတို့ရေ...မြန်မာစာ အက္ခရာလေးတွေကို သာယာတဲ့ အသံလေးတွေနဲ့ 
                လေ့ကျင့်ကြမယ်နော်။ <br><br>
                ကြယ်လေးတွေ စုဖို့ အဆင်သင့်ပဲလားကွယ်။ 
            </p>
        </div>
        <button class="start-game-btn" onclick="startGame()">စကြစို့ ➔</button>
        <button class="nav-circle-btn home-btn" onclick="goToHome()" style="margin-top: 20px;" title="သင်ခန်းစာအားလုံးသို့">🏠</button>
    </div>

    <div id="gameScreen">
        <div class="header-container">
            <div id="modeBadge" class="mode-badge">အဆင့် (၁) - နားထောင်စို့ 🔊</div>
            <div id="instructionTitle" class="instruction-title">စာလုံးလေးကို နှိပ်ပြီး အသံနားထောင်မယ် 🎧</div>
        </div>

        <div class="stars-container" id="starsRow">
            <span class="star">★</span>
            <span class="star">★</span>
            <span class="star">★</span>
            <span class="star">★</span>
            <span class="star">★</span>
        </div>

        <div class="canvas-container" id="boardContainer">
            <div id="giantText" class="giant-text-letter">က</div>
            <canvas id="paintCanvas"></canvas>
        </div>

        <div class="controls">
            <button id="clearBtn" class="action-btn clear-btn" onclick="clearCanvas()">ဖျက်ပါ 🧼</button>
            <button id="actionBtn" class="action-btn practice-btn" onclick="handleActionProgress()" disabled>နောက်တစ်ခု 🔄 +⭐</button>
        </div>

        <div class="nav-container">
            <button id="homeBtn" class="nav-circle-btn home-btn" onclick="goToHome()" title="သင်ခန်းစာအားလုံးသို့">🏠</button>
            <button id="backBtn" class="nav-circle-btn back-btn" onclick="goToIntro()" title="မိတ်ဆက်စာမျက်နှာသို့">↩️</button>
            <button id="prevBtn" class="nav-circle-btn" onclick="navigateLetter(-1)">◀</button>
            <button id="nextBtn" class="nav-circle-btn" onclick="navigateLetter(1)" disabled>▶</button>
        </div>
    </div>

    <script>
        const alphabetData = [
            { name: "က", traceImg: "ka.png", audioSource: "ka.mp3", requiredStrokes: 2 },
            { name: "ခ", traceImg: "kha.png", audioSource: "kha.mp3", requiredStrokes: 1 },
            { name: "ဂ", traceImg: "ga.png", audioSource: "ga.mp3", requiredStrokes: 1 },
            { name: "ဃ", traceImg: "gha.png", audioSource: "gha.mp3", requiredStrokes: 3 },
            { name: "င", traceImg: "nga.png", audioSource: "nga.mp3", requiredStrokes: 1 }
        ];

        let currentIndex = 0;
        let currentMode = "LISTEN";
        let currentStars = 0;
        let strokeCount = 0;
        let isDrawing = false;

        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const giantText = document.getElementById('giantText');
        const actionBtn = document.getElementById('actionBtn');
        const clearBtn = document.getElementById('clearBtn');
        const modeBadge = document.getElementById('modeBadge');
        const instructionTitle = document.getElementById('instructionTitle');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');

        let letterAudio = new Audio();

        // Canvas Responsive Resize Function
        function resizeCanvas() {
            const container = document.getElementById('boardContainer');
            const rect = container.getBoundingClientRect();
            const width = rect.width - 16; // border ပတ်လည်နုတ်ခြင်း
            const height = rect.height - 16;

            const scale = 2;
            canvas.width = width * scale;
            canvas.height = height * scale;
            canvas.style.width = width + "px";
            canvas.style.height = height + "px";
            
            ctx.resetTransform();
            ctx.scale(scale, scale);

            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.lineWidth = width > 260 ? 14 : 10; 
            ctx.strokeStyle = '#ffffff';
        }

        window.addEventListener('resize', resizeCanvas);

        function startGame() {
            document.getElementById('introScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'flex';
            resizeCanvas();
            loadAlphabetLevel();
        }

        function goToIntro() {
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('introScreen').style.display = 'flex';
            if (letterAudio) letterAudio.pause();
        }

        function goToHome() {
            window.location.href = 'index.html?fromGame=true';
        }

        function loadAlphabetLevel() {
            const data = alphabetData[currentIndex];
            currentStars = 0;
            strokeCount = 0;
            updateStarsUI();
            letterAudio.src = data.audioSource;

            prevBtn.disabled = (currentIndex === 0);
            
            if (currentIndex === alphabetData.length - 1 && localStorage.getItem('alphabet_lessons_completed') === 'true') {
                nextBtn.disabled = false;
            } else {
                nextBtn.disabled = true;
            }
            
            actionBtn.onclick = handleActionProgress;
            setGameMode("LISTEN");
        }

        function setGameMode(mode) {
            currentMode = mode;
            const data = alphabetData[currentIndex];
            clearCanvas();
            actionBtn.disabled = true;

            if (currentMode === "LISTEN") {
                modeBadge.innerText = "အဆင့် (၁) - နားထောင်စို့ 🔊";
                modeBadge.style.backgroundColor = "#FFB74D";
                instructionTitle.innerText = "စာလုံးလေးကို နှိပ်ပြီး အသံနားထောင်မယ် 🎧";
                
                giantText.style.display = "flex";
                giantText.innerText = data.name;
                canvas.style.backgroundImage = "none";
                clearBtn.style.display = "none";
                playVocal();
            } else {
                modeBadge.innerText = "အဆင့် (၂) - လိုက်ဆွဲစို့ ✍️";
                modeBadge.style.backgroundColor = "#4CAF50";
                instructionTitle.innerText = "မြားအညွှန်းအတိုင်း လမ်းကြောင်းလိုက်ဆွဲပါ 🎨";
                
                giantText.style.display = "none";
                canvas.style.backgroundImage = `url('${data.traceImg}')`;
                canvas.style.backgroundSize = "contain";
                canvas.style.backgroundPosition = "center";
                canvas.style.backgroundRepeat = "no-repeat";
                clearBtn.style.display = "inline-block";
            }
        }

        function playVocal() {
            letterAudio.play().catch(e => console.log("Audio activation deferred."));
        }

        function handleActionProgress() {
            currentStars++;
            updateStarsUI();
            strokeCount = 0;
            actionBtn.disabled = true;

            if (currentStars < 5) {
                clearCanvas();
                if (currentMode === "LISTEN") {
                    playVocal();
                }
            } else {
                if (currentMode === "LISTEN") {
                    currentStars = 0;
                    updateStarsUI();
                    setGameMode("TRACING");
                } else {
                    if (currentIndex === alphabetData.length - 1) {
                        localStorage.setItem('alphabet_lessons_completed', 'true');
                        instructionTitle.innerText = "သင်ခန်းစာအားလုံး ပြီးပါပြီ။ စွန့်စားခန်းဆီ သွားကြစို့ 🎉";
                        actionBtn.innerText = "စွန့်စားခန်းသို့ ထွက်ခွာမည် ➔";
                        actionBtn.disabled = false;
                        nextBtn.disabled = false;
                        
                        actionBtn.onclick = () => { window.location.href = 'index.html?fromGame=true'; };
                    } else {
                        nextBtn.disabled = false;
                        instructionTitle.innerText = "အောင်မြင်ပါပြီ။ နောက်စာလုံးကို သွားပါ 🎉";
                        actionBtn.innerText = "ပြီးပါပြီ 🌟";
                    }
                }
            }
        }

        function updateStarsUI() {
            const stars = document.querySelectorAll('.star');
            stars.forEach((star, idx) => {
                if (idx < currentStars) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });

            if (currentStars < 5) {
                actionBtn.innerText = "နောက်တစ်ကြိမ် ထပ်လုပ်ပါ 🔄 +⭐";
            }
        }

        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startLine(e) {
            e.preventDefault();
            if (currentMode === "LISTEN") {
                playVocal();
                actionBtn.disabled = false;
                return;
            }
            const coords = getCanvasCoords(e);
            isDrawing = true;
            strokeCount++;
            ctx.beginPath();
            ctx.moveTo(coords.x, coords.y);
        }

        function traceLine(e) {
            e.preventDefault();
            if (!isDrawing || currentMode === "LISTEN") return;
            const coords = getCanvasCoords(e);
            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
        }

        function stopLine() {
            if (!isDrawing) return;
            isDrawing = false;
            ctx.beginPath();

            if (currentMode === "TRACING") {
                const data = alphabetData[currentIndex];
                if (strokeCount >= data.requiredStrokes) {
                    actionBtn.disabled = false;
                }
            }
        }

        canvas.addEventListener('mousedown', startLine);
        canvas.addEventListener('mousemove', traceLine);
        canvas.addEventListener('mouseup', stopLine);

        canvas.addEventListener('touchstart', startLine);
        canvas.addEventListener('touchmove', traceLine);
        canvas.addEventListener('touchend', stopLine);

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (currentMode === "TRACING") {
                strokeCount = 0;
                actionBtn.disabled = true;
            }
        }

        function navigateLetter(direction) {
            const nextIndex = currentIndex + direction;
            if (nextIndex >= 0 && nextIndex < alphabetData.length) {
                currentIndex = nextIndex;
                loadAlphabetLevel();
            } else if (nextIndex >= alphabetData.length) {
                localStorage.setItem('alphabet_lessons_completed', 'true');
                window.location.href = 'index.html?fromGame=true';
            }
        }
    </script>
</body>
</html>
