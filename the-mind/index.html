<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE MIND | DASSY DIGITAL LIBRARY</title>

    <meta name="description" content="Explore the depths of human psychology and the subconscious with THE MIND by DASSY. An interactive digital exploration of the psyche.">
    <meta name="keywords" content="THE MIND, DASSY Digital Library, Psychology, Subconscious, Self-Development, Interactive Book">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Book",
      "name": "THE MIND",
      "author": { "@type": "Person", "name": "DASSY" },
      "description": "A psychological journey into the depths of the subconscious mind by DASSY Digital Library."
    }
    </script>

    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="turn.js"></script>

    <style>
        :root { 
            --gold: #D4AF37;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        #bg-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; filter: brightness(0.4); transition: opacity 1.2s ease; }
        
        #lock { 
            position: fixed;
            inset: 0; display: flex; justify-content: center; align-items: center; 
            flex-direction: column; z-index: 20;
            background: radial-gradient(circle, rgba(18, 1, 27, 0.8) 0%, rgba(0, 0, 0, 0.95) 100%); 
            backdrop-filter: blur(8px); color: #fff; text-align: center; padding: 20px;
        }
        
        .book-title-container { margin-bottom: 45px; }
        .gold-text { 
            background: linear-gradient(to bottom, #d4af37 0%, #f7ef8a 50%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            font-size: clamp(28px, 6vw, 45px); font-weight: 900; letter-spacing: 2px; margin: 0; 
            text-transform: uppercase;
        }
        .book-subtitle { color: #fff; font-size: 14px; letter-spacing: 3px; font-weight: bold; margin-top: 10px; opacity: 0.8; }

        #lock input { 
            padding: 16px;
            width: 300px; border: 1px solid rgba(212, 175, 55, 0.4); 
            background: rgba(255, 255, 255, 0.05); color: #fff; text-align: center; 
            font-size: 16px; outline: none; margin-bottom: 25px; border-radius: 6px;
            letter-spacing: 2px;
        }
        #lock input::placeholder { color: rgba(255,255,255,0.3); }

        #lock button { 
            padding: 15px 80px;
            background: linear-gradient(145deg, #d4af37, #a67c00); 
            color: #000; border: none; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; border-radius: 6px; letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(191, 149, 63, 0.3);
            transition: 0.3s;
        }
        #lock button:hover { transform: scale(1.05); opacity: 0.9; }

        .contact-link { 
            margin-top: 35px; color: #d4af37; text-decoration: none; 
            font-size: 13px; font-weight: bold; letter-spacing: 1px;
            opacity: 0.8; text-transform: uppercase;
        }

        #book-container { display: none; width: 100vw; height: 100vh; position: relative; z-index: 10; opacity: 0; }
        #flipbook-wrapper { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; padding-bottom: 35px; background: #000; }
        
        .page { background: #000; width: 100%; height: 100%; position: relative; overflow: hidden; }
        .page img { width: 100%; height: 100%; object-fit: fill !important; display: block; pointer-events: none; }
        .page iframe { width: 100% !important; height: 100% !important; border: none !important; display: block; background: #000; position: absolute; top: 0; left: 0; }

        .watermark { 
            position: absolute; bottom: 20px; width: 100%; text-align: center; 
            font-size: 10px; color: rgba(212, 175, 55, 0.4); letter-spacing: 3px; pointer-events: none; z-index: 15; 
        }

        /* 🛠️ Bookmark Button Style */
        #bookmark-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1500;
            padding: 8px 16px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--gold);
            color: var(--gold);
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        #bookmark-btn.bookmarked {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 15px var(--gold);
        }

        /* 🛠️ စာမျက်နှာ ၁ သို့ ပြန်သွားရန် ခလုတ် Style */
        #restart-btn {
            display: none;
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1500;
            padding: 10px 20px;
            background: linear-gradient(145deg, #d4af37, #a67c00);
            color: #000;
            border: none;
            font-size: 12px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        #restart-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        @media screen and (max-width: 768px) {
            #bookmark-btn {
                top: 15px;
                right: 15px;
                padding: 6px 12px;
                font-size: 10px;
            }
            #restart-btn {
                bottom: 55px;
                padding: 8px 16px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline><source src="video.mp4" type="video/mp4"></video>

    <div id="lock">
        <div class="book-title-container">
            <h1 class="gold-text">THE MIND</h1>
            <div class="book-subtitle">Build Your Authority</div>
        </div>
        
        <input type="password" id="pass" placeholder="PASSWORD" autocomplete="off" onkeypress="if(event.key === 'Enter') unlock()">
        <button onclick="unlock()">ACCESS THE VAULT</button>
        
        <a href="https://t.me/Dassy_Digital_Library" target="_blank" class="contact-link">
            📩 Contact DASSY for Password
        </a>
    </div>

    <div id="book-container">
        <!-- 🛠️ Floating Bookmark Button -->
        <button id="bookmark-btn" onclick="toggleBookmark()">SAVE BOOKMARK</button>

        <!-- 🛠️ စာမျက်နှာ ၁ သို့ ပြန်သွားရန် ခလုတ် -->
        <button id="restart-btn" onclick="goToFirstPage()">↺ စာမျက်နှာ ၁ သို့ ပြန်သွားရန်</button>

        <div id="flipbook-wrapper"><div id="flipbook"></div></div>
        <div class="watermark">POWERED BY DASSY DIGITAL LIBRARY</div>
    </div>

    <audio id="sound" src="flip.mp3" preload="auto"></audio>

    <script>
        const myPassword = "THE@@MIND99";
        const maxPages = 40; 
        const quizPages = [11, 18, 24, 31, 37]; 
        const storageBookmarkKey = "mind_saved_bookmark";
        const storageKeyAuth = "mind_authenticated";
        
        let isQuizLocked = false;

        $(document).ready(function() {
            if (localStorage.getItem(storageKeyAuth) === "true") {
                $("#lock, #bg-video").hide();
                $("#book-container").show().css("opacity", 1);
                loadAndInit();
            }
        });

        function getBookSize() {
            let w = window.innerWidth;
            let h = window.innerHeight - 40; 

            if (window.innerWidth < 600) {
                w = window.innerWidth;
            } else {
                let tabletH = window.innerHeight * 0.85;
                let tabletW = tabletH * 0.707;
                if (w / h > 0.707) { w = tabletW; h = tabletH; } else { h = w / 0.707; }
            }
            return { w, h };
        }

        // 🌟 ပြင်ဆင်ပြီးသော Message Listener စနစ် (Lock ကို ဖြုတ်ပြီးမှ Next သို့သွားမည်)
        window.addEventListener("message", function(event) {
            if (event.data === "quizCompleted") {
                isQuizLocked = false; // 🛠️ FIX: ဒိုင်ခံပိတ်ထားသော Lock ကို အရင်ဆုံး ဖွင့်ပေးလိုက်ခြင်း
                setTimeout(() => { 
                    $("#flipbook").turn("next"); 
                }, 300);
            }
        }, false);

        function unlock() {
            if(document.getElementById("pass").value === myPassword) {
                localStorage.setItem(storageKeyAuth, "true");
                $("#lock").fadeOut(600, () => {
                    $("#bg-video").fadeOut(600);
                    $("#book-container").css("display", "block").animate({opacity: 1}, 1000);
                    loadAndInit();
                });
            } else { 
                alert("စကားဝှက် မှားယွင်းနေပါသည်။");
            }
        }

        /* 🛠️ Bookmark Functions */
        function toggleBookmark() {
            const flipbook = $("#flipbook");
            const currentPage = flipbook.turn("page");
            const bookmarkedPage = localStorage.getItem(storageBookmarkKey);

            if (bookmarkedPage && parseInt(bookmarkedPage) === currentPage) {
                localStorage.removeItem(storageBookmarkKey);
            } else {
                localStorage.setItem(storageBookmarkKey, currentPage);
            }
            updateBookmarkButton(currentPage);
        }

        function updateBookmarkButton(page) {
            const btn = $("#bookmark-btn");
            const bookmarkedPage = localStorage.getItem(storageBookmarkKey);

            if (bookmarkedPage && parseInt(bookmarkedPage) === page) {
                btn.addClass("bookmarked");
                btn.text("UNSAVE BOOKMARK");
            } else {
                btn.removeClass("bookmarked");
                btn.text("SAVE BOOKMARK");
            }
        }

        /* 🛠️ စာမျက်နှာ ၁ သို့ ပြန်သွားရန် Function */
        function goToFirstPage() {
            $("#flipbook").turn("page", 1);
        }

        function loadAndInit() {
            const flipbook = $("#flipbook");
            if (flipbook.children().length > 0) return;

            const { w, h } = getBookSize();
            
            for(let i=1; i<=maxPages; i++) {
                const pageDiv = $('<div class="page"></div>');
                
                if(quizPages.includes(i)) {
                    pageDiv.append(`<iframe src="page${i}.html" style="width:100%; height:100%; border:none; overflow:hidden;" scrolling="no"></iframe>`);
                } 
                else if (i < maxPages) {
                    pageDiv.append($('<img />').attr('src', `page${i}.jpg`));
                } 
                else {
                    pageDiv.append('<div style="width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; color:#555; font-size:12px;">END OF PREVIEW</div>');
                }
                flipbook.append(pageDiv);
            }

            // 🛠️ Bookmark ရယူခြင်း (မမှတ်ထားပါက Page 1)
            const savedBookmark = localStorage.getItem(storageBookmarkKey);
            let startPage = 1;
            if (savedBookmark) {
                startPage = parseInt(savedBookmark);
            }

            setTimeout(() => {
                flipbook.turn({
                    width: w, height: h, autoCenter: true, display: 'single', acceleration: true, duration: 400,
                    when: {
                        turning: function(e, page) {
                            if (isQuizLocked) { e.preventDefault(); return; }
                            const s = document.getElementById("sound");
                            if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
                        },
                        turned: function(e, page) {
                            isQuizLocked = quizPages.includes(page);
                            updateBookmarkButton(page);

                            // 🛠️ နိဂုံးစာမျက်နှာ (Page 40) ရောက်လျှင် ခလုတ်ပြမည်
                            if (page === maxPages) {
                                $("#restart-btn").fadeIn(300);
                            } else {
                                $("#restart-btn").fadeOut(300);
                            }
                        }
                    }
                });
                
                // 🛠️ Jump to Bookmark Page
                if (startPage > 1) {
                    setTimeout(() => {
                        flipbook.turn("page", startPage);
                    }, 100);
                } else {
                    flipbook.turn("page", 1);
                }

                updateBookmarkButton(startPage);

                if (startPage === maxPages) {
                    $("#restart-btn").show();
                }

            }, 100);
        }

        $(window).resize(function() {
            const { w, h } = getBookSize();
            if ($("#flipbook").turn("is")) {
                $("#flipbook").turn("size", w, h);
            }
        });
    </script>
    <script>
        fetch(`https://api.countapi.xyz/hit/dassy-library/the-mind`).then(res => res.json()).then(data => { console.log("Views:", data.value); });
    </script>
</body>
</html>
