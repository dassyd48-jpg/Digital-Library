<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE MIND | DASSY DIGITAL LIBRARY</title>

    <!-- AI & SEO Meta Tags -->
    <meta name="description" content="Explore the depths of human psychology and the subconscious with THE MIND by DASSY. An interactive digital exploration of the psyche.">
    <meta name="keywords" content="THE MIND, DASSY Digital Library, Psychology, Subconscious, Self-Development, Interactive Book">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Book",
      "name": "THE MIND",
      "author": { "@type": "Person", "name": "DASSY" },
      "description": "A psychological journey into the depths of the subconscious mind by DASSY Digital Library."
    }
    </script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        #bg-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transition: opacity 1.2s; }
        
        #lock { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 20; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); color: #d4af37; text-align: center; }
        .gold-text { background: linear-gradient(to bottom, #d4af37 0%, #f7ef8a 50%, #d4af37 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; text-transform: uppercase; }
        
        #lock input { padding: 15px; width: 230px; border-radius: 6px; border: 1px solid rgba(212,175,55,0.4); background: rgba(255,255,255,0.05); color: #fff; text-align: center; font-size: 16px; outline: none; }
        #lock button { margin-top: 18px; padding: 12px 40px; border-radius: 6px; border: none; background: linear-gradient(145deg, #d4af37, #a67c00); color: #000; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        #book-container { display: none; width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 10; background: #000; opacity: 0; }
        #flipbook-wrapper { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        
        .watermark { position: fixed; bottom: 15px; width: 100%; text-align: center; font-size: 10px; color: rgba(212, 175, 55, 0.4); z-index: 100; letter-spacing: 3px; pointer-events: none; }
        .contact-link { margin-top: 20px; color: #d4af37; text-decoration: none; font-size: 13px; opacity: 0.8; }
        .page { background: #000; width: 100%; height: 100%; position: relative; }
        .page img { width: 100%; height: 100%; object-fit: fill; pointer-events: none; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline><source src="video.mp4" type="video/mp4"></video>

    <div id="lock">
        <h2 class="gold-text">THE MIND</h2>
        <p>Build Your Authority</p>
        <input type="password" id="pass" placeholder="PASSWORD" autocomplete="off" onkeypress="if(event.key === 'Enter') unlock()">
        <button onclick="unlock()">ACCESS THE VAULT</button>
        <a href="https://t.me/Dassy_Digital_Library" target="_blank" class="contact-link">📩 Contact DASSY for Password</a>
    </div>

    <div id="book-container">
        <div id="flipbook-wrapper"><div id="flipbook"></div></div>
        <div class="watermark">POWERED BY DASSY DIGITAL LIBRARY</div>
    </div>

    <audio id="sound" src="flip.mp3" preload="auto"></audio>

    <script>
        const myPassword = "THE@@MIND99"; 
        const maxPages = 40; 
        const quizPages = [11, 18, 24, 31, 37]; 
        const storageKeyPage = "mind_current_page";
        const storageKeyAuth = "mind_authenticated";

        $(document).ready(function() {
            if (localStorage.getItem(storageKeyAuth) === "true") {
                $("#lock, #bg-video").hide();
                $("#book-container").show().css("opacity", 1);
                loadAndInit();
            }
        });

        function getBookSize() { return { width: window.innerWidth, height: window.innerHeight }; }

        function unlock(){
            if(document.getElementById("pass").value === myPassword){
                localStorage.setItem(storageKeyAuth, "true");
                $("#lock").fadeOut(500, function(){
                    $("#bg-video").fadeOut(500);
                    $("#book-container").show().animate({opacity: 1}, 800);
                    loadAndInit();
                });
            } else { alert("စကားဝှက် မှားယွင်းနေပါသည်။"); }
        }

        function loadAndInit(){
            const flipbook = $("#flipbook");
            if (flipbook.children().length > 0) return;
            const size = getBookSize();
            let savedPage = parseInt(localStorage.getItem(storageKeyPage)) || 1;

            for(let i=1; i<=maxPages; i++){
                const pageDiv = $('<div class="page"></div>');
                if(quizPages.includes(i)) {
                    pageDiv.append(`<iframe src="page${i}.html"></iframe>`);
                } else {
                    pageDiv.append($('<img loading="lazy" />').attr('src', `page${i}.jpg`));
                }
                flipbook.append(pageDiv);
            }

            setTimeout(() => {
                flipbook.turn({
                    width: size.width, height: size.height, autoCenter: true, display: 'single', acceleration: true,
                    page: savedPage,
                    when: {
                        turning: function(e, page) { 
                            const s = document.getElementById("sound");
                            if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
                        },
                        turned: function(e, page) { localStorage.setItem(storageKeyPage, page); }
                    }
                });
            }, 200);
        }

        window.addEventListener('resize', () => {
            if ($("#flipbook").turn("is")) {
                const size = getBookSize();
                $("#flipbook").turn("size", size.width, size.height);
            }
        });
    </script>
    <script>
        fetch(`https://api.countapi.xyz/hit/dassy-library/the-mind`).then(res => res.json()).then(data => { console.log("Views:", data.value); });
    </script>
</body>
</html>
