<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>THE AUTOPSY OF A SOUL | DASSY DIGITAL LIBRARY</title>
    
    <meta name="description" content="The official interactive psychological book 'The Autopsy of a Soul' by DASSY. Exploring Generational Trauma and inner healing.">
    <meta name="author" content="DASSY">
    
    <meta property="og:title" content="THE AUTOPSY OF A SOUL | DASSY DIGITAL LIBRARY">
    <meta property="og:description" content="An interactive psychological book by DASSY exploring Generational Trauma and inner healing.">
    <meta property="og:type" content="book">
    <meta property="og:image" content="cover.jpg">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Book",
      "name": "The Autopsy of a Soul",
      "alternateName": "Generational Trauma",
      "author": {
        "@type": "Person",
        "name": "DASSY",
        "url": "https://dassydigitallibrary.com"
      },
      "publisher": {
        "@type": "Organization",
        "name": "DASSY Digital Library"
      },
      "description": "An interactive psychological book by DASSY exploring Generational Trauma and inner healing.",
      "genre": ["Psychology", "Self-Help", "Mental Health", "Generational Trauma"],
      "inLanguage": ["my", "en"]
    }
    </script>

    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="turn.js"></script>

    <style>
        :root { 
            --gold: #D4AF37; 
            --emerald-bg: radial-gradient(circle, #061c18 0%, #000 100%);
            --bright-green: #2ecc71; 
            --neon-glow: 0 0 15px rgba(46, 204, 113, 0.8);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; 
            height: 100vh; height: 100dvh; 
            overflow: hidden; background: #000; 
            font-family: 'Segoe UI', sans-serif; 
        }
        
        #bg-video { 
            position: fixed; inset: 0; width: 100%; height: 100%; 
            object-fit: cover; z-index: 0; filter: brightness(0.4); 
        }
        
        #lock { 
            position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; 
            flex-direction: column; z-index: 20; 
            background: radial-gradient(circle, rgba(6, 28, 24, 0.85) 0%, rgba(0, 0, 0, 0.98) 100%); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            color: #fff; text-align: center; padding: 20px; 
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .brand-label { 
            font-size: 11px; color: var(--gold); letter-spacing: 5px; 
            margin-bottom: 25px; font-weight: bold; opacity: 0.9;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        
        .book-title-container { 
            margin-bottom: 45px; 
            width: 100%;
            max-width: 550px;
        }
        
        .book-title { 
            color: var(--bright-green); font-weight: 900; letter-spacing: 6px; 
            font-size: clamp(22px, 5vw, 34px); margin: 0; 
            text-shadow: var(--neon-glow);
            border-top: 1px solid rgba(212, 175, 55, 0.3); 
            border-bottom: 1px solid rgba(212, 175, 55, 0.3); 
            padding: 25px 0; width: 100%;
        }
        
        .sub-title { 
            font-size: 14px; letter-spacing: 2px; color: var(--bright-green); 
            text-shadow: 0 0 8px rgba(46, 204, 113, 0.5);
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        #lock input { 
            padding: 16px 20px; width: 320px; max-width: 90vw;
            border: 1px solid rgba(212, 175, 55, 0.35); 
            background: rgba(6, 28, 24, 0.6); 
            color: #fff; text-align: center; 
            font-size: 16px; outline: none; border-radius: 6px;
            letter-spacing: 4px; transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        
        #lock input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.25);
        }

        #lock input.error-shake {
            animation: shake 0.4s ease-in-out;
            border-color: #ff3333 !important;
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.4) !important;
        }
        
        #lock input::placeholder { 
            color: rgba(255,255,255,0.25); letter-spacing: 2px; font-size: 13px; 
        }

        #lock button { 
            padding: 16px 80px; width: 320px; max-width: 90vw;
            background: linear-gradient(45deg, #a67c1e, #fbf5b7, #caa142, #fbf5b7, #a67c1e);
            background-size: 400% 400%;
            color: #000; border: none; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; border-radius: 6px; letter-spacing: 2px;
            font-size: 13px;
            box-shadow: 0 4px 20px rgba(166, 124, 30, 0.4);
            transition: all 0.3s ease;
            animation: goldShimmer 6s ease infinite;
        }
        
        #lock button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.6);
        }
        
        #lock button:active {
            transform: translateY(1px);
        }

        .request-link { 
            margin-top: 40px; color: #ff33ff; text-decoration: none; 
            font-size: 11px; font-weight: bold; letter-spacing: 1.5px;
            text-transform: uppercase; transition: all 0.3s ease;
            opacity: 0.8;
        }
        .request-link:hover { opacity: 1; text-shadow: 0 0 10px rgba(255, 51, 255, 0.5); }

        #book-container { 
            display: none; width: 100vw; 
            height: 100vh; height: 100dvh; 
            position: relative; 
            z-index: 10; opacity: 0; transform: scale(1.05);
            transition: opacity 1s ease, transform 1s ease;
            background: var(--emerald-bg);
        }
        
        #flipbook-wrapper { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            position: relative;
            padding-bottom: 40px; /* စာမျက်နှာလှန်ချိန် Watermark ကို မကျော်စေရန် space ချန်ထားခြင်း */
        }
        
        .page { background: #000; width: 100%; height: 100%; position: relative; overflow: hidden; }
        .page img { width: 100%; height: 100%; object-fit: fill !important; display: block; pointer-events: none; }

        .watermark { 
            position: absolute; 
            bottom: 30px; 
            width: 100%; 
            text-align: center; 
            font-size: 10px; 
            color: var(--gold); 
            opacity: 0.35; 
            letter-spacing: 4px; 
            pointer-events: none; 
            z-index: 999; 
        }

        /* Quiz Container */
        .quiz-container {
            width: 100%; height: 100%; display: flex;
            justify-content: center; align-items: center;
            overflow: hidden; background: #030d0b;
        }
        
        .quiz-container iframe {
            width: 100% !important; height: 100% !important; border: none !important; display: block;
        }

        @keyframes goldShimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
    </style>
</head>
<body>

    <video id="bg-video" autoplay muted loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <div id="lock">
        <span class="brand-label">DASSY DIGITAL LIBRARY PRESENTS</span>
        <div class="book-title-container">
            <h1 class="book-title">THE AUTOPSY OF A SOUL<br><span class="sub-title">(Generational Trauma)</span></h1>
        </div>
        
        <div class="input-wrapper">
            <input type="password" id="pass" placeholder="ACCESS KEY" autocomplete="off">
        </div>
        <button onclick="unlock()">OPEN YOUR SOUL</button>
        
        <a href="https://t.me/Dassy_digital_Library" target="_blank" class="request-link">
            REQUEST PRIVATE ACCESS FROM DASSY
        </a>
    </div>

    <div id="book-container">
        <div id="flipbook-wrapper">
            <div id="flipbook"></div>
            <div class="watermark">© DASSY DIGITAL LIBRARY | ALL RIGHTS RESERVED</div>
        </div>
    </div>

    <audio id="sound-flip" src="flip.mp3" preload="auto"></audio>
    <audio id="bgm-dark" src="dark_ambient.mp3" loop preload="auto"></audio>
    <audio id="bgm-light" src="calm_ethereal.mp3" loop preload="auto"></audio>

    <script>
        const myPassword = "GT@@AUTOPSY"; 
        const totalPages = 47; 
        const quizPages = [2, 9, 14, 19, 24, 29, 34, 39, 44, 46]; 
        let isQuizLocked = false; 
        let currentActivePage = 1;

        // 🛠️ FIX 2: Password တစ်ခါပဲ တောင်းစေဖို့ ဝင်စစ်ဆေးတဲ့ Logic
        $(document).ready(function() {
            const isUnlocked = localStorage.getItem("aos_unlocked");
            if (isUnlocked === "true") {
                $("#lock, #bg-video").hide();
                $("#book-container").show().css({ 'opacity': '1', 'transform': 'scale(1)' });
                loadAndInit();
            }
        });

        // 🛠️ FIX 1: စာမျက်နှာ Ratio ကို Mobile/Tablet ပေါ်မူတည်ပြီး တွက်ချက်ပေးတဲ့ Logic
        function getBookSize() {
            let w = window.innerWidth;
            let h = window.innerHeight - 40;

            if (window.innerWidth < 600) {
                w = window.innerWidth;
                h = window.innerHeight * 0.82; // မူရင်း 0.82 အချိုးကို ကွက်တိပြန်ထိန်းထားခြင်း
            } else {
                let tabletH = window.innerHeight * 0.82;
                let tabletW = tabletH * 0.707;
                if (w / h > 0.707) { w = tabletW; h = tabletH; } else { h = w / 0.707; }
            }
            return { w, h };
        }

        // Iframe Window Messenger Sync
        window.addEventListener("message", function(event) {
            if (event.data === "quizCompleted") {
                isQuizLocked = false; 
                setTimeout(() => { $("#flipbook").turn("next"); }, 300);
            }
        }, false);

        // Security Core Execution
        function unlock() {
            const inputField = document.getElementById("pass");
            const darkAmbience = document.getElementById("bgm-dark");
            const lightAmbience = document.getElementById("bgm-light");

            if(inputField.value === myPassword) {
                // 🛠️ FIX 2: Password အောင်မြင်ကြောင်း သိမ်းဆည်းခြင်း
                localStorage.setItem("aos_unlocked", "true");

                darkAmbience.play().then(() => darkAmbience.pause()).catch(()=>{});
                lightAmbience.play().then(() => lightAmbience.pause()).catch(()=>{});

                $("#lock").css({
                    'opacity': '0',
                    'transform': 'scale(0.95)',
                    'pointer-events': 'none'
                });
                
                setTimeout(() => {
                    $("#lock").remove();
                    $("#bg-video").fadeOut(800);
                    
                    $("#book-container").css("display", "block");
                    $("#book-container")[0].offsetHeight; 
                    $("#book-container").css({
                        'opacity': '1',
                        'transform': 'scale(1)'
                    });
                    
                    loadAndInit();
                }, 800);
            } else { 
                inputField.classList.remove("error-shake");
                void inputField.offsetWidth; 
                inputField.classList.add("error-shake");
                inputField.value = "";
                inputField.focus();
            }
        }

        // Render Frame Elements
        function loadAndInit() {
            const flipbook = $("#flipbook");
            if (flipbook.children().length > 0) return;

            const { w, h } = getBookSize();

            for(let i = 1; i <= totalPages; i++) {
                const pageDiv = $('<div class="page"></div>');
                
                if(quizPages.includes(i)) {
                    pageDiv.append(`<div class="quiz-container"><iframe src="quiz.html?p=${i}" scrolling="no"></iframe></div>`);
                } 
                else if (i < totalPages) {
                    pageDiv.append($('<img />').attr('src', `page${i}.jpg`));
                } 
                else {
                    pageDiv.append('<div style="width:100%; height:100%; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; color:rgba(212,175,55,0.4); font-family:sans-serif; text-align:center; padding:20px;"><div style="font-size:12px; letter-spacing:4px; font-weight:bold; margin-bottom:10px; color:#fff;">DASSY DIGITAL LIBRARY</div><div style="font-size:11px; letter-spacing:2px; color:var(--gold); opacity:0.8;">— END OF PREVIEW —</div></div>');
                }
                flipbook.append(pageDiv);
            }

            // Engine Initializations
            setTimeout(() => {
                flipbook.turn({
                    width: w, height: h, autoCenter: true, display: 'single', acceleration: true, duration: 400,
                    elevation: 0,
                    when: {
                        turning: function(e, page) {
                            if (isQuizLocked && page !== currentActivePage) { 
                                e.preventDefault(); 
                                return; 
                            }
                            const s = document.getElementById("sound-flip");
                            if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
                        },
                        turned: function(e, page) {
                            currentActivePage = page;
                            
                            // 🛠️ FIX 3: ဖတ်လက်စ စာမျက်နှာကို သိမ်းဆည်းပေးခြင်း Logic
                            localStorage.setItem("aos_last_page", page);

                            isQuizLocked = quizPages.includes(page);
                            controlMusic(page);
                        }
                    }
                });

                // 🛠️ FIX 3: ဖတ်လက်စ စာမျက်နှာကို ပြန်ခေါ်ယူဖွင့်ပေးခြင်း Logic
                const savedPage = localStorage.getItem("aos_last_page");
                if (savedPage) {
                    flipbook.turn("page", parseInt(savedPage));
                    controlMusic(parseInt(savedPage));
                } else {
                    flipbook.turn("page", 1);
                    controlMusic(1);
                }
            }, 100);
        }

        // Music Logic Controller
        function controlMusic(page) {
            const dark = document.getElementById("bgm-dark");
            const light = document.getElementById("bgm-light");
            if(!dark || !light) return;
            
            if (quizPages.includes(page)) {
                if (dark.paused) {
                    light.pause();
                    dark.volume = 0.3;
                    dark.play().catch(()=>{});
                }
            } else {
                if (light.paused) {
                    dark.pause();
                    light.volume = 0.3;
                    light.play().catch(()=>{});
                }
            }
        }

        // Engine Auto Resizer
        $(window).resize(function() {
            const { w, h } = getBookSize();
            if ($("#flipbook").turn("is")) {
                $("#flipbook").turn("size", w, h);
            }
        });
    </script>
</body>
</html>
