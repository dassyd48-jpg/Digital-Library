<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Autopsy of a Soul - Interactive Test</title>
    <style>
        :root {
            --gold: #D4AF37;
            --emerald-black: #030d0b;
            --neon-green: #2ecc71;
        }

        body { 
            background: #020a08; /* Dark Emerald Black Theme matching Main Book */
            color: var(--gold);
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        
        .quiz-container { 
            width: 100%;
            max-width: 480px; 
            max-height: 96vh;
            background: rgba(0, 0, 0, 0.85); 
            border: 1px solid var(--gold); 
            border-radius: 12px; 
            padding: 15px 20px; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
            margin-bottom: 10px;
            -webkit-overflow-scrolling: touch;
        }

        .scrollable-content::-webkit-scrollbar {
            width: 4px;
        }
        .scrollable-content::-webkit-scrollbar-thumb {
            background: rgba(212, 175, 55, 0.3);
            border-radius: 4px;
        }

        .phase-label { 
            font-size: 11px; 
            color: var(--gold); 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-weight: bold;
            display: block; 
            margin-bottom: 12px;
            text-align: center;
        }
        
        h2 { 
            font-size: 14.5px; 
            line-height: 1.6; 
            color: #fff; 
            margin-bottom: 20px;
            font-weight: normal; 
            text-align: left;
        }
        
        .options-group {
            display: block;
        }
        
        .option { 
            display: block;
            width: 100%; 
            padding: 13px 15px; 
            margin: 10px 0; 
            background: rgba(212, 175, 55, 0.03); 
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: #eee; 
            border-radius: 6px; 
            cursor: pointer; 
            text-align: left; 
            transition: 0.2s; 
            font-size: 13.5px;
            line-height: 1.5;
        }
        
        .option:hover, .option:active { 
            background: var(--gold); 
            color: #000;
            font-weight: bold;
            border-color: var(--gold);
        }
        
        #result-box { 
            display: none; 
            animation: fadeIn 0.5s ease;
            text-align: left;
        }
        
        .res-header {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .res-type { 
            font-size: 13.5px; 
            font-weight: bold; 
            color: #000; 
            background: var(--gold);
            padding: 10px 12px; 
            border-radius: 4px; 
            display: block; 
            margin-bottom: 12px; 
            text-align: left;
            line-height: 1.5;
            width: 100%;
            box-sizing: border-box;
        }
        
        .res-section-title {
            font-weight: bold;
            color: var(--gold);
            margin-top: 14px;
            font-size: 14px;
            display: block;
            letter-spacing: 1px;
        }
        
        .res-desc { 
            color: #ddd;
            font-size: 13.5px; 
            line-height: 1.6; 
            margin-bottom: 10px; 
        }

        .action-container {
            width: 100%;
            padding-top: 5px;
            flex-shrink: 0;
        }
        
        .next-btn { 
            display: block;
            width: 100%;
            background: transparent;
            border: 1px solid var(--gold); 
            color: var(--gold); 
            padding: 14px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 13px;
            text-transform: uppercase; 
            letter-spacing: 2px;
            transition: 0.3s;
            font-weight: bold;
            text-align: center;
        }
        
        .next-btn:hover, .next-btn:active { 
            background: var(--gold); 
            color: #000;
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(8px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="scrollable-content">
        
        <div id="quiz-flow">
            <span class="phase-label" id="quiz-title">Interactive Test</span>
            <h2 id="q-text">မေးခွန်းများကို ရွေးချယ်နေပါသည်...</h2>
            
            <div class="options-group" id="options-group">
                <button class="option" id="opt-ka" onclick="showAnalysis('ka')"></button>
                <button class="option" id="opt-kha" onclick="showAnalysis('kha')"></button>
                <button class="option" id="opt-ga" onclick="showAnalysis('ga')"></button>
            </div>
        </div>

        <div id="result-box">
            <div class="res-header">
                <span class="phase-label">ANALYSIS RESULT</span>
            </div>
            
            <div class="res-type" id="res-choice"></div>
            
            <span class="res-section-title">🧐 စိတ္တဗေဒ ဆန်းစစ်ချက်ရလဒ် -</span>
            <p class="res-desc" id="res-desc"></p>
        </div>

    </div>

    <div class="action-container" id="action-wrapper" style="display: none;">
        <button onclick="completeQuiz()" class="next-btn">စာမျက်နှာကို ဆက်လက်ဖတ်ရှုရန် →</button>
    </div>
</div>

    // Full Comprehensive Database for The Autopsy of a Soul

            ka: { txt: "(က) အခန်းထဲသို့ ပြေးဝင်ကာ အသံတိတ် ငိုကြွေးပြီး 'ဒါ ငါ့အပြစ်ကြောင့် ဖြစ်ရတာ' ဟု ကိုယ့်ကိုယ်ကိုယ် အပြစ်တင်ခဲ့သည်။", desc: "Trauma Internalization — သင်သည် ငယ်စဉ်က ကြုံခဲ့ရသော စိတ်ဒဏ်ရာကို စာနာစိတ်ဖြင့် ကိုယ့်အပေါ် လွဲမှားစွာ သိမ်းဆည်းထားသူ ဖြစ်၏။ ပြဿနာတစ်ခုခုဖြစ်လျှင် သူတစ်ပါးကို မပြစ်တင်ဘဲ ကိုယ့်ကိုယ်ကိုယ် အလိုလို နောင်တရ၊ အပြစ်တင်တတ်သည့် ပူပန်မှု အရိပ်ဆိုး ခိုအောင်းနေတတ်ပါသည်။" },
            kha: { txt: "(ခ) စိတ်ထဲမှ အလွန်ဒေါသထွက်ကာ အော်ဟစ်ပေါက်ကွဲပစ်ပြီး ၎င်းတို့အား ရန်သူကဲ့သို့ စိမ်းကားစွာ တုံ့ပြန်ခဲ့သည်။", desc: "Trauma Externalization — သင်သည် မိမိကိုယ်ကို ထပ်မံနာကျင်ရခြင်းမှ ကာကွယ်ရန်အတွက် 'ဒေါသ' ကို လက်နက်အဖြစ် အသုံးပြုတတ်သူ ဖြစ်၏။ အပြင်ပန်းတွင် ခက်ထန်မာကျောသည်ဟု ထင်ရသော်လည်း အတွင်းစိတ်ထဲ၌ မလုံခြုံမှုနှင့် ကာကွယ်မှုမဲ့ခဲ့ရသော ကလေးငယ်တစ်ဦး ငိုကြွေးနေဆဲ ဖြစ်ပါသည်။" },
            ga: { txt: "(ဂ) အခြေအနေကို တည်ငြိမ်စွာ စောင့်ကြည့်ပြီး မိဘများ၏ စိတ်ပိုင်းဆိုင်ရာ မရင့်ကျက်မှုကို နားလည်ရန် ကြိုးစားကာ ရင့်ကျက်စွာ ရင်ဆိုင်ခဲ့သည်။", desc: "Conscious Observer — သင်သည် စိတ်ဒဏ်ရာကို အသိစိတ်ဖြင့် ဖြတ်တောက်နိုင်စွမ်းရှိသော လမ်းပြသူ ဖြစ်၏။ ပတ်ဝန်းကျင်၏ အဆိပ်အတောက် ဖြစ်စဉ်များကြားတွင် စိတ်ခံစားချက်နောက် လောကတ်မလိုက်ဘဲ အခြေအနေမှန်ကို အမှန်အတိုင်း ရှုမြင်သုံးသပ်နိုင်သော အတွင်းစိတ်အခြေခံ ရှိသူဖြစ်ပါသည်။" }

            kha: { txt: "(ခ) စိတ်မဝင်စားသလို ဟန်ဆောင်ကာ ၎င်းထံမှ ဖုန်းလာလျှင်ပင် မကိုင်ဘဲ ဥပေက္ခာပြုကာ စိတ်ဒဏ်ရာ ပြန်ပေးတတ်သည်။", desc: "Avoidant Attachment — နာကျင်ရမည်ကို ကြောက်သဖြင့် တစ်ဖက်လူနှင့် စိတ်ချင်းဝေးအောင် ကြိုတင်၍ တံခါးပိတ်ထားသူ ဖြစ်၏။ ရင်းနှီးမှု အနက်ရှိုင်းဆုံးအဆင့်သို့ ရောက်ရန် ကြောက်ရွံ့ပြီး စိတ်ခံစားချက်ကို ဖုံးကွယ်ကာ အေးစက်စွာ တုံ့ပြန်တတ်ပါသည်။" },

        },
        "19": {

        document.getElementById("opt-ka").innerText = activeQuiz.ka.txt;

        document.getElementById("opt-ga").innerText = activeQuiz.ga.txt;
    } else {
        document.getElementById("q-text").innerText = "Interactive Quiz data missing or out of scope for this page.";
        document.getElementById("options-group").style.display = "none";
    }

    function showAnalysis(answerKey) {
        // Safe Check Bounds
        if (!activeQuiz) return;

        // Hide Question Mechanics
        document.getElementById('quiz-flow').style.display = 'none';
        
        // Render Analysis Content
        document.getElementById('res-choice').innerText = activeQuiz[answerKey].txt;
        document.getElementById('res-desc').innerText = activeQuiz[answerKey].desc;
        
        // Display Interface Layouts
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('action-wrapper').style.display = 'block';
        
        // Scroll Framework to Top
        document.querySelector('.scrollable-content').scrollTop = 0;
    }

    function completeQuiz() {
        // Send unlocking message to parent iframe architecture safely
        window.parent.postMessage("quizCompleted", "*");
