<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ဩဇာတိက္ကမဖြင့် ခေတ်သစ်အမျိုးသမီးတို့အတွက် စိတ္တဇမဟာဗျူဟာများ | DASSY DIGITAL LIBRARY</title>
    
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="turn.js"></script>

    <style>
        :root { --crimson: #4a0e17; --dark-bg: #140204; --gold: #d4af37; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--dark-bg); font-family: 'Pyidaungsu', sans-serif; }
        
        .video-bg-container { position: fixed; inset: 0; z-index: 0; background: var(--dark-bg); }
        .video-bg-container video { width: 100%; height: 100%; object-fit: cover; }
        .video-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(20,2,4,0.85) 0%, rgba(74,14,23,0.5) 50%, rgba(20,2,4,0.95) 100%); z-index: 1; }
        
        #lock { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 20; color: #fff; text-align: center; padding: 20px; }
        .brand-label { font-size: 11px; color: var(--gold); letter-spacing: 5px; margin-bottom: 15px; font-weight: bold; }
        .book-title { color: #fff; font-weight: 900; letter-spacing: 2px; font-size: clamp(18px, 4.5vw, 26px); margin: 0; padding-top: 20px; width: 100%; max-width: 500px; line-height: 1.6; border-top: 1px solid rgba(212,175,55,0.2); }
        .book-subtitle { font-size: clamp(12px, 2.5vw, 14px); color: var(--gold); font-style: italic; letter-spacing: 1px; margin-bottom: 30px; width: 100%; max-width: 500px; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 20px; }

        #lock input { padding: 15px; width: 100%; max-width: 280px; border: none; border-bottom: 2px solid var(--gold); background: transparent; color: #fff; text-align: center; font-size: 18px; outline: none; margin-bottom: 30px; letter-spacing: 3px; }
        #lock button { padding: 15px 50px; width: 100%; max-width: 280px; background: linear-gradient(45deg, #8a1426, #d4af37, #8a1426); color: #fff; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 4px; }
        
        #book-container { display: none; width: 100vw; height: 100vh; position: relative; z-index: 10; opacity: 0; }
        #flipbook-wrapper { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        
        .fixed-watermark { position: fixed; bottom: 12px; left: 0; width: 100%; text-align: center; font-size: 9px; color: var(--gold); opacity: 0.5; letter-spacing: 2px; z-index: 99; pointer-events: none; }

        /* 🛠️ Floating Bookmark Button Style */
        #bookmark-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1500;
            padding: 8px 16px;
            background: rgba(20, 2, 4, 0.85);
            border: 1px solid var(--gold);
            color: var(--gold);
            font-size: 11px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        #bookmark-btn.bookmarked {
            background: var(--gold);
            color: #140204;
            box-shadow: 0 0 15px var(--gold);
        }

        /* 🛠️ စာမျက်နှာ ၁ သို့ ပြန်သွားရန် ခလုတ် Style */
        #restart-btn {
            display: none;
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1500;
            padding: 10px 22px;
            background: linear-gradient(45deg, #8a1426, #d4af37, #8a1426);
            color: #fff;
            border: none;
            font-size: 12px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        #restart-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        @media screen and (max-width: 768px) {
            #bookmark-btn {
                top: 15px;
                right: 15px;
                padding: 6px 12px;
                font-size: 10px;
            }
            #restart-btn {
                bottom: 45px;
                padding: 8px 18px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <div class="video-bg-container">
        <video autoplay loop muted playsinline poster="page1.jpg"><source src="video.mp4" type="video/mp4"></video>
        <div class="video-overlay"></div>
    </div>

    <div id="lock">
        <span class="brand-label">DASSY DIGITAL LIBRARY PRESENTS</span>
        <h1 class="book-title">ဩဇာတိက္ကမဖြင့်<br>ခေတ်သစ်အမျိုးသမီးတို့အတွက် စိတ္တဇမဟာဗျူဟာများ</h1>
        <div class="book-subtitle">"The Power of Presence & Sovereign Influence"</div>
        <input type="password" id="pass" placeholder="ACCESS KEY" autocomplete="off" onkeypress="if(event.key === 'Enter') unlock()">
        <button onclick="unlock()">ENTER THE SOVEREIGNTY</button>
    </div>

    <div id="book-container">
        <!-- 🛠️ Floating Bookmark Button -->
        <button id="bookmark-btn" onclick="toggleBookmark()">SAVE BOOKMARK</button>

        <!-- 🛠️ စာမျက်နှာ ၁ သို့ ပြန်သွားရန် ခလုတ် -->
        <button id="restart-btn" onclick="goToFirstPage()">↺ စာမျက်နှာ ၁ သို့ ပြန်သွားရန်</button>

        <div id="flipbook-wrapper">
            <div id="flipbook"></div>
        </div>
    </div>
    
    <div id="global-watermark" class="fixed-watermark" style="display:none;">PROPRIETARY MATERIAL | © DASSY DIGITAL LIBRARY</div>
    <audio id="sound" src="flip.mp3" preload="auto"></audio>

    <script>
        const myPassword = "#Sovereign#"; 
        const totalPages = 59; 
        const quizPages = [2, 14, 21, 28, 35, 43, 48, 55]; 
        let isQuizLocked = false;
        const storageBookmarkKey = "sovereign_saved_bookmark";
        const storageKeyAuth = "sovereign_authenticated";

        $(document).ready(function() {
            if (localStorage.getItem(storageKeyAuth) === "true") {
                $("#lock, .video-bg-container").hide();
                $("#book-container").show().css("opacity", 1);
                $("#global-watermark").show();
                loadAndInitBook();
            }
        });

        function getBookSize() { return { width: window.innerWidth, height: window.innerHeight }; }

        function unlock() {
            if(document.getElementById("pass").value === myPassword) {
                localStorage.setItem(storageKeyAuth, "true");
                $("#lock").fadeOut(500, () => {
                    $(".video-bg-container").fadeOut(500); 
                    $("#book-container").show().animate({opacity: 1}, 800);
                    $("#global-watermark").fadeIn(800);
                    loadAndInitBook();
                });
            } else { alert("ACCESS DENIED: ကုဒ်မှားယွင်းနေပါသည်။"); }
        }

        window.addEventListener("message", function(event) {
            if (event.data === "quizCompleted") {
                isQuizLocked = false;
                setTimeout(() => { $("#flipbook").turn("next"); }, 100);
            }
        }, false);

        /* 🛠️ Bookmark Toggle Function */
        function toggleBookmark() {
            const flipbook = $("#flipbook");
            const currentPage = flipbook.turn("page");
            const bookmarkedPage = localStorage.getItem(storageBookmarkKey);

            if (bookmarkedPage && parseInt(bookmarkedPage) === currentPage) {
                localStorage.removeItem(storageBookmarkKey);
            } else {
                localStorage.setItem(storageBookmarkKey, currentPage);
            }
            updateBookmarkButton(currentPage);
        }

        /* 🛠️ Update Bookmark UI Button */
        function updateBookmarkButton(page) {
            const btn = $("#bookmark-btn");
            const bookmarkedPage = localStorage.getItem(storageBookmarkKey);

            if (bookmarkedPage && parseInt(bookmarkedPage) === page) {
                btn.addClass("bookmarked");
                btn.text("UNSAVE BOOKMARK");
            } else {
                btn.removeClass("bookmarked");
                btn.text("SAVE BOOKMARK");
            }
        }

        /* 🛠️ စာမျက်နှာ ၁ သို့ ပြန်သွားရန် Function */
        function goToFirstPage() {
            $("#flipbook").turn("page", 1);
        }

        function loadAndInitBook() {
            const flipbook = $("#flipbook");
            if (flipbook.children().length > 0) return;
            const size = getBookSize();

            // 🛠️ Bookmark ရှိလျှင် သွားမည်၊ မရှိပါက Page 1 ကစမည်
            const savedBookmark = localStorage.getItem(storageBookmarkKey);
            let startPage = 1;
            if (savedBookmark) {
                startPage = parseInt(savedBookmark);
            }

            for(let i=1; i<=totalPages; i++) {
                const pageDiv = $('<div class="page" style="background:#140204;"></div>');
                if(quizPages.includes(i)) {
                    pageDiv.append(`<iframe src="page${i}.html" style="width:100%; height:100%; border:none;" scrolling="yes"></iframe>`);
                } else {
                 pageDiv.append($('<img style="width:100%; height:calc(100% - 20px); object-fit:fill;" />').attr('src', `page${i}.jpg`));
                }
                flipbook.append(pageDiv);
            }

            setTimeout(() => {
                flipbook.turn({
                    width: size.width, height: size.height, autoCenter: true, display: 'single', acceleration: true,
                    page: startPage,
                    when: {
                        turning: function(e, page) {
                            if (isQuizLocked) { e.preventDefault(); return; }
                            const s = document.getElementById("sound");
                            if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
                        },
                        turned: function(e, page) {
                            isQuizLocked = quizPages.includes(page);
                            updateBookmarkButton(page);

                            // 🛠️ နိဂုံးစာမျက်နှာ (Page 59) ရောက်လျှင် ခလုတ်ပြမည်
                            if (page === totalPages) {
                                $("#restart-btn").fadeIn(300);
                            } else {
                                $("#restart-btn").fadeOut(300);
                            }
                        }
                    }
                });

                updateBookmarkButton(startPage);

                if (startPage === totalPages) {
                    $("#restart-btn").show();
                }

            }, 100);
        }

        window.addEventListener('resize', () => {
            if ($("#flipbook").turn("is")) {
                const size = getBookSize();
                $("#flipbook").turn("size", size.width, size.height);
            }
        });
    </script>
</body>
</html>
