<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <meta name="keywords" content="Dassy, Dassy Digital Library, Relationship Psychology, Dark Psychology, Empress Scripts, Women Empowerment, Myanmar Ebook">
    <meta name="author" content="DASSY">
    <meta name="robots" content="index, follow">
    
    <!-- ========================================== -->
    <!-- 2. FACEBOOK, TELEGRAM & VIBER META TAGS (OG) -->
    <!-- ========================================== -->
    <meta property="og:title" content="ဩဇာတိက္ကမဖြင့် ခေတ်သစ်အမျိုးသမီးတို့အတွက် စိတ္တဇမဟာဗျူဟာများ | DASSY">
    <meta property="og:description" content="Master the psychology of relationships. Explore elite strategies and high-value sovereign scripts.">
    <meta property="og:type" content="book">
    <meta property="og:url" content="https://dassy-digital-library.github.io/"> 
    <meta property="og:image" content="page1.jpg"> 
    <meta property="og:site_name" content="DASSY DIGITAL LIBRARY">

    <!-- JS EXTERNAL LIBRARIES -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/3/turn.min.js"></script>

    <style>
        :root { 
            --crimson: #4a0e17; 
            --dark-bg: #140204;
            --gold: #d4af37; 
            --light-gold: #f3e5ab;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--dark-bg); font-family: 'Pyidaungsu', sans-serif; }
        
        /* Video Background Container */
        .video-bg-container { position: fixed; inset: 0; width: 100%; height: 100%; overflow: hidden; z-index: 0; background: var(--dark-bg); }
        .video-bg-container video { width: 100%; height: 100%; object-fit: cover; }
        .video-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(20,2,4,0.85) 0%, rgba(74,14,23,0.5) 50%, rgba(20,2,4,0.95) 100%); z-index: 1; }
        
        /* Lock Screen Styling */
        #lock { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; flex-direction: column; z-index: 20; backdrop-filter: blur(3px); color: #fff; text-align: center; padding: 20px; overflow-y: auto; }
        .brand-label { font-size: 11px; color: var(--gold); letter-spacing: 5px; margin-bottom: 15px; font-weight: bold; }
        .book-title { color: #fff; font-weight: 900; letter-spacing: 2px; font-size: clamp(18px, 4.5vw, 26px); margin: 0; padding-top: 20px; width: 100%; max-width: 500px; line-height: 1.6; border-top: 1px solid rgba(212,175,55,0.2); }
        .book-subtitle { font-size: clamp(12px, 2.5vw, 14px); color: var(--gold); font-style: italic; letter-spacing: 1px; margin-bottom: 30px; width: 100%; max-width: 500px; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 20px; }

        #lock input { padding: 15px; width: 100%; max-width: 280px; border: none; border-bottom: 2px solid var(--gold); background: transparent; color: #fff; text-align: center; font-size: 18px; outline: none; margin-bottom: 30px; letter-spacing: 3px; }
        #lock button { padding: 15px 50px; width: 100%; max-width: 280px; background: linear-gradient(45deg, #8a1426, #d4af37, #8a1426); color: #fff; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 4px; box-shadow: 0 4px 15px rgba(212,175,55,0.2); transition: transform 0.2s ease; }
        #lock button:active { transform: scale(0.98); }
        
        /* Book Interface CSS */
        #book-container { 
            display: none; 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            z-index: 10; 
            opacity: 0;
        }
        #flipbook-wrapper { 
            width: 100%; 
            height: calc(100% - 45px); /* အောက်ခြေ Watermark နေရာလွတ်အသေဖန်တီးပြီး စာအုပ်ကို ဗဟိုပို့ခြင်း */
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        /* Watermark Layer ကို အပေါ်ဆုံးသို့ ဆွဲတင်ထားခြင်း */
        .watermark { 
            position: fixed; 
            bottom: 15px; 
            left: 0;
            width: 100%; 
            text-align: center; 
            font-size: 9px; 
            color: var(--gold); 
            opacity: 0.4; 
            letter-spacing: 3px; 
            pointer-events: none; 
            z-index: 9999; /* Flipbook Element များ၏ အထက်သို့ ရောက်စေရန် */
        }
    </style>
</head>
<body>

    <div class="video-bg-container">
        <video autoplay loop muted playsinline poster="page1.jpg"><source src="video.mp4" type="video/mp4"></video>
        <div class="video-overlay"></div>
    </div>

    <!-- Password Lock Screen -->
    <div id="lock">
        <span class="brand-label">DASSY DIGITAL LIBRARY PRESENTS</span>
        <h1 class="book-title">ဩဇာတိက္ကမဖြင့်<br>ခေတ်သစ်အမျိုးသမီးတို့အတွက် စိတ္တဇမဟာဗျူဟာများ</h1>
        <div class="book-subtitle">"The Power of Presence & Sovereign Influence"</div>
        
        <input type="password" id="pass" placeholder="ACCESS KEY" autocomplete="off">
        <button onclick="unlock()">ENTER THE SOVEREIGNTY</button>
        <div style="margin-top: 30px;">
            <a href="https://t.me/Dassy_digital_Library" target="_blank" style="color: rgba(255,255,255,0.5); text-decoration: none; font-size: 11px; letter-spacing: 1px;">
                REQUEST PRIVATE ACCESS CODE FROM DASSY
            </a>
        </div>
    </div>

    <!-- FlipBook Container -->
    <div id="book-container">
        <div id="flipbook-wrapper"><div id="flipbook"></div></div>
        <div class="watermark">PROPRIETARY MATERIAL | © DASSY DIGITAL LIBRARY</div>
    </div>

    <audio id="sound" src="flip.mp3" preload="auto"></audio>

    <script>
        const myPassword = "#Sovereign#"; 
        const totalPages = 59; 
        
        const quizPages = [2, 14, 21, 28, 35, 43, 48, 55]; 
        let isQuizLocked = false; 

        document.getElementById("pass").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                unlock();
            }
        });

        // Quiz စနစ် ချောမွေ့မြန်ဆန်စေရန် အချက်ပြစနစ်ကို လက်ခံရယူခြင်း
        window.addEventListener("message", function(event) {
            if (event.data === "quizCompleted") {
                isQuizLocked = false; 
                // Delay အချိန်ကို အနည်းဆုံးသို့ လျှော့ချထားပြီး ချက်ချင်း စာမျက်နှာလှည့်စေခြင်း
                setTimeout(() => { 
                    $("#flipbook").turn("next"); 
                }, 100); 
            }
        }, false);

        function unlock() {
            if(document.getElementById("pass").value === myPassword) {
                $("#lock").fadeOut(500, () => {
                    $(".video-bg-container").fadeOut(500); 
                    $("#book-container").show().animate({opacity: 1}, 800);
                    loadAndInitBook();
                });
            } else { alert("ACCESS DENIED: အထူးဝင်ခွင့်ကုဒ် မှားယွင်းနေပါသည်။"); }
        }

        function loadAndInitBook() {
            const flipbook = $("#flipbook");
            
            // Watermark နှင့် မကွယ်စေရန်အတွက် Height ကို စနစ်တကျ တွက်ချက်ခြင်း
            let h = (window.innerHeight - 50) * 0.90;
            let w = (window.innerWidth < 600) ? window.innerWidth * 0.95 : h * 0.707;

            for(let i=1; i<=totalPages; i++) {
                const pageDiv = $('<div class="page" style="background:#140204;"></div>');
                
                if(quizPages.includes(i)) {
                    let quizFile = `page${i}.html`;
                    pageDiv.append(`<iframe src="${quizFile}" style="width:100%; height:100%; border:none; background:transparent; -webkit-overflow-scrolling:touch;" scrolling="yes"></iframe>`);
                } else {
                    pageDiv.append($('<img style="width:100%; height:100%; object-fit:contain;" />').attr('src', `page${i}.jpg`));
                }
                flipbook.append(pageDiv);
            }

            setTimeout(() => {
                flipbook.turn({
                    width: w, height: h, autoCenter: true, display: 'single', acceleration: true,
                    when: {
                        turning: function(e, page) {
                            if (isQuizLocked) { e.preventDefault(); return; }
                            const s = document.getElementById("sound");
                            if(s) { s.currentTime = 0; s.play().catch(()=>{}); }
                        },
                        turned: function(e, page) {
                            isQuizLocked = quizPages.includes(page);
                        }
                    }
                });
            }, 100);
        }
    </script>
</body>
</html>
